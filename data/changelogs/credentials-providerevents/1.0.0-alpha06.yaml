changelogHtml: |
  <h3 id="1.0.0-alpha06" data-text="Version 1.0.0-alpha06" tabindex="-1">Version 1.0.0-alpha06</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.credentials.providerevents:providerevents:1.0.0-alpha06</code>
    and
    <code translate="no" dir="ltr">androidx.credentials.providerevents:providerevents-play-services:1.0.0-alpha06</code>
    are released. Version 1.0.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c26c6f088b95903b7b9cd5e6f2092988f1e64dc3..1a508f033de883ba2853b9f9ae1853eec7010638/credentials/providerevents">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Creating a factory method for
      <code translate="no" dir="ltr">RegisterExportRequest</code>
      without the matcher (
      <a href="https://android-review.googlesource.com/#/q/I2e0334b977bd8482ee918df55d5336bca9ce3bd3">I2e033</a>
      )
    </li>
    <li>
      Removing unused
      <code translate="no" dir="ltr">ImportCredentialsException</code>
      helper methods (
      <a href="https://android-review.googlesource.com/#/q/If2d93c5699c2129c55120ebf1637345fcbdaa6d5">If2d93</a>
      )
    </li>
    <li>
      Removing unused
      <code translate="no" dir="ltr">ImportCredentialsException</code>
      helper methods (
      <a href="https://android-review.googlesource.com/#/q/Ibff001213b1363ec97a4e0483da742af090a06ba">Ibff00</a>
      )
    </li>
  </ul>
