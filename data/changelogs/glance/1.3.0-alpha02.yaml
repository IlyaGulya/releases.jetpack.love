version: 1.3.0-alpha02
releaseDate: 2026-07-01
#language=html
changelogHtml: |
  <h3 id="1.3.0-alpha02" data-text="Version 1.3.0-alpha02" tabindex="-1">Version 1.3.0-alpha02</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance:glance-*:1.3.0-alpha02</code>
    is released. Version 1.3.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe..ba3014c143b9c9782fe30bc766c5dced55e13453/glance">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">androidx.benchmark</code>
      now has a
      <code translate="no" dir="ltr">minSdk</code>
      of 24. (
      <a href="https://android-review.googlesource.com/#/q/Ic2a8500af8a2bf092fcc1b27d9a599aa5f3b81d7">Ic2a85</a>
      )
    </li>
    <li>
      Remove permission check from
      <code translate="no" dir="ltr">heartRateAccuracy</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I14269c1e05223e2b3b851749b40cf24b61e6be15">I14269</a>
      ,
      <a href="https://issuetracker.google.com/issues/522444636">b/522444636</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">androidx.glance.wear.health.DataType</code>
      to
      <code translate="no" dir="ltr">androidx.glance.wear.health.HealthData</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I4cb0b961829680053b1611b153d0c5ce9f5dcb0c">I4cb0b</a>
      ,
      <a href="https://issuetracker.google.com/issues/516746689">b/516746689</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">AssociateWithGlanceWearWidget</code>
      that
      <strong>must</strong>
      be used on the
      <code translate="no" dir="ltr">GlanceWearWidgetService</code>
      to provide which implementation of
      <code translate="no" dir="ltr">GlanceWearWidget</code>
      it is associated to. For example:
      <code translate="no" dir="ltr">@AssociateWithGlanceWearWidget(MyGlanceWearWidget::class)\n class MyGlanceWearWidgetService : GlanceWearWidgetService() {\n override val widget = MyGlanceWearWidget()\n }</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ifcabb316a0dc3fcd5fc0d5a5878fe8ad281ed8ad">Ifcabb</a>
      ,
      <a href="https://issuetracker.google.com/issues/514679763">b/514679763</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">image</code>
      brush to
      <code translate="no" dir="ltr">WearWidgetBrush</code>
      to support bitmap backgrounds in Wear Widgets. (
      <a href="https://android-review.googlesource.com/#/q/I9a22801ae1d5e5d5fe473a51b153f3e0e8e97312">I9a228</a>
      ,
      <a href="https://issuetracker.google.com/issues/513481558">b/513481558</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">isHeartRateBpmAvailable</code>
      to determine if
      <code translate="no" dir="ltr">heartRateBpm</code>
      is available on the host. (
      <a href="https://android-review.googlesource.com/#/q/I5999d40f4cd432e921a7b10ecdff67d566f0d06c">I5999d</a>
      ,
      <a href="https://issuetracker.google.com/issues/514641567">b/514641567</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteInt</code>
      compare operators. (
      <a href="https://android-review.googlesource.com/#/q/I5fe3d4e06e25650003dcea04cdef1c252612bf06">I5fe3d</a>
      ,
      <a href="https://issuetracker.google.com/issues/513228889">b/513228889</a>
      )
    </li>
    <li>
      Exposed
      <code translate="no" dir="ltr">captureRemoteDocument</code>
      Flow API and a new
      <code translate="no" dir="ltr">captureSingleRemoteDocument</code>
      overload (which takes
      <code translate="no" dir="ltr">RemoteCreationDisplayInfo</code>
      ) as public APIs. (
      <a href="https://android-review.googlesource.com/#/q/I87b0ef46ca9cbaae9375053ab8d0618921aa1957">I87b0e</a>
      ,
      <a href="https://issuetracker.google.com/issues/513228889">b/513228889</a>
      )
    </li>
    <li>
      Made
      <code translate="no" dir="ltr">PendingIntentAction</code>
      safe for IDE previews by deferring
      <code translate="no" dir="ltr">PendingIntent</code>
      access via a lambda and returning a no-op action in preview mode. (
      <a href="https://android-review.googlesource.com/#/q/I43b37f5d603065a63f99e3e41d0e0a1b76ad6c53">I43b37</a>
      ,
      <a href="https://issuetracker.google.com/issues/512403924">b/512403924</a>
      )
    </li>
    <li>
      Remove unused snap scrolling constant (
      <a href="https://android-review.googlesource.com/#/q/Ib6df66a8a4c18df5aaadb3240c4d2f3669831924">Ib6df6</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">WearWidgetPreview</code>
      for previewing Wear Widget in Android Studio (
      <a href="https://android-review.googlesource.com/#/q/I36504163576c4869ecd67732321dc7535edf3467">I36504</a>
      ,
      <a href="https://issuetracker.google.com/issues/485147770">b/485147770</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">is*Available</code>
      variables to verify if the related data type is available and valid. (
      <a href="https://android-review.googlesource.com/#/q/Ib98a78eec469c425b2ab8f3b231e9fae562437e0">Ib98a7</a>
      ,
      <a href="https://issuetracker.google.com/issues/498179656">b/498179656</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">triggerUpdateAll</code>
      API to
      <code translate="no" dir="ltr">GlanceWearWidget</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6ab20fe37b23d531d38c622e31acdbe4e1b83f3c">I6ab20</a>
      ,
      <a href="https://issuetracker.google.com/issues/510896410">b/510896410</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Propagate LocalInspectionMode to Remote Compose capture phase (
      <a href="https://android-review.googlesource.com/#/q/I6a56b8d53fd8b094bbd40db648b9dd116b129859">I6a56b</a>
      ,
      <a href="https://issuetracker.google.com/issues/512403924">b/512403924</a>
      )
    </li>
    <li>
      Include rendering schema version info in the WearWidgetParams (
      <a href="https://android-review.googlesource.com/#/q/Idcf8e6e180db390b74d2b283920d1f81dfb797b2">Idcf8e</a>
      ,
      <a href="https://issuetracker.google.com/issues/511263591">b/511263591</a>
      ,
      <a href="https://issuetracker.google.com/issues/512830184">b/512830184</a>
      )
    </li>
  </ul>
