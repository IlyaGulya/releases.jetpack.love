libraryId: glance
groupId: androidx.glance
version: 1.3.0-alpha01
releaseDate: 2026-05-19
#language=html
changelogHtml: |
  <h3 id="1.3.0-alpha01" data-text="Version 1.3.0-alpha01" tabindex="-1">Version 1.3.0-alpha01</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance:glance-*:1.3.0-alpha01</code>
    is released. Version 1.3.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/518791095d6e16ab6dc9987a05c425bbbea4b390..b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe/glance">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Expose
      <code translate="no" dir="ltr">glance.wear.health.DataType</code>
      APIs in Wear Widget. (
      <a href="https://android-review.googlesource.com/#/q/Id0d4b5aba010553afa6b886fb915b6ab9c391dee">Id0d4b</a>
      ,
      <a href="https://issuetracker.google.com/issues/498179813">b/498179813</a>
      )
    </li>
    <li>
      Add new wear-tooling-preview in group
      <code translate="no" dir="ltr">androidx.glance.wear</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ibdc9ce93633ca300afec1825645b731fe16a08bf">Ibdc9c</a>
      ,
      <a href="https://issuetracker.google.com/issues/485147770">b/485147770</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">ExperimentalGlanceWearApi</code>
      which will be used for experimental Glance Wear features. (
      <a href="https://android-review.googlesource.com/#/q/Id2f764bcb6fc427eb0e013e76e7554b172bc9f43">Id2f76</a>
      ,
      <a href="https://issuetracker.google.com/issues/498179813">b/498179813</a>
      )
    </li>
    <li>
      Bumps api and remote compose versions by 1 for glance (
      <a href="https://android-review.googlesource.com/#/q/Ia4ea3f965c358d16302d24f2ecdfab8776981326">Ia4ea3</a>
      )
    </li>
    <li>
      Change Widget update API to take
      <code translate="no" dir="ltr">WidgetInstanceId</code>
      and add helper for fetching IDs for a given widget. The new api throws
      <code translate="no" dir="ltr">IllegalArgumentException</code>
      if the provided id is invalid or not owned by the caller. (
      <a href="https://android-review.googlesource.com/#/q/I6f3c5d0fe4d2e7fa94fecfa3333eb6fa7b424779">I6f3c5</a>
      ,
      <a href="https://issuetracker.google.com/issues/446828899">b/446828899</a>
      )
    </li>
    <li>
      Add vertical and horizontal gradient in
      <code translate="no" dir="ltr">WearWidgetBrush</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/If70ae449194e0c30c43053cdbcd7ed8fed3d6fdb">If70ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/470080675">b/470080675</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">CONTAINER_TYPE_FULLSCREEN</code>
      to
      <code translate="no" dir="ltr">CONTAINER_TYPE_TILE_COMPAT</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6c1ddc334b6b78e9c4b83eab20ff414fae241c4d">I6c1dd</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">WearWidgetBrush</code>
      for Wear Widget background. (
      <a href="https://android-review.googlesource.com/#/q/I66f54dde07793ac7a00c48d374ec04824b9b3858">I66f54</a>
      ,
      <a href="https://issuetracker.google.com/issues/464273091">b/464273091</a>
      )
    </li>
    <li>
      Change
      <code translate="no" dir="ltr">RemoteBox</code>
      alignment to accept a single
      <code translate="no" dir="ltr">RemoteAlignment</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I0bfbf28c95045d517cdd1bd99377895fbca0a376">I0bfbf</a>
      ,
      <a href="https://issuetracker.google.com/issues/471212869">b/471212869</a>
      )
    </li>
    <li>
      Remove
      <code translate="no" dir="ltr">fetchActiveWidgetsForProvider</code>
      api. (
      <a href="https://android-review.googlesource.com/#/q/I85e4e22abd2144a97e4b2765f285c204bbe0c2ab">I85e4e</a>
      ,
      <a href="https://issuetracker.google.com/issues/486197890">b/486197890</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">GlanceWearWidgetManager</code>
      to allow apps to query their active widgets and tiles. (
      <a href="https://android-review.googlesource.com/#/q/I5be95954c759493c4bf978b812e5a5e53daf6394">I5be95</a>
      ,
      <a href="https://issuetracker.google.com/issues/429980862">b/429980862</a>
      )
    </li>
    <li>
      Expose common Remote Composable and Modifier types (
      <a href="https://android-review.googlesource.com/#/q/Id1d40acae7af63f9acb99438adaa992035fd3c01">Id1d40</a>
      )
    </li>
    <li>
      Move APIs in
      <code translate="no" dir="ltr">glance:wear:wear-core</code>
      into the package
      <code translate="no" dir="ltr">androidx.glance.wear.core</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I429cf4c36d27bc8fc01115194b20806f10950dde">I429cf</a>
      )
    </li>
    <li>
      Add support for Interaction Events to
      <code translate="no" dir="ltr">GlanceWearWidget</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ia4e285fc6cab170b37cb647a2a2749c82d2d347e">Ia4e28</a>
      ,
      <a href="https://issuetracker.google.com/issues/469808447">b/469808447</a>
      )
    </li>
    <li>
      Add snap scrolling support when remote compose is used (
      <a href="https://android-review.googlesource.com/#/q/I0ca9de6918645b6284821376b6b905a8c343413d">I0ca9d</a>
      )
    </li>
    <li>
      Expose minimal public API for Glance Wear infra. (
      <a href="https://android-review.googlesource.com/#/q/I7b4b99bb71b0b874acfbb77cbec7e7ec2eb85403">I7b4b9</a>
      ,
      <a href="https://issuetracker.google.com/issues/467532762">b/467532762</a>
      )
    </li>
    <li>
      Return
      <code translate="no" dir="ltr">CapturedDocument</code>
      from
      <code translate="no" dir="ltr">captureSingleRemoteDocument</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I5a2832bcd1eb4b54e82a413452d1146565925b81">I5a283</a>
      ,
      <a href="https://issuetracker.google.com/issues/467532762">b/467532762</a>
      )
    </li>
    <li>
      Add wear widget background color api and mark widget content private. (
      <a href="https://android-review.googlesource.com/#/q/I98d9a4a4e04a5fe857b74436ed562794944795e3">I98d9a</a>
      ,
      <a href="https://issuetracker.google.com/issues/449785790">b/449785790</a>
      )
    </li>
    <li>
      Expose basic document creation API (
      <a href="https://android-review.googlesource.com/#/q/I755a24392268e447a0fd47e27c53ca5f17330df7">I755a2</a>
      )
    </li>
    <li>
      Expose container types as public resources. (
      <a href="https://android-review.googlesource.com/#/q/Iff47ff8e19c8a17c6c0400facac1772b6d6c7211">Iff47f</a>
      )
    </li>
    <li>
      Add missing
      <code translate="no" dir="ltr">@Throws</code>
      annotation. (
      <a href="https://android-review.googlesource.com/#/q/Id20f35e245f678b7d1d5a050d011c8de878cd7f7">Id20f3</a>
      )
    </li>
    <li>
      Introduce
      <code translate="no" dir="ltr">WidgetInstanceId</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I143756b5351de702615447d9312eeb919227d131">I14375</a>
      )
    </li>
    <li>
      Add annotation to the getters of
      <code translate="no" dir="ltr">WearWidgetParams</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I78c018a9f99fdfde97aa457e6b1198a5520075d7">I78c01</a>
      ,
      <a href="https://issuetracker.google.com/issues/449785790">b/449785790</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">WearWidgetRequest</code>
      to
      <code translate="no" dir="ltr">WearWidgetParams</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I2d4e00c1367f1711774b40af1a9a748a6bde3af9">I2d4e0</a>
      ,
      <a href="https://issuetracker.google.com/issues/462031396">b/462031396</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">WearWidgetContent</code>
      to
      <code translate="no" dir="ltr">WearWidgetDocument</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ifa006e7e33bbf700e1480ee7ea123deb54ca2ce1">Ifa006</a>
      ,
      <a href="https://issuetracker.google.com/issues/462031396">b/462031396</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated Compose
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
    <li>
      Add default Wear Widget background when
      <code translate="no" dir="ltr">WearWidgetBrush</code>
      is empty or not specified. (
      <a href="https://android-review.googlesource.com/#/q/I8300b8047772ed0bcafbc0d37cd0da8e0307ad88">I8300b</a>
      )
    </li>
    <li>
      Add wear widget background painter api. (
      <a href="https://android-review.googlesource.com/#/q/Id883ef1726e29cd03c9d469a969035f02609bacc">Id883e</a>
      ,
      <a href="https://issuetracker.google.com/issues/449785790">b/449785790</a>
      )
    </li>
  </ul>
  <h2 id="version_12_2" data-text="Version 1.2" tabindex="-1">Version 1.2</h2>
