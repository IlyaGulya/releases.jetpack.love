      )
    </li>
  </ul>
  <h3 id="version_21_8" data-text="Version 2.1" tabindex="-1">Version 2.1</h3>
  <h4 id="games-frame-pacing-2.1.3" data-text="Version 2.1.3" tabindex="-1">Version 2.1.3</h4>
  <p>July 2, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.1.3</code>
    is released. Version 2.1.3 contains
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/a29e855e6f39df2ba1ef83eb7897c257ee717d66..f81f888fe11e9540dd580edf5993232172ed3cbe/games-frame-pacing">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Enables support for 16KB page size.</li>
  </ul>
  <h4 id="games-frame-pacing-2.1.2" data-text="Version 2.1.2" tabindex="-1">Version 2.1.2</h4>
  <p>July 24, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.1.2</code>
    is released. Version 2.1.2 contains
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/394f81c696e264c403a8491dd6e37aa89e3da00d..a29e855e6f39df2ba1ef83eb7897c257ee717d66/games-frame-pacing">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Swappy now uses
      <code translate="no" dir="ltr">AChoreographer_postVsyncCallback</code>
      from API 33 to calculate the presentation time more accurately. This fixes a bug on 120hz devices where frames are dropped.
    </li>
  </ul>
  <h4 id="games-frame-pacing-2.1.1" data-text="Version 2.1.1" tabindex="-1">Version 2.1.1</h4>
  <p>July 10, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.1.1</code>
    is released. Version 2.1.1 contains
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/4880f53064c0abc7f2adaa4895e0c9e1c0ade08b..394f81c696e264c403a8491dd6e37aa89e3da00d/games-frame-pacing">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Properly unregister display listener from swappy to avoid a hang.</li>
    <li>
      Fix a crash in
      <code translate="no" dir="ltr">ChoreographerFilter::onSettingsChanged</code>
      using destroyed mutex.
    </li>
  </ul>
  <h4 id="games-frame-pacing-2.1.0" data-text="Version 2.1.0" tabindex="-1">Version 2.1.0</h4>
  <p>November 15, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.1.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/408e113fbcd92d04fc5bd273bc2ba1f3a1109488..4880f53064c0abc7f2adaa4895e0c9e1c0ade08b/games-frame-pacing">Version 2.1.0 contains these commits.</a>
  </p>
  <h4 id="games-frame-pacing-2.1.0-rc01" data-text="Version 2.1.0-rc01" tabindex="-1">Version 2.1.0-rc01</h4>
  <p>September 20, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.1.0-rc01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/3643862ac9c7c2fe01ab511cc602e158db1dd21b..408e113fbcd92d04fc5bd273bc2ba1f3a1109488/games-frame-pacing">Version 2.1.0-rc01 contains these commits.</a>
  </p>
  <h4 id="games-frame-pacing-2.1.0-beta01" data-text="Version 2.1.0-beta01" tabindex="-1">Version 2.1.0-beta01</h4>
  <p>May 24, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.1.0-beta01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/5262617d2206673e2e8548596331ead5c0ec41a8..3643862ac9c7c2fe01ab511cc602e158db1dd21b/games-frame-pacing">Version 2.1.0-beta01 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Timeout in case
      <code translate="no" dir="ltr">NDKChoreographer</code>
      initialization fails (
      <a href="https://android-review.googlesource.com/#/q/I02d718cb655ddf3d6a4fbf0ad74e5956dd3eeded">ef466d</a>
      )
    </li>
    <li>
      When using
      <code translate="no" dir="ltr">SwappyGL_getSupportedRefreshPeriodsNS</code>
      query refresh rates explicitly from the system (
      <a href="https://android-review.googlesource.com/#/q/I9e31c9ac4790c75e64338f497b67d2a72c33f301">c85235</a>
      )
    </li>
  </ul>
  <h4 id="games-frame-pacing-2.1.0-alpha01" data-text="Version 2.1.0-alpha01" tabindex="-1">Version 2.1.0-alpha01</h4>
  <p>April 5, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.1.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/6bd669c3efdee9b9c81e185d81ee21c8366b8b7d..5262617d2206673e2e8548596331ead5c0ec41a8/games-frame-pacing">Version 2.1.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>New API to reset the frame-pacing state.</li>
    <li>New API to disable swappy’s frame-pacing impact while still observing the CPU &amp; GPU times.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">SwappyGL_resetFramePacing/SwappyVk_resetFramePacing</code>
      can now be used to reset the internal frame-pacing state. The frame pacing will now only consider data from the point when the reset API is called.
    </li>
    <li>
      <code translate="no" dir="ltr">SwappyGL_enableFramePacing/SwappyVk_enableFramePacing</code>
      can now be used to enable/disable swappy’s frame pacing. When disabled,
    </li>
    <li>
      <code translate="no" dir="ltr">SwappyGL_enableBlockingWait/SwappyVk_enableBlockingWait</code>
      can be used to control whether a blocking wait of the last frame’s GPU work happens when frame-pacing is disabled.
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Performance improvements are made for GPU bound cases when using Swappy GL API.</li>
  </ul>
  <h3 id="version_20_12" data-text="Version 2.0" tabindex="-1">Version 2.0</h3>
  <h4 id="games-frame-pacing-2.0.0" data-text="Version 2.0.0" tabindex="-1">Version 2.0.0</h4>
  <p>March 8, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.0.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/c1b2d4ff92af5ccfa4d345a21f67f1690fba1eaf..e1e20061358fd38e7f014d4d02b9e2878c2169a9/games-frame-pacing">Version 2.0.0 contains these commits.</a>
  </p>
  <p><strong>Important changes since 1.10.1</strong></p>
  <ul>
    <li>The build system went through major changes leading to only one library generated instead of multiple per SDK/NDK version.</li>
    <li>Vulkan Frame Statistics are added.</li>
    <li>A new API for clearing frame statistics is added.</li>
    <li>The logs are all silent in release mode, they can be enabled in debug mode.</li>
  </ul>
  <h4 id="games-frame-pacing-2.0.0-rc01" data-text="Version 2.0.0-rc01" tabindex="-1">Version 2.0.0-rc01</h4>
  <p>February 22, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.0.0-rc01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/27573e27acd71cc7ba80ce592c76611edc3b6328..83d676655ca28ed426bdaf0602bb3046cbf79ce8/games-frame-pacing">Version 2.0.0-rc01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Logging is now hidden behind a compile flag. By default release build of the library has no logging, and debug release of the library has all the logging turned on.</li>
  </ul>
  <h4 id="games-frame-pacing-2.0.0-beta01" data-text="Version 2.0.0-beta01" tabindex="-1">Version 2.0.0-beta01</h4>
  <p>February 8, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.0.0-beta01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/fd1ddaa12b110384031f09fb8fb6b96d80f896c4..27573e27acd71cc7ba80ce592c76611edc3b6328/games-frame-pacing">Version 2.0.0-beta01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>New API introduced to clear frame statistics.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">SwappyGL_clearStats</code>
      and
      <code translate="no" dir="ltr">SwappyGL_clearStats</code>
      APIs.
    </li>
  </ul>
  <h4 id="games-frame-pacing-2.0.0-alpha01" data-text="Version 2.0.0-alpha01" tabindex="-1">Version 2.0.0-alpha01</h4>
  <p>January 11, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.0.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/c1b2d4ff92af5ccfa4d345a21f67f1690fba1eaf..fd1ddaa12b110384031f09fb8fb6b96d80f896c4/games-frame-pacing">Version 2.0.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Added vulkan frame statistics</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>Major version increase due to build files refactoring</li>
    <li>
      Added 3 new APIs :
      <code translate="no" dir="ltr">SwappyVk_enableStats</code>
      ,
      <code translate="no" dir="ltr">SwappyVk_recordFrameStart</code>
      , and
      <code translate="no" dir="ltr">SwappyVk_getStats</code>
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Apply threshold only in auto swap mode (
      <a href="https://android-review.googlesource.com/c/platform/frameworks/opt/gamesdk/+/2281447">Ic0786</a>
      )
    </li>
  </ul>
