changelogHtml: |
  <h3 id="games-performance-tuner-1.4.3" data-text="Version 1.4.3" tabindex="-1">Version 1.4.3</h3>
  <p>July 12, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.4.3</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/66204fc44cbcee003287d7a37f98eefd22bca9dc..c6508fc0745ecbc0bccc6e55bcc47aefc0ada7a8/src/tuningfork">Version 1.4.3 contains these commits.</a>
  </p>
  <p><strong>Important changes since 1.1.0</strong></p>
  <ul>
    <li>Updated to match internal versioning scheme.</li>
  </ul>
  <h3 id="version_11_7" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="games-performance-tuner-1.1.0" data-text="Version 1.1.0" tabindex="-1">Version 1.1.0</h4>
  <p>June 30, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.1.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/11d9f8ed1ee4f04f87dd8ab0ef7c0690e63e1078..66204fc44cbcee003287d7a37f98eefd22bca9dc/src/tuningfork">Version 1.1.0 contains these commits.</a>
  </p>
  <h4 id="games-performance-tuner-1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>June 2, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.1.0-rc01</code>
    is released. Version 1.1.0-rc01 contains these commits.
  </p>
  <h4 id="games-performance-tuner-1.1.0-beta03" data-text="Version 1.1.0-beta03" tabindex="-1">Version 1.1.0-beta03</h4>
  <p>April 21, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.1.0-beta03</code>
    is released.
  </p>
  <h4 id="games-performance-tuner-1.1.0-beta02" data-text="Version 1.1.0-beta02" tabindex="-1">Version 1.1.0-beta02</h4>
  <p>February 24, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.1.0-beta02</code>
    is released.
  </p>
  <h4 id="games-performance-tuner-1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h4>
  <p>December 16, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.1.0-beta01</code>
    is released.
  </p>
  <h4 id="games-performance-tuner-1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h4>
  <p>androidx.games:games-performance-tuner:1.1.0-alpha01 is released.</p>
  <h2 id="games-controller_2" data-text="Games-Controller" tabindex="-1">Games-Controller</h2>
  <h3 id="version_23_3" data-text="Version 2.3" tabindex="-1">Version 2.3</h3>
  <h4 id="games-controller-2.3.0-alpha01" data-text="Version 2.3.0-alpha01" tabindex="-1">Version 2.3.0-alpha01</h4>
  <p>August 13, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:2.3.0-alpha01</code>
    ,
    <code translate="no" dir="ltr">androidx.games:games-memory-advice:2.3.0-alpha01</code>
    , and
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:2.3.0-alpha01</code>
    are released. Version 2.3.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/044fd03c4a7d3b75aeb6ca2bd7fb6155d2cdb787..2ae5d1f41c01ac94f38b46132b1f45f4346fa773/games-controller">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Support 16kb page sizes by default.</li>
  </ul>
  <h3 id="version_22_2" data-text="Version 2.2" tabindex="-1">Version 2.2</h3>
  <h4 id="games-controller-2.2.0-alpha01" data-text="Version 2.2.0-alpha01" tabindex="-1">Version 2.2.0-alpha01</h4>
  <p>March 26, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:2.2.0-alpha01</code>
    ,
    <code translate="no" dir="ltr">androidx.games:games-memory-advice:2.2.0-alpha01</code>
    , and
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:2.2.0-alpha01</code>
    are released. Version 2.2.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/2d7d35fc499735fa5de5990ec261c306b56462f5..044fd03c4a7d3b75aeb6ca2bd7fb6155d2cdb787/games-controller">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Upgrade to Gradle 8.8.1 (
      <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+/1ed0153">1ed0153</a>
      )
    </li>
    <li>
      Upgrade to Java 17 (
      <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+/1ed0153">1ed0153</a>
      )
    </li>
    <li>
      Change
      <code translate="no" dir="ltr">targetSdk</code>
      to 35 (
      <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+/eddf605">eddf605</a>
      )
    </li>
  </ul>
  <h3 id="version_20_11" data-text="Version 2.0" tabindex="-1">Version 2.0</h3>
  <h4 id="games-controller-2.0.2" data-text="Version 2.0.2" tabindex="-1">Version 2.0.2</h4>
  <p>June 12, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:2.0.2</code>
    is released. Version 2.0.2 contains
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/f1ebe620d10210d1ec538e250b6066c487a7f42b..b832f08a5a2c2785f393ae99ad9af81922c2a337/games-controller">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed issue where controller connected callbacks were not firing for controllers already connected before
      <code translate="no" dir="ltr">Paddleboat_init</code>
      .
    </li>
    <li>
      Fixed issue where game controller touchpads were not registering touchpad presses in
      <code translate="no" dir="ltr">Paddleboat_processGameActivityMotionInputEvent</code>
      without manually enabling the pressure axis.
    </li>
    <li>
      Fixed issue where game controller touchpad events were not being marked as consumed by
      <code translate="no" dir="ltr">Paddleboat_processGameActivityMotionInputEvent</code>
      .
    </li>
  </ul>
  <h4 id="games-controller-2.0.1" data-text="Version 2.0.1" tabindex="-1">Version 2.0.1</h4>
  <p>September 20, 2023</p>
  <p>
    `androidx.games:games-controller:2.0.1 ' is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/e1e20061358fd38e7f014d4d02b9e2878c2169a9..f1ebe620d10210d1ec538e250b6066c487a7f42b/games-controller">Version 2.0.1 contains these commits.</a>
  </p>
  <p>Games Controller Bug fixes:</p>
  <ul>
    <li>
      Fix rare
      <code translate="no" dir="ltr">NullReferenceException</code>
      condition in
      <code translate="no" dir="ltr">onInputDeviceChanged</code>
      handler.
    </li>
    <li>Fix to prevent certain USB keyboards from improperly registering as game controllers.</li>
  </ul>
  <h4 id="games-controller-2.0.0" data-text="Version 2.0.0" tabindex="-1">Version 2.0.0</h4>
  <p>March 8, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:2.0.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/c1b2d4ff92af5ccfa4d345a21f67f1690fba1eaf..e1e20061358fd38e7f014d4d02b9e2878c2169a9/games-controller">Version 2.0.0 contains these commits.</a>
  </p>
  <p><strong>Major features of 2.0.0</strong></p>
  <ul>
    <li>Added ability to detect connection status of hardware keyboards.</li>
    <li>Added ability to report motion data (accelerometer/gyroscope) from the main device (i.e. handset) as well as controllers.</li>
    <li>Changed API and format for the controller definition database to reduce memory footprint and support additional features.</li>
  </ul>
  <h4 id="games-controller-2.0.0-alpha01" data-text="Version 2.0.0-alpha01" tabindex="-1">Version 2.0.0-alpha01</h4>
  <p>January 11, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:2.0.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/c1b2d4ff92af5ccfa4d345a21f67f1690fba1eaf..fd1ddaa12b110384031f09fb8fb6b96d80f896c4/games-controller">Version 2.0.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Hardware keyboard detection</li>
    <li>Integrated sensor motion data reporting support (i.e. receiving gyroscope and accelerometer data from the phone itself)</li>
    <li>New optimized controller mapping data format</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      New API calls for hardware keyboard:
      <code translate="no" dir="ltr">Paddleboat_getPhysicalKeyboardStatus</code>
      and
      <code translate="no" dir="ltr">Paddleboat_setPhysicalKeyboardStatusCallback</code>
    </li>
    <li>
      New API calls for integrated sensor motion data reporting:
      <code translate="no" dir="ltr">Paddleboat_getIntegratedMotionSensorFlags</code>
      and
      <code translate="no" dir="ltr">Paddleboat_setMotionDataCallbackWithIntegratedFlags</code>
    </li>
    <li>
      New API calls for revised controller mapping data format:
      <code translate="no" dir="ltr">Paddleboat_addControllerRemapDataFromFd</code>
      ,
      <code translate="no" dir="ltr">Paddleboat_addControllerRemapDataFromFileBuffer</code>
    </li>
    <li>
      Deprecated old mapping API calls:
      <code translate="no" dir="ltr">Paddleboat_addControllerRemapData</code>
      and
      <code translate="no" dir="ltr">Paddleboat_getControllerRemapTableData</code>
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Fixed compatibility issue with motion events from GameActivity 1.2.2 and higher</li>
  </ul>
  <h3 id="version_11_8" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="games-controller-1.1.0" data-text="Version 1.1.0" tabindex="-1">Version 1.1.0</h4>
  <p>February 23, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-activity:1.1.0</code>
    and
    <code translate="no" dir="ltr">androidx.games:games-controller:1.1.0</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/4f851ef851998ea2cb65dad519f595377fd73fcf..ac44a0dd8d5c0a5919346be5df11d473fdb87151/GameActivity">Version 1.1.0 contains these commits.</a>
  </p>
  <p><strong>Important changes since 1.0.0</strong></p>
  <p>Games Activity:</p>
  <ul>
    <li>WindowInsets listening and querying for notch and IME response</li>
    <li>Add key and motion event filters</li>
    <li>
      Bug fixes:
      <ul>
        <li>Add missing messages for compatibility with NativeActivity</li>
        <li>Fix signature of onNativeWindowResized</li>
        <li>Fix input event losses</li>
      </ul>
    </li>
  </ul>
  <h4 id="games-controller-1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>February 9, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:1.1.0-rc01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/60b0ddc9b45463685713d52558c2fa62c4ca50bb..4f851ef851998ea2cb65dad519f595377fd73fcf/GameActivity">Version 1.1.0-rc01 contains these commits.</a>
  </p>
  <h4 id="games-controller-1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h4>
  <p>January 26, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:1.1.0-beta01</code>
    is released with no changes since
    <code translate="no" dir="ltr">1.1.0-alpha01</code>
    .
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/e8e9971ec507a219142344409f5176cc4aea8b3f..60b0ddc9b45463685713d52558c2fa62c4ca50bb/src/paddleboat">Version 1.1.0-beta01 contains these commits.</a>
  </p>
  <h4 id="games-controller-1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h4>
  <p>December 15, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:1.1.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/565cb7b2f1f88bc527c07a1512ab6ae719b7990d..e8e9971ec507a219142344409f5176cc4aea8b3f/src/paddleboat">Version 1.1.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <p>Added support for battery status, dual-motor vibration, light control and motion axis reporting on supported controllers when running on Android S or higher.</p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">Paddleboat_setMotionDataCallback</code>
      function for registering controller motion data callbacks
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">Paddleboat_setControllerLight</code>
      function for changing controller light settings.
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">Paddleboat_Controller_Battery</code>
      structure to
      <code translate="no" dir="ltr">Paddleboat_Controller_Data</code>
    </li>
    <li>
      New structures:
      <ul>
        <li><code translate="no" dir="ltr">Paddleboat_Controller_Battery</code></li>
        <li><code translate="no" dir="ltr">Paddleboat_Motion_Data</code></li>
      </ul>
    </li>
    <li>
      New enums:
      <ul>
        <li><code translate="no" dir="ltr">Paddleboat_BatteryStatus</code></li>
        <li><code translate="no" dir="ltr">Paddleboat_LightType</code></li>
        <li><code translate="no" dir="ltr">Paddleboat_Motion_Type</code></li>
      </ul>
    </li>
    <li>
      New controller flags:
      <ul>
        <li><code translate="no" dir="ltr">PADDLEBOAT_CONTROLLER_FLAG_ACCELEROMETER</code></li>
        <li><code translate="no" dir="ltr">PADDLEBOAT_CONTROLLER_FLAG_GYROSCOPE</code></li>
        <li><code translate="no" dir="ltr">PADDLEBOAT_CONTROLLER_FLAG_LIGHT_PLAYER</code></li>
        <li><code translate="no" dir="ltr">PADDLEBOAT_CONTROLLER_FLAG_LIGHT_RGB</code></li>
        <li><code translate="no" dir="ltr">PADDLEBOAT_CONTROLLER_FLAG_BATTERY</code></li>
      </ul>
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Added alternate deviceId database entry for PS4 controller</li>
    <li>Added API &gt;=31 database entry for PS5 controller</li>
  </ul>
  <h3 id="version_10_4" data-text="Version 1.0" tabindex="-1">Version 1.0</h3>
  <h4 id="games-controller-1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h4>
  <p>August 4, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-activity:1.0.0</code>
    ,
    <code translate="no" dir="ltr">androidx.games:games-controller:1.0.0</code>
    , and
    <code translate="no" dir="ltr">androidx.games:games-text-input:1.0.0</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/c6508fc0745ecbc0bccc6e55bcc47aefc0ada7a8..565cb7b2f1f88bc527c07a1512ab6ae719b7990d/src/paddleboat">Version 1.0.0 contains these commits.</a>
  </p>
  <p><strong>Major features of 1.0.0</strong></p>
  <p>
    This is the initial release to stable of Games-Activity, Games-Controller and Games-Text-Input. See the
    <a href="https://developer.android.com/games/agdk">AGDK Home Page</a>
    for more information.
  </p>
  <h4 id="games-controller-1.0.0-rc02" data-text="Version 1.0.0-rc02" tabindex="-1">Version 1.0.0-rc02</h4>
  <p>July 21, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:1.0.0-rc02</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/c6508fc0745ecbc0bccc6e55bcc47aefc0ada7a8..c87dbd94f9a843d9a766afb6de82957457b96c05/src/paddleboat">Version 1.0.0-rc02 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Fixed packaging error that caused Prefab import to fail on empty, unused architecture/version permutations.</li>
  </ul>
  <h4 id="games-controller-1.0.0-rc01" data-text="Version 1.0.0-rc01" tabindex="-1">Version 1.0.0-rc01</h4>
  <p>July 12, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:1.0.0-rc01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/66204fc44cbcee003287d7a37f98eefd22bca9dc..c6508fc0745ecbc0bccc6e55bcc47aefc0ada7a8/GameController">Version 1.0.0-rc01 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an incompatibility issue with the latest
      <code translate="no" dir="ltr">GameActivity</code>
    </li>
  </ul>
  <h4 id="games-controller-1.0.0-beta01" data-text="Version 1.0.0-beta01" tabindex="-1">Version 1.0.0-beta01</h4>
  <p>June 30, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:1.0.0-beta01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/66204fc44cbcee003287d7a37f98eefd22bca9dc/GameController">Version 1.0.0-beta01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Functions which returned a boolean for success or failure now return a
      <code translate="no" dir="ltr">Paddleboat_Error_Code</code>
      enum.
    </li>
    <li>
      <code translate="no" dir="ltr">Paddleboat_onPause</code>
      renamed to
      <code translate="no" dir="ltr">Paddleboat_onStop</code>
    </li>
    <li>
      <code translate="no" dir="ltr">Paddleboat_onResume</code>
      renamed to
      <code translate="no" dir="ltr">Paddleboat_onStart</code>
    </li>
    <li>
      Paddleboat_processGameActivityEvent split into two functions:
      <code translate="no" dir="ltr">Paddleboat_processGameActivityKeyInputEvent</code>
      and
      <code translate="no" dir="ltr">Paddleboat_processGameActivityMotionInputEvent</code>
    </li>
    <li>Removed extended controller features that required building against a preview Android S SDK</li>
    <li>
      Added
      <code translate="no" dir="ltr">Paddleboat_getBackButtonConsumed</code>
      function
    </li>
    <li>Controller and mouse status callbacks now have an optional parameter of a pointer to user defined data</li>
    <li>
      Moved controller name string out of device info structure, now accessed via
      <code translate="no" dir="ltr">Paddleboat_getControllerName</code>
      function
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Fixed an issue where a controller that doesn’t initially report itself as a controller, but later on does via an onInputDeviceChanged message, wasn’t being properly detected as a controller connection.</li>
  </ul>
  <h4 id="games-controller-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h4>
  <p>June 16, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-controller:1.0.0-alpha01</code>
    is released.
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Games-Controller is a new library that provides a C API for detecting, reading input from, and interacting with game controller devices.</li>
  </ul>
  <h2 id="games-frame-pacing_2" data-text="Games-Frame-Pacing" tabindex="-1">Games-Frame-Pacing</h2>
  <h3 id="version_23_4" data-text="Version 2.3" tabindex="-1">Version 2.3</h3>
  <h4 id="games-frame-pacing-2.3.0-alpha01" data-text="Version 2.3.0-alpha01" tabindex="-1">Version 2.3.0-alpha01</h4>
  <p>March 26, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-frame-pacing:2.3.0-alpha01</code>
    is released. Version 2.3.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/a29e855e6f39df2ba1ef83eb7897c257ee717d66..044fd03c4a7d3b75aeb6ca2bd7fb6155d2cdb787/games-frame-pacing">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Upgrade to Gradle 8.8.1 (
      <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+/1ed0153">1ed0153</a>
      )
    </li>
    <li>
      Upgrade to Java 17 (
      <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+/1ed0153">1ed0153</a>
      )
    </li>
    <li>
      Change
