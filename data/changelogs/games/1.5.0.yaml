changelogHtml: |
  <h3 id="version_150_3" data-text="Version 1.5.0" tabindex="-1">Version 1.5.0</h3>
  <h4 id="games-performance-tuner-1.5.0" data-text="Version 1.5.0" tabindex="-1">Version 1.5.0</h4>
  <p>February 9, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.5.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/60b0ddc9b45463685713d52558c2fa62c4ca50bb..4f851ef851998ea2cb65dad519f595377fd73fcf/src/tuningfork">Version 1.5.0 contains these commits.</a>
  </p>
  <p><strong>Important changes since 1.4.0</strong></p>
  <ul>
    <li>
      Programmatically change the interval between uploads, rather than it being hard-coded in the initial settings.
      <ul>
        <li>
          Added function:
          <code translate="no" dir="ltr">TuningFork_setAggregationStrategyInterval</code>
        </li>
      </ul>
    </li>
    <li>
      Fix for memory corruption in API key on
      <code translate="no" dir="ltr">API&lt;=23</code>
    </li>
  </ul>
  <h4 id="games-performance-tuner-1.5.0-rc01" data-text="Version 1.5.0-rc01" tabindex="-1">Version 1.5.0-rc01</h4>
  <p>January 26, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.5.0-rc01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/e8e9971ec507a219142344409f5176cc4aea8b3f..60b0ddc9b45463685713d52558c2fa62c4ca50bb/src/tuningfork">Version 1.5.0-rc01 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Fix for memory corruption in API key on API&lt;=23</li>
  </ul>
  <h4 id="games-performance-tuner-1.5.0-beta02" data-text="Version 1.5.0-beta02" tabindex="-1">Version 1.5.0-beta02</h4>
  <p>December 15, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.5.0-beta02</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/90ec6911a1fa5e18d2e40b363d03de2dbd6fd912..e8e9971ec507a219142344409f5176cc4aea8b3f/src/tuningfork">Version 1.5.0-beta02 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Remove ABI-breaking change from
      <code translate="no" dir="ltr">TuningFork_Settings</code>
      .
    </li>
  </ul>
  <h4 id="games-performance-tuner-1.5.0-beta01" data-text="Version 1.5.0-beta01" tabindex="-1">Version 1.5.0-beta01</h4>
  <p>September 29, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.5.0-beta01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4c8e6cfcfafe81d9deb1f499b3156e43a91123b7..90ec6911a1fa5e18d2e40b363d03de2dbd6fd912/src/tuningfork">Version 1.5.0-beta01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      No changes from alpha release. That release had:
      <ul>
        <li>Programmatically change the interval between uploads, rather than it being hard-coded in the initial settings.</li>
      </ul>
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      No changes from alpha release. That release had:
      <ul>
        <li>
          New function:
          <code translate="no" dir="ltr">TuningFork_setAggregationStrategyInterval</code>
        </li>
        <li>
          New field in
          <code translate="no" dir="ltr">TuningFork_Settings: aggregation_strategy_intervalms_or_count</code>
        </li>
      </ul>
    </li>
  </ul>
  <h4 id="games-performance-tuner-1.5.0-alpha01" data-text="Version 1.5.0-alpha01" tabindex="-1">Version 1.5.0-alpha01</h4>
  <p>August 18, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.games:games-performance-tuner:1.5.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/opt/gamesdk/+log/c6508fc0745ecbc0bccc6e55bcc47aefc0ada7a8..4c8e6cfcfafe81d9deb1f499b3156e43a91123b7/src/tuningfork">Version 1.5.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>It is now possible to set the interval between APT uploads programmatically, rather than using the settings file.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added function:
      <code translate="no" dir="ltr">TuningFork_setAggregationStrategyInterval</code>
    </li>
    <li>
      Added field to TuningFork_Settings struct:
      <code translate="no" dir="ltr">aggregation_strategy_intervalms_or_count</code>
    </li>
  </ul>
  <h3 id="version_14_2" data-text="Version 1.4" tabindex="-1">Version 1.4</h3>
