changelogHtml: |
  <h3 id="2.0.0-alpha04" data-text="Version 2.0.0-alpha04" tabindex="-1">Version 2.0.0-alpha04</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.tracing:tracing-*:2.0.0-alpha04</code>
    is released. Version 2.0.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..1abcb4178d48853948b9b566cabff9222d90ab69/tracing">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Make
      <code translate="no" dir="ltr">AbstractTraceDriver</code>
      really abstract, and move the
      <code translate="no" dir="ltr">Perfetto</code>
      implementation into the
      <code translate="no" dir="ltr">tracing-wire</code>
      module. (
      <a href="https://android-review.googlesource.com/#/q/Ie2f5910ced640fa038598c04aa0f1a6286cd25b5">Ie2f59</a>
      )
    </li>
    <li>
      Give more descriptive names to base implementations to avoid using the wrong one. For developers previously extending
      <code translate="no" dir="ltr">androidx.tracing.Trace{Sink|Driver}</code>
      they will now need to switch to using
      <code translate="no" dir="ltr">AbstractTrace{Sink|Driver}</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9b46d82d87e0cfc573057872ad8822551803e424">I9b46d</a>
      )
    </li>
  </ul>
