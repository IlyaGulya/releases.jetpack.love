changelogHtml: |
  <h3 id="2.0.0-alpha07" data-text="Version 2.0.0-alpha07" tabindex="-1">Version 2.0.0-alpha07</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.tracing:tracing-*:2.0.0-alpha07</code>
    is released. Version 2.0.0-alpha07 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/df4b49eda6f6834b6bc4c8aa30a581fa577a511e..bf10070790b9acc5ad74a86f3546e71139336096/tracing">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add a API to obtain a stub tracer that can be used when tracing is disabled. (
      <a href="https://android-review.googlesource.com/#/q/I84c98b7a8f4af0e99f6d5a77a4ba54271655dd09">I84c98</a>
      )
    </li>
    <li>
      Make tracing lifecycle consistent with system tracing. (
      <a href="https://android-review.googlesource.com/#/q/Ib391b68941c5e7c7e5ef8d85241fa4593469f3e7">Ib391b</a>
      )
    </li>
    <li>
      Counter APIs are now entirely allocation free. (
      <a href="https://android-review.googlesource.com/#/q/I5e73a5c996315ba653bd886d656ce1b41c68bf59">I5e73a</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed a keep rule for the Perfetto SDK (
      <code translate="no" dir="ltr">tracing-perfetto</code>
      ) which ensures that the Perfetto SDK can be enabled. (
      <a href="https://android-review.googlesource.com/#/q/I1d2277c09195c168298cd03d9577997e37a1b40c">I1d227</a>
      )
    </li>
    <li>
      Add the ability to trace
      <code translate="no" dir="ltr">flush()</code>
      events. (
      <a href="https://android-review.googlesource.com/#/q/I380149a36b78de8cb9f7e60bf0e680494cf6ea31">I38014</a>
      ,
      <a href="https://issuetracker.google.com/issues/495852704">b/495852704</a>
      )
    </li>
  </ul>
