changelogHtml: |
  <h3 id="2.0.0-alpha08" data-text="Version 2.0.0-alpha08" tabindex="-1">Version 2.0.0-alpha08</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.tracing:tracing-*:2.0.0-alpha08</code>
    is released. Version 2.0.0-alpha08 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e29a10982f4299b1fa812e229d76792092a62814..d183e19c77ddcd420f939c1a21cd82c038237f28/tracing">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add the ability to discover and override instances of
      <code translate="no" dir="ltr">TraceDriver</code>
      to be used process wide. (
      <a href="https://android-review.googlesource.com/#/q/I3f715bfd9760b206d3f1c0527632f33fe79ec30f">I3f715</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">Tracer.recordException</code>
      to
      <code translate="no" dir="ltr">Tracer.recordExceptionAndThrow</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I4411f85f159102c74c52a80c0ec970eef96f423b">I4411f</a>
      ,
      <a href="https://issuetracker.google.com/issues/503092450">b/503092450</a>
      )
    </li>
  </ul>
