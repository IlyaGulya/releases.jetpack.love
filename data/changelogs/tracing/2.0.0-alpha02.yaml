changelogHtml: |
  <h3 id="2.0.0-alpha02" data-text="Version 2.0.0-alpha02" tabindex="-1">Version 2.0.0-alpha02</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.tracing:tracing-*:2.0.0-alpha02</code>
    is released. Version 2.0.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d975db48960bccfb22a55f6578ef5cf204907306..6e23fc0c137022098ae2d043778ffdc56402ba5e/tracing">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Improved performance for the Perfetto Trace Sink implementation by using the
      <code translate="no" dir="ltr">suspendCoroutineUninterceptedOrReturn</code>
      intrinsic (
      <a href="https://r.android.com/3955484">2ea97b</a>
      ).
    </li>
  </ul>
