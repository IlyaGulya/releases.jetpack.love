changelogHtml: |
  <h3 id="3.0.0-alpha06" data-text="Version 3.0.0-alpha06" tabindex="-1">Version 3.0.0-alpha06</h3>
  <p>June 03, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.room3:room3-*:3.0.0-alpha06</code>
    is released. Version 3.0.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3301965961089ff8ab504bdda95cc8992393d5d0..40de3d755751fba59277168d32c60d70350ea98d/room3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add a new annotation property in
      <code translate="no" dir="ltr">@Entity</code>
      called
      <code translate="no" dir="ltr">withoutRowId</code>
      that when set to true will create the backing SQLite table using the
      <code translate="no" dir="ltr">WITHOUT ROWID</code>
      option. (
      <a href="https://android-review.googlesource.com/#/q/Idb48efe8710d42bb2d9e225c693af92280973421">Idb48e</a>
      ,
      <a href="https://issuetracker.google.com/issues/472790803">b/472790803</a>
      )
    </li>
  </ul>
