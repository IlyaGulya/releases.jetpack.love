changelogHtml: |
  <h3 id="3.0.0-alpha04" data-text="Version 3.0.0-alpha04" tabindex="-1">Version 3.0.0-alpha04</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.room3:room3-*:3.0.0-alpha04</code>
    is released. Version 3.0.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ec20b1544fe91db83862ce16c68a099d18d31b10..2108adaf188c53e47ffad4cbc8d66d865191e950/room3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add APIs to configure Room's connection pool. The builder functions
      <code translate="no" dir="ltr">setSingleConnectionPool()</code>
      and
      <code translate="no" dir="ltr">setMultipleConnectionPool()</code>
      can be used to control the maximum amount of connection Room will open to the database. (
      <a href="https://android-review.googlesource.com/#/q/I9700d1d245a112116b1e237011a94e57d1477c1b">I9700d</a>
      ,
      <a href="https://issuetracker.google.com/issues/438041176">b/438041176</a>
      ,
      <a href="https://issuetracker.google.com/issues/432820350">b/432820350</a>
      )
    </li>
    <li>
      Remove Room's
      <code translate="no" dir="ltr">DatabaseConfiguration</code>
      from public API since no other public API referenced the config. (
      <a href="https://android-review.googlesource.com/#/q/I5f1e9d384206a2ee87197ae5b94d0b96b75809b5">I5f1e9</a>
      ,
      <a href="https://issuetracker.google.com/issues/438041176">b/438041176</a>
      )
    </li>
  </ul>
