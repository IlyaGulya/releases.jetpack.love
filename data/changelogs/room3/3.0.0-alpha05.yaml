changelogHtml: |
  <h3 id="3.0.0-alpha05" data-text="Version 3.0.0-alpha05" tabindex="-1">Version 3.0.0-alpha05</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.room3:room3-*:3.0.0-alpha05</code>
    is released. Version 3.0.0-alpha05 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/0c82232cfb54d1dcc3ad73598fcc81ceff9b88d6..3301965961089ff8ab504bdda95cc8992393d5d0/room3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Updates
      <code translate="no" dir="ltr">@Relation</code>
      and
      <code translate="no" dir="ltr">@Junction</code>
      such that
      <code translate="no" dir="ltr">parentColumns</code>
      and
      <code translate="no" dir="ltr">entityColumns</code>
      properties are an array of column names to be used as keys for solving relationships, in turn supporting composite relationship keys. (
      <a href="https://android-review.googlesource.com/#/q/I92196913553b083ba9d8b4180dccef79603e8d19">I92196</a>
      ,
      <a href="https://issuetracker.google.com/issues/64247765">b/64247765</a>
      )
    </li>
  </ul>
