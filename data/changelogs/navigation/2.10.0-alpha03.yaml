changelogHtml: |
  <h3 id="2.10.0-alpha03" data-text="Version 2.10.0-alpha03" tabindex="-1">Version 2.10.0-alpha03</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation:navigation-*:2.10.0-alpha03</code>
    is released. Version 2.10.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3268ea760d665cee25941f7245395b2ebdf5bb50..6621e5c304ab7a8ac67f938c3ef741428a21184d/navigation">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated Compose
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
  </ul>
  <p><strong>External Contribution</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">watchos</code>
      and
      <code translate="no" dir="ltr">tvos</code>
      targets added to
      <code translate="no" dir="ltr">navigation-common</code>
      ,
      <code translate="no" dir="ltr">navigation-runtime</code>
      and
      <code translate="no" dir="ltr">navigation-testing</code>
      modules (
      <a href="https://android-review.googlesource.com/#/q/I60e460eb4b5ff4d653f1b4d4cf3acad0643253e8">I60e46</a>
      )
    </li>
    <li>
      Make
      <code translate="no" dir="ltr">DefaultNavTransitions</code>
      public (
      <a href="https://android-review.googlesource.com/#/q/Ide293e6b1c4fa7892375345e664ca9135c997b6b">Ide293</a>
      )
    </li>
  </ul>
