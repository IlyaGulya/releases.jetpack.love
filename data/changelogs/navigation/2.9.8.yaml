changelogHtml: |
  <h3 id="2.9.8" data-text="Version 2.9.8" tabindex="-1">Version 2.9.8</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation:navigation-*:2.9.8</code>
    is released. Version 2.9.8 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/587126e8aabdc62a54ccd3011688507299ad66b5..75fb15aa8f834f82fc4658d3f3c8b76f6a9e5b24/navigation">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Improved
      <code translate="no" dir="ltr">NavHost</code>
      to bolster against possible
      <code translate="no" dir="ltr">NullPointerException</code>
      s caused by a race condition with predictive back. (
      <a href="https://android-review.googlesource.com/#/q/Ie36c68ee4a24307194d85ef08737b091225194f6">Ie36c6</a>
      ,
      <a href="https://issuetracker.google.com/issues/500945998">b/500945998</a>
      )
    </li>
  </ul>
