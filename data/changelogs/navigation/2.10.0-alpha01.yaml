changelogHtml: |
  <h3 id="2.10.0-alpha01" data-text="Version 2.10.0-alpha01" tabindex="-1">Version 2.10.0-alpha01</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation:navigation-*:2.10.0-alpha01</code>
    is released. Version 2.10.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/587126e8aabdc62a54ccd3011688507299ad66b5..a15c668d4bb2e00cfa8ed1af96895a84c3e7e2d5/navigation">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">NavHost</code>
      now provides an overload that accepts
      <code translate="no" dir="ltr">predictivePopEnterTransition</code>
      and
      <code translate="no" dir="ltr">predictivePopExitTransition</code>
      parameters to allow for custom transition during the predictive back gesture. (
      <a href="https://android-review.googlesource.com/#/q/Iac9b0983a7c287624dc12046a6d7d69ced9df39f">Iac9b0</a>
      ,
      <a href="https://issuetracker.google.com/issues/478294569">b/478294569</a>
      )
    </li>
  </ul>
  <p><strong>Min SDK Update</strong></p>
  <ul>
    <li>
      The default minSdk has been from API 21 to API 23 along with the rest of the AndroidX libraries. (
      <a href="https://android-review.googlesource.com/#/q/Ibdfca5942dbb414ca07594ba240093db14aad4df">Ibdfca</a>
      ,
      <a href="https://issuetracker.google.com/issues/380448311">b/380448311</a>
      ,
      <a href="https://issuetracker.google.com/issues/435705964">b/435705964</a>
      ,
      <a href="https://issuetracker.google.com/issues/435705223">b/435705223</a>
      )
    </li>
  </ul>
  <p><strong>External Contribution</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">navigation:navigation-common</code>
      ,
      <code translate="no" dir="ltr">navigation:navigation-runtime</code>
      , and
      <code translate="no" dir="ltr">navigation:navigation-testing</code>
      now support desktop, linux, macOS, iOS, javascript, and WASM in addition to android. Thanks Konstantin Tskhovrebov!(
      <a href="https://android-review.googlesource.com/#/q/I035d92d46ba5e4f46f27a18686d9c669d0af3457">I035d9</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/Iec6244141b76c9dcd717c75e959cac531d47e8ae">Iec624</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/I1615d9b8b27ee93ba621f181f9b1bb70a7941d50">I1615d</a>
      )
    </li>
  </ul>
  <h2 id="version_29_2" data-text="Version 2.9" tabindex="-1">Version 2.9</h2>
