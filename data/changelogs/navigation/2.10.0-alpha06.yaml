changelogHtml: |
  <h3 id="2.10.0-alpha06" data-text="Version 2.10.0-alpha06" tabindex="-1">Version 2.10.0-alpha06</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation:navigation-*:2.10.0-alpha06</code>
    is released. Version 2.10.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ed0627453f51baab21d30d8ca8f74a50ff1cfa7a..ba3014c143b9c9782fe30bc766c5dced55e13453/navigation">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Modified
      <code translate="no" dir="ltr">handleDeepLink</code>
      to ensure only recognized deep links are handled (
      <a href="https://android-review.googlesource.com/#/q/Id4fe399e00c3afc5e85d60778be5b020a058be95">Id4fe3</a>
      ,
      <a href="https://issuetracker.google.com/issues/509640056">b/509640056</a>
      )
    </li>
    <li>
      Changed
      <code translate="no" dir="ltr">ComposableFragment</code>
      to use the fully qualified name from the destination instead of a fragment argument to inflate composable functions. (
      <a href="https://android-review.googlesource.com/#/q/I65dedd09ce677da6d1b30139f2488890e6db5033">I65ded</a>
      ,
      <a href="https://issuetracker.google.com/issues/509640586">b/509640586</a>
      )
    </li>
    <li>
      Fixed a crash in
      <code translate="no" dir="ltr">FragmentNavigator</code>
      that caused legitimate Fragments to throw an
      <code translate="no" dir="ltr">IllegalArgumentException</code>
      when operations are optimized out. (
      <a href="https://android-review.googlesource.com/#/q/I093b09ab6503e93938c7ce5d94275dccd7de4534">I093b0</a>
      ,
      <a href="https://issuetracker.google.com/issues/340202276">b/340202276</a>
      )
    </li>
    <li>
      Fixed an error in Navigation with Fragments where setting the graph programmatically would fail to be restored properly. (
      <a href="https://android-review.googlesource.com/#/q/I412513f82942ba143ded2555bb5d576cb7d3178e">I41251</a>
      ,
      <a href="https://issuetracker.google.com/issues/321147435">b/321147435</a>
      )
    </li>
  </ul>
