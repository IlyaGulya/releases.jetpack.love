  <h3 id="2.10.0-alpha04" data-text="Version 2.10.0-alpha04" tabindex="-1">Version 2.10.0-alpha04</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation:navigation-*:2.10.0-alpha04</code>
    is released. Version 2.10.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/35ca96cc1f129a6cc9d6650029cd6155668f4e7a..5ec3fd7563f4f9b2ba745aac0ad7770cc4cd087f/navigation">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Improved
      <code translate="no" dir="ltr">NavHost</code>
      to bolster against possible
      <code translate="no" dir="ltr">NullPointerException</code>
      s caused by a race condition with predictive back. (
      <a href="https://android-review.googlesource.com/#/q/Ie36c68ee4a24307194d85ef08737b091225194f6">Ie36c6</a>
      ,
      <a href="https://issuetracker.google.com/issues/500945998">b/500945998</a>
      )
    </li>
  </ul>
