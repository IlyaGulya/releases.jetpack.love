#language=html
changelogHtml: |
  <h3 id="1.4.0-rc02" data-text="Version 1.4.0-rc02" tabindex="-1">Version 1.4.0-rc02</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.protolayout:protolayout-*:1.4.0-rc02</code>
    is released. Version 1.4.0-rc02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ab5b6a7b57eb87f47a018419129d770797386e00..b7751004e8a8efc67213531484deed01280fb73a/wear/protolayout">these commits</a>
    .
  </p>
  <p><strong>API changes</strong></p>
  <ul>
    <li>
      Starting from API 36, accessing heart rate data, such as via
      <code translate="no" dir="ltr">ProtoLayout</code>
      Expressions library with
      <code translate="no" dir="ltr">PlatformHealthSources.heartRateBpm</code>
      and
      <code translate="no" dir="ltr">PlatformHealthSources.heartRateAccuracy</code>
      needs
      <code translate="no" dir="ltr">android.health.connect.HealthPermissions.READ_HEART_RATE</code>
      permission to be granted to the calling App.
    </li>
  </ul>
