#language=html
changelogHtml: |
  <h3 id="1.4.1" data-text="Version 1.4.1" tabindex="-1">Version 1.4.1</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.protolayout:protolayout-*:1.4.1</code>
    is released. Version 1.4.1 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/50d7308cb64d77392a80697500e504863780ca24..81d018cf57252f81bc13a95eb11dc08f2e3bf723/wear/protolayout">these commits</a>
    .
  </p>
  <p><strong>Vulnerability &amp; Security Fixes</strong></p>
  <ul>
    <li>
      Enforced a
      <code translate="no" dir="ltr">2048px</code>
      dimension limit and
      <code translate="no" dir="ltr">20MB</code>
      raw size maximum on images to
      <strong>prevent memory exhaustion</strong>
      .
    </li>
    <li>
      <strong>Enforced layout depth checks</strong>
      by fixing a bug that allowed deep layouts to skip depth enforcement during fingerprint optimizations.
    </li>
    <li>
      <strong>Prevented an array bounds exception/crash</strong>
      caused by unbounded gap parameters in
      <code translate="no" dir="ltr">DashedArcLine</code>
      .
    </li>
    <li>
      Replaced uncaught
      <code translate="no" dir="ltr">IllegalArgumentExceptions</code>
      with
      <strong>safer error logging and node invalidation in expression pipeline</strong>
      .
    </li>
    <li>
      Fixed an uncaught
      <code translate="no" dir="ltr">NullPointerException</code>
      when
      <strong>processing malformed image URIs</strong>
      .
    </li>
  </ul>
