changelogHtml: |
  <h3 id="1.6.1" data-text="Version 1.6.1" tabindex="-1">Version 1.6.1</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose:compose-*:1.6.1</code>
    is released. Version 1.6.1 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d367d3435230f7062833893131f93932ceb13f9b..dfff8817db6e7a1f48813f8240bc5c631f499588/wear/compose">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an issue where item animations (via
      <code translate="no" dir="ltr">Modifier.animateItem</code>
      ) stopped working in
      <code translate="no" dir="ltr">TransformingLazyColumn</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I904ec88174205cb9d9f3c5d33dfda55a9b20910b">I904ec</a>
      ,
      <a href="https://issuetracker.google.com/issues/493167084">b/493167084</a>
      )
    </li>
  </ul>
