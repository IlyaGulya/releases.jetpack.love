changelogHtml: |
  <h3 id="1.7.0-alpha05" data-text="Version 1.7.0-alpha05" tabindex="-1">Version 1.7.0-alpha05</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose:compose-*:1.7.0-alpha05</code>
    is released. Version 1.7.0-alpha05 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/a69fea942830b4bac43dd1c2bc9346b0a5282b19..ba3014c143b9c9782fe30bc766c5dced55e13453/wear/compose">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <p>
        Added the
        <code translate="no" dir="ltr">TransformingLazyColumnFirstLayoutItemProvider</code>
        interface in Foundation to enable customization of content that shifts direction during content updates, accompanied by out-of-the-box
        <code translate="no" dir="ltr">rememberTransformingLazyColumnFirstLayoutItemProvider</code>
        and
        <code translate="no" dir="ltr">rememberTransformingLazyColumnFirstVisibleItemProvider</code>
        implementations in Material3. (
        <a href="https://android-review.googlesource.com/#/q/I54814a394938dadb417e34d16a7a187b92f092fc">I54814</a>
        ,
        <a href="https://issuetracker.google.com/issues/503353428">b/503353428</a>
        )
      </p>
    </li>
    <li>
      <p>
        Renamed the fallback parameter from
        <code translate="no" dir="ltr">current</code>
        to
        <code translate="no" dir="ltr">centerItem</code>
        in
        <code translate="no" dir="ltr">TransformingLazyColumnFirstLayoutItemProvider</code>
        . Added
        <code translate="no" dir="ltr">TransformingLazyColumnState</code>
        extensions
        <code translate="no" dir="ltr">firstVisibleItemLayoutItemInfo</code>
        and
        <code translate="no" dir="ltr">layoutItemInfoOf</code>
        , and updated
        <code translate="no" dir="ltr">rememberTransformingLazyColumnFirstLayoutItemProvider</code>
        to use a clean, parameter-based lambda. (
        <a href="https://android-review.googlesource.com/#/q/I9a8d94990418f580ba59d5e6b4dac6def8c953dd">I9a8d9</a>
        ,
        <a href="https://issuetracker.google.com/issues/503353428">b/503353428</a>
        )
      </p>
    </li>
    <li>
      <p>
        Add overloads for multi-slot Material3 Button and Card content, for use with one-handed gestures. (
        <a href="https://android-review.googlesource.com/#/q/I74ccbf8c9a64e8426559120f1afc83013f92224b">I74ccb</a>
        ,
        <a href="https://issuetracker.google.com/issues/515718015">b/515718015</a>
        ,
        <a href="https://issuetracker.google.com/issues/490343658">b/490343658</a>
        )
      </p>
    </li>
    <li>
      <p>
        Add accessibility support to one-handed gestures. (
        <a href="https://android-review.googlesource.com/#/q/I0054d69fd9beb16f5833a5bab2dcd5b2117a9bc6">I0054d</a>
        ,
        <a href="https://issuetracker.google.com/issues/519085906">b/519085906</a>
        )
      </p>
    </li>
    <li>
      <p>
        Rename
        <code translate="no" dir="ltr">OneHandedGestureDefaults.scrollToNextItem()</code>
        to
        <code translate="no" dir="ltr">OneHandedGestureDefaults.scrollDownToNextItem</code>
        and add
        <code translate="no" dir="ltr">wrapAround</code>
        parameter to
        <code translate="no" dir="ltr">OneHandedGestureDefaults</code>
        scroll functions (
        <a href="https://android-review.googlesource.com/#/q/I940ce1acf7f723f5949fd71ef427d3b1c8a90650">I940ce</a>
        ,
        <a href="https://issuetracker.google.com/issues/509639667">b/509639667</a>
        )
      </p>
    </li>
    <li>
      <p>
        Add non-composable
        <code translate="no" dir="ltr">Modifier.oneHandedGesture()</code>
        if developer wants to provide the key manually. (
        <a href="https://android-review.googlesource.com/#/q/I191e1f1b463ecf44b942d577aa63822bed6d9486">I191e1</a>
        ,
        <a href="https://issuetracker.google.com/issues/504712626">b/504712626</a>
        )
      </p>
    </li>
    <li>
      <p>
        Rename
        <code translate="no" dir="ltr">offsetOf</code>
        API in
        <code translate="no" dir="ltr">RevealState</code>
        to
        <code translate="no" dir="ltr">positionOf</code>
        . (
        <a href="https://android-review.googlesource.com/#/q/I2675f234b169c4d7fc9d5f80dd0cee119140f10f">I2675f</a>
        ,
        <a href="https://issuetracker.google.com/issues/522387997">b/522387997</a>
        )
      </p>
    </li>
    <li>
      <p>
        Introduced
        <code translate="no" dir="ltr">actionContentSpacing</code>
        parameter to
        <code translate="no" dir="ltr">SwipeToReveal</code>
        , allowing developers to customize the distance between action slots and the content. (
        <a href="https://android-review.googlesource.com/#/q/I2abaffb3006cb7fce409c1b0d3d8321049e74a81">I2abaf</a>
        ,
        <a href="https://issuetracker.google.com/issues/507073912">b/507073912</a>
        )
      </p>
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an issue in
      <code translate="no" dir="ltr">ScreenScaffold</code>
      where recompositions could cause un-remembered
      <code translate="no" dir="ltr">ScrollInfoProvider</code>
      to reset scroll tracking state. (
      <a href="https://android-review.googlesource.com/#/q/I98f6d37223f8a89646fc42e69f89fa04616516ab">I98f6d</a>
      ,
      <a href="https://issuetracker.google.com/issues/524620765">b/524620765</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">TransformingLazyColumn</code>
      scrollbar color follows gesture indicator background color during indicator animation (
      <a href="https://android-review.googlesource.com/#/q/I353fbc3a69482f1f5f41dc4397134b4d4b83cb40">I353fb</a>
      ,
      <a href="https://issuetracker.google.com/issues/524915104">b/524915104</a>
      )
    </li>
    <li>
      Changed
      <code translate="no" dir="ltr">OneHandedGestureIndicator</code>
      default
      <code translate="no" dir="ltr">gestureIndicatorTint</code>
      to
      <code translate="no" dir="ltr">LocalContentColor</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I1abd338803b0b4ebda8ae9ecb7ccaa0c52c01e45">I1abd3</a>
      ,
      <a href="https://issuetracker.google.com/issues/524228063">b/524228063</a>
      )
    </li>
    <li>
      Parameterize the content description of
      <code translate="no" dir="ltr">DatePicker</code>
      's day and year pickers to support localization. (
      <a href="https://android-review.googlesource.com/#/q/I5dcd93282b696aabaf41ef66e0ae4a9178cca4a3">I5dcd9</a>
      ,
      <a href="https://issuetracker.google.com/issues/430563857">b/430563857</a>
      )
    </li>
    <li>
      Introduce adaptive display frequencies to
      <code translate="no" dir="ltr">GestureIndicators</code>
      based on whether an indicator renders inside or outside its host UI component. (
      <a href="https://android-review.googlesource.com/#/q/Ic618f9bb9d7da96fb83504e4d6c39f843ec6703f">Ic618f</a>
      ,
      <a href="https://issuetracker.google.com/issues/515071642">b/515071642</a>
      )
    </li>
    <li>
      Fix concurrency issue when triggering one-handed gestures (
      <a href="https://android-review.googlesource.com/#/q/I7b95fdc4d94a32ef9088cabbe53cf63b06fcbe4f">I7b95f</a>
      ,
      <a href="https://issuetracker.google.com/issues/512086558">b/512086558</a>
      )
    </li>
  </ul>
