changelogHtml: |
  <h3 id="1.6.2" data-text="Version 1.6.2" tabindex="-1">Version 1.6.2</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose:compose-*:1.6.2</code>
    is released. Version 1.6.2 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/dfff8817db6e7a1f48813f8240bc5c631f499588..f65727cc5cc63d05724c0edb55900bc8790b14e8/wear/compose">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      <p>
        Fix border drawing on
        <code translate="no" dir="ltr">TransformingLazyColumn</code>
        items (
        <a href="https://android-review.googlesource.com/#/q/I0c3c1a9c04ddc0e99477c28867bf884a7a14708a">I0c3c1</a>
        ,
        <a href="https://issuetracker.google.com/issues/510772213">b/510772213</a>
        )
      </p>
    </li>
    <li>
      <p>
        Fix
        <code translate="no" dir="ltr">itemSpacing</code>
        assignment in
        <code translate="no" dir="ltr">TransformingLazyColumn</code>
        content padding measurement strategy (
        <a href="https://android-review.googlesource.com/#/q/I12d2f00d650323540fa5d2c74d8cff3cc2610484">I12d2f</a>
        ,
        <a href="https://issuetracker.google.com/issues/498137919">b/498137919</a>
        )
      </p>
    </li>
  </ul>
