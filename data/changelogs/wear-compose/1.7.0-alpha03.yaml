changelogHtml: |
  <h3 id="1.7.0-alpha03" data-text="Version 1.7.0-alpha03" tabindex="-1">Version 1.7.0-alpha03</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose:compose-*:1.7.0-alpha03</code>
    is released. Version 1.7.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/89ae1d19a395b3c7bc01d591e3924e35d954ad34..ba1ad80843e7ebc1cd4308ee040181e82066ba73/wear/compose">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add non-composable
      <code translate="no" dir="ltr">Modifier.oneHandedGesture()</code>
      if developer wants to provide the key manually. (
      <a href="https://android-review.googlesource.com/#/q/I191e1f1b463ecf44b942d577aa63822bed6d9486">I191e1</a>
      ,
      <a href="https://issuetracker.google.com/issues/504712626">b/504712626</a>
      )
    </li>
    <li>
      Remove gesture indicators from
      <code translate="no" dir="ltr">OneHandedGestureDefaults</code>
      and add color support to one-handed gestures (
      <a href="https://android-review.googlesource.com/#/q/I7934f80bead49c5c1ae136ad8479163ba3b6c340">I7934f</a>
      ,
      <a href="https://issuetracker.google.com/issues/505009712">b/505009712</a>
      ,
      <a href="https://issuetracker.google.com/issues/504712626">b/504712626</a>
      )
    </li>
    <li>
      Added explicit handling for one-handed dismiss gestures in
      <code translate="no" dir="ltr">AlertDialog</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Id71e888bae326c3e111868a3b426e8bcb9ed24ac">Id71e8</a>
      ,
      <a href="https://issuetracker.google.com/issues/509675781">b/509675781</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">DeferredTargetAnimation</code>
      is no longer experimental, please remove opt-in. (
      <a href="https://android-review.googlesource.com/#/q/I1e4aeb4d0542a5ef99d7adc3282794e652b0ba49">I1e4ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/500030165">b/500030165</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix concurrency issue when triggering one-handed gestures (
      <a href="https://android-review.googlesource.com/#/q/I7b95fdc4d94a32ef9088cabbe53cf63b06fcbe4f">I7b95f</a>
      ,
      <a href="https://issuetracker.google.com/issues/512086558">b/512086558</a>
      )
    </li>
    <li>
      Fixed that one-handed gesture indicators are mirrored based on wrist orientation rather than
      <code translate="no" dir="ltr">LayoutDirection</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6db5d2b2f03db95354baf8393bf91563a4337fdc">I6db5d</a>
      ,
      <a href="https://issuetracker.google.com/issues/512003346">b/512003346</a>
      )
    </li>
    <li>
      Fix border drawing on TLC items (
      <a href="https://android-review.googlesource.com/#/q/I0c3c1a9c04ddc0e99477c28867bf884a7a14708a">I0c3c1</a>
      ,
      <a href="https://issuetracker.google.com/issues/510772213">b/510772213</a>
      )
    </li>
    <li>
      Added inline image previews for samples in Kdoc for
      <code translate="no" dir="ltr">SurfaceTransformation</code>
      .kt,
      <code translate="no" dir="ltr">SwitchButton</code>
      .kt and
      <code translate="no" dir="ltr">TextButton</code>
      .kt. These images will now render in the documentation for Wear Compose Material 3 DAC pages, providing developers with immediate visual context for each button variant and example. (
      <a href="https://android-review.googlesource.com/#/q/Ib53ae7447954e5e0565cbf8c79cab32408911437">Ib53ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/484905061">b/484905061</a>
      )
    </li>
    <li>
      Added inline image previews for all samples in Kdoc of Button.kt. These images will now render directly in the documentation on the Wear Compose Material 3 DAC pages, providing developers with immediate visual context for each button variant and example. (
      <a href="https://android-review.googlesource.com/#/q/Ie2fb5bc9d693843d01303649c99f2d0395e4bf6d">Ie2fb5</a>
      ,
      <a href="https://issuetracker.google.com/issues/484905061">b/484905061</a>
      )
    </li>
    <li>
      Added inline image previews for samples in KDoc within
      <code translate="no" dir="ltr">Card.kt</code>
      ,
      <code translate="no" dir="ltr">IconButton.kt</code>
      ,
      <code translate="no" dir="ltr">LevelIndicator.kt</code>
      , and
      <code translate="no" dir="ltr">ListHeader.kt</code>
      . These images will now render in the documentation for Wear Compose Material 3 DAC pages. (
      <a href="https://android-review.googlesource.com/#/q/I371bc1604d30750b8003f2b66e643e1ae8235d15">I371bc</a>
      ,
      <a href="https://issuetracker.google.com/issues/484905061">b/484905061</a>
      )
    </li>
    <li>
      Added inline image previews for samples in KDoc for
      <code translate="no" dir="ltr">Picker</code>
      ,
      <code translate="no" dir="ltr">SegmentedCircularProgressIndicator</code>
      ,
      <code translate="no" dir="ltr">Slider</code>
      , and
      <code translate="no" dir="ltr">Stepper</code>
      . These images will now render in the documentation for Wear Compose Material 3 DAC pages, providing developers with immediate visual context for these components and examples. (
      <a href="https://android-review.googlesource.com/#/q/I6c6ef6ad62b4840d24d90a04afdadf19638b397a">I6c6ef</a>
      ,
      <a href="https://issuetracker.google.com/issues/484905061">b/484905061</a>
      )
    </li>
    <li>
      Added inline image previews for samples in KDoc for
      <code translate="no" dir="ltr">CheckboxButton</code>
      ,
      <code translate="no" dir="ltr">SplitCheckboxButton</code>
      ,
      <code translate="no" dir="ltr">CircularProgressIndicator</code>
      ,
      <code translate="no" dir="ltr">ConfirmationDialog</code>
      ,
      <code translate="no" dir="ltr">SuccessConfirmationDialog</code>
      ,
      <code translate="no" dir="ltr">FailureConfirmationDialog</code>
      , and
      <code translate="no" dir="ltr">curvedText</code>
      . These images will now render in the documentation for Wear Compose Material 3 DAC pages, providing developers with immediate visual context for these components and examples. (
      <a href="https://android-review.googlesource.com/#/q/Ie466232a9a91b7bef35611bf2c1f2056340cb2c9">Ie4662</a>
      ,
      <a href="https://issuetracker.google.com/issues/484905061">b/484905061</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">Fix AlertDialogScreenshotTest test</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I9be58a14cb359857133141d0fb33ca0e21f95889">I9be58</a>
      ,
      <a href="https://issuetracker.google.com/issues/508678506">b/508678506</a>
      )
    </li>
    <li>
      Added inline image previews for samples in KDoc for
      <code translate="no" dir="ltr">NonClickableCard</code>
      ,
      <code translate="no" dir="ltr">OpenOnPhoneDialog</code>
      ,
      <code translate="no" dir="ltr">VerticalPageIndicator</code>
      ,
      <code translate="no" dir="ltr">VerticalPagerScaffold</code>
      , and
      <code translate="no" dir="ltr">RadioButton</code>
      . These images will now render in the documentation for Wear Compose Material 3 DAC pages, providing developers with immediate visual context for these components and examples. (
      <a href="https://android-review.googlesource.com/#/q/I2aa2d5da7ddd61c6067c891127c768d4db44847b">I2aa2d</a>
      ,
      <a href="https://issuetracker.google.com/issues/484905061">b/484905061</a>
      )
    </li>
  </ul>
