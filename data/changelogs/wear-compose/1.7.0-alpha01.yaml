changelogHtml: |
  <h3 id="1.7.0-alpha01" data-text="Version 1.7.0-alpha01" tabindex="-1">Version 1.7.0-alpha01</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose:compose-*:1.7.0-alpha01</code>
    is released. Version 1.7.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/dfff8817db6e7a1f48813f8240bc5c631f499588..f58bb1c0233dd798effef03a699ace0a84e367ac/wear/compose">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Introduced new API for one-handed gestures, where prioritized callbacks may be registered for primary and dismiss actions. The system automatically identifies the most relevant on-screen target to ensure gestures and their indicators are only triggered for elements the user can currently see and interact with. Add
      <code translate="no" dir="ltr">Modifier.oneHandedGesture</code>
      to the composable associated with the gesture (e.g. Button) and use
      <code translate="no" dir="ltr">OneHandedGestureDefaults.GestureIndicator</code>
      to indicate to the user when the gesture action is available. Scrolling and paging can also be triggered with the primary gesture, with
      <code translate="no" dir="ltr">OneHandedGestureDefaults.scrollDown</code>
      and
      <code translate="no" dir="ltr">OneHandedGestureDefaults.scrollToNextPage</code>
      recommended to be used in the callbacks.
      <code translate="no" dir="ltr">OneHandedGestureDefaults.ScrollGestureIndicator</code>
      and
      <code translate="no" dir="ltr">OneHandedGestureDefaults.VerticalPageGestureIndicator</code>
      are provided as alternatives to
      <code translate="no" dir="ltr">ScrollIndicator</code>
      and
      <code translate="no" dir="ltr">PageIndicator</code>
      respectively, to temporarily display a gesture indicator to the user. (
      <a href="https://android-review.googlesource.com/#/q/Ic6324cdb1363866c0ebf587274176190349b5b5c">Ic6324</a>
      ,
      <a href="https://issuetracker.google.com/issues/479098447">b/479098447</a>
      ,
      <a href="https://issuetracker.google.com/issues/485488443">b/485488443</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">requestAnchorItem</code>
      to
      <code translate="no" dir="ltr">TransformingLazyColumnState</code>
      and introduced
      <code translate="no" dir="ltr">TransformingLazyColumnAnchorType</code>
      to provide developers precise control over item expansion direction and layout anchoring. (
      <a href="https://android-review.googlesource.com/#/q/I0c1e6ec013814162aac3b7c06ce3d7e820224d7e">I0c1e6</a>
      ,
      <a href="https://issuetracker.google.com/issues/494301025">b/494301025</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">isSwipeToRevealDualFlingThresholdEnabled</code>
      flag, which is on by default, but can be disabled if bug fixes to swipe behavior in
      <code translate="no" dir="ltr">SwipeToReveal</code>
      in this release cause a regression (in which case, please file a bug as soon as possible) (
      <a href="https://android-review.googlesource.com/#/q/Ie6db68fed30cfbf53a329ea058c9145d0763a498">Ie6db6</a>
      ,
      <a href="https://issuetracker.google.com/issues/497743775">b/497743775</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Improved
      <code translate="no" dir="ltr">SwipeToReveal</code>
      to support fast flings, allowing users to fully reveal actions regardless of swipe distance (this change can be disabled by turning off isSwipeToRevealDualFlingThresholdEnabled flag). (
      <a href="https://android-review.googlesource.com/#/q/I833fd891caad05eefd04fb058cf73f09cb1dc3e0">I833fd</a>
      ,
      <a href="https://issuetracker.google.com/issues/490728860">b/490728860</a>
      )
    </li>
    <li>
      Fixed
      <code translate="no" dir="ltr">SwipeToReveal</code>
      to trigger the full swipe when swiping over 75% of the screen width (this change can be disabled by turning off
      <code translate="no" dir="ltr">isSwipeToRevealDualFlingThresholdEnabled</code>
      flag). (
      <a href="https://android-review.googlesource.com/#/q/Id56043ad442081688bb73fbbfb764dfdeda12eda">Id5604</a>
      ,
      <a href="https://issuetracker.google.com/issues/490728860">b/490728860</a>
      )
    </li>
    <li>
      Added a second haptic feedback for
      <code translate="no" dir="ltr">SwipeToReveal</code>
      when the swipe reaches the partial reveal state (this change can be disabled by turning off
      <code translate="no" dir="ltr">isSwipeToRevealDualFlingThresholdEnabled</code>
      flag). (
      <a href="https://android-review.googlesource.com/#/q/Ic27e35b51e9269a84cbc33707b5fee10a0318fb1">Ic27e3</a>
      ,
      <a href="https://issuetracker.google.com/issues/492273799">b/492273799</a>
      )
    </li>
    <li>
      Fixed an issue in
      <code translate="no" dir="ltr">TransformingLazyColumn</code>
      where item animations (
      <code translate="no" dir="ltr">Modifier.animateItem</code>
      ) stopped working. (
      <a href="https://android-review.googlesource.com/#/q/I904ec88174205cb9d9f3c5d33dfda55a9b20910b">I904ec</a>
      ,
      <a href="https://issuetracker.google.com/issues/493167084">b/493167084</a>
      )
    </li>
    <li>
      Fixed a bug in
      <code translate="no" dir="ltr">PickerGroup</code>
      (and hence
      <code translate="no" dir="ltr">DatePicker</code>
      ) to prevent multiple touches causing intended scrolling on unselected Picker columns (
      <a href="https://android-review.googlesource.com/#/q/Id76c5e69645232a1b23a26c11f6fbce8746599f6">Id76c5</a>
      ,
      <a href="https://issuetracker.google.com/issues/378646798">b/378646798</a>
      )
    </li>
  </ul>
