changelogHtml: |
  <h3 id="1.7.0-alpha02" data-text="Version 1.7.0-alpha02" tabindex="-1">Version 1.7.0-alpha02</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose:compose-*:1.7.0-alpha02</code>
    is released. Version 1.7.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/f58bb1c0233dd798effef03a699ace0a84e367ac..91b07a1ba9b7194e13c4584b74e7bd3830d77b28/wear/compose">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed
      <code translate="no" dir="ltr">GestureIndicator</code>
      size in
      <code translate="no" dir="ltr">AlertDialogs</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I0c16e4ec0d65a2a859c183ba7b7bec7363dde30e">I0c16e</a>
      ,
      <a href="https://issuetracker.google.com/issues/504912009">b/504912009</a>
      )
    </li>
    <li>
      Adjusted
      <code translate="no" dir="ltr">LeftRevealed</code>
      /
      <code translate="no" dir="ltr">RightRevealed</code>
      anchors of
      <code translate="no" dir="ltr">SwipeToReveal</code>
      for out-of-bounds revealed positioning. (
      <a href="https://android-review.googlesource.com/#/q/Id84ff5fad36ded043f41a0f722130ab8f4698ac5">Id84ff</a>
      ,
      <a href="https://issuetracker.google.com/issues/498681589">b/498681589</a>
      )
    </li>
    <li>
      Add state description to
      <code translate="no" dir="ltr">Checkbox</code>
      and
      <code translate="no" dir="ltr">Switch</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Iba12e0de27dc6433013cd838d4daa3442fbdaff2">Iba12e</a>
      ,
      <a href="https://issuetracker.google.com/issues/485098874">b/485098874</a>
      )
    </li>
    <li>
      Fixed a visual bug in
      <code translate="no" dir="ltr">FadingExpandingLabel</code>
      where old text would flash when the number of lines decreased. (
      <a href="https://android-review.googlesource.com/#/q/Ia40c90ce996105726ca25fcaa00462ebb1cd805f">Ia40c9</a>
      ,
      <a href="https://issuetracker.google.com/issues/503709020">b/503709020</a>
      )
    </li>
    <li>
      Add default one-handed gesture support to
      <code translate="no" dir="ltr">Material3 AlertDialog</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I5848e25f3e725f843a978fe337cc285aab158538">I5848e</a>
      ,
      <a href="https://issuetracker.google.com/issues/479098589">b/479098589</a>
      )
    </li>
    <li>
      Built-in visibility logic in one-handed has been removed (
      <a href="https://android-review.googlesource.com/#/q/I8c6024d48e39ce71ce652e799144be99dff1b6dd">I8c602</a>
      ,
      <a href="https://issuetracker.google.com/issues/502903320">b/502903320</a>
      )
    </li>
  </ul>
