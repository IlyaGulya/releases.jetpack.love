libraryId: xr-runtime
groupId: androidx.xr
version: 1.0.0-alpha11
releaseDate: 2026-02-25
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha11" data-text="Version 1.0.0-alpha11" tabindex="-1">Version 1.0.0-alpha11</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.runtime:runtime-*:1.0.0-alpha11</code>
    is released. Version 1.0.0-alpha11 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6d802bc724002ae38712673fb300c314f88fdd9e..6671838a2686d9e8b03e38681b78ebb63031c549/xr/runtime">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Restricted
      <code translate="no" dir="ltr">ConfigMode</code>
      interface to internal use (
      <a href="https://android-review.googlesource.com/#/q/Ibfb8747c911fd6166d0310ad2f3b17378d20a145">Ibfb87</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">androidx.xr.runtime.Config.GeospatialMode</code>
      to package level (
      <a href="https://android-review.googlesource.com/#/q/Ibe68273f6c15f39a84ecac823b11e163da8eb8fe">Ibe682</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">androidx.xr.runtime.Config.FaceTrackingMode</code>
      to package level (
      <a href="https://android-review.googlesource.com/#/q/Iac5018bff5fc2c1467b0d9371c3d3b85fc7ca825">Iac501</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">androidx.xr.runtime.Config.AnchorPersistenceMode</code>
      to package level (
      <a href="https://android-review.googlesource.com/#/q/I0360f5c8efe16dd8acf0b3a065bda0b366bba079">I0360f</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">androidx.xr.runtime.Config.DepthEstimationMode</code>
      to package level (
      <a href="https://android-review.googlesource.com/#/q/I7e3e9e44d4d7e3a662108eab0b1afa977363e983">I7e3e9</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">androidx.xr.runtime.Config.DeviceTrackingMode</code>
      to package level (
      <a href="https://android-review.googlesource.com/#/q/I3aacdbeb3cc159286471c970557920aab9e0277a">I3aacd</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">androidx.xr.runtime.Config.HandTrackingMode</code>
      to package level (
      <a href="https://android-review.googlesource.com/#/q/I658f3ac7f134fee3faa9279b2a29542f2bc42078">I658f3</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">androidx.xr.runtime.Config.PlaneTrackingMode</code>
      to package level (
      <a href="https://android-review.googlesource.com/#/q/Ia251b2c84696209bf4558ad9d3a8a07aef234288">Ia251b</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">androidx.xr.runtime.XrDevice.DisplayBlendMode</code>
      to package level (
      <a href="https://android-review.googlesource.com/#/q/I6f333283c6e1d92a86e3616567d78f0a391193dc">I6f333</a>
      )
    </li>
    <li>
      Added a factory method to create an
      <code translate="no" dir="ltr">XrDevice</code>
      using a Context, Session and a
      <code translate="no" dir="ltr">CoroutineContext</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I139c5f1ec5f3ecd64f1a6fe3ffb51e9139c1c1b8">I139c5</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">SpatialApiVersionHelper</code>
      to help query the runtime version of Android XR available on the platform. (
      <a href="https://android-review.googlesource.com/#/q/I7c53cc27a8c3e014ecf9144d2688830a7013b3cc">I7c53c</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">xr:runtime:runtime-openxr</code>
      module (
      <a href="https://android-review.googlesource.com/#/q/Ib42eae999da3aaf37b8e45f0594d43d0ff0bc0b3">Ib42ea</a>
      )
    </li>
  </ul>
