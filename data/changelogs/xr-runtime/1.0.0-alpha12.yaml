libraryId: xr-runtime
groupId: androidx.xr
version: 1.0.0-alpha12
releaseDate: 2026-03-25
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha12" data-text="Version 1.0.0-alpha12" tabindex="-1">Version 1.0.0-alpha12</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.runtime:runtime-*:1.0.0-alpha12</code>
    is released. Version 1.0.0-alpha12 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6671838a2686d9e8b03e38681b78ebb63031c549..e7913eae74f4112f4fbb22ea1a5037cd8b0e73f0/xr/runtime">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Changed
      <code translate="no" dir="ltr">Config.augmentedObjectCategories</code>
      from a List to a Set, (
      <a href="https://android-review.googlesource.com/#/q/I25a64eb05fa641c80185dbff62b7d140a2d4cac0">I25a64</a>
      ,
      <a href="https://issuetracker.google.com/issues/487376359">b/487376359</a>
      )
    </li>
    <li>
      Removed
      <code translate="no" dir="ltr">unscaledGravityAlignedActivitySpace</code>
      flag from
      <code translate="no" dir="ltr">Session.create</code>
      .
      <code translate="no" dir="ltr">ActivitySpace</code>
      is always unscaled and gravity-aligned now. (
      <a href="https://android-review.googlesource.com/#/q/If6f11877880f649ecf7a4844db3e809064cc10fb">If6f11</a>
      ,
      <a href="https://issuetracker.google.com/issues/458173423">b/458173423</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">Session.create</code>
      overload to allow passing an Android Context for resource-scoping. (
      <a href="https://android-review.googlesource.com/#/q/I7d3fec251fb7d1a415a812286d71adbf23a910b2">I7d3fe</a>
      ,
      <a href="https://issuetracker.google.com/issues/415805990">b/415805990</a>
      ,
      <a href="https://issuetracker.google.com/issues/477386334">b/477386334</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">JvmOverloads</code>
      to
      <code translate="no" dir="ltr">FloatSize2d.to3d</code>
      ,
      <code translate="no" dir="ltr">Matrix3.copy</code>
      , and
      <code translate="no" dir="ltr">Matrix4.copy</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I695860cf9d75d118905cd01123a8b977b806fa61">I69586</a>
      ,
      <a href="https://issuetracker.google.com/issues/481371562">b/481371562</a>
      )
    </li>
    <li>
      Added ability to set categories for
      <code translate="no" dir="ltr">AugmentedObject</code>
      tracking in the Config (
      <a href="https://android-review.googlesource.com/#/q/I1f6e4e634a511ab591802327ce3d45da6a3a0510">I1f6e4</a>
      ,
      <a href="https://issuetracker.google.com/issues/480220930">b/480220930</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">xr:runtime:runtime-interfaces</code>
      module. (
      <a href="https://android-review.googlesource.com/#/q/I52ac614c450be6b8a36e75611face78945f14667">I52ac6</a>
      ,
      <a href="https://issuetracker.google.com/issues/461561664">b/461561664</a>
      )
    </li>
  </ul>
