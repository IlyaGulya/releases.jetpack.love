changelogHtml: |
  <h3 id="1.0.0-alpha12" data-text="Version 1.0.0-alpha12" tabindex="-1">Version 1.0.0-alpha12</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.scenecore:scenecore-*:1.0.0-alpha12</code>
    is released. Version 1.0.0-alpha12 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/858c4795b789900a14f261bc90ed7e375af2b9be..bf48d1095789789d9d62bfd42bb4f8c9a335ecea/xr/scenecore">these commits</a>
    .
  </p>
  <p><strong>Known Issues</strong></p>
  <ul>
    <li>Anchored entities may snap from their anchored position to the activity space origin after several seconds.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">ActivitySpace.addOnSpaceUpdatedListener</code>
      and
      <code translate="no" dir="ltr">ActivitySpace.removeOnSpaceUpdatedListener</code>
      have been renamed to
      <code translate="no" dir="ltr">addOnOriginChangedListener</code>
      and
      <code translate="no" dir="ltr">removeOnOriginChangedListener</code>
      .
      <code translate="no" dir="ltr">AnchorEntity.setOnSpaceUpdatedListener</code>
      has been renamed to
      <code translate="no" dir="ltr">setOnOriginChangedListener</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I5d8fb8dc2994f2241c03c9adab17dfa56c11eb6f">I5d8fb</a>
      )
    </li>
    <li>
      Added public name property to
      <code translate="no" dir="ltr">FakeEntity</code>
      and made view public on
      <code translate="no" dir="ltr">FakePanelEntity</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ifa1f9ed8b3116c2baba71cec85659d944feb42e8">Ifa1f9</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed pixel density calculations on newer system images (
      <a href="https://android-review.googlesource.com/#/q/I57d043ac72367c8765502991141c42389bf9e9d9">I57d04</a>
      )
    </li>
  </ul>
