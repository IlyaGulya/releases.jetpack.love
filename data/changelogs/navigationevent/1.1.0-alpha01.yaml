changelogHtml: |
  <h3 id="1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigationevent:navigationevent-*:1.1.0-alpha01</code>
    is released. Version 1.1.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/a7bd43e4ff5a6c4f70a22b93597ac88425fe5e84..c640b9aa8e30b5db9ee258561ad1fc4bc947e69d/navigationevent">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Support all Kotlin Multiplatform (KMP) targets in NavigationEvent-Compose. Decouple owner resolution from
      <code translate="no" dir="ltr">LocalView</code>
      to allow platform hosts to provide a default
      <code translate="no" dir="ltr">LocalNavigationEventDispatcherOwner</code>
      while maintaining
      <code translate="no" dir="ltr">LocalView</code>
      as a safe fallback on Android. (
      <a href="https://android-review.googlesource.com/#/q/Iae98083eb2c25556d3c6f385ef0948197a2208e8">Iae980</a>
      ,
      <a href="https://issuetracker.google.com/issues/434940570">b/434940570</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/Iccf58b765b5c005e49db1b7cc740c0463897d4e4">Iccf58</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">NavigationEvent.toBackEvent()</code>
      and
      <code translate="no" dir="ltr">BackEvent.toNavigationEvent()</code>
      extension functions to convert between Android's
      <code translate="no" dir="ltr">BackEvent</code>
      and
      <code translate="no" dir="ltr">NavigationEvent</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ie3b71219bd08caa63daccd9d0237c6fd977583b4">Ie3b71</a>
      ,
      <a href="https://issuetracker.google.com/issues/477001292">b/477001292</a>
      )
    </li>
  </ul>
  <h2 id="version_10_2" data-text="Version 1.0" tabindex="-1">Version 1.0</h2>
