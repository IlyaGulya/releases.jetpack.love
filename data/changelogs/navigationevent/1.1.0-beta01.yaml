changelogHtml: |
  <h3 id="1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h3>
  <p>March 27, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigationevent:navigationevent-*:1.1.0-beta01</code>
    is released. Version 1.1.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c640b9aa8e30b5db9ee258561ad1fc4bc947e69d..9b50dbba6a2338e2659bd9ccdd682779ca02615f/navigationevent">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">OnForwardCompletedFallback</code>
      to
      <code translate="no" dir="ltr">NavigationEventDispatcher</code>
      , enabling a default system behavior for unhandled forward navigation events. (
      <a href="https://android-review.googlesource.com/#/q/Iac6205388c43b21e51406b0aa5c42040b2ad325d">Iac620</a>
      ,
      <a href="https://issuetracker.google.com/issues/489138116">b/489138116</a>
      )
    </li>
  </ul>
