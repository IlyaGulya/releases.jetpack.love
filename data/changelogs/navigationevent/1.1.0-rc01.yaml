  <h3 id="1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigationevent:navigationevent-*:1.1.0-rc01</code>
    is released. Version 1.1.0-rc01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/9b50dbba6a2338e2659bd9ccdd682779ca02615f..273e77554d5c4410532d0d7dd23b49937d4f137f/navigationevent">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated Compose compileSdk to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
  </ul>
