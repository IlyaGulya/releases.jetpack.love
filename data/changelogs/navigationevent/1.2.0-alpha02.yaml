changelogHtml: |
  <h3 id="1.2.0-alpha02" data-text="Version 1.2.0-alpha02" tabindex="-1">Version 1.2.0-alpha02</h3>
  <p>July 15, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigationevent:navigationevent-*:1.2.0-alpha02</code>
    is released. Version 1.2.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ba3014c143b9c9782fe30bc766c5dced55e13453..e37cf4eae99bdc35def1209921d658612e2edbc3/navigationevent">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">hasEnabledHandlers</code>
      property to
      <code translate="no" dir="ltr">NavigationEventInput</code>
      to allow developers to query the current handler state directly without relying on callbacks. (
      <a href="https://android-review.googlesource.com/#/q/I8ececaf0b399958ece50003fc9351d95f75d105d">I8ecec</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix fallback propagation in
      <code translate="no" dir="ltr">NavigationEventDispatcher</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I015f8db51db79abb72040e57366a40002d939c89">I015f8</a>
      ,
      <a href="https://issuetracker.google.com/issues/531988076">b/531988076</a>
      )
    </li>
  </ul>
