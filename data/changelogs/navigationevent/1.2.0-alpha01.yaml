changelogHtml: |
  <h3 id="1.2.0-alpha01" data-text="Version 1.2.0-alpha01" tabindex="-1">Version 1.2.0-alpha01</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigationevent:navigationevent-*:1.2.0-alpha01</code>
    is released. Version 1.2.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/97aec8dd133e0797a82bc84ea401f5d85ccb74f2..ba3014c143b9c9782fe30bc766c5dced55e13453/navigationevent">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">androidx.benchmark</code>
      now has a
      <code translate="no" dir="ltr">minSdk</code>
      of 24. (
      <a href="https://android-review.googlesource.com/#/q/Ic2a8500af8a2bf092fcc1b27d9a599aa5f3b81d7">Ic2a85</a>
      )
    </li>
    <li>
      Add onForwardCompletedFallback to TestNavigationEventDispatcherOwner to enable tracking and testing of unhandled forward navigation events. (
      <a href="https://android-review.googlesource.com/#/q/I6bbd7eef2bc2f56a10769c377d8f1a0b498d221e">I6bbd7</a>
      )
    </li>
    <li>
      Add navigationEventInput to TestNavigationEventDispatcherOwner to simplify simulating navigation events in tests. (
      <a href="https://android-review.googlesource.com/#/q/I3ef4851622a1380135c025173fe612547adee466">I3ef48</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Cleans up API information (
      <a href="https://android-review.googlesource.com/#/q/Ia8066818f7e33220445aaeafa9ecc0668cc4818b">Ia8066</a>
      )
    </li>
    <li>
      Ignore navigation events dispatched to disconnected inputs. Previously, dispatching events to a removed input would throw an
      <code translate="no" dir="ltr">IllegalStateException</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I1a8bc17f000b7a0f99ee107c0c09889e14841817">I1a8bc</a>
      ,
      <a href="https://issuetracker.google.com/issues/515890298">b/515890298</a>
      )
    </li>
    <li>
      Prevent symbol duplication with older JetBrains fork versions when upgrading to Compose Multiplatform 1.11.0. (
      <a href="https://android-review.googlesource.com/#/q/I4cc4dce0b07c38f6a624780d012816b5d0e200cd">I4cc4d</a>
      )
    </li>
  </ul>
  <p>There are no release notes for this artifact.</p>
  <h2 id="version_11_2" data-text="Version 1.1" tabindex="-1">Version 1.1</h2>
