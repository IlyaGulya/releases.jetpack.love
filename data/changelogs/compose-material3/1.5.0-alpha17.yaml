changelogHtml: |
  <h3 id="1.5.0-alpha17" data-text="Version 1.5.0-alpha17" tabindex="-1">Version 1.5.0-alpha17</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.material3:material3-*:1.5.0-alpha17</code>
    is released. Version 1.5.0-alpha17 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a..c656c03d44d333d412d260e5c5bc95a482820745/compose/material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Promoted
      <code translate="no" dir="ltr">TopAppBarScrollBehavior</code>
      and its associated methods to stable. These APIs no longer require the
      <code translate="no" dir="ltr">@ExperimentalMaterial3Api</code>
      opt-in. (
      <a href="https://android-review.googlesource.com/#/q/Ieb2d11f5cfaf333eb89966f7af5672fe79ebb7d3">Ieb2d1</a>
      ,
      <a href="https://issuetracker.google.com/issues/496918628">b/496918628</a>
      )
    </li>
  </ul>
