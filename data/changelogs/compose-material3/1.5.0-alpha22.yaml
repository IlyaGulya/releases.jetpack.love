changelogHtml: |
  <h3 id="1.5.0-alpha22" data-text="Version 1.5.0-alpha22" tabindex="-1">Version 1.5.0-alpha22</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.material3:material3-*:1.5.0-alpha22</code>
    is released. Version 1.5.0-alpha22 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d0d5e8b902b1ded8854df7d27fa1d1ee14e3bb4c..14c2f2ed81d0f61a3227641684cd875e95dd6529/compose/material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added a public
      <code translate="no" dir="ltr">snapAnimationSpec</code>
      getter to
      <code translate="no" dir="ltr">TopAppBarDefaults</code>
      to expose the default snap animation spec. (
      <a href="https://android-review.googlesource.com/#/q/Ic7b37cfb5c5f5105235171f18ab3b5f36eee97d7">Ic7b37</a>
      ,
      <a href="https://issuetracker.google.com/issues/519193808">b/519193808</a>
      )
    </li>
    <li>
      Add shapes to internal and private methods of TimePicker.kt API (
      <a href="https://android-review.googlesource.com/#/q/I9d09ee1830bddfbd3a4f168e249d2ffa726c391b">I9d09e</a>
      ,
      <a href="https://issuetracker.google.com/issues/441573791">b/441573791</a>
      )
    </li>
    <li>
      Support shapes in
      <code translate="no" dir="ltr">AnimatedPane</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ie7c6030333bd11075483ef9ceedfcad931f6c5a4">Ie7c60</a>
      ,
      <a href="https://issuetracker.google.com/issues/470517507">b/470517507</a>
      )
    </li>
    <li>
      Fix contrast of AM/PM toggle buttons for TimePicker (
      <a href="https://android-review.googlesource.com/#/q/Ifc0b721cca8d4e9cea20e9ac8b93b42e8c785a8c">Ifc0b7</a>
      ,
      <a href="https://issuetracker.google.com/issues/339079853">b/339079853</a>
      )
    </li>
    <li>
      Graduate Expressive
      <code translate="no" dir="ltr">FloatingToolbar</code>
      APIs to non-experimental. (
      <a href="https://android-review.googlesource.com/#/q/I5a4d868d9a027f3244b8c025c67e6bc15fe373f0">I5a4d8</a>
      ,
      <a href="https://issuetracker.google.com/issues/497887216">b/497887216</a>
      )
    </li>
    <li>
      Remove deprecated
      <code translate="no" dir="ltr">transformOriginState</code>
      from
      <code translate="no" dir="ltr">DropdownMenuPopupPositionProvider</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I0d5b0247483cceec8e5b0a73ef1b4a71cd9948a3">I0d5b0</a>
      ,
      <a href="https://issuetracker.google.com/issues/505481611">b/505481611</a>
      )
    </li>
    <li>
      Updated
      <code translate="no" dir="ltr">pinnedScrollBehavior</code>
      and
      <code translate="no" dir="ltr">enterAlwaysScrollBehavior</code>
      to accept a
      <code translate="no" dir="ltr">ScrollableState</code>
      , which automatically handles edge cases like reversed layouts and pre-scrolled content. Legacy overloads are deprecated. Migrate usages of
      <code translate="no" dir="ltr">isScrollingContentAtStart</code>
      to the new overloads with
      <code translate="no" dir="ltr">scrollableState</code>
      param. Promoted
      <code translate="no" dir="ltr">TopAppBarScrollBehavior</code>
      and related APIs to stable. (
      <a href="https://android-review.googlesource.com/#/q/Ib83cf8b83214590b8bf46bf9b0ab9401915b13a6">Ib83cf</a>
      ,
      <a href="https://issuetracker.google.com/issues/519193808">b/519193808</a>
      )
    </li>
    <li>
      Updated
      <code translate="no" dir="ltr">pinnedScrollBehavior</code>
      and
      <code translate="no" dir="ltr">enterAlwaysScrollBehavior</code>
      to accept a
      <code translate="no" dir="ltr">ScrollableState</code>
      , which automatically handles edge cases like reversed layouts and pre-scrolled content. Promoted
      <code translate="no" dir="ltr">TopAppBarScrollBehavior</code>
      and related APIs to stable. (
      <a href="https://android-review.googlesource.com/#/q/Ieda4b3ff37ab9aa4aade303d1a38927d5fc9b440">Ieda4b</a>
      ,
      <a href="https://issuetracker.google.com/issues/405129274">b/405129274</a>
      )
    </li>
    <li>
      Update
      <code translate="no" dir="ltr">DropdownMenuPositionProvider</code>
      to remove
      <code translate="no" dir="ltr">MutableState</code>
      from
      <code translate="no" dir="ltr">transformOrigin</code>
      . Collapse
      <code translate="no" dir="ltr">MenuAnchorPosition</code>
      from a sealed interface into a single class. Introduces
      <code translate="no" dir="ltr">MenuAnchorPositionScope</code>
      that contains information that can be used to create custom x and y candidates. (
      <a href="https://android-review.googlesource.com/#/q/I21f2b22e19f347a30800ce0b732e69b27050a3ef">I21f2b</a>
      ,
      <a href="https://issuetracker.google.com/issues/505481611">b/505481611</a>
      )
    </li>
    <li>
      Promote
      <code translate="no" dir="ltr">ButtonGroup</code>
      APIs to stable. Remove deprecated experimental APIs that were introduced in a 1.5.0-alpha. (
      <a href="https://android-review.googlesource.com/#/q/Idaf96db31dff21c0c262fb9fbfd414c6657c6032">Idaf96</a>
      ,
      <a href="https://issuetracker.google.com/issues/497876828">b/497876828</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed a bug where
      <code translate="no" dir="ltr">ButtonGroup</code>
      's compression animation did not correctly handle asymmetric button paddings or RTL layout directions, and could crash with
      <code translate="no" dir="ltr">IllegalArgumentException</code>
      under certain display densities. (
      <a href="https://android-review.googlesource.com/#/q/I35074ef11ee26c417730b77109eca8c404085aeb">I35074</a>
      ,
      <a href="https://issuetracker.google.com/issues/516743181">b/516743181</a>
      )
    </li>
    <li>
      Fix TimePicker text input mode error handling mechanism (
      <a href="https://android-review.googlesource.com/#/q/If4541f5b62e43dc847c6f0e89307a10016d3c5da">If4541</a>
      ,
      <a href="https://issuetracker.google.com/issues/405054265">b/405054265</a>
      )
    </li>
  </ul>
