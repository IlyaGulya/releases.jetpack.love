changelogHtml: |
  <h3 id="1.5.0-alpha19" data-text="Version 1.5.0-alpha19" tabindex="-1">Version 1.5.0-alpha19</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.material3:material3-*:1.5.0-alpha19</code>
    is released. Version 1.5.0-alpha19 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/df4b49eda6f6834b6bc4c8aa30a581fa577a511e..8c3e1a24a2ed0291812bf3ffa251a3bde94e271d/compose/material3">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Typography now supports a default font family that will be merged with provided text styles if they don't have a font family explicitly set. (
      <a href="https://android-review.googlesource.com/#/q/I2e3058a9437d30958da3f1f4e593deea0a28a34d">I2e305</a>
      ,
      <a href="https://issuetracker.google.com/issues/500356360">b/500356360</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Removes
      <code translate="no" dir="ltr">supportingText</code>
      as a trailing lambda for
      <code translate="no" dir="ltr">DropdownMenuItem</code>
      . Instead move it to right after the
      <code translate="no" dir="ltr">trailingIcon</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I5694bd72532bfd2a8fad76b8435c8633c997fdec">I5694b</a>
      ,
      <a href="https://issuetracker.google.com/issues/503047115">b/503047115</a>
      )
    </li>
    <li>
      Promote
      <code translate="no" dir="ltr">ToggleButtons</code>
      to stable. (
      <a href="https://android-review.googlesource.com/#/q/I8a77146a7edfb5f413cca61747214c10175a1fb1">I8a771</a>
      ,
      <a href="https://issuetracker.google.com/issues/497876827">b/497876827</a>
      )
    </li>
    <li>
      Promote expressive menu APIs. Remove
      <code translate="no" dir="ltr">DropdownMenuItem</code>
      since it is a deprecated experimental expressive API that was a part of a 1.5.0-alpha. (
      <a href="https://android-review.googlesource.com/#/q/I1d556bbbab02d773d55dd1442db673567f3f9fe1">I1d556</a>
      ,
      <a href="https://issuetracker.google.com/issues/497885285">b/497885285</a>
      )
    </li>
    <li>
      Graduate FAB and FAB Menu APIs from Experimental Expressive (
      <a href="https://android-review.googlesource.com/#/q/Ie509ca9c973d44cfe418edbfd420ccc4ba1a6c15">Ie509c</a>
      ,
      <a href="https://issuetracker.google.com/issues/497892373">b/497892373</a>
      )
    </li>
    <li>
      Promote expressive button APIs. Remove the deprecated experimental API
      <code translate="no" dir="ltr">SmallButtonContentPadding</code>
      which was introduced in a 1.5.0-alpha. (
      <a href="https://android-review.googlesource.com/#/q/Iee31ee0268842ef16f24a8b354014eb1e2a66f99">Iee31e</a>
      ,
      <a href="https://issuetracker.google.com/issues/497873833">b/497873833</a>
      )
    </li>
    <li>
      Move scaffold order APIs back to experimental (
      <a href="https://android-review.googlesource.com/#/q/I014926abcda6d9a26c4c30ee10f77ef3371369b2">I01492</a>
      ,
      <a href="https://issuetracker.google.com/issues/489424245">b/489424245</a>
      )
    </li>
    <li>
      Add another Typography consturctor overload (
      <a href="https://android-review.googlesource.com/#/q/I8b3b31585b7308cb5cb4dde326fba89694d2f0bc">I8b3b3</a>
      ,
      <a href="https://issuetracker.google.com/issues/500356360">b/500356360</a>
      )
    </li>
    <li>
      Revert
      <code translate="no" dir="ltr">MaterialShapes</code>
      and
      <code translate="no" dir="ltr">LoadingIndicator</code>
      promotions to stable. (
      <a href="https://android-review.googlesource.com/#/q/I30e694a1af90ce8f6ef1f984008a01eda00c547c">I30e69</a>
      ,
      <a href="https://issuetracker.google.com/issues/497876695">b/497876695</a>
      ,
      <a href="https://issuetracker.google.com/issues/497877850">b/497877850</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix bug in slider's implementation that caused padding from the inset focus rings to be applied to the track and thumb when the component is not in focus. (
      <a href="https://android-review.googlesource.com/#/q/I16315352d6a3cfa8405f8e8436d0e893e8a970ca">I16315</a>
      ,
      <a href="https://issuetracker.google.com/issues/506158497">b/506158497</a>
      )
    </li>
    <li>
      Fixed an issue in
      <code translate="no" dir="ltr">ModalBottomSheet</code>
      where
      <code translate="no" dir="ltr">imePadding</code>
      was applied unconditionally, preventing control over IME behavior via
      <code translate="no" dir="ltr">contentWindowInsets</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ied80163ecfcd8aa555758933f5c6e7f3467622ab">Ied801</a>
      ,
      <a href="https://issuetracker.google.com/issues/289824811">b/289824811</a>
      )
    </li>
    <li>
      [FAB] Fix crash in
      <code translate="no" dir="ltr">Modifier.animateFloatingActionButton</code>
      caused by density int vs float rounding (
      <a href="https://android-review.googlesource.com/#/q/I2d25fadc476d557323052d9b15dc6f11a0a41343">I2d25f</a>
      ,
      <a href="https://issuetracker.google.com/issues/489769219">b/489769219</a>
      )
    </li>
    <li>
      Fix focus getting trapped inside the date range picker. Tabbing moves focus in and out the dates, and arrow keys move focus through the dates. (
      <a href="https://android-review.googlesource.com/#/q/I7f3eac5c7c3071a8c59abad5ad6de99877ced21c">I7f3ea</a>
      ,
      <a href="https://issuetracker.google.com/issues/498332749">b/498332749</a>
      )
    </li>
    <li>
      Revert medium and large buttons changes for precision pointer mode, and dialog's default icon size also for precision pointer mode (
      <a href="https://android-review.googlesource.com/#/q/I58d8cead645e5b7541f5ceeca0c2ab7914376872">I58d8c</a>
      ,
      <a href="https://issuetracker.google.com/issues/496938250">b/496938250</a>
      ,
      <a href="https://issuetracker.google.com/issues/500356640">b/500356640</a>
      )
    </li>
    <li>
      Fixed keyboard focus getting trapped in non dialog date picker. Also fixed focus order of dismiss and confirm buttons not following their visual order. (
      <a href="https://android-review.googlesource.com/#/q/Ibbe2e20f3313749d2eba5d938197ead3d895036b">Ibbe2e</a>
      ,
      <a href="https://issuetracker.google.com/issues/500454457">b/500454457</a>
      )
    </li>
  </ul>
