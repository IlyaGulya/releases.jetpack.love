changelogHtml: |
  <h3 id="1.5.0-alpha20" data-text="Version 1.5.0-alpha20" tabindex="-1">Version 1.5.0-alpha20</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.material3:material3-*:1.5.0-alpha20</code>
    is released. Version 1.5.0-alpha20 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e29a10982f4299b1fa812e229d76792092a62814..b87ea811dfddc793c6d02cb27381fb9dbe6db09c/compose/material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Removed
      <code translate="no" dir="ltr">shouldUsePrecisionPointerComponentSizing</code>
      function (
      <a href="https://android-review.googlesource.com/#/q/I882c34bf096bf1b50f71b0b9e69895d7ec5dea0c">I882c3</a>
      ,
      <a href="https://issuetracker.google.com/issues/498698039">b/498698039</a>
      )
    </li>
    <li>
      Fixed an issue where the tooltip caret would appear on the wrong side when the tooltip flipped due to screen edges. (
      <a href="https://android-review.googlesource.com/#/q/Idc314432c7cf7159cd53cf20cdf1f9da9be352d3">Idc314</a>
      ,
      <a href="https://issuetracker.google.com/issues/479224210">b/479224210</a>
      )
    </li>
    <li>
      Introduced
      <code translate="no" dir="ltr">rememberBottomSheetState</code>
      as the unified API for
      <code translate="no" dir="ltr">BottomSheet</code>
      state. Deprecated
      <code translate="no" dir="ltr">rememberModalBottomSheetState</code>
      and
      <code translate="no" dir="ltr">rememberStandardBottomSheetState</code>
      in favor of the new unified API. (
      <a href="https://android-review.googlesource.com/#/q/I2724e00fd21f52c1653d2c893135e88c7ec73ac5">I2724e</a>
      ,
      <a href="https://issuetracker.google.com/issues/500005697">b/500005697</a>
      )
    </li>
    <li>
      Remove deprecated experimental
      <code translate="no" dir="ltr">WideNavigationRail</code>
      APIs (
      <a href="https://android-review.googlesource.com/#/q/Iaadd6b4dd693681120311d99c10da81268c85889">Iaadd6</a>
      ,
      <a href="https://issuetracker.google.com/issues/497891040">b/497891040</a>
      )
    </li>
    <li>
      Graduate
      <code translate="no" dir="ltr">SplitButton</code>
      APIs to non-experimental. (
      <a href="https://android-review.googlesource.com/#/q/I4d395e295a27518724f07cb56c6b30381b6cd690">I4d395</a>
      ,
      <a href="https://issuetracker.google.com/issues/497876691">b/497876691</a>
      )
    </li>
    <li>
      Deprecate the
      <code translate="no" dir="ltr">DropdownMenuItem</code>
      APIs with checked and selected params that have
      <code translate="no" dir="ltr">supportingText</code>
      as a trailing lambda. Moved
      <code translate="no" dir="ltr">supportingText</code>
      to be a parameter right after
      <code translate="no" dir="ltr">trailingIcon</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Icaf79546bc0223f828147e24bfc6fc86c6919ad9">Icaf79</a>
      ,
      <a href="https://issuetracker.google.com/issues/503047115">b/503047115</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Update Navigation Drawer predictive back handler to allow going back while drawer is opening instead of only when fully opened (
      <a href="https://android-review.googlesource.com/#/q/I714ae1ff710b8514a18a4b9191cf55d3709baadd">I714ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/418556231">b/418556231</a>
      )
    </li>
  </ul>
