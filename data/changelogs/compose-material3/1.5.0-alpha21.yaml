changelogHtml: |
  <h3 id="1.5.0-alpha21" data-text="Version 1.5.0-alpha21" tabindex="-1">Version 1.5.0-alpha21</h3>
  <p>June 03, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.material3:material3-*:1.5.0-alpha21</code>
    is released. Version 1.5.0-alpha21 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe..bd4a359dc5de8a63e1994022d4282b98de45c418/compose/material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add shapes to timepicker component API (
      <a href="https://android-review.googlesource.com/#/q/I57f28998a4d9e8712394b45bdd3d2e79bf78cb55">I57f28</a>
      ,
      <a href="https://issuetracker.google.com/issues/441573791">b/441573791</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">compressionLimit</code>
      to
      <code translate="no" dir="ltr">animateWidth</code>
      that specifies the padding of the item being compressed which indicates the maximum compression that the item can be squished by. Deprecating the
      <code translate="no" dir="ltr">animateWidth</code>
      API without this
      <code translate="no" dir="ltr">compressionLimit</code>
      parameter. (
      <a href="https://android-review.googlesource.com/#/q/I4a7253bd1fb8b95a70958a4c8fb154324d566f20">I4a725</a>
      ,
      <a href="https://issuetracker.google.com/issues/418822334">b/418822334</a>
      ,
      <a href="https://issuetracker.google.com/issues/403281052">b/403281052</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">BottomSheet</code>
      and
      <code translate="no" dir="ltr">ModalBottomSheet</code>
      <code translate="no" dir="ltr">PartiallyExpanded</code>
      anchor is no longer programmatically removed based on layout conditions. Users now explicitly control this anchor via
      <code translate="no" dir="ltr">rememberBottomSheetState</code>
      . Legacy behavior for these components can be enabled via disabling
      <code translate="no" dir="ltr">isBottomSheetPartiallyExpandedDeterministicEnabled</code>
      feature flag or by leveraging deprecated
      <code translate="no" dir="ltr">rememberModalBottomSheetState</code>
      and
      <code translate="no" dir="ltr">rememberStandardBottomSheetState</code>
      functions.
      <code translate="no" dir="ltr">isAnchoredDraggableComponentsAnchorRecoveryEnabled</code>
      has now been removed from feature flags. (
      <a href="https://android-review.googlesource.com/#/q/Ia416719592d05f705e67eb7351a70d1aaf335363">Ia4167</a>
      ,
      <a href="https://issuetracker.google.com/issues/478210200">b/478210200</a>
      ,
      <a href="https://issuetracker.google.com/issues/512076811">b/512076811</a>
      )
    </li>
    <li>
      Reintroduces experimental tag for
      <code translate="no" dir="ltr">PullToRefreshDefaults.loadingIndicatorColor</code>
      and
      <code translate="no" dir="ltr">PullToRefreshDefaults.loadingIndicatorContainerColor</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ib9d151f52ab743a1124335010579aff6d5812824">Ib9d15</a>
      ,
      <a href="https://issuetracker.google.com/issues/513225663">b/513225663</a>
      )
    </li>
    <li>
      Updated the
      <code translate="no" dir="ltr">SelectableChipColors</code>
      parameters to be public (
      <a href="https://android-review.googlesource.com/#/q/I559e07e6fd666b9bcce01bbcbcc3bed91d82a921">I559e0</a>
      ,
      <a href="https://issuetracker.google.com/issues/512576750">b/512576750</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">horizontalArrangement</code>
      parameter to
      <code translate="no" dir="ltr">MenuItems</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ie8088baa0340f3455f69380071cd23614eb98032">Ie8088</a>
      ,
      <a href="https://issuetracker.google.com/issues/497891817">b/497891817</a>
      )
    </li>
    <li>
      Re-mark Button's
      <code translate="no" dir="ltr">contentPaddingFor</code>
      function as experimental. (
      <a href="https://android-review.googlesource.com/#/q/I07d3ee89337f467552e6053dbfc5588c345e81ee">I07d3e</a>
      ,
      <a href="https://issuetracker.google.com/issues/500355872">b/500355872</a>
      )
    </li>
    <li>
      Introduced
      <code translate="no" dir="ltr">roundedShape</code>
      and
      <code translate="no" dir="ltr">tonalColors()</code>
      in both
      <code translate="no" dir="ltr">TextFieldDefaults</code>
      and
      <code translate="no" dir="ltr">OutlinedTextFieldDefaults</code>
      , which are the visual configurations for expressive style. (
      <a href="https://android-review.googlesource.com/#/q/Id9185e6356df12f82e08953120846a6a1a34515a">Id9185</a>
      ,
      <a href="https://issuetracker.google.com/issues/448728288">b/448728288</a>
      )
    </li>
    <li>
      Deprecated
      <code translate="no" dir="ltr">TextFieldLabelPosition.Attached</code>
      , and introduced
      <code translate="no" dir="ltr">Inside</code>
      and
      <code translate="no" dir="ltr">Cutout</code>
      subtypes, which allows more customizability like an
      <code translate="no" dir="ltr">OutlinedTextField</code>
      with inside label placement. Also deprecated
      <code translate="no" dir="ltr">OutlinedTextFieldDefaults.contentPadding()</code>
      , and introduced
      <code translate="no" dir="ltr">OutlinedTextFieldDefaults.contentPaddingWithLabel()</code>
      and
      <code translate="no" dir="ltr">OutlinedTextFieldDefaults.contentPaddingWithoutLabel()</code>
      to support both label positions. (
      <a href="https://android-review.googlesource.com/#/q/I40f625168c7da2ffb815a8ba8c79cac00567ad8b">I40f62</a>
      ,
      <a href="https://issuetracker.google.com/issues/448728288">b/448728288</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an accessibility issue in
      <code translate="no" dir="ltr">TimePicker</code>
      where keyboard focus was lost when switching from hours to minutes on the dial. Improved accessibility of keyboard focus. (
      <a href="https://android-review.googlesource.com/#/q/I7dd813b7f601da51cb6f1494b6b861f367d3a235">I7dd81</a>
      ,
      <a href="https://issuetracker.google.com/issues/498361169">b/498361169</a>
      )
    </li>
  </ul>
  <p><strong>External Contribution</strong></p>
  <ul>
    <li>
      Improved BottomSheet dismiss gesture physics for a smoother experience. (
      <a href="https://android-review.googlesource.com/#/q/I21df57847dc0f9d20132109032e46351e34b1a7d">I21df5</a>
      )
    </li>
  </ul>
