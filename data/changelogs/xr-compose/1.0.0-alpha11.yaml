libraryId: xr-compose
groupId: androidx.xr
version: 1.0.0-alpha11
releaseDate: 2026-02-25
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha11" data-text="Version 1.0.0-alpha11" tabindex="-1">Version 1.0.0-alpha11</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.compose:compose:1.0.0-alpha11</code>
    and
    <code translate="no" dir="ltr">androidx.xr.compose:compose-testing:1.0.0-alpha11</code>
    are released. Version 1.0.0-alpha11 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/0da43ebb1f8dc8fba8df8f2cf05d8164688aa0ab..a34b6c25f6fbb862348d1696a3ac8806f66842c5/xr/compose">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Adding
      <code translate="no" dir="ltr">SuperSampling</code>
      parameter to
      <code translate="no" dir="ltr">SpatialExternalSurfaces</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Icd4d18c137960ab4c84f03ce97e3ada0c7dc4cb6">Icd4d1</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Subspace modifier padding changes for layout direction awareness. (
      <a href="https://android-review.googlesource.com/#/q/I53e25bced4273331204eac3910dd285c16b9c394">I53e25</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">SpatialCapabilities</code>
      is now sealed and cannot be extended. (
      <a href="https://android-review.googlesource.com/#/q/I07aef87e644421fb5ac63464d88b76a094c5215f">I07aef</a>
      )
    </li>
    <li>
      The
      <code translate="no" dir="ltr">SpatialRow</code>
      and
      <code translate="no" dir="ltr">SpatialColumn</code>
      APIs that accept a generic
      <code translate="no" dir="ltr">SpatialAlignment</code>
      parameter are deprecated; instead, use the APIs that accept either
      <code translate="no" dir="ltr">verticalAlignment</code>
      or
      <code translate="no" dir="ltr">horizontalAlignment</code>
      for
      <code translate="no" dir="ltr">SpatialRow</code>
      and
      <code translate="no" dir="ltr">SpatialColumn</code>
      , respectively. (
      <a href="https://android-review.googlesource.com/#/q/Iec390d2f302fe756f7c112ff30e877f74c36589b">Iec390</a>
      )
    </li>
    <li>
      Combining overloading
      <code translate="no" dir="ltr">SubspaceLayout</code>
      function APIs (
      <a href="https://android-review.googlesource.com/#/q/Idd30a865bf5ff5249be94abae6b5ba2da847450c">Idd30a</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">SubspaceModifier.lookAtUser</code>
      to
      <code translate="no" dir="ltr">rotateToLookAtUser</code>
      and the
      <code translate="no" dir="ltr">up</code>
      parameter to
      <code translate="no" dir="ltr">upDirection</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Icafb85196f75e75e8530eb658981f26141abb6e3">Icafb8</a>
      )
    </li>
    <li>
      Making
      <code translate="no" dir="ltr">SpatialRow</code>
      an inline function (
      <a href="https://android-review.googlesource.com/#/q/Ia2f20b8af183cf5064676fb597ed587cba240266">Ia2f20</a>
      )
    </li>
    <li>
      Making
      <code translate="no" dir="ltr">SpatialColumn</code>
      an inline function (
      <a href="https://android-review.googlesource.com/#/q/I681be0b9b5263f0a2b54eac21d54c81c502b02ce">I681be</a>
      )
    </li>
    <li>
      Removed billboard API (
      <a href="https://android-review.googlesource.com/#/q/Ib76cd43fe8338322d20b062ef937538a8c7fd04d">Ib76cd</a>
      )
    </li>
  </ul>
