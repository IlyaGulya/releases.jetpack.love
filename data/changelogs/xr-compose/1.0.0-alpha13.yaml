libraryId: xr-compose
groupId: androidx.xr
version: 1.0.0-alpha13
releaseDate: 2026-05-06
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha13" data-text="Version 1.0.0-alpha13" tabindex="-1">Version 1.0.0-alpha13</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.compose:compose:1.0.0-alpha13</code>
    and
    <code translate="no" dir="ltr">androidx.xr.compose:compose-testing:1.0.0-alpha13</code>
    are released. Version 1.0.0-alpha13 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/0121e6a2cc0e61e205e8b6dd6cbf762caa1dcb86..27d0d096d63fb669b5bb4658ca4ce53ecb44e8d5/xr/compose">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>The Orbiter API is pending additional changes, we recommend suppressing the deprecation notices for Orbiters and keeping an eye out for Orbiter changes in upcoming releases.</li>
    <li>
      Those using
      <code translate="no" dir="ltr">SceneCoreEntity</code>
      to render glTFs should ensure that they are passing
      <code translate="no" dir="ltr">session.scene.activitySpace</code>
      to the
      <code translate="no" dir="ltr">parent</code>
      parameter of their
      <code translate="no" dir="ltr">GltfModel.create</code>
      call to ensure that their glTFs will render.
    </li>
    <li>
      Adding
      <code translate="no" dir="ltr">SpatialGltfModel</code>
      API to allow developers to add Gltfs to their Compose For XR apps. Developers can also query animations and nodes inside their Gltf models. (
      <a href="https://android-review.googlesource.com/#/q/I8b542678d5e78770f43b72d417853d5930600dbe">I8b542</a>
      ,
      <a href="https://issuetracker.google.com/issues/495422586">b/495422586</a>
      )
    </li>
    <li>
      Changes
      <code translate="no" dir="ltr">SceneCoreEntitySizeAdapter</code>
      from class to interface (
      <a href="https://android-review.googlesource.com/#/q/I5a784b24f9610a0009fe7b9c6a8040cf19462998">I5a784</a>
      ,
      <a href="https://issuetracker.google.com/issues/475292310">b/475292310</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">SurfaceProtection</code>
      to
      <code translate="no" dir="ltr">SpatialExternalSurfaceProtection</code>
      . Updated
      <code translate="no" dir="ltr">SpatialExternalSurface</code>
      kdocs (
      <a href="https://android-review.googlesource.com/#/q/Ifad0a1acb4cadf408f6ecdfc3686523181704a85">Ifad0a</a>
      ,
      <a href="https://issuetracker.google.com/issues/485231082">b/485231082</a>
      )
    </li>
    <li>
      Deprecate
      <code translate="no" dir="ltr">currentWindowAdaptiveInfo</code>
      and introduce V2 of it (
      <a href="https://android-review.googlesource.com/#/q/I40ecff8c40e9de56cc15c1787c2ba958bfe6ee79">I40ecf</a>
      ,
      <a href="https://issuetracker.google.com/issues/424442112">b/424442112</a>
      )
    </li>
    <li>
      The
      <code translate="no" dir="ltr">resizable</code>
      modifier is now public and applicable to groups (e.g.
      <code translate="no" dir="ltr">SpatialRow</code>
      ). (
      <a href="https://android-review.googlesource.com/#/q/I2bcf61d71d78a18495ed0ae986c3aff086a440f6">I2bcf6</a>
      ,
      <a href="https://issuetracker.google.com/issues/348483527">b/348483527</a>
      ,
      <a href="https://issuetracker.google.com/issues/489753178">b/489753178</a>
      ,
      <a href="https://issuetracker.google.com/issues/479530787">b/479530787</a>
      )
    </li>
    <li>
      The
      <code translate="no" dir="ltr">movable</code>
      modifier is now public. This modifier work well, right now, for
      <code translate="no" dir="ltr">SpatialPanels</code>
      and
      <code translate="no" dir="ltr">SpatialExternalSurface</code>
      ; however, the intention is to have these supported well for all
      <code translate="no" dir="ltr">SubspaceComposables</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9a3cd5a7989887a09282207629cd4a6dd39dfae7">I9a3cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/479530787">b/479530787</a>
      ,
      <a href="https://issuetracker.google.com/issues/478935063">b/478935063</a>
      ,
      <a href="https://issuetracker.google.com/issues/478935063">b/478935063</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">SpatialEnterTransition</code>
      and
      <code translate="no" dir="ltr">SpatialExitTransition</code>
      marked as
      <code translate="no" dir="ltr">@Immutable</code>
      (
      <a href="https://android-review.googlesource.com/#/q/If17108c900a075d2daec0030172d1e806a6a6964">If1710</a>
      ,
      <a href="https://issuetracker.google.com/issues/487757837">b/487757837</a>
      )
    </li>
    <li>
      The
      <code translate="no" dir="ltr">SpatialGltfModel</code>
      API is marked as restricted for this release pending additional testing. (
      <a href="https://android-review.googlesource.com/#/q/Ibf003499d9a4c284ad6ad1abe3bff58e428ff87e">Ibf003</a>
      ,
      <a href="https://issuetracker.google.com/issues/466090694">b/466090694</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">DeviceTrackingMode.LAST_KNOWN</code>
      to
      <code translate="no" dir="ltr">SPATIAL_LAST_KNOWN</code>
      (with a deprecated fallback), added
      <code translate="no" dir="ltr">INERTIAL_LAST_KNOWN</code>
      for 3DoF tracking, and added
      <code translate="no" dir="ltr">TRACKING_DEGRADED</code>
      to
      <code translate="no" dir="ltr">TrackingState</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ie661cfd441521987dcebd7e1fd1e7cfc3ef5ab9d">Ie661c</a>
      ,
      <a href="https://issuetracker.google.com/issues/445466590">b/445466590</a>
      )
    </li>
    <li>
      Removing deprecated
      <code translate="no" dir="ltr">SpatialLayoutSpacer</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I7b36c46ce60e5912b984395d66f55352caf1bee3">I7b36c</a>
      )
    </li>
    <li>
      Removing deprecated padding API (
      <a href="https://android-review.googlesource.com/#/q/If188618e37aa061f8bdb9f9cc5d8292e4e8db40e">If1886</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">floatRange</code>
      to bias values. Removed default value for
      <code translate="no" dir="ltr">LayoutDirection</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I9d74e5d03cdc41a6ac09a2e4a7a25d1fbfb76946">I9d74e</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Added code samples and KDoc documentation for
      <code translate="no" dir="ltr">SpatialColumn</code>
      ,
      <code translate="no" dir="ltr">SpatialRow</code>
      , and
      <code translate="no" dir="ltr">SpatialCurvedRow</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Iaf54f15ccd39fd6ac5f5ac3304f3eee968ec6a2a">Iaf54f</a>
      ,
      <a href="https://issuetracker.google.com/issues/495777633">b/495777633</a>
      )
    </li>
  </ul>
