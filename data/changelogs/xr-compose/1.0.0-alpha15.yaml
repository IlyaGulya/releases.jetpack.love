version: 1.0.0-alpha15
releaseDate: 2026-06-17
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha15" data-text="Version 1.0.0-alpha15" tabindex="-1">Version 1.0.0-alpha15</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.compose:compose:1.0.0-alpha15</code>
    and
    <code translate="no" dir="ltr">androidx.xr.compose:compose-testing:1.0.0-alpha15</code>
    are released. Version 1.0.0-alpha15 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/618d7807a412756a751a7ad875c655a3bd51b9cc..6843009ab4a83565ff22c97fa2b27471b6c5c5d7/xr/compose">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Deprecated
      <code translate="no" dir="ltr">ResizePolicy</code>
      and the old resizable modifier, replacing it with a new
      <code translate="no" dir="ltr">SubspaceModifier.resizable</code>
      overload and
      <code translate="no" dir="ltr">SubspaceModifier.transformingResizable</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9e4bc9d09bfe3403584598201b1ca06169553660">I9e4bc</a>
      )
    </li>
    <li>
      Updated
      <code translate="no" dir="ltr">SpatialGltfModel</code>
      APIs: Added support for loading models from resources via
      <code translate="no" dir="ltr">SpatialGltfModelSource</code>
      .
      <code translate="no" dir="ltr">fromResource</code>
      . Renamed speed to
      <code translate="no" dir="ltr">playbackSpeed</code>
      in
      <code translate="no" dir="ltr">SpatialGltfModelAnimation</code>
      and added a resume() method.
      <code translate="no" dir="ltr">SpatialGltfModelStatus</code>
      .Loaded and Loading are now objects. (
      <a href="https://android-review.googlesource.com/#/q/I523de803df338f924f9d9f06da14daee6aca9d2b">I523de</a>
      )
    </li>
    <li>
      Marked
      <code translate="no" dir="ltr">rotateToLookAtUser</code>
      as an experimental API. (
      <a href="https://android-review.googlesource.com/#/q/I86c16750ea50dbb1ef9444b7f7f0511c7fb0281a">I86c16</a>
      )
    </li>
    <li>
      Moved and renamed protected variable
      <code translate="no" dir="ltr">targetCurrentPose</code>
      to local variable
      <code translate="no" dir="ltr">currentTargetPoseMeter</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ia557c44db6ce1a619b9fcde6ea38d64dfabcf9e2">Ia557c</a>
      )
    </li>
    <li>
      Update
      <code translate="no" dir="ltr">SpatialPanel</code>
      and
      <code translate="no" dir="ltr">SpatialExternalSurface</code>
      kdocs to include where the object is rendered within its layout size (
      <a href="https://android-review.googlesource.com/#/q/I72104f8e1043bf5f9331e9957595e754efc9a05f">I72104</a>
      )
    </li>
    <li>
      Encapsulated
      <code translate="no" dir="ltr">SpatialGltfModel</code>
      loading logic within
      <code translate="no" dir="ltr">SpatialGltfModelState</code>
      and clarified failure behavior. (
      <a href="https://android-review.googlesource.com/#/q/Ibe98bb04b109f5b415ca129bf29e260191b30205">Ibe98b</a>
      )
    </li>
    <li>
      Clarified
      <code translate="no" dir="ltr">depth</code>
      in
      <code translate="no" dir="ltr">SubspaceModifer.size</code>
      kdocs (
      <a href="https://android-review.googlesource.com/#/q/I0f84f1a3b39c1594e85afebf76d2872041e54dc3">I0f84f</a>
      )
    </li>
  </ul>
