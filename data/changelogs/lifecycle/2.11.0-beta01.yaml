changelogHtml: |
  <h3 id="2.11.0-beta01" data-text="Version 2.11.0-beta01" tabindex="-1">Version 2.11.0-beta01</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.lifecycle:lifecycle-*:2.11.0-beta01</code>
    is released. Version 2.11.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3268ea760d665cee25941f7245395b2ebdf5bb50..35ca96cc1f129a6cc9d6650029cd6155668f4e7a/lifecycle">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Split
      <code translate="no" dir="ltr">rememberViewModelStoreOwner</code>
      and
      <code translate="no" dir="ltr">rememberViewModelStoreProvider</code>
      into separate functions for with-key and without-key use cases. (
      <a href="https://android-review.googlesource.com/#/q/Ifd1548b5ac97acb765133fcdd2b7f3bea9ffddaf">Ifd154</a>
      ,
      <a href="https://issuetracker.google.com/issues/500802788">b/500802788</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated Compose
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
  </ul>
