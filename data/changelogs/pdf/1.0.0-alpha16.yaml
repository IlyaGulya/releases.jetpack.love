changelogHtml: |
  <h3 id="1.0.0-alpha16" data-text="Version 1.0.0-alpha16" tabindex="-1">Version 1.0.0-alpha16</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.pdf:pdf-*:1.0.0-alpha16</code>
    is released. Version 1.0.0-alpha16 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..1abcb4178d48853948b9b566cabff9222d90ab69/pdf">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">EditablePdfViewerFragment</code>
      now supports rendering and erasing highlight annotations added from other apps. (
      <a href="https://android-review.googlesource.com/#/q/Ic46e4d9eb9dbed85f7bffa7a6032a7a819baa399">Ic46e4</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Updating
      <code translate="no" dir="ltr">EditablePdfDocument</code>
      to interface (
      <a href="https://android-review.googlesource.com/#/q/I94f75e023aa4fdb1318e0e68ea1ed4ebaed1bc11">I94f75</a>
      ,
      <a href="https://issuetracker.google.com/issues/483065130">b/483065130</a>
      )
    </li>
  </ul>
