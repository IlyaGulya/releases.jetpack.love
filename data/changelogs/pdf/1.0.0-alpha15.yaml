changelogHtml: |
  <h3 id="1.0.0-alpha15" data-text="Version 1.0.0-alpha15" tabindex="-1">Version 1.0.0-alpha15</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.pdf:pdf-*:1.0.0-alpha15</code>
    is released. Version 1.0.0-alpha15 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c2de33678eded3b9c19c57db09706e737f17929d..1a508f033de883ba2853b9f9ae1853eec7010638/pdf">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added Android SDK Extension Version 19 as requirement for
      <code translate="no" dir="ltr">ImageSelection</code>
      Feature (
      <a href="https://android-review.googlesource.com/#/q/I93af7f81b7174ae62f6bfee2730c70a74f3c754a">I93af7</a>
      )
    </li>
    <li>
      Marked
      <code translate="no" dir="ltr">isLinearized Boolean</code>
      as deprecated and replaced with
      <code translate="no" dir="ltr">linearizationStatus IntDef</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I5c1bf2cd74cbca7e71e1f1789882338cb6d54ce8">I5c1bf</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix fast scroller rendering without text on single tap gesture for
      <code translate="no" dir="ltr">PdfViewer</code>
      compose component (
      <a href="https://android-review.git.corp.google.com/#/q/I442b70e9148e04ff1be21744c172af3a0304785e">I442b7</a>
      )
    </li>
    <li>
      Clicking on the center of the widget center for
      <code translate="no" dir="ltr">clickTypeWidgets</code>
      .(
      <a href="https://android-review.git.corp.google.com/#/q/Ie566175bd0f87003b558b5f70ec3fe12d3805f52">Ie5661</a>
      )
    </li>
    <li>
      Moves libraries to use Java 11 target. This means produced bytecode will be Java 11 (class file version 55) and might require desugaring to use the library (
      <a href="https://android-review.googlesource.com/#/q/If4c2a6fdda1278f42ea080fa365e8b437b2c2ae6">If4c2a</a>
      ,
      <a href="https://issuetracker.google.com/issues/457821470">b/457821470</a>
      )
    </li>
  </ul>
