changelogHtml: |
  <h3 id="1.0.0-alpha17" data-text="Version 1.0.0-alpha17" tabindex="-1">Version 1.0.0-alpha17</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.pdf:pdf-*:1.0.0-alpha17</code>
    is released. Version 1.0.0-alpha17 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a..951845221205b7a428a9d779107760fc929863ee/pdf">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add a
      <code translate="no" dir="ltr">contentPadding</code>
      API to
      <code translate="no" dir="ltr">PdfViewer</code>
      composable. (
      <a href="https://android-review.googlesource.com/#/q/Idcfd496e17ec67b5ccfcba0d1fe7c047feec978a">Idcfd4</a>
      ,
      <a href="https://issuetracker.google.com/issues/481774503">b/481774503</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated Compose
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
  </ul>
