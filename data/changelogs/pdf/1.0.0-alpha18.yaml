version: 1.0.0-alpha18
releaseDate: 2026-04-22
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha18" data-text="Version 1.0.0-alpha18" tabindex="-1">Version 1.0.0-alpha18</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.pdf:pdf-*:1.0.0-alpha18</code>
    is released. Version 1.0.0-alpha18 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/951845221205b7a428a9d779107760fc929863ee..f669f7cf942ac3327e282bdf508822a3947b220a/pdf">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      The PDF library's read and rendering features have been backported to support android devices down to
      <code translate="no" dir="ltr">minSdk = 28</code>
      and
      <code translate="no" dir="ltr">sdk-extension &lt; 13</code>
      extends compatibility to an additional 2 billion active Android devices (
      <a href="https://android-review.googlesource.com/#/q/I808f89ebe430ce789db2291aabce02464c54cc67">I808f8</a>
      )
    </li>
    <li>
      Added SelectionBoundary-based
      <code translate="no" dir="ltr">getSelectionBounds</code>
      API to
      <code translate="no" dir="ltr">PdfDocument</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ida6ea3cae9fa794cea3f58496a99ae60cc38eb8f">Ida6ea</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Handled
      <code translate="no" dir="ltr">RemoteException</code>
      internally in
      <code translate="no" dir="ltr">PageBitmapSource.close()</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I2c59e13085ba571e8661e671d705572351554a7b">I2c59e</a>
      )
    </li>
  </ul>
