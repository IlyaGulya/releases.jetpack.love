changelogHtml: |
  <h3 id="1.0.0-alpha19" data-text="Version 1.0.0-alpha19" tabindex="-1">Version 1.0.0-alpha19</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.pdf:pdf-*:1.0.0-alpha19</code>
    is released. Version 1.0.0-alpha19 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/df4b49eda6f6834b6bc4c8aa30a581fa577a511e..41275634d9349e095b3315e43a89c309144ec03f/pdf">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Make
      <code translate="no" dir="ltr">AnnotationView</code>
      public (
      <a href="https://android-review.googlesource.com/#/q/I8219f3ec9aaf1586f8e5bac4a5ec7b69717dfeb1">I8219f</a>
      )
    </li>
    <li>
      Make
      <code translate="no" dir="ltr">EditablePdfDocument</code>
      and annotations classes public. (
      <a href="https://android-review.googlesource.com/#/q/I5b9620044fb502cdf92ab5faddbc323d48690bf5">I5b962</a>
      )
    </li>
    <li>
      Introduced new pdf-core submodule (
      <a href="https://android-review.googlesource.com/#/q/Iea331e51c6f9f068275043fb0a5ab2c1832f8e91">Iea331</a>
      )
    </li>
    <li>
      Relocated core pdf apis to new pdf-core artifact to decouple document models from the view implementation. (
      <a href="https://android-review.googlesource.com/#/q/I26e1f805337a6e8ba23d2a35ab4d450a5962625b">I26e1f</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">OcrProvider</code>
      APIs to support image-based text recognition (
      <a href="https://android-review.googlesource.com/#/q/I5271b0bc0eb29dc9c1a6aa75948984d458f362a8">I5271b</a>
      )
    </li>
    <li>
      Removed the deprecated parameterless
      <code translate="no" dir="ltr">onLoadDocumentSuccess()</code>
      method from
      <code translate="no" dir="ltr">PdfViewerFragment</code>
      and the deprecated
      <code translate="no" dir="ltr">isLinearized</code>
      property from
      <code translate="no" dir="ltr">PdfDocument</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6b7ab5f1d90d1d7c11a223aea1ca39c5a457150b">I6b7ab</a>
      )
    </li>
    <li>Autofill support for form filling is enabled.</li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an issue where horizontal scrolling was unreliable at page edges because scroll direction was not accounted for when managing touch event interception. (
      <a href="https://android-review.googlesource.com/#/q/I6bda5e7d9d9eed51ebafdf41aeb2a71f20140fa4">I6bda5</a>
      ,
      <a href="https://issuetracker.google.com/issues/505645009">b/505645009</a>
      )
    </li>
    <li>
      Fixed an issue to ensure the fast scroller is always displayed when accessibility is enabled. (
      <a href="https://android-review.googlesource.com/#/q/Idaf5e67bcccf57cad5a48c986349777b5d6ce091">Idaf5e</a>
      ,
      <a href="https://issuetracker.google.com/issues/513082550">b/513082550</a>
      )
    </li>
  </ul>
