changelogHtml: |
  <h3 id="1.16.0-beta01" data-text="Version 1.16.0-beta01" tabindex="-1">Version 1.16.0-beta01</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.webkit:webkit:1.16.0-beta01</code>
    is released. Version 1.16.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a..cf4acc3c7b7fb09822200e21faddec615955dafe/webkit/webkit">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      The
      <code translate="no" dir="ltr">CallbackExecutor</code>
      argument to
      <code translate="no" dir="ltr">Profile.prefetchUrlAsync</code>
      is now nullable and defaults to the main thread if not provided. (
      <a href="https://android-review.googlesource.com/#/q/Ib89ef77acac24aa312d13f1328abf0dfc1710fce">Ib89ef</a>
      ,
      <a href="https://issuetracker.google.com/issues/483041824">b/483041824</a>
      )
    </li>
  </ul>
