changelogHtml: |
  <h3 id="1.17.0-alpha02" data-text="Version 1.17.0-alpha02" tabindex="-1">Version 1.17.0-alpha02</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.webkit:webkit:1.17.0-alpha02</code>
    is released. Version 1.17.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe..14c2f2ed81d0f61a3227641684cd875e95dd6529/webkit/webkit">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Added new APIs:
      <code translate="no" dir="ltr">getDownloadFaviconsEnabled</code>
      and
      <code translate="no" dir="ltr">setDownloadFaviconsEnabled</code>
      . These APIs will allow you to control whether Favicons will be downloaded automatically. (
      <a href="https://android-review.googlesource.com/#/q/If922448ab7e6ade223c241ce429f7213c436e931">If9224</a>
      ,
      <a href="https://issuetracker.google.com/issues/510229667">b/510229667</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Update the
      <code translate="no" dir="ltr">prefetchUrlAsync</code>
      API that accepts
      <code translate="no" dir="ltr">PrefetchResult</code>
      as a callback type to report users if there is a duplicate prefetch request. (
      <a href="https://android-review.googlesource.com/#/q/Icc79674269aeba0f42746109f17b455217e19218">Icc796</a>
      ,
      <a href="https://issuetracker.google.com/issues/483041824">b/483041824</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ExpectedNoVarySearchData</code>
      is deprecated and updated to
      <code translate="no" dir="ltr">ExpectedNoVarySearchHint</code>
      .
      <code translate="no" dir="ltr">ignoredQueryParameters</code>
      and
      <code translate="no" dir="ltr">consideredQueryParameters</code>
      are made immutable lists. (
      <a href="https://android-review.googlesource.com/#/q/I7bb8cbb22fcd6f2ba77ad1d7ae15c3d874ba0bd9">I7bb8c</a>
      ,
      <a href="https://issuetracker.google.com/issues/491718321">b/491718321</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Corrected
      <code translate="no" dir="ltr">RequiresFeature</code>
      annotations on
      <code translate="no" dir="ltr">ProcessGlobalConfig</code>
      to reference
      <code translate="no" dir="ltr">isStartupFeatureSupported</code>
      instead of the incorrect
      <code translate="no" dir="ltr">isConfigFeatureSupported</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6370bc2413fdb443c1231a84ea581e2c5702a118">I6370b</a>
      )
    </li>
  </ul>
