changelogHtml: |
  <h3 id="1.16.0-alpha03" data-text="Version 1.16.0-alpha03" tabindex="-1">Version 1.16.0-alpha03</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.webkit:webkit:1.16.0-alpha03</code>
    is released. Version 1.16.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cdf076c6abd0f3125cb0302756fcb77fe981ab7c..1a508f033de883ba2853b9f9ae1853eec7010638/webkit/webkit">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Added new Web Performance Metrics APIs
      <code translate="no" dir="ltr">onFirstContentfulPaintMillis</code>
      ,
      <code translate="no" dir="ltr">onLargestContentfulPaintMillis</code>
      and
      <code translate="no" dir="ltr">onPerformanceMarkMillis</code>
      to
      <code translate="no" dir="ltr">NavigationListener</code>
      . These APIs allow developers to track First/Largest Contentful Paint and performance marks directly in their app instead of using JavaScript to retrieve them. (
      <a href="https://android-review.googlesource.com/#/q/Idb93b3661861a723d1d0429e7aab6ad779ee52f2">Idb93b</a>
      ,
      <a href="https://issuetracker.google.com/issues/432696062">b/432696062</a>
      )
    </li>
    <li>
      Added error information to the Navigation object, see
      <code translate="no" dir="ltr">Navigation#getWebResourceError</code>
      and
      <code translate="no" dir="ltr">WebResourceError#getDebugCode.</code>
      If a navigation load fails due to a net error, error information about why this occurred is now available on the navigation object. (
      <a href="https://android-review.googlesource.com/#/q/I18bdcf902e63e5726f0b985e46978ce29d3fdaf5">I18bdc</a>
      ,
      <a href="https://issuetracker.google.com/issues/474625648">b/474625648</a>
      )
    </li>
    <li>
      Update the API shape of
      <code translate="no" dir="ltr">BackForwardCache</code>
      settings by a new
      <code translate="no" dir="ltr">BackForwardCacheSettings</code>
      object that can be obtained by calling
      <code translate="no" dir="ltr">WebSettingsCompat#getBackForwardCacheSettings</code>
      , and can be used to alter each setting through set/get methods.
      <br />
      Note: We are removing
      <code translate="no" dir="ltr">WebSetingsCompat#setBackForwardCacheSettings</code>
      and
      <code translate="no" dir="ltr">BackForwardCacheSettings.Builder</code>
      , so this change may cause compilation errors when you update to this version if you were using the removed API. (
      <a href="https://android-review.googlesource.com/#/q/I377f434d6dc93b2c0fde9cd82c49ff37eaa06f37">I377f4</a>
      )
    </li>
    <li>
      Add an api to attch debug information to prefetch request. (
      <a href="https://android-review.googlesource.com/#/q/Ibb30018c5154fc01d6aa0bdc75c67133150f0fef">Ibb300</a>
      ,
      <a href="https://issuetracker.google.com/issues/474559983">b/474559983</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      The minimum supported SDK (minSdk) has been increased to 24. Apps targeting SDK versions below 24 will need to update their target SDK to use this and future versions of the library. (
      <a href="https://android-review.googlesource.com/#/q/I4df32317770517242777fb87b41f17c27a0d1dc4">I4df32</a>
      ,
      <a href="https://issuetracker.google.com/issues/452708695">b/452708695</a>
      )
    </li>
    <li>
      Removed the experimental
      <code translate="no" dir="ltr">Profile#clearPrefetchAsync</code>
      since it was no-op. This was in-development functionality that never worked. If you need to clear the cache, please submit a feature request. (
      <a href="https://android-review.googlesource.com/#/q/I341a4e62142ab0bbe439bbceddec00902359873b">I341a4</a>
      ,
      <a href="https://issuetracker.google.com/issues/483043529">b/483043529</a>
      )
    </li>
    <li>
      Migrate
      <code translate="no" dir="ltr">androidx.webkit.OutcomeReceiverCompat</code>
      to stable status, and renamed it to
      <code translate="no" dir="ltr">WebViewOutcomeReceiver</code>
      . This library-specific copy of the interface allows the
      <code translate="no" dir="ltr">webkit</code>
      library to maintain
      <code translate="no" dir="ltr">compileSdk = 33</code>
      , and the new name prevents name clashes. (
      <a href="https://android-review.googlesource.com/#/q/I0ebf70c1a865512c57185e5edba8dc92a155af5a">I0ebf7</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/I6ef8a1d6016d354d948f94352b955417ebd11fa7">I6ef8a</a>
      ,
      <a href="https://issuetracker.google.com/issues/487934754">b/487934754</a>
      )
    </li>
    <li>
      Changed return type of
      <code translate="no" dir="ltr">StartUpLocation.getStackInformation()</code>
      from
      <code translate="no" dir="ltr">String</code>
      to
      <code translate="no" dir="ltr">Throwable</code>
      to allow apps to process the information better. (
      <a href="https://android-review.googlesource.com/#/q/I938d6669c83acc98c71a4a83ef5cd02160a18e98">I938d6</a>
      ,
      <a href="https://issuetracker.google.com/issues/417434566">b/417434566</a>
      )
    </li>
  </ul>
  <p><strong>External Contribution</strong></p>
  <ul>
    <li>
      Introducing new APIs to
      <ul>
        <li>
          Inject persistent JavaScript as part of the document loaded event. This works similar to the existing
          <code translate="no" dir="ltr">WebViewCompat#addDocumentStartJavaScript</code>
          , but ensures that the DOM is ready when the script runs. The new API is
          <code translate="no" dir="ltr">WebViewCompat#addJavaScriptOnEvent</code>
          .
        </li>
        <li>
          Inject JavaScript and
          <code translate="no" dir="ltr">WebMessageListener</code>
          s into isolated worlds, to prevent collisions with existing page JavaScript. The new APIs are
          <code translate="no" dir="ltr">WebViewCompat#addJavaScriptOnEvent</code>
          and
          <code translate="no" dir="ltr">WebViewCompat#addWebMessageListener</code>
          .
        </li>
        <li>
          Execute JavaScript as response to a web message sent from a page in the same frame/world combo that sent the message. The new API is
          <code translate="no" dir="ltr">JavaScriptReplyProxy#executeJavaScript</code>
          . (
          <a href="https://android-review.googlesource.com/#/q/I45d92468d5506957702346d4be825b3a386b9282">I45d92</a>
          ,
          <a href="https://issuetracker.google.com/issues/483103617">b/483103617</a>
          )
        </li>
      </ul>
    </li>
  </ul>
