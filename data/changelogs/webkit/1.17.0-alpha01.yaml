changelogHtml: |
  <h3 id="1.17.0-alpha01" data-text="Version 1.17.0-alpha01" tabindex="-1">Version 1.17.0-alpha01</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.webkit:webkit:1.17.0-alpha01</code>
    is released. Version 1.17.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/5744fa6296a0f6147952e836b3d92dd87ff7d4dd..b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe/webkit/webkit">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">WebViewCompat#navigate</code>
      , an enhanced version of
      <code translate="no" dir="ltr">WebView#loadUrl</code>
      . Like
      <code translate="no" dir="ltr">loadUrl</code>
      , this method will load the specified url in the
      <code translate="no" dir="ltr">WebView</code>
      , but offers the following additional capabilities:
      <ul>
        <li>Allows replacing the current page in the navigation history.</li>
        <li>Returns a Navigation object, allowing the developer to match between the navigate call and navigation callbacks.</li>
        <li>
          Handles extra headers in a more consistent and understandable manner, including saving and restoring them when using save state. (
          <a href="https://android-review.googlesource.com/#/q/Iedefd179043f289d6dc905995c979119adf1d0df">Iedefd</a>
          ,
          <a href="https://issuetracker.google.com/issues/408128748">b/408128748</a>
          )
        </li>
      </ul>
    </li>
    <li>
      Deprecated
      <code translate="no" dir="ltr">SpeculativeLoadingParameters</code>
      . Apps should migrate to the more specific
      <code translate="no" dir="ltr">PrerenderParameters</code>
      or
      <code translate="no" dir="ltr">PrefetchParameters</code>
      for controlling speculative loading features.
      <a href="https://android-review.git.corp.google.com/q/I8afed51cd6b037a9907f10015fbbc02f7c23a3a8">(I8afed)</a>
    </li>
    <li>
      Added new methods to
      <code translate="no" dir="ltr">Profile</code>
      to manage prerendering behavior:
      <code translate="no" dir="ltr">Profile#getMaxPrerenders()</code>
      to get the current limit and
      <code translate="no" dir="ltr">Profile#clearMaxPrerenders()</code>
      to reset it to the default. (
      <a href="https://android-review.googlesource.com/#/q/I696eddc59807ba85890583fe83066a260aadffb3">I696ed</a>
      )
    </li>
    <li>
      Removed the experimental
      <code translate="no" dir="ltr">Profile#setOriginMatchedHeader</code>
      and associated methods. The APIs have been superseded by
      <a href="https://developer.android.com/reference/androidx/webkit/Profile#addCustomHeader(androidx.webkit.CustomHeader)">Profile#addCustomHeader</a>
      , which was released as a stable API in
      <code translate="no" dir="ltr">1.15.0</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ia7f5cff673f5bfc152e575c660aaa57736161072">Ia7f5c</a>
      ,
      <a href="https://issuetracker.google.com/issues/485235632">b/485235632</a>
      )
    </li>
  </ul>
