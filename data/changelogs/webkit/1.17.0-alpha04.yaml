changelogHtml: |
  <h3 id="webkit-1.17.0-alpha04" data-text="Version 1.17.0-alpha04" tabindex="-1">Version 1.17.0-alpha04</h3>
  <p>July 15, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.webkit:webkit:1.17.0-alpha04</code>
    is released. Version 1.17.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ba3014c143b9c9782fe30bc766c5dced55e13453..903140ec0e76f2d1c0d1ab18afeeb326f8fc5706/webkit/webkit">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">Profile#enqueuePreconnect</code>
      API to enqueue preconnection requests without triggering immediate
      <code translate="no" dir="ltr">WebView</code>
      startup. (
      <a href="https://android-review.googlesource.com/#/q/Id7e4a0206746df4fa155fd78c33946afd3ed9025">Id7e4a</a>
      ,
      <a href="https://issuetracker.google.com/issues/511156405">b/511156405</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">WebSettingsCompat#setDownloadFaviconsEnabled</code>
      and
      <code translate="no" dir="ltr">WebSettingsCompat#getDownloadFaviconsEnabled</code>
      which allows developers to set or get whether a Favicon will be downloaded upon a navigation, by disabling the downloading of Favicons there will be a decrease in memory and bandwidth. (
      <a href="https://android-review.googlesource.com/#/q/I9f87e3ba0ceaad2af5d7e60e86fb9d7ee48de49a">I9f87e</a>
      ,
      <a href="https://issuetracker.google.com/issues/510229667">b/510229667</a>
      )
    </li>
  </ul>
