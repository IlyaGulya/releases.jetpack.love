changelogHtml: |
  <h3 id="javascriptengine-1.1.0-alpha02" data-text="Version 1.1.0-alpha02" tabindex="-1">Version 1.1.0-alpha02</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.javascriptengine:javascriptengine:1.1.0-alpha02</code>
    is released. Version 1.1.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..1abcb4178d48853948b9b566cabff9222d90ab69/javascriptengine/javascriptengine">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Add message ports API to provide symmetric, flexible, and low-overhead communication with JavaScript isolates. This allows strings and
      <code translate="no" dir="ltr">ArrayBuffers</code>
      to be sent and received without embedding them inside evaluations or named data blobs. (
      <a href="https://android-review.googlesource.com/#/q/I04bc0b0cb601d37562c4c12390e0f39c1378a47e">I04bc0</a>
      ,
      <a href="https://issuetracker.google.com/issues/490128971">b/490128971</a>
      )
    </li>
  </ul>
