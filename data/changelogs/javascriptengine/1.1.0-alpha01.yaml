changelogHtml: |
  <h3 id="1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.javascriptengine:javascriptengine:1.1.0-alpha01</code>
    is released. Version 1.1.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/87de50e190d7e843166cedd9df75192e999fe84b..1a508f033de883ba2853b9f9ae1853eec7010638/javascriptengine/javascriptengine">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Moves libraries to use Java 11 target. This means produced bytecode will be Java 11 (class file version 55) and might require desugaring to use the library (
      <a href="https://android-review.googlesource.com/#/q/If4c2a6fdda1278f42ea080fa365e8b437b2c2ae6">If4c2a</a>
      ,
      <a href="https://issuetracker.google.com/issues/457821470">b/457821470</a>
      )
    </li>
    <li>
      This library now uses
      <a href="https://jspecify.dev/">JSpecify nullness annotations</a>
      , which are type-use. Kotlin developers should use the following compiler argument to enforce correct usage:
      <code translate="no" dir="ltr">-Xjspecify-annotations=strict</code>
      (this is the default starting with version 2.1.0 of the Kotlin compiler) (
      <a href="https://android-review.googlesource.com/#/q/Ieee48ded2b7e705d7274777bdc2b891220fff5bc">Ieee48</a>
      ,
      <a href="https://issuetracker.google.com/issues/326456246">b/326456246</a>
      )
    </li>
  </ul>
  <h2 id="version_10_2" data-text="Version 1.0" tabindex="-1">Version 1.0</h2>
