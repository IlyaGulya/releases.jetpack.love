version: 1.0.0
releaseDate: 2019-11-07
#language=html
changelogHtml: |
  <h3 id="version_100_3" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h3>
  <h4 id="annotation-experimental-1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h4>
  <p>November 7, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.0.0</code>
    and
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental-lint:1.0.0</code>
    is released with no changes since
    <code translate="no" dir="ltr">1.0.0-rc01</code>
    .
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/0bc38a30ea2471d0866c80859ed7fa94e664f461..cc95e7591c5f430294f92000124c313841aca40e/annotation">Version 1.0.0 contains these commits</a>
    .
  </p>
  <p><strong>Major features of 1.0.0</strong></p>
  <ul>
    <li>
      Lint-based enforcement of Kotlin
      <code translate="no" dir="ltr">@Experimental</code>
      semantics in Java source code
    </li>
    <li>
      Java annotations that provide equivalent behavior to Kotlin’s
      <code translate="no" dir="ltr">@Experimental</code>
      and
      <code translate="no" dir="ltr">@UseExperimental</code>
      annotations without the need for a dependency on Kotlin
    </li>
  </ul>
  <h4 id="experimental-1.0.0-rc01" data-text="Version 1.0.0-rc01" tabindex="-1">Version 1.0.0-rc01</h4>
  <p>October 23, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.0.0-rc01</code>
    and
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental-lint:1.0.0-rc01</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/400408ab67b8b2dc8df47dacc7456fccc303bdd0..0bc38a30ea2471d0866c80859ed7fa94e664f461/annotation">Version 1.0.0-rc01 contains these commits</a>
    .
  </p>
  <p><strong>Known issues</strong></p>
  <p>
    When using Studio 3.5 stable, warnings from the
    <code translate="no" dir="ltr">@Experimental</code>
    usage lint detector are not displayed in the IDE for invalid Java usages of Kotlin
    <code translate="no" dir="ltr">@Experimental</code>
    annotation. See
    <a href="https://issuetracker.google.com/issues/140640322">b/140640322</a>
    .
  </p>
  <h4 id="experimental-1.0.0-beta01" data-text="Version 1.0.0-beta01" tabindex="-1">Version 1.0.0-beta01</h4>
  <p>October 9, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.0.0-beta01</code>
    and
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental-lint:1.0.0-beta01</code>
    are released with no changes since version
    <code translate="no" dir="ltr">1.0.0-alpha01</code>
    .
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cd1aae0250ae03f6383bf4fd28a60036778bb509..400408ab67b8b2dc8df47dacc7456fccc303bdd0/annotation">Version 1.0.0-beta01 contains these commits</a>
    .
  </p>
  <h4 id="experimental-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h4>
  <p>September 18, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.0.0-alpha01</code>
    and
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental-lint:1.0.0-alpha01</code>
    are released. These are the
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/571d7a890c8b1e90e9f4db8f783380a928da3624..cd1aae0250ae03f6383bf4fd28a60036778bb509/annotation/annotation-experimental">
      commits included in annotation-experimental
      <code translate="no" dir="ltr">1.0.0-alpha01</code>
    </a>
    and these are the
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/571d7a890c8b1e90e9f4db8f783380a928da3624..55024edf8c790a12afe31ed7729acf895b895034/annotation/annotation-experimental-lint">
      commits included in annotation-experimental-lint
      <code translate="no" dir="ltr">1.0.0-alpha01</code>
    </a>
  </p>
  <aside class="note">
    <strong>Note:</strong>
    <span>
      This version is dependent on the Java 8 programming language. Please read
      <a href="/studio/write/java8-support">Use Java 8 language features</a>
      to learn how to use it in your project.
    </span>
  </aside>
  <p><strong>New features</strong></p>
  <ul>
    <li>
      <p>
        The Jetpack Experimental annotation library provides a Java-compatible implementation of Kotlin’s
        <a href="https://kotlinlang.org/docs/reference/experimental.html">experimental API markers</a>
        . The
        <code translate="no" dir="ltr">-lint</code>
        artifact provides a Lint-based implementation of experimental usage restrictions and enforces restrictions on Java usages of Kotlin’s native experimental API markers.
      </p>
    </li>
    <li>
      <p>
        When using the
        <code translate="no" dir="ltr">annotation-experimental</code>
        artifact as a dependency, the Lint rules provided by the
        <code translate="no" dir="ltr">annotation-experimental-lint</code>
        artifact will be enforced automatically.
      </p>
    </li>
  </ul>
