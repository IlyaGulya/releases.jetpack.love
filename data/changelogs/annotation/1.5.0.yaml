changelogHtml: |
  <h3 id="version_150_4" data-text="Version 1.5.0" tabindex="-1">Version 1.5.0</h3>
  <h4 id="annotation-1.5.0" data-text="Version 1.5.0" tabindex="-1">Version 1.5.0</h4>
  <p>September 21, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.5.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ff9030bbacf23c63ddcaebc04246af0251eb74b2..8d30752c5370497e2cf7560560fd383fed1b2de8/annotation/annotation">Version 1.5.0 contains these commits.</a>
  </p>
  <p><strong>Important changes since 1.4.0</strong></p>
  <ul>
    <li>Annotation library has been fully migrated to Kotlin sources, resulting in support for Kotlin-specific target use sites and other Kotlin-compatible annotation features.</li>
  </ul>
  <h4 id="annotation-1.5.0-rc01" data-text="Version 1.5.0-rc01" tabindex="-1">Version 1.5.0-rc01</h4>
  <p>September 7, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.5.0-rc01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/580b321a1e2ab247096eee6b2c7f65b12ee042c4..ff9030bbacf23c63ddcaebc04246af0251eb74b2/annotation/annotation">Version 1.5.0-rc01 contains these commits.</a>
  </p>
  <ul>
    <li>No changes from previous 1.5.0 beta release.</li>
  </ul>
  <h4 id="annotation-1.5.0-beta01" data-text="Version 1.5.0-beta01" tabindex="-1">Version 1.5.0-beta01</h4>
  <p>August 24, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.5.0-beta01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/bea814b246f89ff7244e3c6b0648f0b57e47897c..580b321a1e2ab247096eee6b2c7f65b12ee042c4/annotation/annotation">Version 1.5.0-beta01 contains these commits.</a>
  </p>
  <ul>
    <li>No changes from previous release. API surface has been frozen for beta.</li>
  </ul>
  <h4 id="annotation-1.5.0-alpha02" data-text="Version 1.5.0-alpha02" tabindex="-1">Version 1.5.0-alpha02</h4>
  <p>August 10, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.5.0-alpha02</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/a7f0710ad21f556f0dde9bf7bdab6d2135170fd4..bea814b246f89ff7244e3c6b0648f0b57e47897c/annotation/annotation">Version 1.5.0-alpha02 contains these commits.</a>
  </p>
  <ul>
    <li>No changes since the previous alpha release.</li>
  </ul>
  <h4 id="annotation-1.5.0-alpha01" data-text="Version 1.5.0-alpha01" tabindex="-1">Version 1.5.0-alpha01</h4>
  <p>July 27, 2022</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.5.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d0a827d2d2415ef04c0c9538af087321d1fc58d8..a7f0710ad21f556f0dde9bf7bdab6d2135170fd4/annotation/annotation">Version 1.5.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Annotation library has been fully migrated to Kotlin sources, resulting in support for Kotlin-specific target use sites and other Kotlin-compatible annotation features.</li>
  </ul>
