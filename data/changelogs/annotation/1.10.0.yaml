changelogHtml: |
  <h3 id="1.10.0" data-text="Version 1.10.0" tabindex="-1">Version 1.10.0</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-*:1.10.0</code>
    is released. Version 1.10.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/af0b67cea9da3f8e8139ee5856040fb5bb47bd72..8975ffa5b6e4e1dbd6e79a89d5779d4e4e553103/annotation/annotation">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.9.0:</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">@RequiresFlag</code>
      annotation to flag usages of not yet stable Android platform APIs
    </li>
    <li>Removed support for KMP x86 Apple targets</li>
  </ul>
