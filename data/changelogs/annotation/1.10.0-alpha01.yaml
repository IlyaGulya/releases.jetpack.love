changelogHtml: |
  <h3 id="1.10.0-alpha01" data-text="Version 1.10.0-alpha01" tabindex="-1">Version 1.10.0-alpha01</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-*:1.10.0-alpha01</code>
    is released. Version 1.10.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/87b88ad088cc9b18d4ab75611fc8b74e8b01c24a..e6053653b05d83f0e5eb0ae2debf1aaddadf4334/annotation/annotation">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Dropped support for x86 based Mac and iOS KMP targets</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">RequiresFlag</code>
      annotation for code that must be gated on pre-release flag checks (
      <a href="https://android-review.googlesource.com/#/q/I77bbaf99fed6f99b55bf1a5382b56a11da694f44">I77bba</a>
      ,
      <a href="https://issuetracker.google.com/issues/479114442">b/479114442</a>
      )
    </li>
    <li>
      Adds
      <code translate="no" dir="ltr">ANNOTATION_TYPE</code>
      target to
      <code translate="no" dir="ltr">RequiresApi</code>
      and
      <code translate="no" dir="ltr">RequiresExtension</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I0cb0dd0ba050c8c703eee1d59a2c96715c84cc6e">I0cb0d</a>
      )
    </li>
    <li>
      Projects released with Kotlin 2.0 require KGP 2.0.0 or newer to be consumed (
      <a href="https://android-review.googlesource.com/#/q/Idb6b5d6ae1625ab870ffe74f9790ffabc82a63b4">Idb6b5</a>
      ,
      <a href="https://issuetracker.google.com/issues/344563182">b/344563182</a>
      )
    </li>
    <li>
      Updated
      <code translate="no" dir="ltr">@Discouraged</code>
      retention policy. (
      <a href="https://android-review.googlesource.com/#/q/Id2f85e1b47c9f8555352b5a29b1df70d6067af20">Id2f85</a>
      ,
      <a href="https://issuetracker.google.com/issues/375937557">b/375937557</a>
      )
    </li>
  </ul>
  <h2 id="version_19_2" data-text="Version 1.9" tabindex="-1">Version 1.9</h2>
