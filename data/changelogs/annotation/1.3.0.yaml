  <h4 id="annotation-1.2.0" data-text="Version 1.2.0" tabindex="-1">Version 1.2.0</h4>
  <p>March 24, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.2.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1eb7d82174683e4f49dfc1ad1a6a085767a40410..733fe826e7dadc17467ed3aabe6b724c1d14d704/annotation/annotation">Version 1.2.0 contains these commits.</a>
  </p>
  <p><strong>Major changes since 1.1.0</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">@ChecksSdkIntAtLeast</code>
      annotation, which can be used to identify methods or fields used to gate access on SDK level and satisfy the
      <code translate="no" dir="ltr">NewApi</code>
      lint check.
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">@DoNotInline</code>
      annotation, which is paired with a Proguard rule to prevent members from being inlined during optimization.
    </li>
    <li>
      A variety of annotations are now annotated with
      <code translate="no" dir="ltr">@Documented</code>
      to ensure they show up in documentation for annotated members.
    </li>
  </ul>
  <h4 id="annotation-1.2.0-rc01" data-text="Version 1.2.0-rc01" tabindex="-1">Version 1.2.0-rc01</h4>
  <p>February 24, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.2.0-rc01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6207afb1646d302c5d29c2c67d332b48db87fb27..1eb7d82174683e4f49dfc1ad1a6a085767a40410/annotation/annotation">Version 1.2.0-rc01 contains these commits.</a>
  </p>
  <h4 id="annotation-1.2.0-beta01" data-text="Version 1.2.0-beta01" tabindex="-1">Version 1.2.0-beta01</h4>
  <p>January 13, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.2.0-beta01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/56da5579c165464d278289e593d73d48571b9510..6207afb1646d302c5d29c2c67d332b48db87fb27/annotation/annotation">Version 1.2.0-beta01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      New
      <code translate="no" dir="ltr">@DoNotInline</code>
      annotation which instructs code optimizers (e.g. Proguard, R8) to not inline the annotated method. (
      <a href="https://android-review.googlesource.com/#/q/I3dfe8732c062e500b19d1cf2e3812389c7fc3cca">I3dfe8</a>
      ,
      <a href="https://issuetracker.google.com/issues/141326133">b/141326133</a>
      )
    </li>
  </ul>
  <h4 id="annotation-1.2.0-alpha01" data-text="Version 1.2.0-alpha01" tabindex="-1">Version 1.2.0-alpha01</h4>
  <p>May 14, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.2.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/2f634eec2143acd6a4ea19a375a6e3877cdcc2ed..56da5579c165464d278289e593d73d48571b9510/annotation/annotation">Version 1.2.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">@ChecksSdkIntAtLeast</code>
      annotation. This let’s androidx and users annotate methods and fields that represent an
      <code translate="no" dir="ltr">SDK_INT</code>
      check. (
      <a href="https://android-review.googlesource.com/#/q/I89a5407693458796a6f67446ad107a82dbe47329">I89a54</a>
      ,
      <a href="https://issuetracker.google.com/issues/120255046">b/120255046</a>
      )
    </li>
  </ul>
  <h3 id="version_11_4" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="annotation-experimental-1.1.0" data-text="Version 1.1.0" tabindex="-1">Version 1.1.0</h4>
  <p>April 7, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.1.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/733fe826e7dadc17467ed3aabe6b724c1d14d704..b3c87f0d84c9d910b5458fe784e71d195d431509/annotation/annotation-experimental">Version 1.1.0 contains these commits.</a>
  </p>
  <p><strong>Major changes since 1.0.0</strong></p>
  <ul>
    <li>Jetpack’s experimental annotations have been rewritten in Kotlin to provide support for multiple marker classes and improved handling of deprecation.</li>
    <li>
      <code translate="no" dir="ltr">RequiresOptIn</code>
      and
      <code translate="no" dir="ltr">OptIn</code>
      annotations have been added for parity with Kotlin, and the
      <code translate="no" dir="ltr">Experimental</code>
      and
      <code translate="no" dir="ltr">UsesExperimental</code>
      annotations have been deprecated.
    </li>
  </ul>
  <h4 id="annotation-experimental-1.1.0-rc02" data-text="Version 1.1.0-rc02" tabindex="-1">Version 1.1.0-rc02</h4>
  <p>March 24, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.1.0-rc02</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1eb7d82174683e4f49dfc1ad1a6a085767a40410..733fe826e7dadc17467ed3aabe6b724c1d14d704/annotation/annotation-experimental">Version 1.1.0-rc02 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Added Proguard rules to ensure that code optimization does not warn about missing Kotlin meta-annotations.</li>
  </ul>
  <h4 id="annotation-experimental-1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>March 10, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.1.0-rc01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/aee18b103203a91ee89df91f0af5df2ecff356d6..1eb7d82174683e4f49dfc1ad1a6a085767a40410/annotation/annotation-experimental">Version 1.1.0-rc01 contains these commits.</a>
  </p>
  <p>No changes since prior beta release.</p>
  <h4 id="annotation-experimental-1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h4>
  <p>January 27, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.1.0-beta01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/9f60cc700129e30cee9df020005c317fb39d32ec..aee18b103203a91ee89df91f0af5df2ecff356d6/annotation/annotation-experimental">Version 1.1.0-beta01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      The androidx variant of the Experimental annotation has been deprecated to provide parity with Kotlin. It has been replaced by an androidx variant of the RequiresOptIn annotation, and the Java-facing linter has been updated to support both the new Kotlin annotation and the new androidx variant. (
      <a href="https://android-review.googlesource.com/#/q/I52495721777cf9d2243a825fc491e59c031d2e96">I52495</a>
      ,
      <a href="https://issuetracker.google.com/issues/151331381">b/151331381</a>
      )
    </li>
  </ul>
  <h4 id="annotation-experimental-1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h4>
  <p>July 22, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.1.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cc95e7591c5f430294f92000124c313841aca40e..9f60cc700129e30cee9df020005c317fb39d32ec/annotation/annotation-experimental">Version 1.1.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Experimental annotation library is now written in Kotlin, but does not require the Kotlin standard library to be included as a dependency. It includes a Proguard file that allows unnecessary Kotlin metadata to be stripped from projects that only use the Java programming language.</li>
    <li>
      <code translate="no" dir="ltr">@UseExperimental</code>
      now supports multiple marker classes (
      <a href="https://android-review.googlesource.com/1185577">aosp/1185577</a>
      ,
      <a href="https://issuetracker.google.com/145137892">b/145137892</a>
      )
    </li>
  </ul>
