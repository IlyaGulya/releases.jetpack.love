changelogHtml: |
  <h3 id="version_130_4" data-text="Version 1.3.0" tabindex="-1">Version 1.3.0</h3>
  <h4 id="annotation-1.3.0" data-text="Version 1.3.0" tabindex="-1">Version 1.3.0</h4>
  <p>November 3, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.3.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c38bf8cba2f6d60f9cceb03adcb56ff57f793b27..cbe56bb68421125805e82cc6ecb60a7701518e07/annotation/annotation">Version 1.3.0 contains these commits.</a>
  </p>
  <p><strong>Important changes since 1.2.0</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">@Discouraged</code>
      annotation for marking APIs that cannot be reasonably deprecated but have significant negative performance impact and should not be called in normal production code
    </li>
    <li>
      <code translate="no" dir="ltr">@Context</code>
      annotation to mark generic Contexts so that developers can migrate to new APIs more easily
    </li>
    <li>
      <code translate="no" dir="ltr">@GravityInt</code>
      annotation for marking elements containing gravity values packed into integers
    </li>
    <li>
      Deprecated
      <code translate="no" dir="ltr">@InspectableProperty</code>
      in favor of
      <code translate="no" dir="ltr">@Attribute</code>
      for
      <code translate="no" dir="ltr">androidx.resourceinspection</code>
    </li>
  </ul>
  <h4 id="1.3.0-rc01" data-text="Version 1.3.0-rc01" tabindex="-1">Version 1.3.0-rc01</h4>
  <p>October 27, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.3.0-rc01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1f6bc4d47b7be46a5af151ed726e84db0a1cf9f9..c38bf8cba2f6d60f9cceb03adcb56ff57f793b27/annotation/annotation">Version 1.3.0-rc01 contains these commits.</a>
  </p>
  <h4 id="annotation-1.3.0-beta01" data-text="Version 1.3.0-beta01" tabindex="-1">Version 1.3.0-beta01</h4>
  <p>September 29, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.3.0-beta01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/5c42896eb6591b09e3952030fb7ea8d9b8c42713..1f6bc4d47b7be46a5af151ed726e84db0a1cf9f9/annotation/annotation">Version 1.3.0-beta01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Require explanation in 'message' for @Discouraged. (
      <a href="https://android-review.googlesource.com/#/q/I3390f4682fb583fcc38feaa00577a45dbb0d14e6">I3390f</a>
      )
    </li>
    <li>
      Adding @Discouraged annotation for marking elements that are discouraged. (
      <a href="https://android-review.googlesource.com/#/q/Ib2549fc20843a13384fa74befc2f733e61549253">Ib2549</a>
      )
    </li>
    <li>
      Make the RestrictTo annotation visible from Studio docs popup (
      <a href="https://android-review.googlesource.com/#/q/Ie8e1a8ce27aca13319b0f02726050b11c8415f77">Ie8e1a</a>
      ,
      <a href="https://issuetracker.google.com/issues/183134648">b/183134648</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Add Context annotation to mark generic Contexts, so developers can migrate to new APIs more easily. (
      <a href="https://android-review.googlesource.com/#/q/Ie581abf2bd48eb2120cced5f4592d4344591cf28">Ie581a</a>
      )
    </li>
  </ul>
  <h4 id="annotation-1.3.0-alpha01" data-text="Version 1.3.0-alpha01" tabindex="-1">Version 1.3.0-alpha01</h4>
  <p>March 24, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.3.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1eb7d82174683e4f49dfc1ad1a6a085767a40410..5c42896eb6591b09e3952030fb7ea8d9b8c42713/annotation/annotation">Version 1.3.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Deprecated
      <code translate="no" dir="ltr">@InspectableProperty</code>
      in favor of
      <code translate="no" dir="ltr">@Attribute</code>
      in
      <code translate="no" dir="ltr">androidx.resourceinspection</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ic0eff8463bacf8efb21c2dfe90e136849b8ef26f">Ic0eff</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">@GravityInt</code>
      annotation for marking elements containing gravity values packed into integers. (
      <a href="https://android-review.googlesource.com/#/q/Ifcaa4ad1df11c767b1060bcfcf2debeb9b1a666f">Ifcaa4</a>
      ,
      <a href="https://issuetracker.google.com/issues/180620048">b/180620048</a>
      )
    </li>
  </ul>
  <h3 id="version_11_3" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="annotation-1.1.0" data-text="Version 1.1.0" tabindex="-1">Version 1.1.0</h4>
  <p>June 5, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.1.0</code>
    is released with no changes from 1.1.0-rc01.
  </p>
  <h4 id="1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>May 7, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.1.0-rc01</code>
    is released with no changes from
    <code translate="no" dir="ltr">1.1.0-beta01</code>
    . The commits included in this version can be found
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d0c85eb6e595cfd4383ef345e97e1b8d6acd0a44..baca2b5c73982f26b5630b87ff7dbf25622bbafc/activity">here</a>
    .
  </p>
  <h4 id="1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h4>
  <p>April 3rd, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.1.0-beta01</code>
    is released. The commits included in this version can be found
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/091eca9ac5e20c1346e4c1fdace7b63721f9ce43..2f634eec2143acd6a4ea19a375a6e3877cdcc2ed/annotations">here</a>
    .
  </p>
  <aside class="note">
    <strong>Note:</strong>
    <span>this version of Annotation is incompatible with Activity 1.0.0-alpha04 and 1.0.0-alpha05 as well as Fragment 1.1.0-alpha04 and 1.1.0-alpha05. Please upgrade to Activity 1.0.0-alpha06 and Fragment 1.1.0-alpha06, respectively.</span>
  </aside>
  <p><strong>New features</strong></p>
  <ul>
    <li>
      New
      <code translate="no" dir="ltr">@InspectableProperty</code>
      annotation to support the new view inspection APIs added in Android 10. This annotation can be applied to getters on views or other UI elements. Code generation tools may use it to create companion objects that map property names and attribute IDs to property values without the overhead of reflection.
    </li>
  </ul>
  <p><strong>API changes</strong></p>
  <ul>
    <li>
      Breaking change:
      <code translate="no" dir="ltr">@ContentView</code>
      has been changed to a constructor annotation and the
      <code translate="no" dir="ltr">@LayoutRes</code>
      value has been removed. Classes wishing to support
      <code translate="no" dir="ltr">@ContentView</code>
      annotations should add this annotation to a constructor that takes a
      <code translate="no" dir="ltr">@LayoutRes int</code>
      parameter. This fixes an issue when using this annotation in library modules. (
      <a href="https://issuetracker.google.com/issues/128352521">b/128352521</a>
      )
    </li>
  </ul>
  <h4 id="1.1.0-alpha02" data-text="Version 1.1.0-alpha02" tabindex="-1">Version 1.1.0-alpha02</h4>
  <p>March 13, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation:1.1.0-alpha02</code>
    is released. The full list of commits included in this version can be found
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/941836d33391459696e51b18c08a08f0441eb216..091eca9ac5e20c1346e4c1fdace7b63721f9ce43/annotations">here</a>
    .
  </p>
  <p><strong>New features</strong></p>
  <ul>
    <li>
      New API restriction scope:
      <code translate="no" dir="ltr">RestrictTo.Scope.LIBRARY_GROUP_PREFIX</code>
      . It restricts usage to code within packages whose groups share the same library group prefix up to the last
      <code translate="no" dir="ltr">.</code>
      (period). For example, because libraries
      <code translate="no" dir="ltr">foo.bar:lib1</code>
      and
      <code translate="no" dir="ltr">foo.baz:lib2</code>
      share the prefix
      <code translate="no" dir="ltr">foo</code>
      , they can use each other's APIs that are restricted to this scope. Similarly, for
      <code translate="no" dir="ltr">com.foo.bar:lib1</code>
      and
      <code translate="no" dir="ltr">com.foo.baz:lib2</code>
      share the
      <code translate="no" dir="ltr">com.foo.</code>
      prefix and can share APIs restricted to that scope. Library
      <code translate="no" dir="ltr">com.bar.qux:lib3</code>
      however will not be able to use the restricted API because it only shares the prefix
      <code translate="no" dir="ltr">com.</code>
      and not all the way until the last
      <code translate="no" dir="ltr">.</code>
      (period).
    </li>
  </ul>
  <h4 id="1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h4>
  <p>January 30, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation 1.1.0-alpha01</code>
    is released.
  </p>
  <p><strong>New features</strong></p>
  <ul>
    <li>
      Added a
      <code translate="no" dir="ltr">@ContentView</code>
      annotation that allows you to indicate which layout XML file should be inflated. This is supported in
      <code translate="no" dir="ltr">ComponentActivity</code>
      in its
      <code translate="no" dir="ltr">1.0.0-alpha04</code>
      and
      <code translate="no" dir="ltr">Fragment</code>
      in its
      <code translate="no" dir="ltr">1.1.0-alpha04</code>
      release as an alternative to using
      <code translate="no" dir="ltr">setContentView()</code>
      or overriding
      <code translate="no" dir="ltr">onCreateView()</code>
      , respectively. (
      <a href="https://android-review.googlesource.com/837619">aosp/837619</a>
      )
    </li>
  </ul>
  <h3 id="version_10_2" data-text="Version 1.0" tabindex="-1">Version 1.0</h3>
  <h4 id="1.0.2" data-text="Version  1.0.2" tabindex="-1">Version 1.0.2</h4>
  <p>February 25, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation 1.0.2</code>
    is released.
  </p>
  <p><strong>Bug fixes</strong></p>
  <ul>
    <li>
      Correct the R8/ProGuard rules which are embedded in the jar. These were incorrectly referencing the old
      <code translate="no" dir="ltr">android.support.annotation</code>
      types instead of
      <code translate="no" dir="ltr">androidx.annotation</code>
      . Note: This would have only had an impact on your builds if you were not using
      <code translate="no" dir="ltr">getDefaultProguardFile</code>
      as those default rules also included correct rules for both packages. (
      <a href="https://android-review.googlesource.com/891685/">aosp/891685</a>
      )
    </li>
    <li>
      Add a R8/ProGuard rule which explicitly keeps the @Keep annotation itself. This ensures that ProGuard does not remove the annotation from types prior to actually honoring its semantics. Note: This would have only had an impact on your builds if you were not using
      <code translate="no" dir="ltr">getDefaultProguardFile</code>
      as those default rules also included correct rules for both packages. (
      <a href="https://android-review.googlesource.com/903818/">aosp/903818</a>
      )
    </li>
  </ul>
  <h2 id="annotation-experimental_2" data-text="Annotation-Experimental" tabindex="-1">Annotation-Experimental</h2>
  <h3 id="version_16_4" data-text="Version 1.6" tabindex="-1">Version 1.6</h3>
  <h4 id="annotation-experimental-1.6.0" data-text="Version 1.6.0" tabindex="-1">Version 1.6.0</h4>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.6.0</code>
    is released. Version 1.6.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/af0b67cea9da3f8e8139ee5856040fb5bb47bd72..8975ffa5b6e4e1dbd6e79a89d5779d4e4e553103/annotation/annotation-experimental">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.5.0:</strong></p>
  <ul>
    <li>Fixes to support latest version of Android Lint in the bundled lint checks</li>
  </ul>
  <h4 id="annotation-experimental-1.6.0-rc01" data-text="Version 1.6.0-rc01" tabindex="-1">Version 1.6.0-rc01</h4>
  <p>February 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.6.0-rc01</code>
    is released. Version 1.6.0-rc01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/46bcdef6281ae0f03c3a2bb2812edfc2c0e66d05..9bc7aecc488a90940bced04fce3ff47f80f09cf7/annotation/annotation-experimental">no changes</a>
    since the prior beta release.
  </p>
  <h4 id="annotation-experimental-1.6.0-alpha01" data-text="Version 1.6.0-alpha01" tabindex="-1">Version 1.6.0-alpha01</h4>
  <p>October 22, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.6.0-alpha01</code>
    is released. Version 1.6.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/af0b67cea9da3f8e8139ee5856040fb5bb47bd72..46bcdef6281ae0f03c3a2bb2812edfc2c0e66d05/annotation/annotation-experimental">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      The
      <code translate="no" dir="ltr">OptIn</code>
      annotation now supports the
      <code translate="no" dir="ltr">ElementType.PARAMETER</code>
      target.
    </li>
  </ul>
  <h3 id="version_15_2" data-text="Version 1.5" tabindex="-1">Version 1.5</h3>
  <h4 id="annotation-experimental-1.5.1" data-text="Version 1.5.1" tabindex="-1">Version 1.5.1</h4>
  <p>July 16, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.5.1</code>
    is released. Version 1.5.1 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/dccd20efaf4df6424d5d73527bb84f396b69ff2d..af0b67cea9da3f8e8139ee5856040fb5bb47bd72/annotation/annotation-experimental">these commits</a>
    .
  </p>
  <h4 id="annotation-experimental-1.5.0" data-text="Version 1.5.0" tabindex="-1">Version 1.5.0</h4>
  <p>May 7, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.5.0</code>
    is released. Version 1.5.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d0c1307893e9154be53313000d28149a45174387..dccd20efaf4df6424d5d73527bb84f396b69ff2d/annotation/annotation-experimental">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.4.0</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">message</code>
      to
      <code translate="no" dir="ltr">RequiresOptIn</code>
      to match the Kotlin stdlib annotation with default empty string value. (
      <a href="https://android-review.googlesource.com/#/q/I1f50e2259d75e1d14f5320d21c91cb8fbc2e1609">I1f50e</a>
      )
    </li>
    <li>
      This library now targets Kotlin 2.0 language level and requires KGP 2.0.0 or newer. (
      <a href="https://android-review.googlesource.com/#/q/Idb6b5d6ae1625ab870ffe74f9790ffabc82a63b4">Idb6b5</a>
      )
    </li>
  </ul>
  <h4 id="annotation-experimental-1.5.0-rc01" data-text="Version 1.5.0-rc01" tabindex="-1">Version 1.5.0-rc01</h4>
  <p>April 23, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.5.0-rc01</code>
    is released. Version 1.5.0-rc01 contains no changes since the previous beta release, see
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4c37298a97c16270c139eb812ddadaba03e23a52..d0c1307893e9154be53313000d28149a45174387/annotation/annotation-experimental">commits</a>
    .
  </p>
  <h4 id="annotation-experimental-1.5.0-beta01" data-text="Version 1.5.0-beta01" tabindex="-1">Version 1.5.0-beta01</h4>
  <p>April 9, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.5.0-beta01</code>
    is released. Version 1.5.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c71a0ac68935256ff7027557d5396130c71eb54d..4c37298a97c16270c139eb812ddadaba03e23a52/annotation/annotation-experimental">these commits</a>
    .
  </p>
  <p><strong>Important changes</strong></p>
  <ul>
    <li>
      This library now targets Kotlin 2.0 language level and requires KGP 2.0.0 or newer (
      <a href="https://android-review.googlesource.com/#/q/Idb6b5d6ae1625ab870ffe74f9790ffabc82a63b4">Idb6b5</a>
      )
    </li>
  </ul>
  <h4 id="annotation-experimental-1.5.0-alpha01" data-text="Version 1.5.0-alpha01" tabindex="-1">Version 1.5.0-alpha01</h4>
  <p>August 21, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.5.0-alpha01</code>
    is released. Version 1.5.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cb993e8594b035615bb12e0cb8294769eb7c10d1..c71a0ac68935256ff7027557d5396130c71eb54d/annotation/annotation-experimental">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">message</code>
      to
      <code translate="no" dir="ltr">RequiresOptIn</code>
      to match the Kotlin stdlib annotation with default empty string value. (
      <a href="https://android-review.googlesource.com/#/q/I1f50e2259d75e1d14f5320d21c91cb8fbc2e1609">I1f50e</a>
      )
    </li>
  </ul>
  <h3 id="version_14_2" data-text="Version 1.4" tabindex="-1">Version 1.4</h3>
  <h4 id="annotation-experimental-1.4.1" data-text="Version 1.4.1" tabindex="-1">Version 1.4.1</h4>
  <p>April 3, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.4.1</code>
    is released. Version 1.4.1 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d25969e764bee00b0d8bb519bdd1487ef71e94de..cb993e8594b035615bb12e0cb8294769eb7c10d1/annotation/annotation-experimental">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix usage of
      <code translate="no" dir="ltr">isKotlin</code>
      to avoid accidentally triggering
      <code translate="no" dir="ltr">RequiresOptIn</code>
      check in Kotlin files. (
      <a href="https://android-review.googlesource.com/q/I2d8c1f5b4425bd042cff6552e6a8c45c9905c2b3">I2d8c1f</a>
      )
    </li>
  </ul>
  <h4 id="annotation-experimental-1.4.0" data-text="Version 1.4.0" tabindex="-1">Version 1.4.0</h4>
  <p>January 24, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.4.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b23f311a4abd047c9b02d5585e80ac7884c1967f..d25969e764bee00b0d8bb519bdd1487ef71e94de/annotation/annotation-experimental">Version 1.4.0 contains these commits.</a>
  </p>
  <p><strong>Important changes since 1.3.0</strong></p>
  <ul>
    <li>Add support for Kotlin multi-platform</li>
    <li>Fix compatibility with Kotlin 2.0</li>
    <li>
      Show warnings for Java usages of experimentally-annotated Kotlin properties (
      <a href="https://android-review.googlesource.com/#/q/I8bd43b972619c8622a7d57e923951079712b9ace">I8bd43</a>
      )
    </li>
    <li>
      Fix placement of autofix annotation on Kotlin methods (
      <a href="https://android-review.googlesource.com/#/q/Id7a41679a7262c63c1e4c2f59fd8394283963785">Id7a41</a>
      )
    </li>
  </ul>
  <h4 id="annotation-experimental-1.4.0-rc01" data-text="Version 1.4.0-rc01" tabindex="-1">Version 1.4.0-rc01</h4>
  <p>January 10, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.4.0-rc01</code>
    is released. Version 1.4.0-rc01 contains no changes since the previous release.
  </p>
  <h4 id="annotation-experimental-1.4.0-beta01" data-text="Version 1.4.0-beta01" tabindex="-1">Version 1.4.0-beta01</h4>
  <p>December 13, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.annotation:annotation-experimental:1.4.0-beta01</code>
    is released. There are no changes since the previous release.
  </p>
