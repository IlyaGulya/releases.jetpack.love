changelogHtml: |
  <h3 id="1.6.0" data-text="Version 1.6.0" tabindex="-1">Version 1.6.0</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.camera.viewfinder:viewfinder-compose:1.6.0</code>
    ,
    <code translate="no" dir="ltr">androidx.camera.viewfinder:viewfinder-core:1.6.0</code>
    , and
    <code translate="no" dir="ltr">androidx.camera.viewfinder:viewfinder-view:1.6.0</code>
    are released. Version 1.6.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/2afad3835627a7fdd11578788696f14b7aff6017..18899702605001b396c92fe1f50666948ce85048/camera/viewfinder">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.5.0:</strong></p>
  <ul>
    <li>
      Exposed the default viewfinder
      <code translate="no" dir="ltr">ImplementationMode</code>
      via the new
      <code translate="no" dir="ltr">ViewfinderDefaults.implementationMode</code>
      public API. This is now used as the default for both
      <code translate="no" dir="ltr">ViewfinderView</code>
      and the
      <code translate="no" dir="ltr">Viewfinder</code>
      composable. (
      <a href="https://android-review.googlesource.com/#/q/Ic3f52afe6a4e188b3487f124b4fa873d5e2f2b06">Ic3f52</a>
      )
    </li>
  </ul>
