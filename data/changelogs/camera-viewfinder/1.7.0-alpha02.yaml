changelogHtml: |
  <h3 id="1.7.0-alpha02" data-text="Version 1.7.0-alpha02" tabindex="-1">Version 1.7.0-alpha02</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.camera.viewfinder:viewfinder-compose:1.7.0-alpha02</code>
    ,
    <code translate="no" dir="ltr">androidx.camera.viewfinder:viewfinder-core:1.7.0-alpha02</code>
    , and
    <code translate="no" dir="ltr">androidx.camera.viewfinder:viewfinder-view:1.7.0-alpha02</code>
    are released. Version 1.7.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..01f3396e92df911805f22836f27c7057324e40ff/camera/viewfinder">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">CameraXViewfinder</code>
      now supports built-in gestures for pinch-to-zoom and tap-to-focus, and adds support for screen flash and stream state.
      <code translate="no" dir="ltr">FocusState</code>
      is now public in viewfinder-core to allow monitoring tap-to-focus results. (
      <a href="https://android-review.googlesource.com/#/q/I66a17527c5faa563006f6807a33c757a6f35588d">I66a17</a>
      ,
      <a href="https://issuetracker.google.com/issues/522549890">b/522549890</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">TransformationMode</code>
      property to
      <code translate="no" dir="ltr">TransformationInfo</code>
      to support apps to use
      <code translate="no" dir="ltr">OpenGL</code>
      pipeline in
      <code translate="no" dir="ltr">EMBEDDED</code>
      mode. (
      <a href="https://android-review.googlesource.com/#/q/Id1de19ff50ddf96e0045e39344c99d08bb773d76">Id1de1</a>
      ,
      <a href="https://issuetracker.google.com/issues/487826941">b/487826941</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Remove requirement for
      <code translate="no" dir="ltr">compileSdk 37</code>
      (
      <a href="https://android-review.googlesource.com/#/q/If78b4fbdec15e6b1d6ad34a487ae10b2e2494325">If78b4</a>
      )
    </li>
  </ul>
