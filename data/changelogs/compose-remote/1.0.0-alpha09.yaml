libraryId: compose-remote
groupId: androidx.compose
version: 1.0.0-alpha09
releaseDate: 2026-04-22
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha09" data-text="Version 1.0.0-alpha09" tabindex="-1">Version 1.0.0-alpha09</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.remote:remote-*:1.0.0-alpha09</code>
    is released. Version 1.0.0-alpha09 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/951845221205b7a428a9d779107760fc929863ee..fa102f7428ce722bf997f7388ba3e80223f1db3c/compose/remote">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Modifier clickable changed to not accept null value for action parameter. Action.Empty should be used instead. (
      <a href="https://android-review.googlesource.com/#/q/I21be9ccd0c402e176cbb5998ba4e73b76851d4d8">I21be9</a>
      ,
      <a href="https://issuetracker.google.com/issues/498881738">b/498881738</a>
      )
    </li>
    <li>
      Padding modifier parameters were changed from left/right to start/end. (
      <a href="https://android-review.googlesource.com/#/q/Id781cdd4c631488e0934555dcbbb0d7c54989741">Id781c</a>
      ,
      <a href="https://issuetracker.google.com/issues/500760020">b/500760020</a>
      )
    </li>
    <li>
      Modifier
      <code translate="no" dir="ltr">onTouchDown(varargs action)</code>
      and
      <code translate="no" dir="ltr">onTouchUp(varargs action)</code>
      were changed to
      <code translate="no" dir="ltr">onTouchDown/onTouchUp(action)</code>
      . Use
      <code translate="no" dir="ltr">CombinedAction</code>
      for a list of actions. (
      <a href="https://android-review.googlesource.com/#/q/I8af9d304b14795ec579527b7d636c923378763bb">I8af9d</a>
      ,
      <a href="https://issuetracker.google.com/issues/498881738">b/498881738</a>
      )
    </li>
    <li>
      Modifier
      <code translate="no" dir="ltr">clickable(varargs action)</code>
      was changed to
      <code translate="no" dir="ltr">clickable(action)</code>
      . Use
      <code translate="no" dir="ltr">CombinedAction</code>
      for a list of actions. (
      <a href="https://android-review.googlesource.com/#/q/I8432da06a6ca0c39c297cc6f65bf4b4d67967630">I8432d</a>
      ,
      <a href="https://issuetracker.google.com/issues/498881738">b/498881738</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix
      <code translate="no" dir="ltr">MatrixExpression.write</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Id3c52536a1a746d7577e7fa1d129eb3949b11722">Id3c52</a>
      )
    </li>
  </ul>
