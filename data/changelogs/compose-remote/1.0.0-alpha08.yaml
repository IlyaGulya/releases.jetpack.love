changelogHtml: |
  <h3 id="1.0.0-alpha08" data-text="Version 1.0.0-alpha08" tabindex="-1">Version 1.0.0-alpha08</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.remote:remote-*:1.0.0-alpha08</code>
    is released. Version 1.0.0-alpha08 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a..f1f39f6b54f6a8f12b26c7dae6526eb225d8c805/compose/remote">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Promote the
      <code translate="no" dir="ltr">CoreText</code>
      ,
      <code translate="no" dir="ltr">TextStyle</code>
      ,
      <code translate="no" dir="ltr">TextTransform</code>
      and
      <code translate="no" dir="ltr">ColorTheme</code>
      Operations to the baseline AndroidX and Widgets Profiles (
      <a href="https://android-review.googlesource.com/#/q/I69671b3aff85e495b61d9e162db1077abcb783cf">I69671</a>
      ,
      <a href="https://issuetracker.google.com/issues/494482597">b/494482597</a>
      )
      <ul>
        <li>
          <code translate="no" dir="ltr">CoreText</code>
          provides richer capabilities for rendering text, including adaptive text resizing, and improved control over text layout features like line breaking and overflow behavior.
        </li>
        <li>
          <code translate="no" dir="ltr">TextStyle</code>
          allows common text styling attributes to be captured in the document once, and referenced by multiple text runs.
        </li>
        <li>
          <code translate="no" dir="ltr">TextTransform</code>
          enables text transformations - for example, uppercasing text.
        </li>
      </ul>
    </li>
    <li>
      Reverse rendering of items in horizontal layout when layout direction is RTL and not using Absolute horizontal arrangement. (
      <a href="https://android-review.googlesource.com/#/q/I2d38e8a6a2b1cb39b7251afd77ffead21c807c75">I2d38e</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Prefer
      <code translate="no" dir="ltr">toRemoteString(DecimalFormat)</code>
      as the developer API. (
      <a href="https://android-review.googlesource.com/#/q/Ia49252351b49f0ee3ad1622f6cbd5908d408dad7">Ia4925</a>
      ,
      <a href="https://issuetracker.google.com/issues/493924433">b/493924433</a>
      )
    </li>
    <li>
      Modifier
      <code translate="no" dir="ltr">clip(shape, size)</code>
      was removed. Modifier
      <code translate="no" dir="ltr">clip(shape)</code>
      should be used instead. (
      <a href="https://android-review.googlesource.com/#/q/I76301e0330583ab49e051a7e51482ae298de92a2">I76301</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Update
      <code translate="no" dir="ltr">TextLookup</code>
      to track array element changes. This ensures that expressions will be reevaluated if an element they look up in an array has changed (
      <a href="https://android-review.googlesource.com/#/q/I162c73eb1562dbbb6568abd320ac3201a763c9dc">I162c7</a>
      )
    </li>
  </ul>
