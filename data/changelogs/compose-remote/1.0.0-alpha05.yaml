version: 1.0.0-alpha05
releaseDate: 2026-02-25
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha05" data-text="Version 1.0.0-alpha05" tabindex="-1">Version 1.0.0-alpha05</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.remote:remote-*:1.0.0-alpha05</code>
    is released. Version 1.0.0-alpha05 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cdf076c6abd0f3125cb0302756fcb77fe981ab7c..c129dd3005b507bbf2c535f70d7329ed14d6804b/compose/remote">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Introduced
      <code translate="no" dir="ltr">fillParentMaxWidth</code>
      and
      <code translate="no" dir="ltr">fillParentMaxHeight</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I13a63fdcd07bb44e3b78072bc98889e133656a2d">4c6d77c</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Expose common Remote Composable and Modifier types (
      <a href="https://android-review.googlesource.com/#/q/Id1d40acae7af63f9acb99438adaa992035fd3c01">Id1d40</a>
      )
    </li>
    <li>
      Expose types for
      <code translate="no" dir="ltr">RemoteState</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I22429108472ff50e5694c80f1e4c42c4009cea61">I22429</a>
      ,
      <a href="https://issuetracker.google.com/issues/465453482">b/465453482</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixes for scrolling (
      <a href="https://android-review.googlesource.com/#/q/Iaee130c182a8c66604bdc006329add5f705cb77f">0a25299</a>
      )
    </li>
    <li>
      Fixes for touch slop (
      <a href="https://android-review.googlesource.com/#/q/I43622c0b1565fdbe113a3b826ac780e7dd2ac732">0192b69</a>
      )
    </li>
    <li>
      Set density earlier in the rendering process, so it is applied correctly on the first frame (often captured in screenshot tests) (
      <a href="https://android-review.googlesource.com/#/q/Id590ac87459094cbd90c49fd2c7f96459e92a93c">f775399</a>
      )
    </li>
  </ul>
