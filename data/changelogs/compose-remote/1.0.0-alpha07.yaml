libraryId: compose-remote
groupId: androidx.compose
version: 1.0.0-alpha07
releaseDate: 2026-03-25
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha07" data-text="Version 1.0.0-alpha07" tabindex="-1">Version 1.0.0-alpha07</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.remote:remote-*:1.0.0-alpha07</code>
    is released. Version 1.0.0-alpha07 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..cef2ecc0ae575dbc48d99750710fd5b7aec1f8ba/compose/remote">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Implement non-linear font scaling (
      <a href="https://android-review.googlesource.com/#/q/73b23c0f3122c2a51ef13763c2bf13dd34f3df54">73b23c0</a>
      )
    </li>
    <li>
      Make layouts aware of
      <code translate="no" dir="ltr">LayoutDirection</code>
      (
      <a href="https://android-review.googlesource.com/#/q/81f984bd9616fe40b17ab64c26be238477ff7489">81f984b</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteSpacer</code>
      as public API (
      <a href="https://android-review.googlesource.com/#/q/I1a5408204bd804b725c2a0135f0afc19fbaf6649">I1a540</a>
      )
    </li>
    <li>
      Make
      <code translate="no" dir="ltr">RemoteBrush</code>
      <code translate="no" dir="ltr">applyTo</code>
      and typeface API public (
      <a href="https://android-review.googlesource.com/#/q/I87ce999db9c9f25067dbebe5496a0a624481141f">I87ce9</a>
      ,
      <a href="https://issuetracker.google.com/issues/493249631">b/493249631</a>
      )
    </li>
    <li>
      Omit alignment and placement parameters from
      <code translate="no" dir="ltr">drawTextOnCircle</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I7fd16219208da609750747ed62d4d6997722cf18">I7fd16</a>
      ,
      <a href="https://issuetracker.google.com/issues/446824085">b/446824085</a>
      )
    </li>
    <li>
      Expose semantics modifier functions (
      <a href="https://android-review.googlesource.com/#/q/Ice73b23ac5a078903c163531891631ac3e6b8034">Ice73b</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteImageVector</code>
      and
      <code translate="no" dir="ltr">painterRemoteVector</code>
      (
      <a href="https://android-review.googlesource.com/#/q/If8f3812874e92db7ee2186545ed8d6e4a33a24c1">If8f38</a>
      ,
      <a href="https://issuetracker.google.com/issues/446824085">b/446824085</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteTimeDefaults</code>
      as a public API in
      <code translate="no" dir="ltr">remote-creation-compose</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Iddc7465ef1508099c629141b9290482a665f60ef">Iddc74</a>
      ,
      <a href="https://issuetracker.google.com/issues/446824085">b/446824085</a>
      )
    </li>
    <li>
      Make
      <code translate="no" dir="ltr">RemoteArrangement.spacedBy</code>
      methods public (
      <a href="https://android-review.googlesource.com/#/q/I36e86045bc31807cfe57dbb7f1b72cbf07033a8e">I36e86</a>
      )
    </li>
    <li>
      Expose more
      <code translate="no" dir="ltr">RemoteDrawScope</code>
      API (
      <a href="https://android-review.googlesource.com/#/q/I1dde7631d93a84b899cf03d217673449dbe70ea4">I1dde7</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemotePainter</code>
      types in API (
      <a href="https://android-review.googlesource.com/#/q/I1ec8e43cf0262efce24549257f56cbda3daa2fbd">I1ec8e</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteBrush</code>
      API (
      <a href="https://android-review.googlesource.com/#/q/I4b0741cf3abcea0861f4123783f42acb1daf1ffa">I4b074</a>
      )
    </li>
    <li>
      Minimal public API for
      <code translate="no" dir="ltr">RemoteCanvas</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I008533c52d0d2bc4306c27a9d5bc1ea07be71b4c">I00853</a>
      ,
      <a href="https://issuetracker.google.com/issues/446824085">b/446824085</a>
      )
    </li>
    <li>
      Expose RC semantics Modifiers (
      <a href="https://android-review.googlesource.com/#/q/I8b175b970612fdc639bcf1e39f31e056bf702315">I8b175</a>
      ,
      <a href="https://issuetracker.google.com/issues/446824085">b/446824085</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteFloat.asRemoteDp()</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I28b361187b51f6b0b15a5223cd7af98f50270da0">I28b36</a>
      ,
      <a href="https://issuetracker.google.com/issues/446824085">b/446824085</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteFloat</code>
      operations (
      <a href="https://android-review.googlesource.com/#/q/I85fb5db1d481753f137b13f601493711a0994ed6">I85fb5</a>
      ,
      <a href="https://issuetracker.google.com/issues/446824085">b/446824085</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">RemoteArrangement.CenterHorizontally</code>
      was removed and is replaced by
      <code translate="no" dir="ltr">RemoteArrangement.Center</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I2f9077cb5bf0947e80b28ba6a04744d239199d0f">I2f907</a>
      ,
      <a href="https://issuetracker.google.com/issues/471212869">b/471212869</a>
      ,
      <a href="https://issuetracker.google.com/issues/471153933">b/471153933</a>
      )
    </li>
    <li>
      Change
      <code translate="no" dir="ltr">RemoteBox</code>
      alignment to accept a single
      <code translate="no" dir="ltr">RemoteAlignment</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I0bfbf28c95045d517cdd1bd99377895fbca0a376">I0bfbf</a>
      ,
      <a href="https://issuetracker.google.com/issues/471212869">b/471212869</a>
      )
    </li>
  </ul>
