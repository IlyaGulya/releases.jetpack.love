libraryId: compose-remote
groupId: androidx.compose
version: 1.0.0-alpha14
releaseDate: 2026-07-01
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha14" data-text="Version 1.0.0-alpha14" tabindex="-1">Version 1.0.0-alpha14</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.remote:remote-*:1.0.0-alpha14</code>
    is released. Version 1.0.0-alpha14 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/14c2f2ed81d0f61a3227641684cd875e95dd6529..19660b9e1b2fec4a9528fe80ce0a432c0fa2f825/compose/remote">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Exposed
      <code translate="no" dir="ltr">RemoteDensityBehavior</code>
      and density-behavior-aware constructors in
      <code translate="no" dir="ltr">RemoteCreationDisplayInfo</code>
      as public APIs. (
      <a href="https://android-review.googlesource.com/#/q/Iafca2bc0a818adc3221019ae10d231a5b5cff936">Iafca2</a>
      ,
      <a href="https://issuetracker.google.com/issues/524921038">b/524921038</a>
      )
    </li>
    <li>
      Exposed
      <code translate="no" dir="ltr">densityBehavior</code>
      in
      <code translate="no" dir="ltr">RemoteCreationDisplayInfo</code>
      and
      <code translate="no" dir="ltr">RemoteComposeCreationState</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Iae938d26aee08db4a59a6d396432f5a262cb723d">Iae938</a>
      ,
      <a href="https://issuetracker.google.com/issues/524921038">b/524921038</a>
      )
    </li>
    <li>
      Made
      <code translate="no" dir="ltr">RemoteComposeCreationComposeFlags</code>
      public. (
      <a href="https://android-review.googlesource.com/#/q/I1f899d3ca7d8a6ab7dfb8af097c09fcd495bad6a">I1f899</a>
      ,
      <a href="https://issuetracker.google.com/issues/467532762">b/467532762</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Added lint check to warn about usage of standard Compose
      <code translate="no" dir="ltr">CompositionLocals</code>
      in @
      <code translate="no" dir="ltr">RemoteComposable</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ic12bac59c6fc1097287169b70f88a5c94fb8feb4">Ic12ba</a>
      )
    </li>
    <li>
      Remove requirement for
      <code translate="no" dir="ltr">compileSdk 37</code>
      (
      <a href="https://android-review.googlesource.com/#/q/If78b4fbdec15e6b1d6ad34a487ae10b2e2494325">If78b4</a>
      )
    </li>
    <li>
      Removed obsolete
      <code translate="no" dir="ltr">rememberRemoteStringList</code>
      documentation. (
      <a href="https://android-review.googlesource.com/#/q/I997226c23a46b4ac4de259149f475e5f3b0c1cb0">I99722</a>
      )
    </li>
    <li>
      Fixed font weight adjustment rendering when adjustment is undefined. (
      <a href="https://android-review.googlesource.com/#/q/I167040c9f4d0f2ad0b4bb62e9bdba3bf9fe8a990">I16704</a>
      ,
      <a href="https://issuetracker.google.com/issues/522050705">b/522050705</a>
      )
    </li>
    <li>
      Aligned
      <code translate="no" dir="ltr">BorderModifier</code>
      to Compose behavior to draw inside the component bounds. (
      <a href="https://android-review.googlesource.com/#/q/Iae36c594ac9584e6c22137f333c0777d6a6a6964">Iae36c</a>
      )
    </li>
    <li>
      Fixed
      <code translate="no" dir="ltr">RemoteComposeWriter</code>
      to serialize
      <code translate="no" dir="ltr">DOC_PROFILES</code>
      in the constructor. (
      <a href="https://android-review.googlesource.com/#/q/I3bbead427c7c5912fdf9b814c170e2173c0291e1">I3bbea</a>
      )
    </li>
    <li>
      Fixed
      <code translate="no" dir="ltr">RemoteModifier.background</code>
      native support for dynamic colors. (
      <a href="https://android-review.googlesource.com/#/q/If4f047c8adda89450ba6e3f77610eb47267a607e">If4f04</a>
      ,
      <a href="https://issuetracker.google.com/issues/499049643">b/499049643</a>
      )
    </li>
  </ul>
  <p>
    <strong>Features</strong>
    - Added
    <code translate="no" dir="ltr">typefaceResolver</code>
    parameter to
    <code translate="no" dir="ltr">RemoteDocumentPlayer</code>
    . (
    <a href="https://android-review.googlesource.com/#/q/Ie7cdaac587f703fd117276d2bd5ef60b6a6a6964">Ie7cda</a>
    ,
    <a href="https://issuetracker.google.com/issues/524621320">b/524621320</a>
    ) - Added custom component support for the Compose player. (
    <a href="https://android-review.googlesource.com/#/q/Ic055912ecb7002f8f8a1c71d59283709c3fc563e">Ic0559</a>
    ) - Optimized select operations where both alternatives are the same. (
    <a href="https://android-review.googlesource.com/#/q/I55b9e1cfeb8f22d841ade26762727eeade54ed01">I55b9e</a>
    ,
    <a href="https://issuetracker.google.com/issues/390355362">b/390355362</a>
    )
  </p>
