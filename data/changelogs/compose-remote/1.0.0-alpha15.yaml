libraryId: compose-remote
groupId: androidx.compose
version: 1.0.0-alpha15
releaseDate: 2026-07-15
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha15" data-text="Version 1.0.0-alpha15" tabindex="-1">Version 1.0.0-alpha15</h3>
  <p>July 15, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.remote:remote-*:1.0.0-alpha15</code>
    is released. Version 1.0.0-alpha15 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ba3014c143b9c9782fe30bc766c5dced55e13453..e37cf4eae99bdc35def1209921d658612e2edbc3/compose/remote">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">rememberRemoteImageBitmap(url)</code>
      and exposed
      <code translate="no" dir="ltr">rememberMutableRemoteImageBitmap</code>
      publicly to support non-named remote bitmaps. (
      <a href="https://android-review.googlesource.com/#/q/I7b960be38b55e565d4762072a1357a8ed5512269">I7b960</a>
      )
    </li>
    <li>
      Exposed
      <code translate="no" dir="ltr">RemoteStateScope.remotePath</code>
      and
      <code translate="no" dir="ltr">RemotePathScope</code>
      APIs for building paths via DSL. (
      <a href="https://android-review.googlesource.com/#/q/I9e2fe31b1a482e8671e0713f253b92417a83999b">I9e2fe</a>
      ,
      <a href="https://issuetracker.google.com/issues/513228889">b/513228889</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Removed restricted LIBRARY_GROUP overload of
      <code translate="no" dir="ltr">rememberRemoteDocument</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ifd9b4c8ed344f5339dd6ed079d3632267ee73c16">Ifd9b4</a>
      ,
      <a href="https://issuetracker.google.com/issues/532022244">b/532022244</a>
      ,
      <a href="https://issuetracker.google.com/issues/532022244">b/532022244</a>
      )
    </li>
  </ul>
