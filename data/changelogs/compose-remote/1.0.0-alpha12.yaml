libraryId: compose-remote
groupId: androidx.compose
version: 1.0.0-alpha12
releaseDate: 2026-06-03
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha12" data-text="Version 1.0.0-alpha12" tabindex="-1">Version 1.0.0-alpha12</h3>
  <p>June 03, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.remote:remote-*:1.0.0-alpha12</code>
    is released. Version 1.0.0-alpha12 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/34c838042ff03be46cb1ed8e20535acf880a70bf..d0d5e8b902b1ded8854df7d27fa1d1ee14e3bb4c/compose/remote">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Modifiers
      <code translate="no" dir="ltr">onTouchCancel(varargs action)</code>
      and
      <code translate="no" dir="ltr">onTouchCancel(List&lt;Action&gt;)</code>
      were changed to
      <code translate="no" dir="ltr">onTouchCancel(action)</code>
      . Use
      <code translate="no" dir="ltr">CombinedAction</code>
      for a list of actions. (
      <a href="https://android-review.googlesource.com/#/q/Ia7b5a65a7caf05639b8a454896aa171ee5405da9">Ia7b5a</a>
      ,
      <a href="https://issuetracker.google.com/issues/498881738">b/498881738</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteBoolean</code>
      static factory. (
      <a href="https://android-review.googlesource.com/#/q/Ifedb65e7648d911d9a836aa362e83658e045bbbb">Ifedb6</a>
      ,
      <a href="https://issuetracker.google.com/issues/484137042">b/484137042</a>
      )
    </li>
    <li>
      Exposed
      <code translate="no" dir="ltr">hostAction</code>
      and
      <code translate="no" dir="ltr">combinedAction</code>
      factory functions to allow external usage. (
      <a href="https://android-review.googlesource.com/#/q/I78002dd845c9b99e84af3710168c1491000b19c1">I78002</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">RemoteContentPreview</code>
      ,
      <code translate="no" dir="ltr">RemoteDocumentPreview</code>
      and
      <code translate="no" dir="ltr">RemotePreviewWrapper</code>
      functions for previewing Remote Compose content. (
      <a href="https://android-review.googlesource.com/#/q/I706ae78988c920ff868acbde94396578a96c17fa">I706ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/507379403">b/507379403</a>
      )
    </li>
  </ul>
