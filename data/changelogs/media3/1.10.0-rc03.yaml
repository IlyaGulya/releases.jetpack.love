libraryId: media3
groupId: androidx.media3
version: 1.10.0-rc03
releaseDate: 2026-03-26
#language=html
changelogHtml: |
  <h3 id="1.10.0-rc03" data-text="1.10.0-rc03" tabindex="-1">1.10.0-rc03</h3>
  <p>March 26, 2026</p>
  <p>
    Version 1.10.0-rc03 contains the following
    <a href="https://github.com/androidx/media/commits/1.10.0-rc03">commits</a>
    .
  </p>
  <ul>
    <li>
      ExoPlayer
      <ul>
        <li>Fix bug where an uninitialized pre roll ad produced an ArrayIndexOutOfBoundsException (#3125).</li>
      </ul>
    </li>
    <li>
      Session:
      <ul>
        <li>Workaround SysUI bug on API 29 where media session artwork in a particular size can crash SysUI and force the device to reboot (#3118).</li>
      </ul>
    </li>
    <li>
      RTSP extension:
      <ul>
        <li>Fixed regression in H.264 and H.265 streaming that would incorrectly parse samples of the same access unit that spanned multiple RTP packets. This resulted in visual artifacts and corruption in the video (#3121).</li>
      </ul>
    </li>
  </ul>
