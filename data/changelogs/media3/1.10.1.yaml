libraryId: media3
groupId: androidx.media3
version: 1.10.1
releaseDate: 2026-05-12
#language=html
changelogHtml: |
  <h3 id="1.10.1" data-text="1.10.1" tabindex="-1">1.10.1</h3>
  <p>May 12, 2026</p>
  <ul>
    <li>
      Common library:
      <ul>
        <li>
          Fix handling of
          <code translate="no" dir="ltr">onAudioSessionIdChanged</code>
          in
          <code translate="no" dir="ltr">SimpleBasePlayer</code>
          and
          <code translate="no" dir="ltr">ForwardingSimpleBasePlayer</code>
          .
        </li>
      </ul>
    </li>
    <li>
      ExoPlayer:
      <ul>
        <li>
          Fix race condition related to audio session ID generation that could lead to an
          <code translate="no" dir="ltr">IllegalStateException</code>
          with tunneling mode. (
          <a href="https://github.com/androidx/media/issues/3099">#3099</a>
          ).
        </li>
        <li>Fix possible app crashes when recovering from decoder errors with renderer prewarming.</li>
        <li>
          Fix issue where video artifacts were caused by supplying initialization data when using an AV1-based Dolby Vision codec (
          <a href="https://github.com/androidx/media/pull/3153">#3153</a>
          ).
        </li>
      </ul>
    </li>
    <li>
      Track selection:
      <ul>
        <li>
          Adjust track selection logic in
          <code translate="no" dir="ltr">VideoTrackInfo</code>
          to resolve fallback MIME types and move HDR and codec score preferences to quality preferences (
          <a href="https://github.com/androidx/media/issues/3135">#3135</a>
          ).
        </li>
      </ul>
    </li>
    <li>
      Extractors:
      <ul>
        <li>
          MP3: Ignore Xing data length if it is longer than the known stream length (
          <a href="https://github.com/androidx/media/issues/3117">#3117</a>
          ).
        </li>
        <li>
          Fix
          <code translate="no" dir="ltr">ArrayIndexOutOfBoundsException</code>
          in
          <code translate="no" dir="ltr">Mp4Extractor</code>
          when
          <code translate="no" dir="ltr">FLAG_OMIT_TRACK_SAMPLE_TABLE</code>
          is set and the track lacks a sync sample (
          <code translate="no" dir="ltr">stss</code>
          ) box.
        </li>
      </ul>
    </li>
    <li>
      Audio:
      <ul>
        <li>Fix bug where audio events may be misrouted if multiple audio renderers are added to the player.</li>
      </ul>
    </li>
    <li>
      Video:
      <ul>
        <li>
          Adjust logic for codec reuse at frame rate changes on API below 30 to avoid codec resets where they are not beneficial (
          <a href="https://github.com/androidx/media/issues/3120">#3120</a>
          ).
        </li>
        <li>
          Disable forced synchronization workaround in
          <code translate="no" dir="ltr">queueSecureInputBuffer</code>
          for API 31+. The workaround was an artificial bottleneck that forced decryption to run serially which prevented garbled video due to a framework issue existing prior to API 31.
        </li>
      </ul>
    </li>
    <li>
      Image:
      <ul>
        <li>
          Fix issue in scrubbing mode where image updates would only take effect when the user "stops scrubbing" (
          <a href="https://github.com/androidx/media/issues/2815">#2815</a>
          ).
        </li>
      </ul>
    </li>
    <li>
      Session:
      <ul>
        <li>
          Fix bug where
          <code translate="no" dir="ltr">ForegroundServiceStartNotAllowedException</code>
          wasn't propagated across thread boundaries in case the application thread is not the main thread (
          <a href="https://github.com/androidx/media/issues/2499">#2499</a>
          ).
        </li>
        <li>
          Fix bug where
          <code translate="no" dir="ltr">COMMAND_SEEK_TO_MEDIA_ITEM</code>
          is not available in a
          <code translate="no" dir="ltr">MediaController</code>
          when connecting to a platform-only session that supports seeking to other items but no playlist modifications.
        </li>
        <li>
          Fix issue where
          <code translate="no" dir="ltr">MediaController</code>
          can't set media items on platform media sessions that don't allow
          <code translate="no" dir="ltr">PREPARE_FROM</code>
          actions.
        </li>
        <li>
          Fix bug where own process wasn't marked with
          <code translate="no" dir="ltr">Controller.isTrusted()</code>
          on API 27 or before when connecting via platform controllers.
        </li>
      </ul>
    </li>
    <li>
      HLS extension:
      <ul>
        <li>
          Fix a bug where an
          <code translate="no" dir="ltr">ArrayIndexOutOfBoundsException</code>
          is thrown during stream fallback if the track selection is a subset of the available tracks (
          <a href="https://github.com/androidx/media/issues/3161">#3161</a>
          ).
        </li>
        <li>
          Fix an issue where the initialization segment was not carried over across media playlist updates if the
          <code translate="no" dir="ltr">#EXT-X-MAP</code>
          tag was not repeated in subsequent updates (
          <a href="https://github.com/androidx/media/issues/3105">#3105</a>
          ).
        </li>
      </ul>
    </li>
    <li>
      DASH extension:
      <ul>
        <li>
          Fix crash in
          <code translate="no" dir="ltr">SampleQueue</code>
          when seeking into a chunk that is currently being canceled.
        </li>
      </ul>
    </li>
  </ul>
