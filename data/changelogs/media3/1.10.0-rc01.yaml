version: 1.10.0-rc01
releaseDate: 2026-03-10
#language=html
changelogHtml: |
  <h3 id="1.10.0-rc01" data-text="1.10.0-rc01" tabindex="-1">1.10.0-rc01</h3>
  <p>March 10, 2026</p>
  <p>
    Version 1.10.0-rc01 contains the following
    <a href="https://github.com/androidx/media/commits/1.10.0-rc01">commits</a>
    .
  </p>
  <ul>
    <li>
      Session:
      <ul>
        <li>
          Fix notification artwork icon scaling on Android Q (
          <a href="https://github.com/androidx/media/issues/3084">#3084</a>
          ).
        </li>
      </ul>
    </li>
    <li>
      UI:
      <ul>
        <li>
          Hide playback position from the accessibility service to prevent continuous announcement update when
          <code translate="no" dir="ltr">PlayerControlView</code>
          is visible.
        </li>
      </ul>
    </li>
  </ul>
