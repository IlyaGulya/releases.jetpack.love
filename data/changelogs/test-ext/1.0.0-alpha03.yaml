changelogHtml: |
  <h3 id="junit-gtest-1.0.0-alpha03" data-text="Version 1.0.0-alpha03" tabindex="-1">Version 1.0.0-alpha03</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.test.ext:junit-gtest:1.0.0-alpha03</code>
    is released. Version 1.0.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/01aefa1ec2d8ae54b9a4dd42cedfa13352d71cae..466b8fd7dc877ebc2e961649f1c65a6c3627275f/test/ext/junit-gtest">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Deprecate all APIs in junit-gtest. (
      <a href="https://android-review.googlesource.com/#/q/I355dfb907ec590913e843a37bb6077441171e5b0">I355df</a>
      ,
      <a href="https://issuetracker.google.com/issues/500007449">b/500007449</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Change
      <code translate="no" dir="ltr">minSdkVersion</code>
      to 21 to allow for NDK upgrade (
      <a href="https://android-review.googlesource.com/#/q/Ic748f8570b1fb31702be340d0403a37c65401cbc">Ic748f</a>
      )
    </li>
  </ul>
