#language=html
changelogHtml: |
  <h3 id="1.4.0-beta01" data-text="Version 1.4.0-beta01" tabindex="-1">Version 1.4.0-beta01</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.hilt:hilt-*:1.4.0-beta01</code>
    is released. Version 1.4.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/97db31fffa2902bcae14976e21a5a23562131bc6..13d567e2ebb0051bcb4043bcac17e5c6c80ffffc/hilt">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Simplify the
      <code translate="no" dir="ltr">rememberHiltViewModelFactory</code>
      API by removing the
      <code translate="no" dir="ltr">ViewModelStoreOwner</code>
      parameter. Use the
      <code translate="no" dir="ltr">delegateFactory parameter</code>
      to provide custom factory logic when necessary. (
      <a href="https://android-review.googlesource.com/#/q/I3611adc20951347a614dbb5fbb5d0e9a408969cc">I3611a</a>
      )
    </li>
    <li>
      Introduce
      <code translate="no" dir="ltr">rememberHiltViewModelFactory()</code>
      to allow manual creation of Hilt-injected ViewModels. This is particularly useful when providing a default factory to the
      <code translate="no" dir="ltr">rememberViewModelStoreOwner</code>
      API. (
      <a href="https://android-review.googlesource.com/#/q/If751760e2bee243b6788e0207fed83892c24efae">If7517</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated Compose
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
  </ul>
