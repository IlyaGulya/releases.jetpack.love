changelogHtml: |
  <h3 id="1.2.0-alpha04" data-text="Version 1.2.0-alpha04" tabindex="-1">Version 1.2.0-alpha04</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.health.connect:connect-client:1.2.0-alpha04</code>
    ,
    <code translate="no" dir="ltr">androidx.health.connect:connect-client-external-protobuf:1.2.0-alpha04</code>
    , and
    <code translate="no" dir="ltr">androidx.health.connect:connect-client-proto:1.2.0-alpha04</code>
    are released. Version 1.2.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a..df4b49eda6f6834b6bc4c8aa30a581fa577a511e/health/connect">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Matchmaking APIs: Introduced new methods to help users discover and connect compatible data sources that can provide the health data your app needs.
      <ul>
        <li>
          <code translate="no" dir="ltr">checkIfMatchmakingIsPossible</code>
          : A suspend function to verify if there are any matching applications or devices available to show before launching the flow.
        </li>
        <li>
          <code translate="no" dir="ltr">createMatchmakingIntent</code>
          : Generates an Intent to launch a flow where users can discover and grant write permissions to apps and devices capable of providing the health record types your app reads.
        </li>
      </ul>
    </li>
  </ul>
