#language=html
changelogHtml: |
  <h3 id="1.2.0-alpha03" data-text="Version 1.2.0-alpha03" tabindex="-1">Version 1.2.0-alpha03</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.health.connect:connect-client:1.2.0-alpha03</code>
    ,
    <code translate="no" dir="ltr">androidx.health.connect:connect-client-external-protobuf:1.2.0-alpha03</code>
    , and
    <code translate="no" dir="ltr">androidx.health.connect:connect-client-proto:1.2.0-alpha03</code>
    are released. Version 1.2.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4350deab5806bf95370a4d012d7eeaa70a10be44..5c4bebf7730d4fc1064d9dfeb0f24c5833fc9649/health/connect">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Introduce new fields to
      <code translate="no" dir="ltr">ExerciseSessionRecord</code>
      and
      <code translate="no" dir="ltr">ExerciseSegment</code>
      to support richer exercise tracking (
      <a href="https://android-review.googlesource.com/#/q/I3c1765ce940b72d3d2d339ff3773b9702eb8e441">I3c176</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">HealthConnectClient#getChanges(changeLogsToken, pageSize)</code>
      to set a soft limit for the number of change logs returned (
      <a href="https://android-review.googlesource.com/#/q/I6837d64fa9549566225a16e8baa25cbee2662b32">I6837d</a>
      )
    </li>
    <li>
      Enable support for activity intensity for Health Connect APK (
      <a href="https://android-review.googlesource.com/#/q/I312499639f50859fffbea14586020fbf90f3363d">8c7923c</a>
      )
    </li>
    <li>
      Defer record validation checks to platform on Android U+ (
      <a href="https://android-review.googlesource.com/#/q/I81cc097511864059f4cbc0ae5dd34fde38a86a10">7682d18</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix aggregation for activity intensity and mindfulness (
      <a href="https://android-review.googlesource.com/#/q/I0a2c8b1dbeaead0823640bda8f8adfe6e06df779">0b312833</a>
      )
    </li>
  </ul>
