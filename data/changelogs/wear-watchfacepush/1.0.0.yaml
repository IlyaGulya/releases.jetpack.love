changelogHtml: |
  <h3 id="watchfacepush-1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.watchfacepush:watchfacepush:1.0.0</code>
    is released. Version 1.0.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e8af6ab7417811bf386c52a59ab5d0b94d194eeb..c741092999557dd138c1cc256f77f3b1482332b8/wear/watchfacepush/watchfacepush">these commits</a>
    .
  </p>
  <p><strong>Major features of 1.0.0:</strong></p>
  <ul>
    <li>
      This is the first major release of Watch Face Push (
      <a href="https://developer.android.com/training/wearables/watch-face-push">read more</a>
      ).
    </li>
    <li>Watch Face Push is an API which allows a Wear OS app to add, update, or remove watch faces directly. It is designed to support use-cases where a user might select, create, or edit a watch face on their phone, and wish to add it to their connected watch.</li>
  </ul>
