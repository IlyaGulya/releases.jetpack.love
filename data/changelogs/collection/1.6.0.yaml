libraryId: collection
groupId: androidx.collection
version: 1.6.0
releaseDate: 2026-03-11
#language=html
changelogHtml: |
  <h3 id="1.6.0" data-text="Version 1.6.0" tabindex="-1">Version 1.6.0</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.collection:collection-*:1.6.0</code>
    is released. Version 1.6.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/fb376ee6d05727045f41e320bd36923eb385c5f8..5e46f82d2e75f3f4e6a88da615d2a4aba4427d95/collection">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.5.0:</strong></p>
  <ul>
    <li>
      Added no-argument version of trim for
      <code translate="no" dir="ltr">MutableFloatList</code>
      ,
      <code translate="no" dir="ltr">MutableDoubleList</code>
      ,
      <code translate="no" dir="ltr">MutableIntList</code>
      .
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">toMutableOrderedScatterSet</code>
      ,
      <code translate="no" dir="ltr">toOrderedScatterSet</code>
      ,
      <code translate="no" dir="ltr">toMutableScatterMap</code>
      ,
      <code translate="no" dir="ltr">toScatterMap</code>
      ,
      <code translate="no" dir="ltr">toMutableScatterSet</code>
      ,
      <code translate="no" dir="ltr">toScatterSet</code>
      extension functions.
    </li>
    <li>
      Performance improvements for
      <code translate="no" dir="ltr">ScatterMap</code>
      and
      <code translate="no" dir="ltr">ScatterSet</code>
      .
    </li>
    <li>
      <code translate="no" dir="ltr">minSdk</code>
      version is now 23.
    </li>
  </ul>
