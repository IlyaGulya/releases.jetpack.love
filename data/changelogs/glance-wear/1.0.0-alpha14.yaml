changelogHtml: |
  <h3 id="1.0.0-alpha14" data-text="Version 1.0.0-alpha14" tabindex="-1">Version 1.0.0-alpha14</h3>
  <p>July 15, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha14</code>
    ,
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha14</code>
    , and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-tooling-preview:1.0.0-alpha14</code>
    are released. Version 1.0.0-alpha14 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ba3014c143b9c9782fe30bc766c5dced55e13453..d69490a714532fe8324db40750cd9169294c445f/glance/wear">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We have added
      <code translate="no" dir="ltr">RoundAllWidgetPreviewParams</code>
      ,
      <code translate="no" dir="ltr">RoundSmallWidgetPreviewParams</code>
      , and
      <code translate="no" dir="ltr">RoundLargeWidgetPreviewParams</code>
      preview parameter providers for fully rounded Glance Wear widgets. (
      <a href="https://android-review.googlesource.com/#/q/If5336d9d33778b72e1db0728e10c973adb42349e">If5336</a>
      ,
      <a href="https://issuetracker.google.com/issues/512405233">b/512405233</a>
      )
    </li>
  </ul>
  <p><strong>New features</strong></p>
  <ul>
    <li>
      We have set up and added Linter library for Glance Wear widgets.(
      <a href="https://android-review.googlesource.com/#/q/If421854c5ccfcf1639916028c7e33a5d055627af">If4218</a>
      ,
      <a href="https://issuetracker.google.com/issues/527402079">b/527402079</a>
      )
      <ul>
        <li>
          Added a lint check to ensure that subclasses of
          <code translate="no" dir="ltr">GlanceWearWidgetService</code>
          explicitly declare their associated widget class using the
          <code translate="no" dir="ltr">@AssociateWithGlanceWearWidget</code>
          annotation. (
          <a href="https://android-review.googlesource.com/#/q/Idc575b0e4bc0f8ee90363c8a4fd78f5a45c6173c">Idc575</a>
          ,
          <a href="https://issuetracker.google.com/issues/477024153">b/477024153</a>
          )
        </li>
      </ul>
    </li>
    <li>
      We have improved backwards compatiblity for widgets running on older Hosts by propagating supported operations via
      <code translate="no" dir="ltr">WearWidgetParams</code>
      and adding filtering the profile of allowed operations to those. (
      <a href="https://android-review.googlesource.com/#/q/Ib0a1b193a65263dfa68d8cd768f71d39a4d55c3e">Ib0a1b</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/I83cb1ee32af7466fb31bb560a167fc081a57c96e">I83cb1</a>
      , [b/526716195])
    </li>
  </ul>
