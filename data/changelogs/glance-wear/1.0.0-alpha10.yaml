version: 1.0.0-alpha10
releaseDate: 2026-05-19
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha10" data-text="Version 1.0.0-alpha10" tabindex="-1">Version 1.0.0-alpha10</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha10</code>
    ,
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha10</code>
    , and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-tooling-preview:1.0.0-alpha10</code>
    are released. Version 1.0.0-alpha10 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e29a10982f4299b1fa812e229d76792092a62814..376d4304794a4ceb62b09f6b61dd88688bda018d/glance/wear">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Expose
      <code translate="no" dir="ltr">glance.wear.health.DataType</code>
      APIs in Wear Widget. These APIs can be used by developers to access system health data.
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed a crash loop happening in the
      <em>alpha09</em>
      version on Wear 7 emulator or devices running 1.6 renderer by not allowing empty font axis to be send to the Player for Glance Wear Widget.
    </li>
  </ul>
