version: 1.0.0-alpha08
releaseDate: 2026-04-22
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha08" data-text="Version 1.0.0-alpha08" tabindex="-1">Version 1.0.0-alpha08</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha08</code>
    and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha08</code>
    are released. Version 1.0.0-alpha08 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/951845221205b7a428a9d779107760fc929863ee..df4b49eda6f6834b6bc4c8aa30a581fa577a511e/glance/wear">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">&lt;queries&gt;</code>
      tag to the manifest of
      <code translate="no" dir="ltr">glance:wear:wear</code>
      library to make sure the
      <code translate="no" dir="ltr">PackageManager</code>
      queries the correct services for push updates. (
      <a href="https://android-review.googlesource.com/#/q/I192787bae1d03dcd83c824e30a010e2ce7ea514c">I192787</a>
      )
    </li>
  </ul>
  <p><strong>Other</strong></p>
  <ul>
    <li>
      Reverted "Updates Compose compileSdk to 37" (
      <a href="https://android-review.googlesource.com/#/q/I60078d5774b303651921c5c0a26ab0cf7ce09205">I6007</a>
      ) which also applies to glance-wear, so the compileSdk requirement is no longer 37 in this release.
    </li>
  </ul>
