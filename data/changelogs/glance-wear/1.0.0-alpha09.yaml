changelogHtml: |
  <h3 id="1.0.0-alpha09" data-text="Version 1.0.0-alpha09" tabindex="-1">Version 1.0.0-alpha09</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha09</code>
    and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha09</code>
    are released. Version 1.0.0-alpha09 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/df4b49eda6f6834b6bc4c8aa30a581fa577a511e..7115d2ecdb44b1d7d55e95cae78fa4736ee25d13/glance/wear">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We have added
      <code translate="no" dir="ltr">ExperimentalGlanceWearApi</code>
      which will be used for experimental Glance Wear features. (
      <a href="https://android-review.googlesource.com/#/q/Id2f764bcb6fc427eb0e013e76e7554b172bc9f43">Id2f76</a>
      ,
      <a href="https://issuetracker.google.com/issues/498179813">b/498179813</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Updated the parser for Wear Widget XML metadata to be aware of widgets during boot.</li>
  </ul>
