changelogHtml: |
  <h3 id="1.0.0-alpha11" data-text="Version 1.0.0-alpha11" tabindex="-1">Version 1.0.0-alpha11</h3>
  <p>June 03, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha11</code>
    ,
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha11</code>
    , and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-tooling-preview:1.0.0-alpha11</code>
    are released. Version 1.0.0-alpha11 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe..59d7db8fc3c97056707d1f7a4b415c80d9a8688a/glance/wear">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We have added
      <code translate="no" dir="ltr">WearWidgetPreview</code>
      for previewing Wear Widgets in Android Studio. (
      <a href="https://android-review.googlesource.com/#/q/I36504163576c4869ecd67732321dc7535edf3467">I36504</a>
      ,
      <a href="https://issuetracker.google.com/issues/485147770">b/485147770</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">is*Available</code>
      (
      <code translate="no" dir="ltr">isDailyStepsAvailable</code>
      , etc.) variables to verify if the related health data type is available and valid. (
      <a href="https://android-review.googlesource.com/#/q/Ib98a78eec469c425b2ab8f3b231e9fae562437e0">Ib98a7</a>
      ,
      <a href="https://issuetracker.google.com/issues/498179656">b/498179656</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">triggerUpdateAll</code>
      API to
      <code translate="no" dir="ltr">GlanceWearWidget</code>
      to trigger update on all widgets of the given app. (
      <a href="https://android-review.googlesource.com/#/q/I6ab20fe37b23d531d38c622e31acdbe4e1b83f3c">I6ab20</a>
      ,
      <a href="https://issuetracker.google.com/issues/510896410">b/510896410</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Include Renderer version information in the
      <code translate="no" dir="ltr">WearWidgetParams</code>
      as internal field to prevent breakage in the document generated with the alpha10 version. (
      <a href="https://android-review.googlesource.com/#/q/Idcf8e6e180db390b74d2b283920d1f81dfb797b2">Idcf8e</a>
      ,
      <a href="https://issuetracker.google.com/issues/511263591">b/511263591</a>
      ,
      <a href="https://issuetracker.google.com/issues/512830184">b/512830184</a>
      )
    </li>
    <li>Trigger force pull update flow in debug mode or emulator for Wear Widgets.</li>
  </ul>
