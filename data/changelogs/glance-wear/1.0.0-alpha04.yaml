version: 1.0.0-alpha04
releaseDate: 2026-02-25
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha04" data-text="Version 1.0.0-alpha04" tabindex="-1">Version 1.0.0-alpha04</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha04</code>
    and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha04</code>
    are released. Version 1.0.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cdf076c6abd0f3125cb0302756fcb77fe981ab7c..6e23fc0c137022098ae2d043778ffdc56402ba5e/glance/wear">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">GlanceWearWidgetManager</code>
      API for allowing Apps to query their active widgets and tiles. (
      <a href="https://android-review.googlesource.com/#/q/I5be95954c759493c4bf978b812e5a5e53daf6394">I5be95</a>
      )
    </li>
    <li>
      We have moved APIs from the
      <code translate="no" dir="ltr">glance:wear:wear-core</code>
      library into the
      <code translate="no" dir="ltr">androidx.glance.wear.core</code>
      package. (
      <a href="https://android-review.googlesource.com/#/q/I429cf4c36d27bc8fc01115194b20806f10950dde">I429cf</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Expose common Remote Composable and Modifier types (
      <a href="https://android-review.googlesource.com/#/q/Id1d40acae7af63f9acb99438adaa992035fd3c01">Id1d40</a>
      )
    </li>
  </ul>
