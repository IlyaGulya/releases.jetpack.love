#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha06" data-text="Version 1.0.0-alpha06" tabindex="-1">Version 1.0.0-alpha06</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha06</code>
    and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha06</code>
    are released. Version 1.0.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..fe367de0a74244126fbc65fbf03d56061fb84f79/glance/wear">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Define the operations for Wear Widgets profile inline.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We have renamed
      <code translate="no" dir="ltr">CONTAINER_TYPE_FULLSCREEN</code>
      to
      <code translate="no" dir="ltr">CONTAINER_TYPE_TILE_COMPAT</code>
      to better differentiate fullscreen compatibility widget. This includes reverting of mapping previously
      <code translate="no" dir="ltr">FULLSCREEN</code>
      type to
      <code translate="no" dir="ltr">LARGE</code>
      in Widget params.
    </li>
  </ul>
