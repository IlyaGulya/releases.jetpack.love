#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha07" data-text="Version 1.0.0-alpha07" tabindex="-1">Version 1.0.0-alpha07</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha07</code>
    and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha07</code>
    are released. Version 1.0.0-alpha07 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a..4c9e6b44e0f35c9a0595abec3ba2fd139900c25d/glance/wear">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Add default Wear Widget background when
      <code translate="no" dir="ltr">WearWidgetBrush</code>
      is empty or not specified. (
      <a href="https://android-review.googlesource.com/#/q/I8300b8047772ed0bcafbc0d37cd0da8e0307ad88">I8300b</a>
      )
    </li>
    <li>
      Update
      <code translate="no" dir="ltr">getActiveWidgets</code>
      API to return the Container Type of the Widget. (
      <a href="https://android-review.googlesource.com/#/q/I9383b031feccedbc967e25bd54acc055d968555e">2772eb1</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Change Widget update API to take
      <code translate="no" dir="ltr">WidgetInstanceId</code>
      and add helper for fetching IDs for a given widget. The new api throws
      <code translate="no" dir="ltr">IllegalArgumentException</code>
      if the provided id is invalid or not owned by the caller. (
      <a href="https://android-review.googlesource.com/#/q/I6f3c5d0fe4d2e7fa94fecfa3333eb6fa7b424779">I6f3c5</a>
      ,
      <a href="https://issuetracker.google.com/issues/446828899">b/446828899</a>
      )
    </li>
    <li>
      Add vertical and horizontal gradient in
      <code translate="no" dir="ltr">WearWidgetBrush</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/If70ae449194e0c30c43053cdbcd7ed8fed3d6fdb">If70ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/470080675">b/470080675</a>
      )
    </li>
  </ul>
