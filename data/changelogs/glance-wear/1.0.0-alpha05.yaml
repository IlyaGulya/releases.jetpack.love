changelogHtml: |
  <h3 id="1.0.0-alpha05" data-text="Version 1.0.0-alpha05" tabindex="-1">Version 1.0.0-alpha05</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha05</code>
    and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha05</code>
    are released. Version 1.0.0-alpha05 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6e23fc0c137022098ae2d043778ffdc56402ba5e..1a508f033de883ba2853b9f9ae1853eec7010638/glance/wear">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We have added
      <code translate="no" dir="ltr">WearWidgetBrush</code>
      API with the
      <code translate="no" dir="ltr">color</code>
      method to be used for the Wear Widget background. (
      <a href="https://android-review.googlesource.com/#/q/I66f54dde07793ac7a00c48d374ec04824b9b3858">I66f54</a>
      ,
      <a href="https://issuetracker.google.com/issues/464273091">b/464273091</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">fetchActiveWidgetsForProvider</code>
      method has been removed as there is already
      <code translate="no" dir="ltr">fetchActiveWidgets</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I85e4e22abd2144a97e4b2765f285c204bbe0c2ab">I85e4e</a>
      ,
      <a href="https://issuetracker.google.com/issues/486197890">b/486197890</a>
      )
    </li>
  </ul>
