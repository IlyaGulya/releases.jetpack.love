changelogHtml: |
  <h3 id="1.0.0-alpha13" data-text="Version 1.0.0-alpha13" tabindex="-1">Version 1.0.0-alpha13</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.glance.wear:wear:1.0.0-alpha13</code>
    ,
    <code translate="no" dir="ltr">androidx.glance.wear:wear-core:1.0.0-alpha13</code>
    , and
    <code translate="no" dir="ltr">androidx.glance.wear:wear-tooling-preview:1.0.0-alpha13</code>
    are released. Version 1.0.0-alpha13 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/14c2f2ed81d0f61a3227641684cd875e95dd6529..ba3014c143b9c9782fe30bc766c5dced55e13453/glance/wear">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Removed the permission check from
      <code translate="no" dir="ltr">heartRateAccuracy</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I14269c1e05223e2b3b851749b40cf24b61e6be15">I14269</a>
      ,
      <a href="https://issuetracker.google.com/issues/522444636">b/522444636</a>
      )
    </li>
  </ul>
  <p><strong>Bug fixes</strong></p>
  <ul>
    <li>We have tweaked the Squircle shaped Wear widget params for preview per UX feedback</li>
  </ul>
