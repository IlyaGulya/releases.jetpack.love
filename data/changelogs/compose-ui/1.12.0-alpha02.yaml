changelogHtml: |
  <h3 id="1.12.0-alpha02" data-text="Version 1.12.0-alpha02" tabindex="-1">Version 1.12.0-alpha02</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.ui:ui-*:1.12.0-alpha02</code>
    is released. Version 1.12.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/df4b49eda6f6834b6bc4c8aa30a581fa577a511e..351656707899bbbcbadeae1b992fc4040f30e48f/compose/ui">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Introduces
      <code translate="no" dir="ltr">MeshGradient</code>
      Modifier. (
      <a href="https://android-review.googlesource.com/#/q/Ia9a087ec10d66c9341beab479cb8f93411c5dc4a">Ia9a08</a>
      ,
      <a href="https://issuetracker.google.com/issues/455752719">b/455752719</a>
      )
    </li>
    <li>
      Removes built-in autofill debug logging callbacks. The same functionality can be achieved by logging from
      <code translate="no" dir="ltr">AutofillManager.AutofillCallback</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I631c79553995df07a25c2c2e6f3b8dbdca47686e">I631c7</a>
      ,
      <a href="https://issuetracker.google.com/issues/502279690">b/502279690</a>
      )
    </li>
    <li>
      Support variation settings for downloadable fonts (
      <a href="https://android-review.googlesource.com/#/q/Ic25c7e562d3f251fd500fe2425b6e37f236f5ebc">Ic25c7</a>
      ,
      <a href="https://issuetracker.google.com/issues/496278020">b/496278020</a>
      )
    </li>
    <li>
      Updated
      <code translate="no" dir="ltr">mediaQuery</code>
      and
      <code translate="no" dir="ltr">derivedMediaQuery</code>
      to return a generic type instead of a
      <code translate="no" dir="ltr">Boolean</code>
      , allowing more flexible usage when building adaptive UIs. (
      <a href="https://android-review.googlesource.com/#/q/I9383020bc5f562b35bb7fad3cdc09d0366a697cb">I93830</a>
      ,
      <a href="https://issuetracker.google.com/issues/498698350">b/498698350</a>
      )
    </li>
  </ul>
