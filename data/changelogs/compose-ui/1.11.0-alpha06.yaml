changelogHtml: |
  <h3 id="1.11.0-alpha06" data-text="Version 1.11.0-alpha06" tabindex="-1">Version 1.11.0-alpha06</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.ui:ui-*:1.11.0-alpha06</code>
    is released. Version 1.11.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cdf076c6abd0f3125cb0302756fcb77fe981ab7c..6e23fc0c137022098ae2d043778ffdc56402ba5e/compose/ui">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      The
      <code translate="no" dir="ltr">ComposeUiFlags.areWindowInsetsRulersEnabled</code>
      flag has been replaced with the
      <code translate="no" dir="ltr">ComposeView.disableWindowInsetsRulers()</code>
      API. (
      <a href="https://android-review.googlesource.com/#/q/Idcdb499fe497b5b3ac6119436ae8086812870d75">Idcdb4</a>
      ,
      <a href="https://issuetracker.google.com/issues/455590696">b/455590696</a>
      )
    </li>
    <li>
      Moved the experimental Android-only feature flag
      <code translate="no" dir="ltr">isAccessibilityShowOnScreenNestedScrollingEnabled</code>
      to (
      <a href="https://android-review.googlesource.com/#/q/I1c13a5c1af88602e2d7cef0b6398e4e367db9209">I1c13a</a>
      )
    </li>
    <li>
      Add support for walking up (
      <a href="https://android-review.googlesource.com/#/q/I1c13a5c1af88602e2d7cef0b6398e4e367db9209">I1c13a</a>
      )
    </li>
    <li>
      Report off-screen semantics nodes that are children of partially visible merging nodes in scrollable containers for better user experience with screen readers and similar accessibility services (
      <a href="https://android-review.googlesource.com/#/q/I71df9662d589f8a78bad0f58881dee4db8362937">I71df9</a>
      ,
      <a href="https://issuetracker.google.com/issues/434782764">b/434782764</a>
      )
    </li>
    <li>
      When
      <code translate="no" dir="ltr">AndroidComposeUiFlags.isSharedClipboardManagerEnabled</code>
      is true, clipboard-related instances can be shared across
      <code translate="no" dir="ltr">ComposeViews</code>
      using
      <code translate="no" dir="ltr">ComposeViewContext</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I65e2ce3e05f6a883146aa571f4537f6ee0ffaf37">I65e2c</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComposeUiFlags.isRectManagerOffsetUsageFromLayoutCoordinatesEnabled</code>
      was removed (
      <a href="https://android-review.googlesource.com/#/q/I6e14a1bf7267e9ea61169a2ce556f53afad2ffd2">I6e14a</a>
      ,
      <a href="https://issuetracker.google.com/issues/455601894">b/455601894</a>
      )
    </li>
  </ul>
