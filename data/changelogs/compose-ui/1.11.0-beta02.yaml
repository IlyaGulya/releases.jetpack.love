changelogHtml: |
  <h3 id="1.11.0-beta02" data-text="Version 1.11.0-beta02" tabindex="-1">Version 1.11.0-beta02</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.ui:ui-*:1.11.0-beta02</code>
    is released. Version 1.11.0-beta02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/a15c668d4bb2e00cfa8ed1af96895a84c3e7e2d5..4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a/compose/ui">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Rename
      <code translate="no" dir="ltr">PreviewWrapper</code>
      API for consistency (
      <a href="https://android-review.googlesource.com/#/q/I626592290471f10061560dececd15b469ed2398b">I62659</a>
      ,
      <a href="https://issuetracker.google.com/issues/490085948">b/490085948</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComposeViewContext</code>
      allows a
      <code translate="no" dir="ltr">ComposeView</code>
      to compose without being attached to the view hierarchy. Use
      <code translate="no" dir="ltr">AbstractComposeView.createComposition(composeViewContext)</code>
      to start composing without the
      <code translate="no" dir="ltr">ComposeView</code>
      being attached. (
      <a href="https://android-review.googlesource.com/#/q/I46e6f35555c6d1d7d0ebce7589d080ff171a4db6">I46e6f</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">delayMillis</code>
      to trackpad test APIs for
      <code translate="no" dir="ltr">panEnd</code>
      and
      <code translate="no" dir="ltr">scaleEnd</code>
      (
      <a href="https://android-review.googlesource.com/#/q/If80fe26c436f96baec37bcf090c6d5b6acc082b8">If80fe</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">Clipboard</code>
      and
      <code translate="no" dir="ltr">ClipboardManager</code>
      now request the system service on the first method call (
      <a href="https://android-review.googlesource.com/#/q/If0016b703b6f2b465c8e7cee444077888393177e">If0016</a>
      ,
      <a href="https://issuetracker.google.com/issues/487947860">b/487947860</a>
      )
    </li>
    <li>
      Focus will be restored correctly inside lazy containers where focus nodes and groups are being reused (
      <a href="https://android-review.googlesource.com/#/q/I18d3632de3a3e9b54650de40b90dc0622f2b4e7f">I18d36</a>
      ,
      <a href="https://issuetracker.google.com/issues/481564275">b/481564275</a>
      )
    </li>
    <li>
      Popup with
      <code translate="no" dir="ltr">clippingEnabled = false</code>
      now correctly uses the full window bounds to display edge-to-edge (
      <a href="https://android-review.googlesource.com/q/I206408d6ccb905ce6cac605c2c57eacd0e715ba3">I206408</a>
      ,
      <a href="https://issuetracker.google.com/issues/327017902">b/327017902</a>
      )
    </li>
  </ul>
