changelogHtml: |
  <h3 id="1.12.0-alpha03" data-text="Version 1.12.0-alpha03" tabindex="-1">Version 1.12.0-alpha03</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.ui:ui-*:1.12.0-alpha03</code>
    is released. Version 1.12.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e29a10982f4299b1fa812e229d76792092a62814..b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe/compose/ui">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added a new
      <code translate="no" dir="ltr">credentialRequest</code>
      Semantics property and a
      <code translate="no" dir="ltr">CredentialRequestData</code>
      helper on API 34+ to allow Jetpack Compose text fields to integrate with Android's Credential Manager via the Autofill framework. (
      <a href="https://android-review.googlesource.com/#/q/Ida2bf2292460e115b7f57f208e0616cf886cbd01">Ida2bf</a>
      ,
      <a href="https://issuetracker.google.com/issues/488446455">b/488446455</a>
      )
    </li>
    <li>
      Added a
      <code translate="no" dir="ltr">ParagraphIntrinsics</code>
      factory function that takes the
      <code translate="no" dir="ltr">softWrap</code>
      argument among others. Internally, we could use it as a signal that the text is rendered as a single line and perform certain optimisations. (
      <a href="https://android-review.googlesource.com/#/q/I66ca486f47acab3254bb7a41d6c8c3f271d73d49">I66ca4</a>
      ,
      <a href="https://issuetracker.google.com/issues/485495112">b/485495112</a>
      )
    </li>
    <li>
      Added support for automatic interaction sounds (clicks and focus navigation) to Compose components, with a new
      <code translate="no" dir="ltr">SoundEffectOnInteraction</code>
      Composable to allow opt-out. Note that as a consequence of this change semantics click listeners must now be called from the main thread, which may effect a small number of test cases. (
      <a href="https://android-review.googlesource.com/#/q/I78f6551c0d99aac4a51b708a9c40b99062c765f3">I78f65</a>
      )
    </li>
    <li>
      Stabilized
      <code translate="no" dir="ltr">Font</code>
      factory function taking
      <code translate="no" dir="ltr">variationSettings</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I183f286dd05c6168540c66bdd85fba81978e4f62">I183f2</a>
      )
    </li>
    <li>
      Stabilized
      <code translate="no" dir="ltr">ResourceFont</code>
      <code translate="no" dir="ltr">loadingStrategy</code>
      property and
      <code translate="no" dir="ltr">copy</code>
      method. (
      <a href="https://android-review.googlesource.com/#/q/I40d84ded5582ecec104d59123524eeed9bace484">I40d84</a>
      )
    </li>
    <li>
      Stabilized
      <code translate="no" dir="ltr">InterceptPlatformTextInput</code>
      and
      <code translate="no" dir="ltr">PlatformTextInputInterceptor</code>
      APIs. (
      <a href="https://android-review.googlesource.com/#/q/Id27842e2858644a33822066cda0c05cfd62fa017">Id2784</a>
      )
    </li>
    <li>
      To improve platform separation,
      <code translate="no" dir="ltr">registerIdlingResource</code>
      and
      <code translate="no" dir="ltr">unregisterIdlingResource</code>
      have been moved to extension functions; you may need to update your imports. (
      <a href="https://android-review.googlesource.com/#/q/I21d3df65e81c29fb847c3bd24ac099714de55ade">I21d3d</a>
      ,
      <a href="https://issuetracker.google.com/issues/471148519">b/471148519</a>
      )
    </li>
    <li>
      Introduced
      <code translate="no" dir="ltr">runWithoutImplicitWait</code>
      to
      <code translate="no" dir="ltr">ComposeTestRule</code>
      and
      <code translate="no" dir="ltr">ComposeUiTest</code>
      to improve test performance during state inspection. This API allows to execute a block of code with implicit synchronization disabled, avoiding the overhead of repeated synchronizations for each node query. This results in significantly faster test execution, especially for tests that manually step through frames and sample multiple properties, such as in animation testing. (
      <a href="https://android-review.googlesource.com/#/q/Ie00e911f5a278f37cc9d10369c2e16edbad1703b">Ie00e9</a>
      ,
      <a href="https://issuetracker.google.com/issues/490270394">b/490270394</a>
      )
    </li>
    <li>
      The
      <code translate="no" dir="ltr">@PreviewWrapper</code>
      annotation can now be applied to
      <code translate="no" dir="ltr">MultiPreview</code>
      annotation classes, allowing developers to create reusable, pre-wrapped preview configurations. (
      <a href="https://android-review.googlesource.com/#/q/I8ae665ab37dc5d8f9c0379f84b8ee7f0fab4e19e">I8ae66</a>
      ,
      <a href="https://issuetracker.google.com/issues/511170361">b/511170361</a>
      )
    </li>
    <li>
      Introduces
      <code translate="no" dir="ltr">MeshGradientPainter</code>
      for rendering mesh gradients.
      <code translate="no" dir="ltr">Modifier.meshGradient</code>
      has been removed, use
      <code translate="no" dir="ltr">MeshGradientPainter</code>
      with
      <code translate="no" dir="ltr">Modifier.paint</code>
      instead.
      <code translate="no" dir="ltr">MeshGradientRenderer</code>
      is now internal. (
      <a href="https://android-review.googlesource.com/#/q/I2d170f2e93aed3b353eb0dd55a642d7dd243b253">I2d170</a>
      ,
      <a href="https://issuetracker.google.com/issues/508110246">b/508110246</a>
      )
    </li>
    <li>
      Rulers can now be provided individually by supplying a lambda that responds whether the Ruler can be provided, along with separate lambda that provides the Ruler's value. The
      <code translate="no" dir="ltr">isRulerProvided</code>
      lambda isn't observed and should be optimistic in whether a value can be provided. The
      <code translate="no" dir="ltr">rulerProvider</code>
      lambda is observed so that if any value changes, it will update the ruler value and all readers of the ruler. (
      <a href="https://android-review.googlesource.com/#/q/Ie9089f59027910100819466f00cf869fe853939e">Ie9089</a>
      )
    </li>
    <li>
      In the experimental Style API, added support for creating custom style types that can have custom style scopes. This allows subsetting the properties settable by a style (such as removing the graphics layer or text properties entirely) as well as allowing the scope to be extended independently of other styles (such as only supporting the
      <code translate="no" dir="ltr">playing { }</code>
      syntax in a
      <code translate="no" dir="ltr">MediaPlayer</code>
      composable). This change breaks binary and source compatibility. The primary change that breaks source compatibility is that helper functions in the
      <code translate="no" dir="ltr">StyleScope</code>
      have moved to be extension functions (e.g.
      <code translate="no" dir="ltr">fun contentProperty(all: Dp)</code>
      is now an extension function). Either importing the required extension functions or by importing all symbols from androidx.compose.foundation.styles should be all that is required get code that calls these methods to compile correctly. (
      <a href="https://android-review.googlesource.com/#/q/I1ef2747803fb7ee7474aebe21af3968fe25d5c40">I1ef27</a>
      ,
      <a href="https://issuetracker.google.com/issues/493676648">b/493676648</a>
      )
    </li>
    <li>
      Adds
      <code translate="no" dir="ltr">updatePointerBy()</code>
      with default argument for the pointer id. (
      <a href="https://android-review.googlesource.com/#/q/I99f30e8b64425f544fac51c24a641a52b3b523d8">I99f30</a>
      ,
      <a href="https://issuetracker.google.com/issues/502001776">b/502001776</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">DeferredTargetAnimation</code>
      is no longer experimental, please remove opt-in." into androidx-main
    </li>
    <li>
      Added flag
      <code translate="no" dir="ltr">isClearNestedScrollCoroutineScopeFixEnabled</code>
      to control the fix. (
      <a href="https://android-review.googlesource.com/#/q/Ibd394d3e330fc12b4ed3e12813118cf791eb743b">Ibd394</a>
      ,
      <a href="https://issuetracker.google.com/issues/505343254">b/505343254</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">DeferredTargetAnimation</code>
      is no longer experimental, please remove opt-in. (
      <a href="https://android-review.googlesource.com/#/q/I1e4aeb4d0542a5ef99d7adc3282794e652b0ba49">I1e4ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/500030165">b/500030165</a>
      )
    </li>
    <li>
      New enum to support triggers in ui-tooling (
      <a href="https://android-review.googlesource.com/#/q/I6e19896c8cea4e5006de7b414bf67ab92cd5e83d">I6e198</a>
      ,
      <a href="https://issuetracker.google.com/issues/478807872">b/478807872</a>
      )
    </li>
    <li>
      The
      <code translate="no" dir="ltr">ComposeViewContext</code>
      is allowed to be created without the reference View being attached. It still requires that the reference View is attached prior to calling
      <code translate="no" dir="ltr">setContent()</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Id0952d3e58d400376975ca6d3b2c172e88173f67">Id0952</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixes
      <code translate="no" dir="ltr">focusRestorer</code>
      not properly restoring focus when multiple save calls occur for the same layout (
      <a href="https://android-review.googlesource.com/#/q/I10277d5126ca12f3e93858d2c1cf0dc2f54f53eb">I10277</a>
      ,
      <a href="https://issuetracker.google.com/issues/505371994">b/505371994</a>
      )
    </li>
    <li>
      A previous performance improvement had the side-effect of disallowing unattached
      <code translate="no" dir="ltr">ComposeViews</code>
      from being measured. This change now allows it without reintroducing the performance problem. (
      <a href="https://android-review.googlesource.com/#/q/I9b2c56e548f3bdb6d5fba9b17f416e62276d03f4">I9b2c5</a>
      ,
      <a href="https://issuetracker.google.com/issues/508650647">b/508650647</a>
      )
    </li>
    <li>
      Composition is now recreated on
      <code translate="no" dir="ltr">ComposeViewContext</code>
      change to support faster access to the
      <code translate="no" dir="ltr">ComposeViewContext</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I3b3a8876e531448e0579fd074c9ab61ce5b289bc">I3b3a8</a>
      ,
      <a href="https://issuetracker.google.com/issues/487364963">b/487364963</a>
      )
    </li>
    <li>
      Allow Compose to set non-sRGB colors on paint and shader on Android, preserving wide color gamut by correctly mapping Compose color spaces to platform equivalents. Color spaces not supported for platform rendering operations (e.g., CIE XYZ, CIE Lab, OkLab) or not available on the current API level will safely fallback to the Srgb color space. (
      <a href="https://android-review.googlesource.com/#/q/I3efb592f298a380c79ddb40e5185dec8089e1edb">I3efb5</a>
      ,
      <a href="https://issuetracker.google.com/issues/388511109">b/388511109</a>
      )
    </li>
  </ul>
  <p><strong>External Contribution</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">androidx.compose.ui.platform.NativeClipboard</code>
      typealias is deprecated, use
      <code translate="no" dir="ltr">android.content.ClipboardManager</code>
      directly instead (
      <a href="https://android-review.googlesource.com/#/q/Ibc6113ed6d98b8721aed89f6fb5c4c0b2e83232b">Ibc611</a>
      )
    </li>
    <li>
      Replace
      <code translate="no" dir="ltr">Clipboard.nativeClipboard</code>
      property to
      <code translate="no" dir="ltr">Clipboard.nativeClipboardManager</code>
      extension to avoid exposing platform type into
      <code translate="no" dir="ltr">commonMain</code>
      sourceset via
      <code translate="no" dir="ltr">typealias</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ibc6113ed6d98b8721aed89f6fb5c4c0b2e83232b">Ibc611</a>
      )
    </li>
  </ul>
