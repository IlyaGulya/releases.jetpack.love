libraryId: lint
groupId: androidx.lint
version: 1.0.0
releaseDate: 2026-06-17
#language=html
changelogHtml: |
  <h3 id="1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.lint:lint-gradle:1.0.0</code>
    is released. Version 1.0.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e1b82c49c59d8e976ce558aba5586f6c61bc9054..df2b9da6fcff9fb5520d8564e517dc1f822c5615/lint/lint-gradle">these commits</a>
    .
  </p>
  <p><strong>Major features of 1.0.0:</strong></p>
  <p>
    <code translate="no" dir="ltr">lint-gradle</code>
    ships the following checks to help Gradle plugin authors:
  </p>
  <ul>
    <li>Eager configuration check to defer creating and configuring objects until they are needed</li>
    <li>Project Isolation violations check</li>
    <li>
      Likely bugs check for calling
      <code translate="no" dir="ltr">Provider.toString</code>
    </li>
    <li>Performance check that flags calls to APIs that are unexpectedly expensive</li>
    <li>Overly broad configuration cache inputs check</li>
    <li>
      Check to discourage usage of
      <code translate="no" dir="ltr">Property&lt;File&gt;</code>
    </li>
    <li>Internal Gradle, Android Gradle Plugin and Kotlin Gradle plugin API usage check</li>
    <li>
      Call to
      <code translate="no" dir="ltr">withType</code>
      without
      <code translate="no" dir="ltr">.configureEach</code>
      check
    </li>
    <li>
      Usage of
      <code translate="no" dir="ltr">GradleRunner.withPluginClasspath</code>
      check
    </li>
  </ul>
