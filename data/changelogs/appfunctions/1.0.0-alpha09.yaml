changelogHtml: |
  <h3 id="1.0.0-alpha09" data-text="Version 1.0.0-alpha09" tabindex="-1">Version 1.0.0-alpha09</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.appfunctions:appfunctions-*:1.0.0-alpha09</code>
    is released. Version 1.0.0-alpha09 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..05192460aef562f83eca3446674026b917977615/appfunctions">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Accept
      <code translate="no" dir="ltr">AppInteractionAttribution</code>
      in
      <code translate="no" dir="ltr">ExecuteAppFunctionRequest</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I70ad80ec0d58a0ef29dd3b04cb94a94b6fb136f2">I70ad8</a>
      ,
      <a href="https://issuetracker.google.com/issues/462092640">b/462092640</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix
      <code translate="no" dir="ltr">AppFunctionUriGrant</code>
      compatibility issue on SDK37 (
      <a href="https://android-review.googlesource.com/#/q/I21110a9c2e593927a2ac2097a70d40c1fc30afae">I21110</a>
      ,
      <a href="https://issuetracker.google.com/issues/485613578">b/485613578</a>
      )
    </li>
  </ul>
