changelogHtml: |
  <h3 id="1.0.0-alpha10" data-text="Version 1.0.0-alpha10" tabindex="-1">Version 1.0.0-alpha10</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.appfunctions:appfunctions:1.0.0-alpha10</code>
    ,
    <code translate="no" dir="ltr">androidx.appfunctions:appfunctions-compiler:1.0.0-alpha10</code>
    , and
    <code translate="no" dir="ltr">androidx.appfunctions:appfunctions-testing:1.0.0-alpha10</code>
    are released. Version 1.0.0-alpha10 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/05192460aef562f83eca3446674026b917977615..072655e27a9e07e74cc1493667526ee98f3de919/appfunctions">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">AppFunctionServiceEntryPoint</code>
      . All AppFunction annotation must be declared within the
      <code translate="no" dir="ltr">AppFunctionService</code>
      that is annotated with
      <code translate="no" dir="ltr">AppFunctionServiceEntryPoint</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Idc5d5a5cc0f3a20f5d8f0e4387f8e6dd43a2f260">Idc5d5</a>
      ,
      <a href="https://issuetracker.google.com/issues/463909015">b/463909015</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">AppFunction</code>
      and
      <code translate="no" dir="ltr">AppFunctionConfiguration</code>
      APIs .
      <code translate="no" dir="ltr">AppFunctionConfiguration</code>
      will be removed in future release as it will be replaced by
      <code translate="no" dir="ltr">AppFunctionServiceEntryPoint</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Iaff2378a969f282d667f00db5f59ae3bb733de85">Iaff23</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/I4cf3efd8a640ad221d2224dae3e09ae5e20b78e4">I4cf3e</a>
      ,
      <a href="https://issuetracker.google.com/issues/517876475">b/517876475</a>
      )
    </li>
    <li>
      Updated
      <code translate="no" dir="ltr">AppFunctionService</code>
      API to support callback (
      <a href="https://android-review.googlesource.com/#/q/I6e0d71c9606633315664390e567b66f928fa0189">I6e0d7</a>
      ,
      <a href="https://issuetracker.google.com/issues/519880977">b/519880977</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">searchAppFunctions</code>
      API (
      <a href="https://android-review.googlesource.com/#/q/I8c0f99fd6f4c548b23dbbfa95c2bd55b4b995b31">I8c0f9</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/I1fa27e6a02a8c70d7539796c14159f859e3c46f5">I1fa27</a>
      ,
      <a href="https://issuetracker.google.com/issues/494239238">b/494239238</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">functionNames</code>
      to
      <code translate="no" dir="ltr">AppFunctionSearchSpec</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I95f535e4de738e45132eeab61a115d253e369b8a">I95f53</a>
      ,
      <a href="https://issuetracker.google.com/issues/494239238">b/494239238</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">AppFunctionInstruction</code>
      annotation (
      <a href="https://android-review.googlesource.com/#/q/I21120525ca7f0be0307395ab0aa2f4905fff5c04">I21120</a>
      ,
      <a href="https://issuetracker.google.com/issues/488994214">b/488994214</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">AppFunctionSignature</code>
      annotation and accompanying constants to declare runtime registered app function signatures. (
      <a href="https://android-review.googlesource.com/#/q/I82a0564aa3a8c7c227cd9527b8a2a70db4fe9621">I82a05</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/Ie23619350211671447abdcc2f157c67912ada33e">Ie2361</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/Ib6bb2c7263026b537a5a322abaa57e45577847be">Ib6bb2</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Omit
      <code translate="no" dir="ltr">enabledByDefault</code>
      from generated XML for
      <code translate="no" dir="ltr">AppFunctionSignatures</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ie299615ae35eacf4cff5d1ce58e6bae5294962c7">Ie2996</a>
      ,
      <a href="https://issuetracker.google.com/issues/501032667">b/501032667</a>
      )
    </li>
  </ul>
