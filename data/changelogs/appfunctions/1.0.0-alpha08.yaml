changelogHtml: |
  <h3 id="1.0.0-alpha08" data-text="Version 1.0.0-alpha08" tabindex="-1">Version 1.0.0-alpha08</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.appfunctions:appfunctions-*:1.0.0-alpha08</code>
    is released. Version 1.0.0-alpha08 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/fe02b1e42b486a2911eb323ef49a2caf556982bc..1a508f033de883ba2853b9f9ae1853eec7010638/appfunctions">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Added support for Parcelable (s) besides
      <code translate="no" dir="ltr">PendingIntent</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I8ab9fcc69d0ebe11ce1cc9caeed7c7e3f69984d9">I8ab9f</a>
      )
    </li>
    <li>
      APIs to convert from/to Platform request and response (
      <a href="https://android-review.googlesource.com/#/q/Ifdf20ebaa1e365cae501dfea7f4c326c208d3bfe">Ifdf20</a>
      ),
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Parameter conformity with styleguide. (
      <a href="https://android-review.googlesource.com/#/q/I69b2ddfdf8ae4fdf341cd5f364c056bae23f9c51">I69b2d</a>
      )
    </li>
    <li>
      Add APIs to convert from/to Platform request and response (
      <a href="https://android-review.googlesource.com/#/q/Ifdf20ebaa1e365cae501dfea7f4c326c208d3bfe">Ifdf20</a>
      ,
      <a href="https://issuetracker.google.com/issues/476047880">b/476047880</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">AppFunctionManagerCompat</code>
      to
      <code translate="no" dir="ltr">AppFunctionManager</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Id9a78b0a74787ec911f0b10b9b5bd237937ca838">Id9a78</a>
      ,
      <a href="https://issuetracker.google.com/issues/448372122">b/448372122</a>
      )
    </li>
    <li>
      Remove get/set APIs for
      <code translate="no" dir="ltr">PendingIntent</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ic7fd6c9f5a9d69b6d88e752253e99f3369e1fbf1">Ic7fd6</a>
      ,
      <a href="https://issuetracker.google.com/issues/447530985">b/447530985</a>
      )
    </li>
    <li>
      Add support for Parcelables and migrate
      <code translate="no" dir="ltr">PendingIntent</code>
      to be represented as a Parcelable. (
      <a href="https://android-review.googlesource.com/#/q/I8ab9fcc69d0ebe11ce1cc9caeed7c7e3f69984d9">I8ab9f</a>
      ,
      <a href="https://issuetracker.google.com/issues/447530985">b/447530985</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Moves libraries to use Java 11 target. This means produced bytecode will be Java 11 (class file version 55) and might require desugaring to use the library (
      <a href="https://android-review.googlesource.com/#/q/If4c2a6fdda1278f42ea080fa365e8b437b2c2ae6">If4c2a</a>
      ,
      <a href="https://issuetracker.google.com/issues/457821470">b/457821470</a>
      )
    </li>
  </ul>
