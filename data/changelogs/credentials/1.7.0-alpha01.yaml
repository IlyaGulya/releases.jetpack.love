changelogHtml: |
  <h3 id="1.7.0-alpha01" data-text="Version 1.7.0-alpha01" tabindex="-1">Version 1.7.0-alpha01</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.credentials:credentials:1.7.0-alpha01</code>
    and
    <code translate="no" dir="ltr">androidx.credentials:credentials-play-services-auth:1.7.0-alpha01</code>
    are released. Version 1.7.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/73c49c625afa14864002e62b7db64050670c0b25..412954d4caa85d7f1003107fd178c2a069e5dbcd/credentials">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Support large credential payloads for
      <code translate="no" dir="ltr">getCredential</code>
      API
    </li>
  </ul>
  <h2 id="credentials_e2ee_version_10_2" data-text="Credentials e2ee Version 1.0." tabindex="-1">Credentials e2ee Version 1.0.</h2>
