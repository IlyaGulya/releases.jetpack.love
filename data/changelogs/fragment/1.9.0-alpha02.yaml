changelogHtml: |
  <h3 id="1.9.0-alpha02" data-text="Version 1.9.0-alpha02" tabindex="-1">Version 1.9.0-alpha02</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.fragment:fragment-*:1.9.0-alpha02</code>
    is released. Version 1.9.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/14c2f2ed81d0f61a3227641684cd875e95dd6529..9fc03893cb70909cdef7303e9f1c7dd1fa6d6a63/fragment">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add a
      <code translate="no" dir="ltr">maxLifecycle</code>
      parameter to the
      <code translate="no" dir="ltr">AndroidFragment</code>
      composable. This allows you to cap the lifecycle state of the embedded
      <code translate="no" dir="ltr">Fragment</code>
      , giving you finer control over its behavior in complex UI setups like pagers or tabs. (
      <a href="https://android-review.googlesource.com/#/q/Ie99b57c34f67ace9b940096754877e35db0769b3">Ie99b5</a>
      ,
      <a href="https://issuetracker.google.com/issues/526109804">b/526109804</a>
      )
    </li>
    <li>
      Fragment library now supports system tracing of the lifecycle event via
      <a href="/jetpack/androidx/releases/jetpack/androidx/releases/tracing">Jetpack Tracing</a>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ibc63b1894f2b1c8dc192d45fcf02ef6c8afba54f">Ibc63b</a>
      ,
      <a href="https://issuetracker.google.com/issues/112161409">b/112161409</a>
      )
    </li>
  </ul>
