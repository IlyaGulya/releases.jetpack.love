changelogHtml: |
  <h3 id="1.3.0-alpha06" data-text="Version 1.3.0-alpha06" tabindex="-1">Version 1.3.0-alpha06</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.datastore:datastore-*:1.3.0-alpha06</code>
    is released. Version 1.3.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c26c6f088b95903b7b9cd5e6f2092988f1e64dc3..c640b9aa8e30b5db9ee258561ad1fc4bc947e69d/datastore">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">DataStore</code>
      now supports
      <code translate="no" dir="ltr">androidx.tracing</code>
      on the Android target platform. You can create a
      <code translate="no" dir="ltr">DataStore</code>
      with tracing by providing a
      <code translate="no" dir="ltr">androidx.tracing.Tracer</code>
      instance to the
      <code translate="no" dir="ltr">DataStoreFactory.createWithTracing()</code>
      function. (
      <a href="https://android-review.googlesource.com/#/q/I71bc206a0b272b5a21d6695d62de0d2c916a5067">I71bc2</a>
      ,
      <a href="https://issuetracker.google.com/issues/427722902">b/427722902</a>
      )
    </li>
  </ul>
