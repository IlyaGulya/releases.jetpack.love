changelogHtml: |
  <h3 id="1.3.0-alpha09" data-text="Version 1.3.0-alpha09" tabindex="-1">Version 1.3.0-alpha09</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.datastore:datastore-*:1.3.0-alpha09</code>
    is released. Version 1.3.0-alpha09 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/35ca96cc1f129a6cc9d6650029cd6155668f4e7a..cf2f8d0fe4a727775ee70389170ce7ae0e152c6c/datastore">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Make
      <code translate="no" dir="ltr">ReThrowCorruptionHandler</code>
      public. (
      <a href="https://android-review.googlesource.com/#/q/I137bb14c906007e8032c55f1524e954533664e0c">I137bb</a>
      ,
      <a href="https://issuetracker.google.com/issues/427722902">b/427722902</a>
      )
    </li>
    <li>
      Make tracing lifecycle consistent with system tracing. (
      <a href="https://android-review.googlesource.com/#/q/Ib391b68941c5e7c7e5ef8d85241fa4593469f3e7">Ib391b</a>
      )
    </li>
  </ul>
