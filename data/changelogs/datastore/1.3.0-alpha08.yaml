changelogHtml: |
  <h3 id="1.3.0-alpha08" data-text="Version 1.3.0-alpha08" tabindex="-1">Version 1.3.0-alpha08</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.datastore:datastore-*:1.3.0-alpha08</code>
    is released. Version 1.3.0-alpha08 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/8107a93d3eeb340973ffee74a307faabd1152ea5..35ca96cc1f129a6cc9d6650029cd6155668f4e7a/datastore">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Added support for Origin Private File System (OPFS) in DataStore for web platforms. This implementation introduces
      <code translate="no" dir="ltr">WebOpfsStorage</code>
      and includes architectural support for asynchronous file I/O, cross-tab notifications using the
      <code translate="no" dir="ltr">BroadcastChannel</code>
      API, and distributed locking via the native
      <code translate="no" dir="ltr">Web Locks API</code>
      for exclusive write access.
      <a href="https://android-review.googlesource.com/q/Id7f5807b6d5abd94ac268b91dcbe5f19e2ff8ef5">Id7f5807</a>
      <a href="https://buganizer.corp.google.com/issues/316376114">b/316376114</a>
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Introduced
      <code translate="no" dir="ltr">WebLocalStorage</code>
      and
      <code translate="no" dir="ltr">WebSessionStorage</code>
      APIs for explicit storage type management in Web environments.
      <a href="https://android-review.googlesource.com/q/I35fa259b5d5940d599e8dce0efe79d9a15886895">I35fa259b</a>
      <a href="https://buganizer.corp.google.com/issues/316376114">b/316376114</a>
    </li>
  </ul>
