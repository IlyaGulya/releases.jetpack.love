libraryId: core-locationbutton
groupId: androidx.core
version: 1.0.0-alpha01
releaseDate: 2026-06-17
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.core.locationbutton:locationbutton:1.0.0-alpha01</code>
    ,
    <code translate="no" dir="ltr">androidx.core.locationbutton:locationbutton-compose:1.0.0-alpha01</code>
    , and
    <code translate="no" dir="ltr">androidx.core.locationbutton:locationbutton-testing:1.0.0-alpha01</code>
    are released. Version 1.0.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/refs/heads/androidx-main/core/locationbutton">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <p>
    The initial alpha release of AndroidX implementations of
    <code translate="no" dir="ltr">LocationButton</code>
    that enable both view and compose based applications to easily request one-time precise location permission. For devices running Android 16 (API 36) or below, the library provides automatic backwards compatibility by defaulting to standard location permission prompts.
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">LocationButton</code>
      View as an entry point for View based applications.
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">LocationButton</code>
      composable as an entrypoint for Compose based applications.
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">OnPermissionResultListener</code>
      ,
      <code translate="no" dir="ltr">OnErrorListener</code>
      , and
      <code translate="no" dir="ltr">OnRequestPermissionsListener</code>
      for callback handling.
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">TestLocationButtonProvider</code>
      to allow apps to test flows relying on the secure
      <code translate="no" dir="ltr">LocationButton</code>
      .
    </li>
  </ul>
