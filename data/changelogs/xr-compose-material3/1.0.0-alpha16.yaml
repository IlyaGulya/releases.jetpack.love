changelogHtml: |
  <h3 id="1.0.0-alpha16" data-text="Version 1.0.0-alpha16" tabindex="-1">Version 1.0.0-alpha16</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.compose.material3:material3:1.0.0-alpha16</code>
    is released. Version 1.0.0-alpha16 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3c5ca110d9a6bce5bd9efd6a97f6579d27385abc..03e8089df94c39eaf258d82271bb97697e95d5a9/xr/compose/material3/material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Changed Orbiter to use either an
      <code translate="no" dir="ltr">OrbiterAnchorPoint</code>
      +
      <code translate="no" dir="ltr">VolumeOffset</code>
      or an
      <code translate="no" dir="ltr">OrbiterPoseProvider</code>
      instead of
      <code translate="no" dir="ltr">position</code>
      ,
      <code translate="no" dir="ltr">offset</code>
      ,
      <code translate="no" dir="ltr">offsetType</code>
      ,
      <code translate="no" dir="ltr">alignment</code>
      , and elevation. Also removed the
      <code translate="no" dir="ltr">shouldRenderInNonSpatial</code>
      parameter. If the developer does not want the orbiter to render in non-spatial they should wrap the orbiter in an if statement and check the
      <code translate="no" dir="ltr">SpatialCapabilities</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9fbb3826fb7e709f86fee3e033585cdd97bc0b79">I9fbb3</a>
      ,
      <a href="https://issuetracker.google.com/issues/462428503">b/462428503</a>
      )
    </li>
  </ul>
