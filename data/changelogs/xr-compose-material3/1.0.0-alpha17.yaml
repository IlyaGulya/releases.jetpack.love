changelogHtml: |
  <h3 id="1.0.0-alpha17" data-text="Version 1.0.0-alpha17" tabindex="-1">Version 1.0.0-alpha17</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.compose.material3:material3:1.0.0-alpha17</code>
    is released. Version 1.0.0-alpha17 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/03e8089df94c39eaf258d82271bb97697e95d5a9..92a04f7c6f34453321c5cf56381648170950a0c5/xr/compose/material3/material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Changed
      <code translate="no" dir="ltr">Orbiter</code>
      to use either an
      <code translate="no" dir="ltr">OrbiterAnchorPoint</code>
      +
      <code translate="no" dir="ltr">VolumeOffset</code>
      or an
      <code translate="no" dir="ltr">OrbiterPoseProvider</code>
      instead of position, offset, offsetType, alignment, and elevation. Also removed the
      <code translate="no" dir="ltr">shouldRenderInNonSpatial</code>
      parameter. If the developer does not want the orbiter to render in non-spatial they should wrap the orbiter in an if statement and check the
      <code translate="no" dir="ltr">SpatialCapabilities</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9fbb3826fb7e709f86fee3e033585cdd97bc0b79">I9fbb3</a>
      )
    </li>
    <li>
      Added movable modifiers. These modifiers currently work for
      <code translate="no" dir="ltr">SpatialPanels</code>
      and
      <code translate="no" dir="ltr">SpatialExternalSurface</code>
      . They will be supported in the future for
      <code translate="no" dir="ltr">SpatialGltfModel</code>
      and eventually all
      <code translate="no" dir="ltr">SubspaceComposables</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9a3cd5a7989887a09282207629cd4a6dd39dfae7">I9a3cd</a>
      )
    </li>
  </ul>
