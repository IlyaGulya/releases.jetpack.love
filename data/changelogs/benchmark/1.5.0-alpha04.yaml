#language=html
changelogHtml: |
  <h3 id="1.5.0-alpha04" data-text="Version 1.5.0-alpha04" tabindex="-1">Version 1.5.0-alpha04</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.benchmark:benchmark-*:1.5.0-alpha04</code>
    is released. Version 1.5.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cdf076c6abd0f3125cb0302756fcb77fe981ab7c..1a508f033de883ba2853b9f9ae1853eec7010638/benchmark">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">JvmOverloads</code>
      to
      <code translate="no" dir="ltr">PowerMetric.Energy</code>
      and
      <code translate="no" dir="ltr">PowerMetric.Power</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Iac0d06e0d13c6c2a5318c092e888292fc8166059">Iac0d0</a>
      ,
      <a href="https://issuetracker.google.com/issues/481371562">b/481371562</a>
      ).
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated
      <code translate="no" dir="ltr">ArtMetric</code>
      to account for top-level packages, especially important when using AGP/R8 9.1+, or
      <code translate="no" dir="ltr">-repackageclasses</code>
      global option. Previously,
      <code translate="no" dir="ltr">ArtMetric</code>
      would fail to detect these classloads in its
      <code translate="no" dir="ltr">artClassLoad...</code>
      measurements. (
      <a href="https://android-review.googlesource.com/#/q/I207cad3b03bf4ed2c8779a1260a453e36b1716cf">I207ca</a>
      ,
      <a href="https://issuetracker.google.com/issues/487402058">b/487402058</a>
      )
    </li>
  </ul>
