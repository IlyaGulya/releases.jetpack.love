changelogHtml: |
  <h3 id="1.1.0-alpha03" data-text="Version 1.1.0-alpha03" tabindex="-1">Version 1.1.0-alpha03</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.ink:ink-*:1.1.0-alpha03</code>
    is released. Version 1.1.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/df4b49eda6f6834b6bc4c8aa30a581fa577a511e..e8de700385d9ab9cdeb458e7ff3867b6a03d869e/ink">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Make programmatic Ink brush customization API public (
      <a href="https://android-review.googlesource.com/#/q/I8e2e12a3f449ce9b553ced187ea8b7c32a47e902">I8e2e1</a>
      )
    </li>
    <li>
      Split
      <code translate="no" dir="ltr">BrushPaint.TextureLayer</code>
      into more specific subclasses (
      <a href="https://android-review.googlesource.com/#/q/I8848ae547b17614a567bc5478e2b0aaf7a0729f8">I8848a</a>
      )
    </li>
  </ul>
