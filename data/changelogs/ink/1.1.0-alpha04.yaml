groupId: androidx.ink
version: 1.1.0-alpha04
releaseDate: 2026-06-17
#language=html
changelogHtml: |
  <h3 id="1.1.0-alpha04" data-text="Version 1.1.0-alpha04" tabindex="-1">Version 1.1.0-alpha04</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.ink:ink-*:1.1.0-alpha04</code>
    is released. Version 1.1.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe..54300995fb997ea31a64ab9de0daf6580692612d/ink">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li><p>Fix floating point precision issues leading to visual artifacts in finished strokes, affecting certain devices after OS upgrades</p></li>
    <li>
      <p>
        Add KMP-common API for storage module (going to/from
        <code translate="no" dir="ltr">ByteArray</code>
        instead of Java
        <code translate="no" dir="ltr">InputStream</code>
        /
        <code translate="no" dir="ltr">OutputStream</code>
        ).
      </p>
    </li>
    <li>
      <p>
        Add a
        <code translate="no" dir="ltr">BrushBehavior.developerComment</code>
        property to hold metadata explaining a custom brush family's design. This is intended to support Brush Designer UI.
      </p>
    </li>
    <li>
      <p>
        Fix a bug in threading consistency checks in
        <code translate="no" dir="ltr">CanvasInProgressStrokesRenderHelperV33</code>
        .
      </p>
    </li>
    <li>
      <p>
        Fix some bugs in handling of
        <code translate="no" dir="ltr">MotionEvent</code>
        optional fields (e.g. tilt, pressure).
      </p>
    </li>
    <li><p>Improve documentation for custom brush API.</p></li>
    <li>
      <p>
        Add new
        <code translate="no" dir="ltr">BrushPaint.ColorFunction</code>
        types.
      </p>
    </li>
  </ul>
