changelogHtml: |
  <h3 id="1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.ink:ink-*:1.1.0-alpha01</code>
    is released. Version 1.1.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/8bf058367eab7e1352e81f61606d663ed7b3cd1d..1a508f033de883ba2853b9f9ae1853eec7010638/ink">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Assorted small bug fixes</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">InProgressShape.isCanceled</code>
      , fix concurrency issues in authoring module. (
      <a href="https://android-review.googlesource.com/#/q/Ibfd32ed6aa398653461d9e86d247f09c57caa53d">Ibfd32</a>
      ,
      <a href="https://issuetracker.google.com/issues/474385518">b/474385518</a>
      ,
      <a href="https://issuetracker.google.com/issues/470695777">b/470695777</a>
      )
    </li>
    <li>
      Expose zero-argument version of
      <code translate="no" dir="ltr">CanvasStrokeRenderer.create</code>
      and
      <code translate="no" dir="ltr">InProgressStroke.updateShape</code>
      to Java (
      <a href="https://android-review.googlesource.com/#/q/Id80a171f1c2c71f3ef7fa309c4aad44c4300867d">Id80a1</a>
      ,
      <a href="https://issuetracker.google.com/issues/457715938">b/457715938</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix a bug causing crashes in
      <code translate="no" dir="ltr">InProgressStrokesView</code>
      after detach/reattach from window for API 29-32, allow Vec operations to take same
      <code translate="no" dir="ltr">MutableVec</code>
      as input and output, merge Proguard configs into one file. (
      <a href="https://android-review.googlesource.com/#/q/Ia4da08aa4ed8b5b428a19ef8b00c63ef544e62ff">Ia4da0</a>
      )
    </li>
    <li>
      Increase dependency on graphics-core to 1.0.4 (
      <a href="https://android-review.googlesource.com/#/q/Ibfa187a40ab55711f8eca9ae0ae53c181086db23">Ibfa18</a>
      )
    </li>
  </ul>
  <h2 id="version_10_2" data-text="Version 1.0" tabindex="-1">Version 1.0</h2>
