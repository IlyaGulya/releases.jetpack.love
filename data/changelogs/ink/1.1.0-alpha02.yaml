changelogHtml: |
  <h3 id="1.1.0-alpha02" data-text="Version 1.1.0-alpha02" tabindex="-1">Version 1.1.0-alpha02</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.ink:ink-*:1.1.0-alpha02</code>
    is released. Version 1.1.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..f99a4088c23a06cb8f2e113e607ef12853d95f09/ink">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Expose an overload of
      <code translate="no" dir="ltr">BrushFamily.decode</code>
      that specifies max version compatibility (
      <a href="https://android-review.googlesource.com/#/q/I1c7bc469cc79fa4ead6bcf605e2891e456c63b23">I1c7bc</a>
      )
    </li>
    <li>
      Graduate
      <code translate="no" dir="ltr">BrushFamily</code>
      serialization API from experimental (
      <a href="https://android-review.googlesource.com/#/q/Idd16ea9454d944d8daaf3ad719592c9e654df43b">Idd16e</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix flicker when using
      <code translate="no" dir="ltr">InProgressStrokesView.maskPath</code>
      on certain devices (
      <a href="https://android-review.googlesource.com/#/q/I1c7bc469cc79fa4ead6bcf605e2891e456c63b23">I1c7bc</a>
      ,
      <a href="https://issuetracker.google.com/issues/496920044">b/496920044</a>
      )
    </li>
  </ul>
