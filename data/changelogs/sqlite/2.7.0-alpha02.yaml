changelogHtml: |
  <h3 id="2.7.0-alpha02" data-text="Version 2.7.0-alpha02" tabindex="-1">Version 2.7.0-alpha02</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.sqlite:sqlite-*:2.7.0-alpha02</code>
    is released. Version 2.7.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a/sqlite">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix missing symbols issue on iOS when using the
      <code translate="no" dir="ltr">NativeSQLiteDriver</code>
      and dynamically linking to IOS's SQLite library (
      <a href="https://issuetracker.google.com/434324365">b/434324365</a>
      ).
    </li>
  </ul>
