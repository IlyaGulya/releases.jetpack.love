changelogHtml: |
  <h3 id="1.7.0-alpha01" data-text="Version 1.7.0-alpha01" tabindex="-1">Version 1.7.0-alpha01</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.camera:camera-*:1.7.0-alpha01</code>
    is released. Version 1.7.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/0dc6fa695e63a0bbc17f07b7368ba2567fb47d01..1a508f033de883ba2853b9f9ae1853eec7010638/camera">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Exposed the
      <code translate="no" dir="ltr">CameraController.setSessionConfig()</code>
      API. This allows providing a custom
      <code translate="no" dir="ltr">SessionConfig</code>
      for advanced
      <code translate="no" dir="ltr">UseCase</code>
      configurations not directly exposed by
      <code translate="no" dir="ltr">CameraController</code>
      . When a
      <code translate="no" dir="ltr">SessionConfig</code>
      is active, other configuration methods on
      <code translate="no" dir="ltr">CameraController</code>
      are disabled.(
      <a href="https://android-review.googlesource.com/#/q/I35cf1d01438eb69b32a5ca947f1ee28a8b50a343">I35cf1</a>
      ,
      <a href="https://issuetracker.google.com/issues/448525636">b/448525636</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Moves libraries to use Java 11 target. This means produced bytecode will be Java 11 (class file version 55) and might require desugaring to use the library (
      <a href="https://android-review.googlesource.com/#/q/If4c2a6fdda1278f42ea080fa365e8b437b2c2ae6">If4c2a</a>
      ,
      <a href="https://issuetracker.google.com/issues/457821470">b/457821470</a>
      )
    </li>
    <li>
      Fixed a bug in
      <code translate="no" dir="ltr">ImageAnalysis</code>
      where images were not correctly rotated when output image rotation is enabled and the initial relative rotation is 0 degrees. (
      <a href="https://android-review.googlesource.com/#/q/Id46c2a7a2a1212e636ace2b96945184eae507d7b">Id46c2</a>
      ,
      <a href="https://issuetracker.google.com/issues/487160584">b/487160584</a>
      )
    </li>
  </ul>
