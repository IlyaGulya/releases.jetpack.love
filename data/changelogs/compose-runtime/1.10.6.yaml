changelogHtml: |
  <h3 id="1.10.6" data-text="Version 1.10.6" tabindex="-1">Version 1.10.6</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.runtime:runtime-*:1.10.6</code>
    is released. Version 1.10.6 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e5be55ea7f9dceafc442ec739922936c1e056a33..deab088e55dabc3db4d0638d62ea3132fc51d69b/compose/runtime">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix "Cannot disable reuse from root if it was caused by other groups" crash in pausable composition (
      <a href="https://android-review.googlesource.com/#/q/I474b541e9da5a7e9c182f0c0c1bae0e4f0f42c47">I474b5</a>
      ,
      <a href="https://issuetracker.google.com/issues/488433633">b/488433633</a>
      )
    </li>
    <li>
      Fix "Apply is called on deactivated node" crash in pausable composition (
      <a href="https://android-review.googlesource.com/#/q/I880c073ea4ea5d479c1aee99a9cbc3321e010c31">I880c0</a>
      ,
      <a href="https://issuetracker.google.com/issues/484300733">b/484300733</a>
      )
    </li>
  </ul>
