changelogHtml: |
  <h3 id="1.12.0-alpha01" data-text="Version 1.12.0-alpha01" tabindex="-1">Version 1.12.0-alpha01</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.runtime:runtime-*:1.12.0-alpha01</code>
    is released. Version 1.12.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ecc44700355708734de3756bf5e677323ae14ed1..35ca96cc1f129a6cc9d6650029cd6155668f4e7a/compose/runtime">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an issue in the LinkTable that can cause invalid node operations. (
      <a href="https://android-review.googlesource.com/#/q/I491c34222c1fa4006516c3dbad14289dd5391298">I491c3</a>
      )
    </li>
    <li>
      Updated Compose compileSdk to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
    <li>
      Fixed a caching issue in the LinkTable where content insertions that trigger resizes could lead to stale values being read, which could cause CompositionLocals to not be resolved. (
      <a href="https://android-review.googlesource.com/#/q/I8016cc973b6ad8c92b91c4af649e660db010a022">I8016c</a>
      )
    </li>
    <li>
      Fixed a bug that was causing
      <code translate="no" dir="ltr">T.writableRecord</code>
      to throw unnecessary
      <code translate="no" dir="ltr">IllegalStateException</code>
      s (
      <a href="https://android-review.googlesource.com/#/q/Ia778fb060336a827788fe2a4f5b42ddf96092b78">Ia778f</a>
      ,
      <a href="https://issuetracker.google.com/issues/440975176">b/440975176</a>
      )
    </li>
  </ul>
  <h2 id="runtime_tracing_version_17_2" data-text="Runtime Tracing Version 1.7" tabindex="-1">Runtime Tracing Version 1.7</h2>
