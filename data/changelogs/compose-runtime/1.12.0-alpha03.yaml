changelogHtml: |
  <h3 id="1.12.0-alpha03" data-text="Version 1.12.0-alpha03" tabindex="-1">Version 1.12.0-alpha03</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.runtime:runtime-*:1.12.0-alpha03</code>
    is released. Version 1.12.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/0c82232cfb54d1dcc3ad73598fcc81ceff9b88d6..a5046b380f14cd67d25208fa4c58d41bf3b06a1b/compose/runtime">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Resolved several issues in the
      <code translate="no" dir="ltr">LinkTable</code>
      where diagnostic stack traces would be unpopulated or missing information (
      <a href="https://android-review.googlesource.com/#/q/I3918cccbbcd4c9539582cdbcaea659a19fb84e22">I3918c</a>
      )
    </li>
    <li>
      Fixed an issue in an internal data type that could cause an exception in rare cases with movable content. (
      <a href="https://android-review.googlesource.com/#/q/Ic478fb977ff8d650caa481f33ad0a2f0fa4c9671">Ic478f</a>
      ,
      <a href="https://issuetracker.google.com/issues/507724717">b/507724717</a>
      )
    </li>
    <li>
      Fixed an issue in the
      <code translate="no" dir="ltr">LinkComposer</code>
      's skipping behavior that resulted in inconsistent behavior compared to the
      <code translate="no" dir="ltr">GapComposer</code>
      , unexpected recalculation of default arguments, and test timeouts. (
      <a href="https://android-review.googlesource.com/#/q/I783dcb968d5af58fe2cfcbb7b7bb8d1dcc158709">I783dc</a>
      )
    </li>
  </ul>
