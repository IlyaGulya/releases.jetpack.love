  <h3 id="1.12.0-beta02" data-text="Version 1.12.0-beta02" tabindex="-1">Version 1.12.0-beta02</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.runtime:runtime-*:1.12.0-beta02</code>
    is released. Version 1.12.0-beta02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/40b1610b08564489b3f6a426cd8833f8615bfc68..aa883d8aa3e51057610bdf6e76ff9753350fa02c/compose/runtime">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an
      <code translate="no" dir="ltr">ArrayIndexOutOfBoundsException</code>
      in the
      <code translate="no" dir="ltr">LinkComposer</code>
      when using nested
      <code translate="no" dir="ltr">MovableContent</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I85daf75aa5dd28409289dcee04ad49a808e0da3e">I85daf</a>
      )
    </li>
  </ul>
