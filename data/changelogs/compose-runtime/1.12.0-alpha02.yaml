changelogHtml: |
  <h3 id="1.12.0-alpha02" data-text="Version 1.12.0-alpha02" tabindex="-1">Version 1.12.0-alpha02</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.runtime:runtime-*:1.12.0-alpha02</code>
    is released. Version 1.12.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/35ca96cc1f129a6cc9d6650029cd6155668f4e7a..5ec3fd7563f4f9b2ba745aac0ad7770cc4cd087f/compose/runtime">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added an overload to
      <code translate="no" dir="ltr">SideEffect</code>
      that accepts key arguments. The new API can be used to fire one-shot
      <code translate="no" dir="ltr">SideEffects</code>
      without the need for a
      <code translate="no" dir="ltr">LaunchedEffect</code>
      or
      <code translate="no" dir="ltr">DisposableEffect</code>
      whose
      <code translate="no" dir="ltr">CoroutineScope</code>
      or
      <code translate="no" dir="ltr">onDispose</code>
      block are unused. (
      <a href="https://android-review.googlesource.com/#/q/I528b214d6fc40d3436c178e9a23cd897443f8f0c">I528b2</a>
      ,
      <a href="https://issuetracker.google.com/issues/476108743">b/476108743</a>
      )
    </li>
  </ul>
