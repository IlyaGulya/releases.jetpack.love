changelogHtml: |
  <h3 id="1.11.0-beta01" data-text="Version 1.11.0-beta01" tabindex="-1">Version 1.11.0-beta01</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.runtime:runtime-*:1.11.0-beta01</code>
    is released. Version 1.11.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c640b9aa8e30b5db9ee258561ad1fc4bc947e69d..a15c668d4bb2e00cfa8ed1af96895a84c3e7e2d5/compose/runtime">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">SnapshotFlowManager</code>
      and the overload of
      <code translate="no" dir="ltr">snapshotFlow</code>
      that accept the
      <code translate="no" dir="ltr">manager</code>
      parameter are now marked as experimental (
      <a href="https://android-review.googlesource.com/#/q/I5c1a54d02edec71c4ce4c7cca7227961bb40f37f">I5c1a5</a>
      ,
      <a href="https://issuetracker.google.com/issues/486077876">b/486077876</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/I0de712a2f311c63e239a4bc0181181a7d033637b">I0de71</a>
      ,
      <a href="https://issuetracker.google.com/issues/486077876">b/486077876</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix "Apply is called on deactivated node" crash in pausable composition (
      <a href="https://android-review.googlesource.com/#/q/I880c073ea4ea5d479c1aee99a9cbc3321e010c31">I880c0</a>
      ,
      <a href="https://issuetracker.google.com/issues/484300733">b/484300733</a>
      )
    </li>
    <li>
      Fixed an issue in the
      <code translate="no" dir="ltr">LinkTable</code>
      that could cause
      <code translate="no" dir="ltr">ArrayIndexOutOfBoundsExceptions</code>
      or metadata corruption when using
      <code translate="no" dir="ltr">MovableContent</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I8452b177590ca1303e6ceb8f5379ba968e86e3b1">I8452b</a>
      )
    </li>
    <li>
      Fixed an issue in the
      <code translate="no" dir="ltr">LinkTable</code>
      that would prevent diagnostic traces from being populated correctly (
      <a href="https://android-review.googlesource.com/#/q/I5986897dad1e146f93a391ac94815e8120c10561">I59868</a>
      )
    </li>
    <li>
      Fixed an issue in the new SlotTable where
      <code translate="no" dir="ltr">RememberObservers</code>
      used in
      <code translate="no" dir="ltr">MovableContent</code>
      could cause an
      <code translate="no" dir="ltr">OutOfMemoryError/infinite</code>
      loop when removed. (
      <a href="https://android-review.googlesource.com/#/q/I884e7b1e0e83818ccb11fc1fa2dc75761c989ec3">I884e7</a>
      )
    </li>
  </ul>
