  <h3 id="1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.core.uwb:uwb:1.1.0-alpha01</code>
    and
    <code translate="no" dir="ltr">androidx.core.uwb:uwb-rxjava3:1.1.0-alpha01</code>
    are released. Version 1.1.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/77dd3dfa840c9142af3e376b80ba1e5740a0d6ec..92906e864a2b9ada27dee710266d12dc035dbaa2/core/uwb">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add new API
      <code translate="no" dir="ltr">close()</code>
      for
      <code translate="no" dir="ltr">UwbManager</code>
      to unbound the UWB service. (
      <a href="https://android-review.googlesource.com/#/q/I4606fd5545db1f5eb61d4bd3398e8cb8b5c8e4e5">I4606f</a>
      ,
      <a href="https://issuetracker.google.com/issues/498499531">b/498499531</a>
      )
    </li>
  </ul>
