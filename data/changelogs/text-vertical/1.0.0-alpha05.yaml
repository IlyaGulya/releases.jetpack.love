version: 1.0.0-alpha05
releaseDate: 2026-04-22
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha05" data-text="Version 1.0.0-alpha05" tabindex="-1">Version 1.0.0-alpha05</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.text:text-vertical:1.0.0-alpha05</code>
    and
    <code translate="no" dir="ltr">androidx.text:text-vertical-compose:1.0.0-alpha05</code>
    are released. Version 1.0.0-alpha05 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/951845221205b7a428a9d779107760fc929863ee..df4b49eda6f6834b6bc4c8aa30a581fa577a511e/text">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Added Composable functions to support vertical text layout, aligning with Google's Compose-first initiative.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Introduced
      <code translate="no" dir="ltr">:text:text-vertical-compose</code>
      library artifact. (
      <a href="https://android-review.googlesource.com/#/q/I939e4862996f64c79975568aa3249016ccda19ab">I939e4</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">lineCount</code>
      property to
      <code translate="no" dir="ltr">VerticalTextLayout</code>
      class. (
      <a href="https://android-review.googlesource.com/#/q/I93884649fdcbc7be076446b5fe7d75e15f58b84d">I93884</a>
      ,
      <a href="https://issuetracker.google.com/issues/502088091">b/502088091</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated KDoc documentation for clarity and accuracy. (
      <a href="https://android-review.googlesource.com/#/q/I71c8ffd6d4b2987bb7abc1a090133501d25a766c">I71c8f</a>
      ,
      <a href="https://issuetracker.google.com/issues/449184326">b/449184326</a>
      )
    </li>
  </ul>
