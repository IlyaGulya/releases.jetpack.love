#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha03" data-text="Version 1.0.0-alpha03" tabindex="-1">Version 1.0.0-alpha03</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.text:text-vertical:1.0.0-alpha03</code>
    is released. Version 1.0.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4350deab5806bf95370a4d012d7eeaa70a10be44..1abcb4178d48853948b9b566cabff9222d90ab69/text/text-vertical">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">VerticalTextLayout</code>
      now supports the horizontal layout, to display special spans in Japanese such as Ruby and Emphasis (Boten).
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">RubySpan</code>
      and
      <code translate="no" dir="ltr">EmphasisSpan</code>
      now inherit ReplacementSpan for supporting them for horizontal text (
      <a href="https://android-review.googlesource.com/#/q/I38db6f5fd0676dc0fdf0433dd81e53fe3c7fc981">I38db6</a>
      ,
      <a href="https://issuetracker.google.com/issues/447239659">b/447239659</a>
      ,
      <a href="https://issuetracker.google.com/issues/447224892">b/447224892</a>
      )
    </li>
  </ul>
