changelogHtml: |
  <h3 id="1.0.0-alpha04" data-text="Version 1.0.0-alpha04" tabindex="-1">Version 1.0.0-alpha04</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.text:text-vertical:1.0.0-alpha04</code>
    is released. Version 1.0.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a..966cd4961ea7030c43c4afe234f0c8a4472f8160/text/text-vertical">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Refactored all public classes to provide more convenient, idiomatic Kotlin APIs for general usage, while maintaining strong Java interoperability.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added a default zero-argument constructor to
      <code translate="no" dir="ltr">FontShearSpan</code>
      for Java compatibility (
      <a href="https://android-review.googlesource.com/#/q/I730658f1c6d29b291b6a9493e3ccc40f0ada4764">I73065</a>
      ,
      <a href="https://issuetracker.google.com/issues/493692287">b/493692287</a>
      ).
    </li>
    <li>
      Removed the
      <code translate="no" dir="ltr">Parcelable</code>
      implementation in
      <code translate="no" dir="ltr">RubySpan</code>
      and
      <code translate="no" dir="ltr">EmphasisSpan</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I49884b2585ece811bb85a86d7b100c68d10f116d">I49884</a>
      ,
      <a href="https://issuetracker.google.com/issues/493693386">b/493693386</a>
      ).
    </li>
    <li>
      Refactored
      <code translate="no" dir="ltr">EmphasisSpan</code>
      for better compatibility (
      <a href="https://android-review.googlesource.com/#/q/I34c40e89606a520b3a6a8d3d3f5c4cc531da6fc5">I34c40</a>
      ,
      <a href="https://issuetracker.google.com/issues/493693310">b/493693310</a>
      ).
    </li>
    <li>
      Refactored
      <code translate="no" dir="ltr">AnnotationPosition</code>
      to improve API surface (
      <a href="https://android-review.googlesource.com/#/q/I10dce948b769873d68c64077b4d96997cc2fa37e">I10dce</a>
      ,
      <a href="https://issuetracker.google.com/issues/493693386">b/493693386</a>
      ).
    </li>
    <li>
      Converted
      <code translate="no" dir="ltr">TextOrientation</code>
      to an enum class, refactored
      <code translate="no" dir="ltr">AnnotationPosition</code>
      to a sealed class, and removed
      <code translate="no" dir="ltr">RubySpan.Builder</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ib4a77651cdd2f3c7aa320ba6ef6d51c7965b7283">Ib4a77</a>
      ,
      <a href="https://issuetracker.google.com/issues/493693386">b/493693386</a>
      ).
    </li>
    <li>
      Added the
      <code translate="no" dir="ltr">AnnotationPosition</code>
      enum and refactored the
      <code translate="no" dir="ltr">RubySpan</code>
      class (
      <a href="https://android-review.googlesource.com/#/q/Ibfcff6f417bbb5bdf79998fa7876e5cec79bb93a">Ibfcff</a>
      ,
      <a href="https://issuetracker.google.com/issues/493692426">b/493692426</a>
      ).
    </li>
    <li>
      Refactored
      <code translate="no" dir="ltr">TextOrientation</code>
      for general usage and improved internal text scaling extensions (
      <a href="https://android-review.googlesource.com/#/q/I821529f1e8457a5541a66e55907ea04aa88104c9">I82152</a>
      ,
      <a href="https://issuetracker.google.com/issues/493692428">b/493692428</a>
      ).
    </li>
  </ul>
