changelogHtml: |
  <h3 id="1.2.0-alpha01" data-text="Version 1.2.0-alpha01" tabindex="-1">Version 1.2.0-alpha01</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.loader:loader:1.2.0-alpha01</code>
    is released. Version 1.2.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/f9158f48961e6c6fcc619334eb9790561a5d9cdb/loader/loader">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      This library now uses
      <a href="https://jspecify.dev/">JSpecify nullness annotations</a>
      , which are type-use. Kotlin developers should use the following compiler arguments to enforce correct usage: -Xjspecify-annotations=strict, -Xtype-enhancement-improvements-strict-mode (
      <a href="https://android-review.googlesource.com/#/q/Ib5eb3626c41d53cac5bd4175b5c5da6e05f91250">Ib5eb3</a>
      ,
      <a href="https://issuetracker.google.com/issues/326456246">b/326456246</a>
      )
    </li>
    <li>
      Deprecated
      <code translate="no" dir="ltr">androidx.core.os.CancellationSignal</code>
      . Usages should be replaced with the platform-provided
      <code translate="no" dir="ltr">android.os.CancellationSignal</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Id45f69a0b9cee7515d3f5b35dde3b3b037f8bd3a">Id45f6</a>
      ,
      <a href="https://issuetracker.google.com/issues/309499026">b/309499026</a>
      ,
      <a href="https://issuetracker.google.com/issues/309054079">b/309054079</a>
      )
    </li>
  </ul>
