groupId: androidx.test
version: 2.4.0
releaseDate: 2026-07-01
#language=html
changelogHtml: |
  <h3 id="2.4.0" data-text="Version 2.4.0" tabindex="-1">Version 2.4.0</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.test.uiautomator:uiautomator:2.4.0</code>
    ,
    <code translate="no" dir="ltr">androidx.test.uiautomator:uiautomator-shell:2.4.0</code>
    , and
    <code translate="no" dir="ltr">androidx.test.uiautomator:uiautomator-shell-android:2.4.0</code>
    are released. Version 2.4.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4f8d91d904a453dc1b9661cb43ea02b62436a1e6..ec9022d156846f24e22bec3e475d4206d6f321ea/test/uiautomator">these commits</a>
    .
  </p>
  <p><strong>Important changes since 2.3.0:</strong></p>
  <p>The API surface of UiAutomator has been overhauled to provide:</p>
  <ul>
    <li>
      A dedicated
      <code translate="no" dir="ltr">uiAutomator</code>
      test scope for cleaner and more expressive test code.
    </li>
    <li>
      Methods like
      <code translate="no" dir="ltr">onElement</code>
      ,
      <code translate="no" dir="ltr">onElements</code>
      , and
      <code translate="no" dir="ltr">onElementOrNull</code>
      for finding UI elements with clear predicates.
    </li>
    <li>
      Built-in waiting mechanism for conditional elements
      <code translate="no" dir="ltr">onElement*(timeoutMs: Long = 10000)</code>
    </li>
    <li>
      Explicit app state management such as
      <code translate="no" dir="ltr">waitForStable</code>
      and
      <code translate="no" dir="ltr">waitForAppToBeVisible</code>
      .
    </li>
    <li>Direct interaction with accessibility window nodes for multi-window testing scenarios.</li>
    <li>
      Built-in screenshot capabilities and a
      <code translate="no" dir="ltr">ResultsReporter</code>
      for visual testing and debugging.
    </li>
  </ul>
  <p>
    To get started with the new APIs, see
    <a href="https://developer.android.com/training/testing/other-components/ui-automator">the UiAutomator 2.4+ guide</a>
    .
  </p>
