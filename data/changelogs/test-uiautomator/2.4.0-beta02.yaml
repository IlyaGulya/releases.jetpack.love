changelogHtml: |
  <h3 id="2.4.0-beta02" data-text="Version 2.4.0-beta02" tabindex="-1">Version 2.4.0-beta02</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.test.uiautomator:uiautomator:2.4.0-beta02</code>
    and
    <code translate="no" dir="ltr">androidx.test.uiautomator:uiautomator-shell:2.4.0-beta02</code>
    are released. Version 2.4.0-beta02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cdf076c6abd0f3125cb0302756fcb77fe981ab7c..1a508f033de883ba2853b9f9ae1853eec7010638/test/uiautomator">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed
      <code translate="no" dir="ltr">UiObject2#scrollToElementOrNull</code>
      throwing instead of returning
      <code translate="no" dir="ltr">null</code>
      , and updated its return type (
      <a href="https://android-review.googlesource.com/#/q/If0109f22857a774e936625862c8eda98eb8aad22">If0109</a>
      ,
      <a href="https://issuetracker.google.com/issues/479892735">b/479892735</a>
      )
    </li>
  </ul>
