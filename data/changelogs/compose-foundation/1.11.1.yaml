  <h3 id="1.11.1" data-text="Version 1.11.1" tabindex="-1">Version 1.11.1</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.foundation:foundation-*:1.11.1</code>
    is released. Version 1.11.1 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6ce2d81339d3380e021df09daaa55acb307ee912..5d39d0c458dbf0b3791cfaba65f42a27e442c15f/compose/foundation">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an issue in
      <code translate="no" dir="ltr">FlexBox</code>
      where items would not shrink correctly when exceeding the container bounds. (
      <a href="https://android-review.googlesource.com/#/q/Ia741d22a77ae3f33e45b2e65532a16a7131e413a">Ia741d</a>
      ,
      <a href="https://issuetracker.google.com/issues/480797591">b/480797591</a>
      )
    </li>
  </ul>
