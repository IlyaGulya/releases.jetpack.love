  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">ComposeFoundationFlags.isPausableCompositionInPrefetchEnabled</code>
      is disabled by default to address stability concerns. (
      <a href="https://android-review.googlesource.com/#/q/I739608e313cf41b74bee5ea900951b6c28652b85">I73960</a>
      ,
      <a href="https://issuetracker.google.com/482223006">b/482223006</a>
      ,
      <a href="https://issuetracker.google.com/488433633">b/488433633</a>
