  <h3 id="1.10.6" data-text="Version 1.10.6" tabindex="-1">Version 1.10.6</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.foundation:foundation-*:1.10.6</code>
    is released. Version 1.10.6 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e5be55ea7f9dceafc442ec739922936c1e056a33..deab088e55dabc3db4d0638d62ea3132fc51d69b/compose/foundation">these commits</a>
