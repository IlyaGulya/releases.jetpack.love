changelogHtml: |
  <h3 id="1.10.5" data-text="Version 1.10.5" tabindex="-1">Version 1.10.5</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.foundation:foundation-*:1.10.5</code>
    is released. Version 1.10.5 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6b6d8d062bfb0daa907101a196d1ea43d60ecfe2..e5be55ea7f9dceafc442ec739922936c1e056a33/compose/foundation">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an
      <code translate="no" dir="ltr">IndexOutOfBoundsException</code>
      in
      <code translate="no" dir="ltr">BasicTextField</code>
      when using
      <code translate="no" dir="ltr">OutputTransformation</code>
      and deleting text. (
      <a href="https://android-review.googlesource.com/#/q/I20ee17de095ffb2c598267bd7b1450651d2ce1f1">I20ee1</a>
      )
    </li>
  </ul>
