changelogHtml: |
  <h3 id="1.10.4" data-text="Version 1.10.4" tabindex="-1">Version 1.10.4</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.foundation:foundation-*:1.10.4</code>
    is released. Version 1.10.4 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/0d23f956849b578e041ea4245127d4007eae43be..6b6d8d062bfb0daa907101a196d1ea43d60ecfe2/compose/foundation">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed a regression bug where using an alignment modifier from a different scope (e.g.,
      <code translate="no" dir="ltr">ColumnScope.align</code>
      inside a
      <code translate="no" dir="ltr">Row</code>
      ) resulted in incorrect positioning. (
      <a href="https://android-review.googlesource.com/q/commit:3479c6b12d81762b0b262a949ffe2b8c5410642f">6888f2b</a>
      ,
      <a href="https://issuetracker.google.com/issues/477639546">b/477639546</a>
      )
    </li>
  </ul>
