#language=html
changelogHtml: |
  <h3 id="1.11.0-alpha06" data-text="Version 1.11.0-alpha06" tabindex="-1">Version 1.11.0-alpha06</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.foundation:foundation-*:1.11.0-alpha06</code>
    is released. Version 1.11.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cdf076c6abd0f3125cb0302756fcb77fe981ab7c..6e23fc0c137022098ae2d043778ffdc56402ba5e/compose/foundation">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Introduces an experimental style API that allows a consistent way to enable customization of composable functions. This API is under active development and may undergo significant changes before becoming stable. See included documentation for details of how to use this API. (
      <a href="https://android-review.googlesource.com/#/q/I7fed2e5cfceadffce739d5d522171c70aaf678d9">I7fed2</a>
      ,
      <a href="https://issuetracker.google.com/issues/455788242">b/455788242</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">Modifier.combinedClickable</code>
      is rewritten to not use suspend pointer input as an optimization. This feature is enabled by the flag you can disable if encounter a bug in the new implementation -
      <code translate="no" dir="ltr">ComposeFoundationFlags.isNonSuspendingPointerInputInCombinedClickableEnabled</code>
      .(
      <a href="https://android-review.googlesource.com/#/q/Iea684f0973b8407920f452b94795ae913ec05f28">Iea684</a>
      )
    </li>
  </ul>
  <p><strong>Known Issues</strong></p>
  <ul>
    <li>
      The
      <code translate="no" dir="ltr">Modifier.combinedClickable</code>
      rewrite introduces a regression for long click behavior that can cause deep presses to trigger repeated long clicks on some devices. This will be fixed in the next release, until then you can set
      <code translate="no" dir="ltr">ComposeFoundationFlags.isNonSuspendingPointerInputInCombinedClickableEnabled=false</code>
      to avoid this problem.
    </li>
  </ul>
