changelogHtml: |
  <h3 id="1.12.0-alpha01" data-text="Version 1.12.0-alpha01" tabindex="-1">Version 1.12.0-alpha01</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.foundation:foundation-*:1.12.0-alpha01</code>
    is released. Version 1.12.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ecc44700355708734de3756bf5e677323ae14ed1..df4b49eda6f6834b6bc4c8aa30a581fa577a511e/compose/foundation">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      A new flag
      <code translate="no" dir="ltr">isBasicTextFieldHeighInLinesOptimizationEnabled</code>
      was added to enable optimisation in calculating text field's height in the number of min/max lines. If should be on by default. If you find any regressions in the text field layout and disabling this flag fixes it, please file a bug to Compose team to investigate. (
      <a href="https://android-review.googlesource.com/#/q/Idffaeae4572fb2a657968561ea27357ab3a3ace4">Idffae</a>
      ,
      <a href="https://issuetracker.google.com/issues/486871837">b/486871837</a>
      ,
      <a href="https://issuetracker.google.com/issues/487546327">b/487546327</a>
      )
    </li>
    <li>
      Fix
      <code translate="no" dir="ltr">textfield</code>
      selection while editing text during gesture. (
      <a href="https://android-review.googlesource.com/#/q/I6fd9868b321a099dc9b04430dc62069d0c895077">I6fd98</a>
      ,
      <a href="https://issuetracker.google.com/issues/490509264">b/490509264</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">colorFilter</code>
      support to
      <code translate="no" dir="ltr">StyleScope</code>
      in Compose Foundation. (
      <a href="https://android-review.googlesource.com/#/q/I553a0bda0b23ec220d542b6a6b3278099b25980a">I553a0</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">textMotion</code>
      to
      <code translate="no" dir="ltr">StyleScope</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Id852338eca11f96a76fee08ba4449ab116b09bd5">Id8523</a>
      ,
      <a href="https://issuetracker.google.com/issues/482301609">b/482301609</a>
      )
    </li>
    <li>
      Adds additional
      <code translate="no" dir="ltr">KeyboardType</code>
      options to complete the set of supported keyboard options on Android, including date, time, datetime, signed decimal, and more. (
      <a href="https://android-review.googlesource.com/#/q/I3713e4fd9c4201aca7ae18debf22728cd08b598e">I3713e</a>
      ,
      <a href="https://issuetracker.google.com/issues/202353328">b/202353328</a>
      )
    </li>
    <li>
      Remove flag
      <code translate="no" dir="ltr">isNestedDraggablesTouchConflictFixEnabled</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I79e52bb1c60ac0c1111d213d21ec670a6f45dbd7">I79e52</a>
      ,
      <a href="https://issuetracker.google.com/issues/485966180">b/485966180</a>
      )
    </li>
    <li>
      Remove flag
      <code translate="no" dir="ltr">isDelayPressesUsingGestureConsumptionEnabled</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I533ddad246b4dc9feead3f109dd8ec096dfa1ae4">I533dd</a>
      ,
      <a href="https://issuetracker.google.com/issues/485966702">b/485966702</a>
      )
    </li>
    <li>
      Remove flag
      <code translate="no" dir="ltr">isBringIntoViewRltBouncyBehaviorInPagerFixEnabled</code>
      as it's been released in a stable version. (
      <a href="https://android-review.googlesource.com/#/q/I73fb27dc6e95d97c1b374e43e5678a4cb19c8047">I73fb2</a>
      ,
      <a href="https://issuetracker.google.com/issues/485967682">b/485967682</a>
      )
    </li>
    <li>
      Remove flag
      <code translate="no" dir="ltr">isCacheWindowRefillFixEnabled</code>
      as it's been released in a stable version. (
      <a href="https://android-review.googlesource.com/#/q/Ic75054674d701b8a8eede5b632caa7c0bc80dc06">Ic7505</a>
      ,
      <a href="https://issuetracker.google.com/issues/485967875">b/485967875</a>
      )
    </li>
    <li>
      Removes
      <code translate="no" dir="ltr">ComposeFoundationFlags#isNonSuspendingPointerInputInCombinedClickableEnabled</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I1f76c7c99a895986bea609a08c9b570e9b5a1851">I1f76c</a>
      ,
      <a href="https://issuetracker.google.com/issues/485966320">b/485966320</a>
      ,
      <a href="https://issuetracker.google.com/issues/477836055">b/477836055</a>
      )
    </li>
    <li>
      Added overloads for
      <code translate="no" dir="ltr">contentPadding</code>
      and
      <code translate="no" dir="ltr">externalPadding</code>
      in
      <code translate="no" dir="ltr">StyleScope</code>
      that accept
      <code translate="no" dir="ltr">PaddingValues</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I3a6cec53d43e4d22309bd37da4a02a16f2bd514b">I3a6ce</a>
      ,
      <a href="https://issuetracker.google.com/issues/493154098">b/493154098</a>
      )
    </li>
    <li>
      Changed the
      <code translate="no" dir="ltr">VelocityTracker</code>
      to use the implementation provided by the Android Framework (configurable with
      <code translate="no" dir="ltr">AndroidComposeUiFlags.isFrameworkVelocityTrackerEnabled</code>
      ). (
      <a href="https://android-review.googlesource.com/#/q/Ibc7e24c4840a9e6235240642945db374b8068e10">Ibc7e2</a>
      ,
      <a href="https://issuetracker.google.com/issues/359962905">b/359962905</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Changed how animations and properties are tracked to avoid overlapping animations for the same property. (
      <a href="https://android-review.googlesource.com/#/q/I4921f32f149283c1d22f1e6808a73d52155be4ac">I4921f</a>
      )
    </li>
    <li>
      Fixed the bug that context menu will crash when the
      <code translate="no" dir="ltr">TextField</code>
      (or selectable text) is in a Dialog. (
      <a href="https://android-review.googlesource.com/#/q/I21461d5d0659676c4b18370dc3db57e3f43e8a6e">I21461</a>
      ,
      <a href="https://issuetracker.google.com/issues/441759435">b/441759435</a>
      )
    </li>
    <li>
      Updated Compose
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
    <li>
      Fixed an issue in Grid where keyboard focus and accessibility traversal followed the item composition order rather than the visual Z-shaped placement order. (
      <a href="https://android-review.googlesource.com/#/q/I122a8ef9905023f5fc6944dca2f6a72280b85475">I122a8</a>
      ,
      <a href="https://issuetracker.google.com/issues/494096503">b/494096503</a>
      )
    </li>
    <li>
      Fixed a bug where the text selection toolbar would incorrectly hide when the start and end handles aligned horizontally (e.g. selecting across multiple lines ending on an empty line). (
      <a href="https://android-review.googlesource.com/#/q/I391d2f7d91999f24e6a2d1781c5a80cfb56f8d0a">I391d2</a>
      ,
      <a href="https://issuetracker.google.com/issues/497724722">b/497724722</a>
      )
    </li>
    <li>
      Fixed an issue in
      <code translate="no" dir="ltr">FlexBox</code>
      where items would not shrink correctly when exceeding the container bounds. (
      <a href="https://android-review.googlesource.com/#/q/Ia741d22a77ae3f33e45b2e65532a16a7131e413a">Ia741d</a>
      ,
      <a href="https://issuetracker.google.com/issues/480797591">b/480797591</a>
      )
    </li>
    <li>
      Bugfix for
      <code translate="no" dir="ltr">foregroundColor</code>
      not being correctly invalidated. (
      <a href="https://android-review.googlesource.com/#/q/I74abe341bed1ee265a735f0a7d08dc8f1883188c">I74abe</a>
      ,
      <a href="https://issuetracker.google.com/issues/493245886">b/493245886</a>
      )
    </li>
    <li>
      Fixes stale insets for the case where the inset listener for Compose is detached and reattached. (
      <a href="https://android-review.googlesource.com/#/q/I1e9052add06cee77ea66749619fed01091cb32fa">I1e905</a>
      ,
      <a href="https://issuetracker.google.com/issues/491346046">b/491346046</a>
      ,
      <a href="https://issuetracker.google.com/issues/486084139">b/486084139</a>
      )
    </li>
    <li>
      When a user moves the cursor outside the scrollable area, the cursor is now scrolled into the visible space. (
      <a href="https://android-review.googlesource.com/#/q/If694c0325af3704dda197b33f027946fcc69e658">If694c</a>
      ,
      <a href="https://issuetracker.google.com/issues/266094055">b/266094055</a>
      )
    </li>
  </ul>
  <h2 id="version_111_3" data-text="Version 1.11" tabindex="-1">Version 1.11</h2>
