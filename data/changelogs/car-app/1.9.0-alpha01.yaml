changelogHtml: |
  <h3 id="1.9.0-alpha01" data-text="Version 1.9.0-alpha01" tabindex="-1">Version 1.9.0-alpha01</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.car.app:app-*:1.9.0-alpha01</code>
    is released. New features added for more flexibility using templates:
  </p>
  <ul>
    <li>
      <strong>Spotlight Section</strong>
      : Showcases featured content collections or editorial recommendations by pairing a prominent hero image with adjacent condensed items.
    </li>
    <li>
      <strong>Condensed Items</strong>
      : Displays compact visual components that restrict text to one line, allowing more content to fit on the screen without overwhelming the driver.
    </li>
    <li>
      <strong>Chips</strong>
      : Provides compact, interactive elements used to filter content or trigger quick actions, supporting customizable shapes, borders, and colors.
    </li>
    <li>
      <strong>Minimized Control Panel</strong>
      : Implements a persistent, responsive, and condensed version of the Now Playing View (NPV) that automatically appears during active playback.
    </li>
    <li>
      <strong>Banners</strong>
      : Showcases special app experiences, new features, or important messages with distinct visual prominence through customizable background fills and corner radii.
    </li>
    <li>
      <strong>Section Header</strong>
      : Defines interactive titles, overlines, brand icons, and trailing action buttons for individual content groups within the sectioned item template.
    </li>
    <li>
      <strong>Expanded Header Layout</strong>
      : Upgrades standard headers within the sectioned item template to support rich layouts, such as background images that collapse on scroll and secondary actions.
    </li>
  </ul>
  <p>
    Version 1.9.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/df4b49eda6f6834b6bc4c8aa30a581fa577a511e..a056e8a54b6e77aecf81199c7986794dfddbfa8c/car/app">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">Banner</code>
      and
      <code translate="no" dir="ltr">BannerSection</code>
      which allows
      <code translate="no" dir="ltr">Banners</code>
      to be added to
      <code translate="no" dir="ltr">SectionedItemTemplate</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Id5dd246efebea883901eb4147ae80b9d1512db65">Id5dd2</a>
      ,
      <a href="https://issuetracker.google.com/issues/505494611">b/505494611</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">NavigationManager.setVoiceAssistantCapabilities</code>
      to allow navigation apps to send their voice assistant capabilities and consent status to the host. (
      <a href="https://android-review.googlesource.com/#/q/I34c93990dab6b5c560bc07dd463131b2feed2585">I34c93</a>
      ,
      <a href="https://issuetracker.google.com/issues/489625791">b/489625791</a>
      ,
      <a href="https://issuetracker.google.com/issues/486967456">b/486967456</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">NavigationVoiceAssistantCapabilities</code>
      API for navigation apps to declare supported voice actions, disruptions, and voice assistant consent status. (
      <a href="https://android-review.googlesource.com/#/q/I79d3ed19cc7ab683937af12a18e18aaa140043ca">I79d3e</a>
      ,
      <a href="https://issuetracker.google.com/issues/489625791">b/489625791</a>
      ,
      <a href="https://issuetracker.google.com/issues/486967456">b/486967456</a>
      )
    </li>
    <li>
      Introduce
      <code translate="no" dir="ltr">CarAppApiLevel</code>
      9 (
      <a href="https://android-review.googlesource.com/#/q/I87656fbeeedfa26a57fab56dbdfbb493c04bf5a0">I87656</a>
      ,
      <a href="https://issuetracker.google.com/issues/501233317">b/501233317</a>
      )
    </li>
    <li>
      Add an API to set the Shape of a
      <code translate="no" dir="ltr">Chip</code>
      or
      <code translate="no" dir="ltr">ChipSection</code>
      via
      <code translate="no" dir="ltr">ChipStyle</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I1fcfc7a93476c1ce79e972bb0a29e880c74ae76d">I1fcfc</a>
      ,
      <a href="https://issuetracker.google.com/issues/505086379">b/505086379</a>
      )
    </li>
    <li>
      Added new
      <code translate="no" dir="ltr">CondensedItem</code>
      and
      <code translate="no" dir="ltr">CondensedSection</code>
      APIs to support high-density layouts in
      <code translate="no" dir="ltr">SectionedItemTemplate</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Iabaa8ec8931db3b8b91da5db63c469434bd1109c">Iabaa8</a>
      ,
      <a href="https://issuetracker.google.com/issues/499350859">b/499350859</a>
      )
    </li>
    <li>
      Added experimental support for subtitles in Header and a new Background model. (
      <a href="https://android-review.googlesource.com/#/q/I66b5b6dbea58075b54e998c0d243341d6edb3803">I66b5b</a>
      )
    </li>
  </ul>
  <h2 id="version_18_2" data-text="Version 1.8" tabindex="-1">Version 1.8</h2>
