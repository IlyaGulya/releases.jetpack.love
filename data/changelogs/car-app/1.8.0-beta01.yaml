version: 1.8.0-beta01
releaseDate: 2026-04-22
#language=html
changelogHtml: |
  <h3 id="1.8.0-beta01" data-text="Version 1.8.0-beta01" tabindex="-1">Version 1.8.0-beta01</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.car.app:app-*:1.8.0-beta01</code>
    is released. Version 1.8.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4d752a0684fb1bf991cd0d15ebd3649ee8684ca1..df4b49eda6f6834b6bc4c8aa30a581fa577a511e/car/app">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Added support for Sectioned Item Template, allowing for more complex list and grid layouts.</li>
    <li>Enhanced Media Playback support.</li>
    <li>
      Added support for
      <code translate="no" dir="ltr">IMAGE_TYPE_MEDIUM</code>
      in
      <code translate="no" dir="ltr">RowImageType</code>
      .
    </li>
    <li>
      Added Intent Action
      <code translate="no" dir="ltr">ACTION_MEDIA_SHOW_PLAYBACK_VIEW</code>
      to launch media playback screens.
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added support for
      <code translate="no" dir="ltr">IMAGE_TYPE_MEDIUM</code>
      in
      <code translate="no" dir="ltr">RowImageType</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I761087836bccbdcb309bd88606bc8aba323b3115">I76108</a>
      )
    </li>
    <li>
      Add Intent Action
      <code translate="no" dir="ltr">ACTION_MEDIA_SHOW_PLAYBACK_VIEW</code>
      . When this action is sent to an Activity that supports it, it indicates that the application should launch its playback screen, or a relevant screen otherwise (
      <a href="https://android-review.googlesource.com/#/q/If29dbf6ef8fc5c59c7ab24e52b99c2d52c8a4e8b">If29db</a>
      ,
      <a href="https://issuetracker.google.com/issues/455949944">b/455949944</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Change default behavior of upcoming
      <code translate="no" dir="ltr">SectionedItemTemplate</code>
      to save scroll state across template refreshes and back actions (
      <a href="https://android-review.googlesource.com/#/q/I6c9cc0a686e043604d9097a46747672b837c678c">I6c9cc</a>
      ,
      <a href="https://issuetracker.google.com/issues/461256656">b/461256656</a>
      )
    </li>
  </ul>
