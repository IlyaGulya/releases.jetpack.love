changelogHtml: |
  <h3 id="1.6.1" data-text="Version 1.6.1" tabindex="-1">Version 1.6.1</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.tiles:tiles-*:1.6.1</code>
    is released. Version 1.6.1 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/50d7308cb64d77392a80697500e504863780ca24..81d018cf57252f81bc13a95eb11dc08f2e3bf723/wear/tiles">these commits</a>
    .
  </p>
  <p><strong>Vulnerability &amp; Security Fixes</strong></p>
  <ul>
    <li>
      Fixed a potential
      <code translate="no" dir="ltr">IllegalStateException</code>
      race condition in
      <code translate="no" dir="ltr">TilesConnectionBinder</code>
      that occurred during service connection callbacks called from unexpected threads.
    </li>
  </ul>
