changelogHtml: |
  <h3 id="1.6.0-alpha05" data-text="Version 1.6.0-alpha05" tabindex="-1">Version 1.6.0-alpha05</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.window:window-*:1.6.0-alpha05</code>
    is released. Version 1.6.0-alpha05 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/df4b49eda6f6834b6bc4c8aa30a581fa577a511e..b02d0e27599e3509a8bac35b0902665cf3150ab8/window">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add new
      <code translate="no" dir="ltr">EngagementMode.PRECISE_POINTER</code>
      API in
      <code translate="no" dir="ltr">WindowEngagementInfo</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I7e4d7b7a6cca4050ae2b679558e643b519038df5">I7e4d7</a>
      ,
      <a href="https://issuetracker.google.com/issues/474545085">b/474545085</a>
      )
    </li>
    <li>
      Deprecated
      <code translate="no" dir="ltr">WindowLayoutInfo.engagementModes</code>
      . Use the new
      <code translate="no" dir="ltr">WindowInfoTracker.windowEngagementInfo()</code>
      method to observe engagement mode changes. (
      <a href="https://android-review.googlesource.com/#/q/I500d14bbc0916c45ecb4bfdb56318985e679b383">I500d1</a>
      ,
      <a href="https://issuetracker.google.com/issues/491562425">b/491562425</a>
      )
    </li>
  </ul>
