changelogHtml: |
  <h3 id="1.6.0-alpha03" data-text="Version 1.6.0-alpha03" tabindex="-1">Version 1.6.0-alpha03</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.window:window-*:1.6.0-alpha03</code>
    is released. Version 1.6.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4d752a0684fb1bf991cd0d15ebd3649ee8684ca1..df4b49eda6f6834b6bc4c8aa30a581fa577a511e/window">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add APIs for engagement state control. (
      <a href="https://android-review.googlesource.com/#/q/I98a09d045a5d3d2aa33ec76d742e0ede625ace14">I98a09</a>
      ,
      <a href="https://issuetracker.google.com/issues/489793703">b/489793703</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">transferActivityToWindowArea</code>
      to
      <code translate="no" dir="ltr">transferToWindowArea</code>
      to be clearer about the behavior when triggering the feature. This also removes the session based behavior for this method as it's an operation that outlives the process that requests it. (
      <a href="https://android-review.googlesource.com/#/q/Ie7d6fa7258d323363748e25fade8d658c1f0f510">Ie7d6f</a>
      ,
      <a href="https://issuetracker.google.com/issues/271644150">b/271644150</a>
      ,
      <a href="https://issuetracker.google.com/issues/273807246">b/273807246</a>
      ,
      <a href="https://issuetracker.google.com/issues/272064992">b/272064992</a>
      ,
      <a href="https://issuetracker.google.com/issues/473870239">b/473870239</a>
      )
    </li>
    <li>
      Add safe method to get
      <code translate="no" dir="ltr">WindowMetrics</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I2adf80fd88226210735c4c2c168ef5d94dc4a782">I2adf8</a>
      ,
      <a href="https://issuetracker.google.com/issues/449386176">b/449386176</a>
      )
    </li>
    <li>
      Update methods in WM extensions for engagement mode for clarity. (
      <a href="https://android-review.googlesource.com/#/q/I219a4993d190e12c25db4d5d4aa1f410de3813a3">I219a4</a>
      ,
      <a href="https://issuetracker.google.com/issues/454438323">b/454438323</a>
      )
    </li>
    <li>
      Add helper methods to construct
      <code translate="no" dir="ltr">WindowSizeClassSets</code>
      in a grid form. (
      <a href="https://android-review.googlesource.com/#/q/I4d6236961e51ed10b3007941bb777401edaabc39">I4d623</a>
      ,
      <a href="https://issuetracker.google.com/issues/444174274">b/444174274</a>
      )
    </li>
    <li>
      Add API to get engagement mode. (
      <a href="https://android-review.googlesource.com/#/q/I9fef211338328f8901ceea7c2254471d320bb0ba">I9fef2</a>
      ,
      <a href="https://issuetracker.google.com/issues/423990404">b/423990404</a>
      )
    </li>
    <li>
      Add callback-based listeners directly to
      <code translate="no" dir="ltr">WindowLayoutInfo</code>
      and deprecate
      <code translate="no" dir="ltr">WindowInfoTrackerCallbackAdapter</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I1ff174d41234a38bb9ce1c1ddea95335d9d91e28">I1ff17</a>
      ,
      <a href="https://issuetracker.google.com/issues/423990404">b/423990404</a>
      )
    </li>
    <li>
      Deprecate
      <code translate="no" dir="ltr">WindowLayoutInfo</code>
      constructor in Extensions. (
      <a href="https://android-review.googlesource.com/#/q/I6ab65dbcd6c79320234d10ddee2a20724af2725c">I6ab65</a>
      ,
      <a href="https://issuetracker.google.com/issues/423990404">b/423990404</a>
      )
    </li>
    <li>
      Add extensions support for reporting engagement mode. (
      <a href="https://android-review.googlesource.com/#/q/I66211deee702eb826a298c37fe06da67970d329f">I66211</a>
      ,
      <a href="https://issuetracker.google.com/issues/423990404">b/423990404</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated Compose
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
  </ul>
