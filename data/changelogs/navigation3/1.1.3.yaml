changelogHtml: |
  <h3 id="1.1.3" data-text="Version 1.1.3" tabindex="-1">Version 1.1.3</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation3:navigation3-*:1.1.3</code>
    is released. Version 1.1.3 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/de2178359512aff61888c40fa499bbf88d5593eb..258497755004be3f071eb9572543a052b665b407/navigation3">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      <p>
        Fixed overlay animation issue where nested overlays such as
        <code translate="no" dir="ltr">ModalBottomSheet</code>
        are re-aniamting unexpectedly when the overlays above it are popped. (
        <a href="https://android-review.googlesource.com/#/q/Ia2b9e35ce6873dce20a8c9c8c7a51fa549174c9e">Ia2b9e</a>
        ,
        <a href="https://issuetracker.google.com/issues/502624496">b/502624496</a>
        )
      </p>
    </li>
    <li>
      <p>
        Bumped
        <code translate="no" dir="ltr">NavigationEvent</code>
        dependency to 1.1.2 which removed the no-op
        <code translate="no" dir="ltr">NavigationEventHandler</code>
        when in inspection mode to enable Predictive Back in Android Studio Previews.
      </p>
    </li>
  </ul>
