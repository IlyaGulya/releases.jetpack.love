changelogHtml: |
  <h3 id="1.2.0-alpha04" data-text="Version 1.2.0-alpha04" tabindex="-1">Version 1.2.0-alpha04</h3>
  <p>June 03, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation3:navigation3-*:1.2.0-alpha04</code>
    is released. Version 1.2.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ed0627453f51baab21d30d8ca8f74a50ff1cfa7a..d0d5e8b902b1ded8854df7d27fa1d1ee14e3bb4c/navigation3">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed overlay animation issue where nested overlays such as
      <code translate="no" dir="ltr">ModalBottomSheet</code>
      are re-aniamting unexpectedly when the overlays above it are popped. (
      <a href="https://android-review.googlesource.com/#/q/Ia2b9e35ce6873dce20a8c9c8c7a51fa549174c9e">Ia2b9e</a>
      ,
      <a href="https://issuetracker.google.com/issues/502624496">b/502624496</a>
      )
    </li>
  </ul>
