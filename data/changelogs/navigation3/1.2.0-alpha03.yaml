changelogHtml: |
  <h3 id="1.2.0-alpha03" data-text="Version 1.2.0-alpha03" tabindex="-1">Version 1.2.0-alpha03</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation3:navigation3-*:1.2.0-alpha03</code>
    is released. Version 1.2.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/26c899ea5b979b9ccfa4661a8e5482de3f13bcab..ed0627453f51baab21d30d8ca8f74a50ff1cfa7a/navigation3">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <p>
    Navigation 3 now supports deep links with
    <code translate="no" dir="ltr">DeepLinkRequest</code>
    and
    <code translate="no" dir="ltr">DeepLinkMatcher</code>
    :
  </p>
  <ul>
    <li>
      <p>
        <code translate="no" dir="ltr">DeepLinkRequest</code>
        a requested deep link containing a
        <code translate="no" dir="ltr">DeepLinkUri</code>
        and an optional mimeType or action(Android only). Along with the new class are companion functions to create an instance with either a
        <code translate="no" dir="ltr">uri</code>
        , a
        <code translate="no" dir="ltr">mimeType</code>
        , or an
        <code translate="no" dir="ltr">action</code>
        . The android platform also has a helper to build a request from an Intent. (
        <a href="https://android-review.googlesource.com/#/q/Iaaac9c02bc9ae16b5127256ad4ef2910c93f84b5">Iaaac9</a>
        ,
        <a href="https://issuetracker.google.com/issues/470282247">b/470282247</a>
        )
      </p>
      <div></div>
      <devsite-code>
        <pre class="devsite-click-to-copy" translate="no" dir="ltr" is-upgraded="" syntax="Kotlin"><code translate="no" dir="ltr"><span class="devsite-syntax-kd">val</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-nv">uriOnlyRequest</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-o">=</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-n">DeepLinkRequest</span><span class="devsite-syntax-p">.</span><span class="devsite-syntax-na">fromUriString</span><span class="devsite-syntax-p">(</span><span class="devsite-syntax-s">"https://sampledeeplink.com/home"</span><span class="devsite-syntax-p">)</span>
  <span class="devsite-syntax-kd">val</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-nv">uriAndMimeRequest</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-o">=</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-n">DeepLinkRequest</span><span class="devsite-syntax-p">.</span><span class="devsite-syntax-na">fromUriString</span><span class="devsite-syntax-p">(</span>
  <span class="devsite-syntax-w">  </span><span class="devsite-syntax-s">"https://sampledeeplink.com/user/profile?id=123"</span><span class="devsite-syntax-p">,</span>
  <span class="devsite-syntax-w">  </span><span class="devsite-syntax-s">"image/png"</span>
  <span class="devsite-syntax-p">)</span>
  </code></pre>
      </devsite-code>
    </li>
    <li>
      <p>
        <code translate="no" dir="ltr">DeepLinkMatcher</code>
        represents a deep link that can be matched with a
        <code translate="no" dir="ltr">DeepLinkRequest</code>
        . Each matcher instance is associated with the navigation key that supports this deep link. A navigation key can be associated with multiple matchers. Calling
        <code translate="no" dir="ltr">DeepLinkMatcher.match</code>
        will return a
        <code translate="no" dir="ltr">MatchResult</code>
        that contains the associated navigation key if match succeeds. There are two default
        <code translate="no" dir="ltr">DeepLinkMatcher</code>
        implementations:
        <code translate="no" dir="ltr">UriDeepLinkMatcher</code>
        for matching deep links based on Uri, and
        <code translate="no" dir="ltr">StaticKeyDeepLinkMatcher</code>
        for matching deep links with only
        <code translate="no" dir="ltr">DeepLinkMatcher.Filter</code>
        that match by a
        <code translate="no" dir="ltr">Boolean</code>
        . (
        <a href="https://android-review.googlesource.com/#/q/I3798e89108f17fcde2ff80be6bed9fc4e7a039ef">I3798e</a>
        ,
        <a href="https://issuetracker.google.com/issues/470282247">b/470282247</a>
        )
      </p>
    </li>
    <li>
      <p>
        <code translate="no" dir="ltr">UriDeepLinkMatcher</code>
        an opinionated implementation of
        <code translate="no" dir="ltr">DeepLinkMatcher</code>
        that handles deep link by matching
        <code translate="no" dir="ltr">DeepLinkUri</code>
        to a Serializable navigation key. It supports deep link arguments of Primitive types or Collection of primitives such as Lists, Arrays, and Sets. (
        <a href="https://android-review.googlesource.com/#/q/I1520b129d23f79f51843501a0468c02dc453b566">I1520b</a>
        ,
        <a href="https://issuetracker.google.com/issues/470282247">b/470282247</a>
        )
      </p>
      <div></div>
      <devsite-code>
        <pre class="devsite-click-to-copy" translate="no" dir="ltr" is-upgraded="" syntax="Kotlin"><code translate="no" dir="ltr"><span class="devsite-syntax-nd">@Serializable</span>
  <span class="devsite-syntax-kd">data</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-kd">class</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-nc">UserKey</span><span class="devsite-syntax-p">(</span><span class="devsite-syntax-kd">val</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-nv">id</span><span class="devsite-syntax-p">:</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-kt">Int</span><span class="devsite-syntax-p">):</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-n">NavKey</span>

  <span class="devsite-syntax-c1">// declare a deep link supported by UserKey</span>
  <span class="devsite-syntax-kd">val</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-nv">userMatcher</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-o">=</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-n">UriDeepLinkMatcher</span><span class="devsite-syntax-p">(</span>
  <span class="devsite-syntax-w">  </span><span class="devsite-syntax-n">uriPattern</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-o">=</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-s">"www.sampledeeplink.com/user?userId={id}"</span><span class="devsite-syntax-p">,</span>
  <span class="devsite-syntax-w">  </span><span class="devsite-syntax-n">serializer</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-o">=</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-n">serializer&lt;UserKey&gt;</span><span class="devsite-syntax-p">()</span>
  <span class="devsite-syntax-p">)</span>

  <span class="devsite-syntax-c1">// handle a requested deep link with fallback key</span>
  <span class="devsite-syntax-kd">val</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-nv">key</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-o">=</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-n">userMatcher</span><span class="devsite-syntax-p">.</span><span class="devsite-syntax-na">match</span><span class="devsite-syntax-p">(</span><span class="devsite-syntax-n">deepLinkRequest</span><span class="devsite-syntax-p">)</span><span class="devsite-syntax-o">?.</span><span class="devsite-syntax-na">key</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-o">?:</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-n">HomeKey</span>
  </code></pre>
      </devsite-code>
    </li>
    <li>
      <p>
        Added
        <code translate="no" dir="ltr">DeepLinkUri</code>
        which is a kotlin-multiplatform version of
        <code translate="no" dir="ltr">android.net.Uri</code>
        (
        <a href="https://android-review.googlesource.com/#/q/Id47259e21dafd72dd7ef127cc75713a886a93844">Id4725</a>
        ,
        <a href="https://issuetracker.google.com/issues/470282247">b/470282247</a>
        )
      </p>
    </li>
  </ul>
  <p><strong>Api Changes</strong></p>
  <ul>
    <li>
      Bumped to
      <code translate="no" dir="ltr">compileSdk 37</code>
      to match Compose's compileSdk
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed
      <code translate="no" dir="ltr">AnimatedBottomSheetSample</code>
      's
      <code translate="no" dir="ltr">IllegalArgumentException</code>
      when displaying multiple overlays. The sample
      <code translate="no" dir="ltr">SceneStrategy</code>
      will now correctly calculate the last non-
      <code translate="no" dir="ltr">OverlayScene</code>
      and display it under all the overlay scenes. (
      <a href="https://android-review.googlesource.com/#/q/If2281f0e4b7f1d5995dc49fa08a76f38b96fcdd3">If2281</a>
      ,
      <a href="https://issuetracker.google.com/issues/506733412">b/506733412</a>
      )
    </li>
    <li>
      Bumped
      <code translate="no" dir="ltr">NavigationEvent</code>
      dependency to 1.1.1 which removes the no-op NavigationEventHandler when in inspection mode to enable Predictive Back in Android Studio Previews. (
      <a href="https://android-review.googlesource.com/c/platform/frameworks/support/+/4064962">I487fd</a>
      )
    </li>
  </ul>
