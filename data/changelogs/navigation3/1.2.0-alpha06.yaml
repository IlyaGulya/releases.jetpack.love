changelogHtml: |
  <h3 id="1.2.0-alpha06" data-text="Version 1.2.0-alpha06" tabindex="-1">Version 1.2.0-alpha06</h3>
  <p>July 15, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation3:navigation3-*:1.2.0-alpha06</code>
    is released. Version 1.2.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/98641569d70837298aa655adb1e99af419b8702a..083bec4c4e0404ace62367346eec383b0a460a7d/navigation3">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed
      <code translate="no" dir="ltr">UriDeepLinkMatcher</code>
      documentation on uri fragments to clarify that fragments with wildcards will match any input but the input does not get extracted as arguments. (
      <a href="https://android-review.googlesource.com/#/q/I5ad9bd2e6ac24be88f9274c8803a2fe8067c86df">I5ad9b</a>
      ,
      <a href="https://issuetracker.google.com/issues/524677091">b/524677091</a>
      )
    </li>
    <li>
      Fixed
      <code translate="no" dir="ltr">UriDeepLinkMatcher</code>
      failing to match with a request if the uri pattern does not contain a scheme or does not start with double slash. For example,
      <code translate="no" dir="ltr">www.example.com/home</code>
      will now match with
      <code translate="no" dir="ltr">http://www.example.com/home</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ia6b6533f33b430a691508affbcc466d8ef28ff68">Ia6b65</a>
      ,
      <a href="https://issuetracker.google.com/issues/522791926">b/522791926</a>
      )
    </li>
  </ul>
