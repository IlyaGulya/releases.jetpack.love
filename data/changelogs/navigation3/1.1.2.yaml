changelogHtml: |
  <h3 id="1.1.2" data-text="Version 1.1.2" tabindex="-1">Version 1.1.2</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation3:navigation3-*:1.1.2</code>
    is released. Version 1.1.2 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/9bf9572b7c334c003a7a83981bdb2f8f6b7825ce..de2178359512aff61888c40fa499bbf88d5593eb/navigation3">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Bumped
      <code translate="no" dir="ltr">NavigationEvent</code>
      dependency to 1.1.1 which removed the no-op
      <code translate="no" dir="ltr">NavigationEventHandler</code>
      when in inspection mode to enable Predictive Back in Android Studio Previews.
    </li>
  </ul>
