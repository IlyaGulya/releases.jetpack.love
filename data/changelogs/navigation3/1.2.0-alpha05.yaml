changelogHtml: |
  <h3 id="1.2.0-alpha05" data-text="Version 1.2.0-alpha05" tabindex="-1">Version 1.2.0-alpha05</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation3:navigation3-*:1.2.0-alpha05</code>
    is released. Version 1.2.0-alpha05 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d0d5e8b902b1ded8854df7d27fa1d1ee14e3bb4c..98641569d70837298aa655adb1e99af419b8702a/navigation3">these commits</a>
    .
  </p>
  <p><strong>New API</strong></p>
  <ul>
    <li>
      Added a
      <code translate="no" dir="ltr">rememberResultEventBus</code>
      api which returns a
      <code translate="no" dir="ltr">ResultEventBus</code>
      that can be passed to
      <code translate="no" dir="ltr">rememberResultEventBusNavEntryDecorator</code>
      . This allows hoisting a
      <code translate="no" dir="ltr">ResultEventBus</code>
      outside the
      <code translate="no" dir="ltr">ResultEventBusNavEntryDecorator</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ia655ba3cd739841eb0820db60d089c951ba3b621">Ia655b</a>
      ,
      <a href="https://issuetracker.google.com/issues/516995400">b/516995400</a>
      )
    </li>
  </ul>
  <p>
    DeepLinkRequest - Added two KMP-compatible constructors - one that takes a DeepLinkUri and one that takes a raw string uri. (
    <a href="https://android-review.googlesource.com/#/q/I3c088a7b0b9c7e33368a38aef4def31583cb4a22">I3c088</a>
    ,
    <a href="https://issuetracker.google.com/issues/513200887">b/513200887</a>
    ,
    <a href="https://issuetracker.google.com/issues/522194187">b/522194187</a>
    ) - (Android only) Added a constructor that takes an
    <code translate="no" dir="ltr">Intent</code>
    . (
    <a href="https://android-review.googlesource.com/#/q/Ia0498ab9209688ccaeb28ebbf8b3da8ef2a9255e">Ia0498</a>
    ,
    <a href="https://issuetracker.google.com/issues/513200887">b/513200887</a>
    ,
    <a href="https://issuetracker.google.com/issues/522194187">b/522194187</a>
    ) - All constructors have an additional
    <code translate="no" dir="ltr">extras</code>
    field for a
    <code translate="no" dir="ltr">Map&lt;String, Any&gt;</code>
    to attach additional request information. (
    <a href="https://android-review.googlesource.com/#/q/If81d5766720fd14676d03a817f47a5a91be13260">If81d5</a>
    ,
    <a href="https://issuetracker.google.com/issues/513200887">b/513200887</a>
    ) - A new
    <code translate="no" dir="ltr">requestExtras</code>
    dsl is added as a type safe way to build a map of extras. The dsl provides a
    <code translate="no" dir="ltr">put</code>
    function to store pairs of
    <code translate="no" dir="ltr">RequestExtrasKey</code>
    to
    <code translate="no" dir="ltr">Any</code>
    . The
    <code translate="no" dir="ltr">Map&lt;String, Any&gt;.get(key)</code>
    extension function can be used to read from the map with a
    <code translate="no" dir="ltr">RequestExtrasKey</code>
    (
    <a href="https://android-review.googlesource.com/#/q/I5091c3821acb4fab2b8d908741522a246501fbe8">I5091c</a>
    ,
    <a href="https://issuetracker.google.com/issues/513200887">b/513200887</a>
    ) - (Android only) Added an
    <code translate="no" dir="ltr">ActionExtrasKey</code>
    and
    <code translate="no" dir="ltr">actionExtra</code>
    function to create an extras map with
    <code translate="no" dir="ltr">ActionExtrasKey</code>
    . (
    <a href="https://android-review.googlesource.com/#/q/Id0c902d432be2e7f4fd6e23f49ea87444815994e">Id0c90</a>
    , [b/513200887] - Added a
    <code translate="no" dir="ltr">MimeTypeExtrasKey</code>
    and
    <code translate="no" dir="ltr">mimeTypeExtra</code>
    function to create an extras map with
    <code translate="no" dir="ltr">MimeTypeExtrasKey</code>
    . (
    <a href="https://android-review.googlesource.com/#/q/I85131ce001439654dba5859909bb7b00dfb04b09">I85131</a>
    ,
    <a href="https://issuetracker.google.com/issues/513200887">b/513200887</a>
    )
  </p>
  <p>
    DeepLinkMatcher - Added
    <code translate="no" dir="ltr">DeepLinkMatcher.mimeTypeFilter</code>
    and
    <code translate="no" dir="ltr">DeepLinkMatcher.actionFilter</code>
    functions to create
    <code translate="no" dir="ltr">DeepLinkMatcher.Filters</code>
    that filter
    <code translate="no" dir="ltr">DeepLinkRequest</code>
    by
    <code translate="no" dir="ltr">mimeType</code>
    or
    <code translate="no" dir="ltr">action</code>
    (Android only). Both filters match by string equality and is case-insensitive. (
    <a href="https://android-review.googlesource.com/#/q/Ie7e67577a5be205ed0ed369622afc8231f3ef658">Ie7e67</a>
    ,
    <a href="https://issuetracker.google.com/issues/513191950">b/513191950</a>
    )
  </p>
  <p><strong>API Changes</strong></p>
  <p>
    DeepLinkRequest - Remove
    <code translate="no" dir="ltr">fromAction</code>
    factory function. To create a request associated with an Action, use the new
    <code translate="no" dir="ltr">DeepLinkRequest.extras</code>
    field.(
    <a href="https://android-review.googlesource.com/#/q/Id0c902d432be2e7f4fd6e23f49ea87444815994e">Id0c90</a>
    ,
    <a href="https://issuetracker.google.com/issues/513200887">b/513200887</a>
    ) - Removed
    <code translate="no" dir="ltr">fromMimeType</code>
    factory function. To create a request associated with a mimeType, use the new
    <code translate="no" dir="ltr">DeepLinkRequest.extras</code>
    field. (
    <a href="https://android-review.googlesource.com/#/q/I85131ce001439654dba5859909bb7b00dfb04b09">I85131</a>
    ,
    <a href="https://issuetracker.google.com/issues/513200887">b/513200887</a>
    ) - (Android-only) Removed
    <code translate="no" dir="ltr">fromIntent</code>
    factory function. Replaced by a new constructor that takes an Intent and extras map. (
    <a href="https://android-review.googlesource.com/#/q/Ia0498ab9209688ccaeb28ebbf8b3da8ef2a9255e">Ia0498</a>
    ,
    <a href="https://issuetracker.google.com/issues/513200887">b/513200887</a>
    ,
    <a href="https://issuetracker.google.com/issues/522194187">b/522194187</a>
    ) - Removed factory functions
    <code translate="no" dir="ltr">fromUri</code>
    and
    <code translate="no" dir="ltr">fromUriString</code>
    . Replaced by new constructors that either take a
    <code translate="no" dir="ltr">DeepLinkUri</code>
    or a raw string uri. (
    <a href="https://android-review.googlesource.com/#/q/Id5b6ff02d270b377f2c7dc5abd35633ed371d19e">Id5b6f</a>
    ,
    <a href="https://issuetracker.google.com/issues/522194187">b/522194187</a>
    ) -
    <code translate="no" dir="ltr">DeepLinkMatcher</code>
    ,
    <code translate="no" dir="ltr">DeepLinkMatcher.MatchResult</code>
    and their subclasses now take a covariant T (out T) so that hierarchical keys will not need type casting with used with Matchers. (
    <a href="https://android-review.googlesource.com/#/q/I1e45364f85d56731a1e11b8975932845f00f03d8">I1e453</a>
    ,
    <a href="https://issuetracker.google.com/issues/525094876">b/525094876</a>
    ) - The
    <code translate="no" dir="ltr">UriMatchResult</code>
    constructor param for arguments map now defaults to an empty map. (
    <a href="https://android-review.googlesource.com/#/q/I3acdd8c52f289a08dcc980f7ba8bb04fff6b1b21">I3acdd</a>
    ) -
    <code translate="no" dir="ltr">DeepLinkMatcher.Filter</code>
    abstract class is now a functional interface. The
    <code translate="no" dir="ltr">filter</code>
    constructor field is removed and instead should be passed directly in the subclass. (
    <a href="https://android-review.googlesource.com/#/q/I9eb7dca74c96b799e4357766434205c5fec1f4c8">I9eb7d</a>
    ,
    <a href="https://issuetracker.google.com/issues/522194187">b/522194187</a>
    )
  </p>
  <p>
    <strong>Bug Fixes</strong>
    - Fixed popped entry disappearing immediately when popping to an entry that has a nested metadata containing lambda values. (
    <a href="https://android-review.googlesource.com/#/q/Idb872842a3aa174716e063fb9dd16506b41a031e">Idb872</a>
    ,
    <a href="https://issuetracker.google.com/issues/520494430">b/520494430</a>
    ) - Fixed
    <code translate="no" dir="ltr">UriDeepLinkMatcher</code>
    so that it will return a null
    <code translate="no" dir="ltr">UriMatchResult</code>
    instead of throwing
    <code translate="no" dir="ltr">MissingFieldException</code>
    when required arguments are missing during matching. (
    <a href="https://android-review.googlesource.com/#/q/I5322fc616c79d5d5f07c7805de49a3e599b31b3d">I5322f</a>
    ,
    <a href="https://issuetracker.google.com/issues/524663005">b/524663005</a>
    ) - A
    <code translate="no" dir="ltr">UriDeeplinkMatcher</code>
    containing uri with https scheme can only be matched with requests that also have https scheme. (
    <a href="https://android-review.googlesource.com/#/q/Ibfe229d8d1f87a78bc20a61f636fd2d8546fde40">Ibfe22</a>
    ,
    <a href="https://issuetracker.google.com/issues/522304329">b/522304329</a>
    ) - Fix
    <code translate="no" dir="ltr">UriDeepLinkMatcher</code>
    to correctly identify
    <code translate="no" dir="ltr">http</code>
    scheme as a positive match with
    <code translate="no" dir="ltr">https</code>
    when matching a
    <code translate="no" dir="ltr">DeepLinkRequest</code>
    to a
    <code translate="no" dir="ltr">UriDeepLinkMatcher</code>
    . (
    <a href="https://android-review.googlesource.com/#/q/I3a62b073c8f0b7011b8d273108c37be619b253b9">I3a62b</a>
    ,
    <a href="https://issuetracker.google.com/issues/518804264">b/518804264</a>
    ) -
    <code translate="no" dir="ltr">DeepLinkMatcher.MatchResult</code>
    comparator now returns 0 by default when two results are equal. (
    <a href="https://android-review.googlesource.com/#/q/I48ddb462bd2cc20c8a5873cd197510544ae20f4c">I48ddb</a>
    ,
    <a href="https://issuetracker.google.com/issues/518841353">b/518841353</a>
    ) -
    <code translate="no" dir="ltr">UriDeepLinkMatcher</code>
    will now return a null
    <code translate="no" dir="ltr">UriMatchResult</code>
    instead of throwing an exception when match request fails due to missing required arguments. (
    <a href="https://android-review.googlesource.com/#/q/I669a7c413950739664300f55ba3540c79c9e8888">I669a7</a>
    ,
    <a href="https://issuetracker.google.com/issues/470282247">b/470282247</a>
    ,
    <a href="https://issuetracker.google.com/issues/512923412">b/512923412</a>
    )
  </p>
