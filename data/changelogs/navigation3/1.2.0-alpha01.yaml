changelogHtml: |
  <h3 id="1.2.0-alpha01" data-text="Version 1.2.0-alpha01" tabindex="-1">Version 1.2.0-alpha01</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation3:navigation3-*:1.2.0-alpha01</code>
    is released. Version 1.2.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/65530abc6f586edfe303825bb9b94c9fb64c4a0f..08c0997a220e855b5c82a220cf3cc68ce0ff144b/navigation3">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Accessing
      <code translate="no" dir="ltr">LocalNavAnimatedContentScope</code>
      from an
      <code translate="no" dir="ltr">OverlayScene</code>
      will no longer cause an
      <code translate="no" dir="ltr">IllegalStateException</code>
      as
      <code translate="no" dir="ltr">OverlayScenes</code>
      are now provided with a no-op
      <code translate="no" dir="ltr">LocalAnimatedContentScope</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I2f00c9c916cb77cfb85bb736ed8efc9ccedbd512">I2f00c</a>
      ,
      <a href="https://issuetracker.google.com/issues/486067688">b/486067688</a>
      )
    </li>
  </ul>
  <h2 id="version_11_2" data-text="Version 1.1" tabindex="-1">Version 1.1</h2>
