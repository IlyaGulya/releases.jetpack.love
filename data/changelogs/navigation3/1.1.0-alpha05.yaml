changelogHtml: |
  <h3 id="1.1.0-alpha05" data-text="Version 1.1.0-alpha05" tabindex="-1">Version 1.1.0-alpha05</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.navigation3:navigation3-*:1.1.0-alpha05</code>
    is released. Version 1.1.0-alpha05 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cdf076c6abd0f3125cb0302756fcb77fe981ab7c..c640b9aa8e30b5db9ee258561ad1fc4bc947e69d/navigation3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">NavDisplay</code>
      and
      <code translate="no" dir="ltr">rememberSceneState</code>
      now take a
      <code translate="no" dir="ltr">List&lt;SceneStrategy&gt;</code>
      instead of the previous single
      <code translate="no" dir="ltr">SceneStrategy</code>
      parameter that was chained by the
      <code translate="no" dir="ltr">then</code>
      infix. This more closely aligns with the
      <code translate="no" dir="ltr">List&lt;SceneDecoratorStrategy&lt;T&gt;&gt;</code>
      that both of these APIs already take. The previous APIs have been deprecated. (
      <a href="https://android-review.googlesource.com/#/q/I78b2c1c393a72b3f9fea3b615a0f23559e66809b">I78b2c</a>
      ,
      <a href="https://issuetracker.google.com/issues/482108465">b/482108465</a>
      )
    </li>
    <li>
      Added a metadata #contains operator to check if the metadata map contains the given
      <code translate="no" dir="ltr">NavMetadataKey</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ic30dbb34dba4d45f54868e40bd57edeb9f44668d">Ic30db</a>
      ,
      <a href="https://issuetracker.google.com/issues/485311895">b/485311895</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">NavMetadataKey</code>
      <code translate="no" dir="ltr">DialogKey</code>
      for
      <code translate="no" dir="ltr">DialogSceneStrategy</code>
      to use with Metadata DSL. (
      <a href="https://android-review.googlesource.com/#/q/Ic7a2685dd0882e1e66e8416de3fc8063de301ba6">Ic7a26</a>
      ,
      <a href="https://issuetracker.google.com/issues/483388817">b/483388817</a>
      )
    </li>
  </ul>
