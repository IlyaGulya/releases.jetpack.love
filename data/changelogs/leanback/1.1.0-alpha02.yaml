changelogHtml: |
  <h3 id="leanback-grid-1.1.0-alpha02" data-text="Version 1.1.0-alpha02" tabindex="-1">Version 1.1.0-alpha02</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-grid:1.1.0-alpha02</code>
    is released. Version 1.1.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe..75dd8c1a8287fd3324c8c3fe2c6bf0f376c41ef0/leanback/leanback-grid">these commits</a>
    .
  </p>
  <h4 id="leanback-grid-1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h4>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-grid:1.1.0-alpha01</code>
    is released. Version 1.1.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b7d439a209d4081f77ac6e05350e1f5f88a7db2b..32daa2dc7166667bee1833519b0a0b2b9319029d/leanback/leanback-grid">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">setSelectedPositionToUnalignedChild</code>
      and
      <code translate="no" dir="ltr">setSelectedPositionToAlignedChild</code>
      to change selected position without triggering scrolling. (
      <a href="https://android-review.googlesource.com/#/q/If53aba3d98c3e1c9af1d8c79de112c3f46c8a8bf">If53ab</a>
      ,
      <a href="https://issuetracker.google.com/issues/499067714">b/499067714</a>
      )
    </li>
    <li>
      Provides
      <code translate="no" dir="ltr">setFocusScrollStrategy(FOCUS_SCROLL_ALIGNED_AND_SNAP)</code>
      to support snapping in touch mode. (
      <a href="https://android-review.googlesource.com/#/q/I55fbcb516701c9c82d3d8d13a4b2844b4e118096">I55fbc</a>
      )
    </li>
    <li>
      Support
      <code translate="no" dir="ltr">SpanSizeLookup</code>
      with the ability to occupy all spans and padding area. (
      <a href="https://android-review.googlesource.com/#/q/I7f87c09c7c36ea27ae26f663ba85f9afe82fc17d">I7f87c</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">getNumColumns()</code>
      and
      <code translate="no" dir="ltr">getNumRows()</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Icd8c02a71de4dd511e6b5b5beef8d4238c5355b4">Icd8c0</a>
      ,
      <a href="https://issuetracker.google.com/issues/138276997">b/138276997</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix leaking child views after adapter is reset. (
      <a href="https://android-review.googlesource.com/#/q/I636a02fab7fc1e8506bd97212507a98a0409598c">I636a0</a>
      )
    </li>
    <li>
      Moving the default
      <code translate="no" dir="ltr">minSdk</code>
      from API 21 to API 23 (
      <a href="https://android-review.googlesource.com/#/q/Ibdfca5942dbb414ca07594ba240093db14aad4df">Ibdfca</a>
      ,
      <a href="https://issuetracker.google.com/issues/380448311">b/380448311</a>
      ,
      <a href="https://issuetracker.google.com/issues/435705964">b/435705964</a>
      ,
      <a href="https://issuetracker.google.com/issues/435705223">b/435705223</a>
      )
    </li>
  </ul>
  <h3 id="version_10_2" data-text="Version 1.0" tabindex="-1">Version 1.0</h3>
  <h4 id="leanback-grid-1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h4>
  <p>April 23, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-grid:1.0.0</code>
    is released. The version does not contain any change, it just moves it to stable.
  </p>
  <h4 id="leanback-grid-1.0.0-rc01" data-text="Version 1.0.0-rc01" tabindex="-1">Version 1.0.0-rc01</h4>
  <p>April 9, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-grid:1.0.0-rc01</code>
    is released. This does not have any major commits, and only moves the library to stable.
  </p>
  <h4 id="leanback-grid-1.0.0-alpha03" data-text="Version 1.0.0-alpha03" tabindex="-1">Version 1.0.0-alpha03</h4>
  <p>November 15, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-grid:1.0.0-alpha03</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/9ce75ea1baa2af10dda8f787f69c40c6654bcac1..312eb9f1ddece3a18317f18515a877e0e745cb2c/leanback/leanback-grid">Version 1.0.0-alpha03 contains these commits.</a>
  </p>
  <p><strong>Dependency Updates</strong></p>
  <ul>
    <li>
      Update to depend on
      <a href="/jetpack/androidx/releases/recyclerview#recyclerview-1.3.2">
        RecyclerView
        <code translate="no" dir="ltr">1.3.2</code>
      </a>
      to fix a common crash in TV apps (
      <a href="https://android-review.googlesource.com/#/q/I2c3a0f7ae43f72bd6a1dbbe30c269148f824a885">I2c3a0</a>
      ,
      <a href="https://issuetracker.google.com/issues/292114537">b/292114537</a>
      )
    </li>
  </ul>
  <h4 id="leanback-grid-1.0.0-alpha02" data-text="Version 1.0.0-alpha02" tabindex="-1">Version 1.0.0-alpha02</h4>
  <p>September 6, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-grid:1.0.0-alpha02</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cc1240d00b28657ee0c1a937f60430eaf1b03b09..9ce75ea1baa2af10dda8f787f69c40c6654bcac1/leanback/leanback-grid">Version 1.0.0-alpha02 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Made
      <code translate="no" dir="ltr">setFocusOutAllowed</code>
      public to allow the focus out properties to be set programmatically. (
      <a href="https://android-review.googlesource.com/#/q/Iebd996b00e7b04903261a025d77ddbbd9be81f90">Iebd99</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Ensure grids are treated as grids by a11y services by setting an a11y node info class name. (
      <a href="https://android-review.googlesource.com/#/q/I128122352a3fc4898cc6ba76d7da8166519bd648">I12812</a>
      )
    </li>
    <li>
      Add missing navigation sound when falling to smooth scroll. (
      <a href="https://android.googlesource.com/platform/frameworks/support/+/f4976759c48f5a0dd78b14c4e8b3f77645576e98">f49767</a>
      )
    </li>
  </ul>
  <h4 id="leanback-grid-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h4>
  <p>November 17, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-grid:1.0.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cc1240d00b28657ee0c1a937f60430eaf1b03b09/leanback/leanback-grid">Version 1.0.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Moved following classes/interfaces from
      <code translate="no" dir="ltr">leanback</code>
      to new
      <code translate="no" dir="ltr">leanback-grid</code>
      library:
      <code translate="no" dir="ltr">BaseGridView</code>
      ,
      <code translate="no" dir="ltr">FacetProvider</code>
      ,
      <code translate="no" dir="ltr">FacetProviderAdapter</code>
      ,
      <code translate="no" dir="ltr">GridLayoutManager</code>
      ,
      <code translate="no" dir="ltr">HorizontalGridView</code>
      ,
      <code translate="no" dir="ltr">ItemAlignmentFacet</code>
      ,
      <code translate="no" dir="ltr">OnChildLaidOutListener</code>
      ,
      <code translate="no" dir="ltr">OnChildSelectedListener</code>
      ,
      <code translate="no" dir="ltr">OnChildViewHolderSelectedListener</code>
      ,
      <code translate="no" dir="ltr">VerticalGridView</code>
      ,
      <code translate="no" dir="ltr">ViewHolderTask</code>
      ,
      <code translate="no" dir="ltr">Visibility</code>
      . This change preserves binary compatibility. Anyone willing to use just the grid view components of leanback can directly use
      <code translate="no" dir="ltr">leanback-grid</code>
      as a dependency. (
      <a href="https://android-review.googlesource.com/#/q/If1e490c6a36ba9e8b2e6de7aa0774c5bc374e50d">If1e49</a>
      )
    </li>
  </ul>
  <h2 id="leanback_3" data-text="Leanback" tabindex="-1">Leanback</h2>
  <h3 id="version_13_2" data-text="Version 1.3" tabindex="-1">Version 1.3</h3>
  <h4 id="leanback-1.3.0-alpha02" data-text="Version 1.3.0-alpha02" tabindex="-1">Version 1.3.0-alpha02</h4>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback:1.3.0-alpha02</code>
    is released. Version 1.3.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe..ef1fe5fb3a6f1ba5ecfb6f1d56189249df0abe7f/leanback/leanback">these commits</a>
    .
  </p>
  <h4 id="1.3.0-alpha01" data-text="Version 1.3.0-alpha01" tabindex="-1">Version 1.3.0-alpha01</h4>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback:1.3.0-alpha01</code>
    is released. Version 1.3.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b7d439a209d4081f77ac6e05350e1f5f88a7db2b..32daa2dc7166667bee1833519b0a0b2b9319029d/leanback/leanback">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Support
      <code translate="no" dir="ltr">SpanSizeLookup</code>
      with the ability to occupy all spans and padding area. (
      <a href="https://android-review.googlesource.com/#/q/I7f87c09c7c36ea27ae26f663ba85f9afe82fc17d">I7f87c</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">getNumColumns()</code>
      and
      <code translate="no" dir="ltr">getNumRows()</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Icd8c02a71de4dd511e6b5b5beef8d4238c5355b4">Icd8c0</a>
      ,
      <a href="https://issuetracker.google.com/issues/138276997">b/138276997</a>
      )
    </li>
    <li>
      Removing obsolete
      <code translate="no" dir="ltr">@RequiresApi(21)</code>
      annotations (
      <a href="https://android-review.googlesource.com/#/q/Ic47923dcc82f4b7c4638fadb10c2c0268b414fcd">Ic4792</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix leaking child views after adapter is reset. (
      <a href="https://android-review.googlesource.com/#/q/I636a02fab7fc1e8506bd97212507a98a0409598c">I636a0</a>
      )
    </li>
    <li>
      Moving the default
      <code translate="no" dir="ltr">minSdk</code>
      from API 21 to API 23 (
      <a href="https://android-review.googlesource.com/#/q/Ibdfca5942dbb414ca07594ba240093db14aad4df">Ibdfca</a>
      ,
      <a href="https://issuetracker.google.com/issues/380448311">b/380448311</a>
      ,
      <a href="https://issuetracker.google.com/issues/435705964">b/435705964</a>
      ,
      <a href="https://issuetracker.google.com/issues/435705223">b/435705223</a>
      )
    </li>
  </ul>
  <h3 id="version_11_6" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="1.1.0-rc02" data-text="Version 1.1.0-rc02" tabindex="-1">Version 1.1.0-rc02</h4>
