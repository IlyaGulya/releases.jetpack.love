  <h4 id="1.2.0-alpha01" data-text="Version 1.2.0-alpha01" tabindex="-1">Version 1.2.0-alpha01</h4>
  <p>July 21, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback:1.2.0-alpha01</code>
    and
