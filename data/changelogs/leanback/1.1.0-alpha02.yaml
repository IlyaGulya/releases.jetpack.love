      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Made leanback GridLayoutManager public and exchangeable in BaseGridView. (
      <a href="https://android.googlesource.com/platform/frameworks/support/+/f316b5dc1f24099be9115c6c39ab62b78e33a6d0">f316b5</a>
      )
    </li>
  </ul>
  <h3 id="version_11_7" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>April 7, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback:1.1.0-rc01</code>
    and
    <code translate="no" dir="ltr">androidx.leanback:leanback-preference:1.1.0-rc01</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/38a668d3ef95f40ad28d6e735a2c3eb95ae4cf63..bf8af1081ee3ce8c6dbea9e75c37f53dd8c0553b/leanback">Version 1.1.0-rc01 contains these commits.</a>
  </p>
  <ul>
    <li>
      Fixed view leaks in
      <code translate="no" dir="ltr">SearchSupportFragment()</code>
      (
      <a href="https://android.googlesource.com/platform/frameworks/support/+/6c47a1e08882d4932ace063ff2d1ed11f0fe37da">6c47a1</a>
      ,
      <a href="https://issuetracker.google.com/issues/171909417">b/171909417</a>
      )
    </li>
    <li>
      Made speech recognizer optional for
      <code translate="no" dir="ltr">SearchSupportFragment</code>
      (
      <a href="https://android.googlesource.com/platform/frameworks/support/+/4ff949b813f4954533390ed87672771c45d60bc4">4ff949</a>
      ,
      <a href="https://issuetracker.google.com/issues/169936953">b/169936953</a>
      )
    </li>
  </ul>
  <h2 id="leanback-paging_2" data-text="Leanback-Paging" tabindex="-1">Leanback-Paging</h2>
  <h3 id="version_11_8" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="1.1.0" data-text="Version 1.1.0" tabindex="-1">Version 1.1.0</h4>
  <p>April 23, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-paging:1.1.0</code>
    and
    <code translate="no" dir="ltr">androidx.leanback:leanback-tab:1.1.0</code>
    are released. The version does not contain any change, it just moves it to stable.
  </p>
  <h4 id="1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>April 9, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-paging:1.1.0-rc01</code>
    and
    <code translate="no" dir="ltr">androidx.leanback:leanback-tab:1.1.0-rc01</code>
    are released. This does not have any major commits, and only moves the library to stable.
  </p>
  <h4 id="leanback-paging-1.1.0-alpha11" data-text="Version 1.1.0-alpha11" tabindex="-1">Version 1.1.0-alpha11</h4>
  <p>November 15, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-paging:1.1.0-alpha11</code>
    is released with no changes.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/9ce75ea1baa2af10dda8f787f69c40c6654bcac1..312eb9f1ddece3a18317f18515a877e0e745cb2c/leanback/leanback-paging">Version 1.1.0-alpha11 contains these commits.</a>
  </p>
  <h4 id="leanback-paging-1.1.0-alpha10" data-text="Version 1.1.0-alpha10" tabindex="-1">Version 1.1.0-alpha10</h4>
  <p>September 6, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-paging:1.1.0-alpha10</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cc1240d00b28657ee0c1a937f60430eaf1b03b09..9ce75ea1baa2af10dda8f787f69c40c6654bcac1/leanback/leanback-paging">Version 1.1.0-alpha10 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Update leanback-paging to Paging 3.1.0. (
      <a href="https://android.googlesource.com/platform/frameworks/support/+/882ed18ddf35bf0189622c10ec4205261fdfa1f6">882ed1</a>
      )
    </li>
  </ul>
  <h4 id="leanback-paging-1.1.0-alpha09" data-text="Version 1.1.0-alpha09" tabindex="-1">Version 1.1.0-alpha09</h4>
  <p>November 17, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-paging:1.1.0-alpha09</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/97264aa4532db7f7db1ffb3f42f3a9204971dbfc..cc1240d00b28657ee0c1a937f60430eaf1b03b09/leanback/leanback-paging">Version 1.1.0-alpha09 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Updated to use latest paging APIs.</li>
  </ul>
  <h4 id="leanback-paging-1.1.0-alpha08" data-text="Version 1.1.0-alpha08" tabindex="-1">Version 1.1.0-alpha08</h4>
  <p>July 21, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-paging:1.1.0-alpha08</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6207afb1646d302c5d29c2c67d332b48db87fb27..97264aa4532db7f7db1ffb3f42f3a9204971dbfc/leanback/leanback-paging">Version 1.1.0-alpha08 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">.peek()</code>
      and
      <code translate="no" dir="ltr">.snapshot()</code>
      APIs to PagingDataAdapter, allowing inspection of presented data without triggering page fetch. (
      <a href="https://android-review.googlesource.com/#/q/Ic89171a55a10a73b585f130d2a9eb1b8927db1fd">Ic8917</a>
      )
    </li>
  </ul>
  <h4 id="leanback-paging-1.1.0-alpha07" data-text="Version 1.1.0-alpha07" tabindex="-1">Version 1.1.0-alpha07</h4>
  <p>January 13, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-paging:1.1.0-alpha07</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/38a668d3ef95f40ad28d6e735a2c3eb95ae4cf63..6207afb1646d302c5d29c2c67d332b48db87fb27/leanback/leanback-paging">Version 1.1.0-alpha07 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Updated the convenience properties,
      <code translate="no" dir="ltr">CombinedLoadStates.refresh</code>
      ,
      <code translate="no" dir="ltr">CombinedLoadStates.prepend</code>
      ,
      <code translate="no" dir="ltr">CombinedLoadStates.append</code>
      to only transition from
      <code translate="no" dir="ltr">Loading</code>
      to
      <code translate="no" dir="ltr">NotLoading</code>
      after both mediator and source load states are
      <code translate="no" dir="ltr">NotLoading</code>
      to ensure the remote update has been applied. (
      <a href="https://android-review.googlesource.com/#/q/I656192632c4ce073ac8e54a3f1c597bbbae77002">I65619</a>
      )
    </li>
  </ul>
  <h4 id="1.1.0-beta01" data-text="Leanback Leanback-Preference Leanback-Tab Version 1.1.0-beta01" tabindex="-1">Leanback Leanback-Preference Leanback-Tab Version 1.1.0-beta01</h4>
  <p>December 2, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback:1.1.0-beta01</code>
    ,
    <code translate="no" dir="ltr">androidx.leanback:leanback-preference:1.1.0-beta01</code>
    , and
    <code translate="no" dir="ltr">androidx.leanback:leanback-tab:1.1.0-beta01</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/f5a2c7477391539d8bc9f65a8f0db1e8a7bf2cf5..38a668d3ef95f40ad28d6e735a2c3eb95ae4cf63/leanback">Version 1.1.0-beta01 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix view leak when pushing VerticalGridSupportFragment to backstack (
      <a href="https://android-review.googlesource.com/#/q/Iaac695b36b0c2e1bddddb2e496ad0fc5038d8e1e">Iaac69</a>
      ,
      <a href="https://issuetracker.google.com/issues/171909417">b/171909417</a>
      )
    </li>
    <li>
      Fix view leak when pushing BrowseSupportFragment to backstack (
      <a href="https://android-review.googlesource.com/#/q/I344835e2d429a7bacd2416077f054fee20f59dcb">I34483</a>
      ,
      <a href="https://issuetracker.google.com/issues/171909417">b/171909417</a>
      )
    </li>
    <li>
      Fix view leak when pushing DetailsSupportFragment to backstack (
      <a href="https://android-review.googlesource.com/#/q/Ifec9e735bddd83831a07119c26c1e80c71cd0a6d">Ifec9e</a>
      ,
      <a href="https://issuetracker.google.com/issues/171909417">b/171909417</a>
      )
    </li>
    <li>
      Fix view leak when pushing RowsSupportFragment to backstack (
      <a href="https://android-review.googlesource.com/#/q/I985d4b09ef8d137f6f21590fdef615d7dca322cd">I985d4</a>
      ,
      <a href="https://issuetracker.google.com/issues/171909417">b/171909417</a>
      )
    </li>
    <li>
      Fix GuidedStepSupportFragment background transition animation. (
      <a href="https://android-review.googlesource.com/#/q/I86d156db92dd90b49f7efbbb4efa0595602ff505">I86d15</a>
      ,
      <a href="https://issuetracker.google.com/issues/173647688">b/173647688</a>
      )
    </li>
    <li>
      Fix IllegalArgumentException when restoring GuidedStepSupportFragment (
      <a href="https://android-review.googlesource.com/#/q/Ic829f9256c1bd825a04bdeb81e673aa2a75527db">Ic829f</a>
      ,
      <a href="https://issuetracker.google.com/issues/172000115">b/172000115</a>
      )
    </li>
    <li>
      Fix GridLayoutManager NullPointerException in findContainingItemView() when clearFocus() (
      <a href="https://android-review.googlesource.com/#/q/Id0e42555cfe720eb291f0c80dc3dab340845783e">Id0e42</a>
      )
    </li>
  </ul>
  <h4 id="leanback-paging-1.1.0-alpha06" data-text="Version 1.1.0-alpha06" tabindex="-1">Version 1.1.0-alpha06</h4>
  <p>December 2, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-paging:1.1.0-alpha06</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/f5a2c7477391539d8bc9f65a8f0db1e8a7bf2cf5..38a668d3ef95f40ad28d6e735a2c3eb95ae4cf63/leanback/leanback-paging">Version 1.1.0-alpha06 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <p>dataRefreshFlow / dataRefreshListener APIs have been removed as they are redundant with loadStateFlow / Listener updates. For those migrating, the loadStateFlow equivalent is:</p>
      <div></div>
      <devsite-code>
        <pre class="devsite-click-to-copy" translate="no" dir="ltr" is-upgraded="" syntax="Kotlin"><code translate="no" dir="ltr"><span class="devsite-syntax-n">loadStateFlow</span><span class="devsite-syntax-p">.</span><span class="devsite-syntax-na">distinctUntilChangedBy</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-p">{</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-nb">it</span><span class="devsite-syntax-p">.</span><span class="devsite-syntax-na">refresh</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-p">}</span>
  <span class="devsite-syntax-w">    </span><span class="devsite-syntax-p">.</span><span class="devsite-syntax-na">filter</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-p">{</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-nb">it</span><span class="devsite-syntax-p">.</span><span class="devsite-syntax-na">refresh</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-k">is</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-n">NotLoading</span><span class="devsite-syntax-w"> </span><span class="devsite-syntax-p">}</span>
  </code></pre>
      </devsite-code>
      <p>
        (
        <a href="https://android-review.googlesource.com/#/q/Ib55709c3f560711200a9eac5a4931d57c76053af">Ib5570</a>
        ,
        <a href="https://issuetracker.google.com/issues/173530908">b/173530908</a>
        )
      </p>
    </li>
    <li>
      <p>
        Full deprecate dataRefreshFlow / Listener methods with a replaceWith clause. (
        <a href="https://android-review.googlesource.com/#/q/I6e2dd23b100bc1186dc652e5076b2d15b191c436">I6e2dd</a>
        )
      </p>
    </li>
  </ul>
  <h4 id="1.1.0-alpha05" data-text="Version 1.1.0-alpha05" tabindex="-1">Version 1.1.0-alpha05</h4>
  <p>October 1, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback-*:1.1.0-alpha05</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b1ae31bb42f205dd2c4cf3c1aaf6d6e00ae84038..f5a2c7477391539d8bc9f65a8f0db1e8a7bf2cf5/leanback">Version 1.1.0-alpha05 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Let A11Y navigation respect GridLayoutManager focusOutFront and focusOutEnd attributes. (
      <a href="https://issuetracker.google.com/issues/161390258">b/161390258</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix View leak in
      <code translate="no" dir="ltr">GuidanceStylist.onDestroyView()</code>
      (
      <a href="https://issuetracker.google.com/issues/164841457">b/164841457</a>
      )
    </li>
    <li>
      Fix ConcatAdapter in GridLayoutManager (
      <a href="https://issuetracker.google.com/issues/165694295">b/165694295</a>
      )
    </li>
    <li>
      leanback-tab: Javadoc improvements and minor code refactoring (
      <a href="https://android-review.googlesource.com/c/platform/frameworks/support/+/1393383">aosp/1393383</a>
      )
    </li>
    <li>
      Remove setRecyclerView method from API which was added when same method was deprecated on RecyclerView. Update leanback lib to use RecyclerView's new addRecyclerListener API method. (
      <a href="https://android-review.googlesource.com/#/q/I14798462b11be3ac2bd0b73fcfe28711effa4379">I14798</a>
      )
    </li>
  </ul>
  <h4 id="1.1.0-alpha04" data-text="Version 1.1.0-alpha04" tabindex="-1">Version 1.1.0-alpha04</h4>
  <p>August 11, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback:1.1.0-alpha04</code>
    ,
    <code translate="no" dir="ltr">androidx.leanback:leanback-paging:1.1.0-alpha04</code>
    ,
    <code translate="no" dir="ltr">androidx.leanback:leanback-preference:1.1.0-alpha04</code>
    , and
    <code translate="no" dir="ltr">androidx.leanback:leanback-tab:1.1.0-alpha04</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/740cde70237dd276f8ad66dfe9528b1cdb5d54bb..b1ae31bb42f205dd2c4cf3c1aaf6d6e00ae84038/leanback">Version 1.1.0-alpha04 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      The LeanbackTabLayout provides the top navigation (typically displayed horizontally across the top of the app) in the
      <a href="https://developer.android.com/training/tv/playback/browse">browse experience</a>
      .
    </li>
    <li>
      Paging for Leanback simplifies adding paging support to a
      <a href="https://developer.android.com/reference/kotlin/androidx/recyclerview/widget/RecyclerView.Adapter">RecyclerView.Adapter</a>
      .
    </li>
    <li>Added appcompat themes for leanback that will simplify the creation of a single code base between mobile and TV.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added adapter based on asyncpagingdatadiffer for leanback widgets (
      <a href="https://android-review.googlesource.com/#/q/If0dfed7c38fd4a20271e9a12d45ab71d3eba0c26">If0dfe</a>
      )
    </li>
    <li>
      Adding a customized TabLayout to be used as the top navigation bar in leanback (
      <a href="https://android-review.googlesource.com/#/q/I1e3048d300106ad0b0f9ef55f14e7070793a579a">I1e304</a>
      )
    </li>
  </ul>
  <h4 id="1.1.0-alpha03" data-text="Version 1.1.0-alpha03" tabindex="-1">Version 1.1.0-alpha03</h4>
  <p>December 18, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback:1.1.0-alpha03</code>
    and
    <code translate="no" dir="ltr">androidx.leanback:leanback-preference:1.1.0-alpha03</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/7d95cd5e6358dee8cab72c39e4e99e412c7a450c..740cde70237dd276f8ad66dfe9528b1cdb5d54bb/leanback">Leanback Version 1.1.0-alpha03 contains these commits</a>
    and
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/049b727631e94ea7bd14c2568b65da29a0add661..740cde70237dd276f8ad66dfe9528b1cdb5d54bb/leanback-preference">Leanback-Preference Version 1.1.0-alpha03 contains these commits</a>
    .
  </p>
  <p><strong>New features</strong></p>
  <ul>
    <li>
      BaseGridView now supports custom scrolling speeds (
      <a href="https://android-review.googlesource.com/c/952718">aosp/952718</a>
      )
    </li>
    <li>
      Made guided step item touch more friendly (
      <a href="https://android-review.googlesource.com/c/1167964">aosp/1167964</a>
      )
    </li>
    <li>
      Exposed the BaseGridView OnLayoutCompleteListener so apps can perform View transformations after the layout pass. (
      <a href="https://android-review.googlesource.com/c/1164409">aosp/1164409</a>
      )
    </li>
  </ul>
  <p><strong>API changes</strong></p>
  <ul>
    <li>
      Added a new API to allow custom BaseGridView scrolling speeds (
      <a href="https://android-review.googlesource.com/c/952718">aosp/952718</a>
      )
    </li>
    <li>
      Added a new API to add OnLayoutCompleteListener in BaseGridView (
      <a href="https://android-review.googlesource.com/c/1164409">aosp/1164409</a>
      )
    </li>
  </ul>
  <p><strong>Bug fixes</strong></p>
  <ul>
    <li>
      Fixed a bug where fast layout pass doesn’t update the alignment of a child. (
      <a href="https://android-review.googlesource.com/c/1122745">aosp/1122745</a>
      )
    </li>
    <li>
      Fixed a stack overflow crash in the Picker widget when the focus is changing (
      <a href="https://android-review.googlesource.com/c/1168473">aosp/1168473</a>
      )
    </li>
  </ul>
  <p><strong>Dependency changes</strong></p>
  <ul>
    <li>
      Leanback-preference: pinned the dependency of
      <code translate="no" dir="ltr">androidx.preference</code>
      to
      <code translate="no" dir="ltr">1.1.0</code>
      (
      <a href="https://android-review.googlesource.com/c/1181902">aosp/1181902</a>
      )
    </li>
  </ul>
  <h4 id="1.1.0-alpha02" data-text="Version 1.1.0-alpha02" tabindex="-1">Version 1.1.0-alpha02</h4>
  <p>May 7, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback:1.1.0-alpha02</code>
    and
    <code translate="no" dir="ltr">androidx.leanback:leanback-preference:1.1.0-alpha02</code>
    are released. The commits included in this version can at
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/612658bcef0ed83d388dc2d49377854857614d7f..7d95cd5e6358dee8cab72c39e4e99e412c7a450c/leanback">leanback commits</a>
    and
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/393699c416e547076b19186fef4968a64cf4971a..049b727631e94ea7bd14c2568b65da29a0add661/leanback-preference">leanback-preference commits</a>
    .
  </p>
  <p><strong>New features</strong></p>
  <ul>
    <li>RowsSupportFragment is now allowed to share ViewHolders with other RowsSupportFragments, which would improve performance for a multiple-tab UI.</li>
  </ul>
  <p><strong>API changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">PlaybackSupportFragment.setShowOrHideControlsOverlayOnUserInteraction()</code>
      to allow app disable auto hide/show playback controls when DPAD is pressed.
    </li>
  </ul>
  <p><strong>Bug fixes</strong></p>
  <ul>
    <li>Fixed broken leanback-preference Fragments theme due to a change in preference library.</li>
    <li>Fix navigation bug when BACK key is pressed on SearchEditText</li>
  </ul>
  <h4 id="1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h4>
  <p>January 30, 2019</p>
  <p>
    <code translate="no" dir="ltr">androidx.leanback:leanback 1.1.0-alpha01</code>
    is released.
  </p>
  <p><strong>New features</strong></p>
  <ul>
    <li>Added PinPicker widget.</li>
    <li>Outline clipping is now disabled by default on low-ram device.</li>
    <li>
      Allowed customized PlaybackSupportFragment showing/hiding controls behavior (
      <a href="https://issuetracker.google.com/122918400">b/122918400</a>
      )
    </li>
  </ul>
  <p><strong>API changes</strong></p>
  <ul>
    <li>Framework fragments were deprecated.</li>
    <li>New PinPicker class.</li>
  </ul>
  <p><strong>Bug fixes</strong></p>
  <ul>
    <li>
      Fixed a fragment transaction crash after
      <code translate="no" dir="ltr">BrowseSupportFragment</code>
      is stopped
    </li>
    <li>
      <code translate="no" dir="ltr">GuidedStepSupportFragment</code>
      should not clip items in
      <code translate="no" dir="ltr">VerticalGridView</code>
      (
      <a href="https://android-review.googlesource.com/787396">aosp/787396</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">onCreateActionsStylist()</code>
      and
      <code translate="no" dir="ltr">onCreateGuidanceStylist()</code>
      were moved from constructor to
      <code translate="no" dir="ltr">GuidedSupportFragment.onCreate()</code>
      (
      <a href="https://android-review.googlesource.com/787397">aosp/787397</a>
      )
    </li>
    <li>
      Fixed a bug where
