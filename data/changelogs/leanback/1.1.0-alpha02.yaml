  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed details fragment background bug. (
      <a href="https://android.googlesource.com/platform/frameworks/support/+/40d8e3cd2f78a1622d1a806cf910c7c961837ed9">40d8e3</a>
      )
