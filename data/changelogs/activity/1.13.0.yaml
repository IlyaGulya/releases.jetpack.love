#language=html
changelogHtml: |
  <h3 id="1.13.0" data-text="Version 1.13.0" tabindex="-1">Version 1.13.0</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.activity:activity:1.13.0</code>
    ,
    <code translate="no" dir="ltr">androidx.activity:activity-compose:1.13.0</code>
    , and
    <code translate="no" dir="ltr">androidx.activity:activity-ktx:1.13.0</code>
    are released. Version 1.13.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d1ba6dcc5e581e7f1d2cc18466e48d5044a58d4e..475afe04599ffc0893939effda40187916c4ceb0/activity">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.12.0:</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">ComponentActivity</code>
      now implements the
      <code translate="no" dir="ltr">OnPictureInPictureUiStateChangedProvider</code>
      interface which means it can now integrate with the new
      <code translate="no" dir="ltr">core:core-pip</code>
      artifact that allows allow any component to receive picture-in-picture ui state change events.
    </li>
    <li>
      <code translate="no" dir="ltr">EdgeToEdge</code>
      is now re-invoked on configuration changes to ensure that the system status bar color is properly updated.
    </li>
  </ul>
