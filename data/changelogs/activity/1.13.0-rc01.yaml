changelogHtml: |
  <h3 id="1.13.0-rc01" data-text="Version 1.13.0-rc01" tabindex="-1">Version 1.13.0-rc01</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.activity:activity:1.13.0-rc01</code>
    ,
    <code translate="no" dir="ltr">androidx.activity:activity-compose:1.13.0-rc01</code>
    , and
    <code translate="no" dir="ltr">androidx.activity:activity-ktx:1.13.0-rc01</code>
    are released. Version 1.13.0-rc01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/adeb519268e4eeff7d0a5a9d024dbe26d88bb6ad..6360e6fe078d931d2fcdd7076c6952c41b455f5d/activity">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      From
      <a href="/jetpack/androidx/releases/jetpack/androidx/releases/activity#1.12.4">Activity 1.12.4</a>
      : The Photo and Video
      <code translate="no" dir="ltr">ActivityResultContracts</code>
      now will correctly launch when being used on devices with the latest URI security fixes. (
      <a href="https://android-review.googlesource.com/#/q/I612010ef247badc4cd926afa2130ef553ecd2f3e">I61201</a>
      ,
      <a href="https://issuetracker.google.com/issues/433708587">b/433708587</a>
      )
    </li>
  </ul>
