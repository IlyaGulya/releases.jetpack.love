changelogHtml: |
  <h3 id="1.0.0-alpha02" data-text="Version 1.0.0-alpha02" tabindex="-1">Version 1.0.0-alpha02</h3>
  <p>July 01, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.photopicker:photopicker:1.0.0-alpha02</code>
    ,
    <code translate="no" dir="ltr">androidx.photopicker:photopicker-compose:1.0.0-alpha02</code>
    , and
    <code translate="no" dir="ltr">androidx.photopicker:photopicker-testing:1.0.0-alpha02</code>
    are released. Version 1.0.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/786176dc2284c87a0e620477608e0aca9adeff15..f7668b81600bdf22bc975d3fc38e6fd22c94b585/photopicker">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Lowered the
      <code translate="no" dir="ltr">minSdk</code>
      of the androidx.photopicker:photopicker and androidx.photopicker:photopicker-compose libraries to 23, while the APIs still require to be called starting from 34. (
      <a href="https://android-review.googlesource.com/#/q/I94e42624e79d97494629acedd891ad318e5733c7">I94e42</a>
      ,
      <a href="https://issuetracker.google.com/issues/524083018">b/524083018</a>
      )
    </li>
    <li>
      Updating Embedded PhotoPicker Compose APIs (removing AbstractEmbeddedPhotoPickerState, renaming and change visibility of some fields from EmbeddedPhotoPickerState) (
      <a href="https://android-review.googlesource.com/#/q/Ie32c9a86b3c826863b727fdc90d909a4c5dfd84e">Ie32c9</a>
      ,
      <a href="https://issuetracker.google.com/issues/449786033">b/449786033</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated Compose compileSdk to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Ic748a207afaadaa5d1061603adae2028637bf85c">Ic748a</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
  </ul>
