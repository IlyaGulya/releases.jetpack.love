changelogHtml: |
  <h3 id="1.0.0-alpha13" data-text="Version 1.0.0-alpha13" tabindex="-1">Version 1.0.0-alpha13</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.glimmer:glimmer:1.0.0-alpha13</code>
    and
    <code translate="no" dir="ltr">androidx.xr.glimmer:glimmer-google-fonts:1.0.0-alpha13</code>
    are released. Version 1.0.0-alpha13 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e29a10982f4299b1fa812e229d76792092a62814..b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe/xr/glimmer">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added an optional
      <code translate="no" dir="ltr">enabled</code>
      parameter to
      <code translate="no" dir="ltr">Modifier.surface</code>
      which applies a visual overlay when the surface is disabled. (
      <a href="https://android-review.googlesource.com/#/q/I8b781ec1db421ae48252d64692525b2087da0972">I8b781</a>
      )
    </li>
    <li>
      Introduced
      <code translate="no" dir="ltr">reverseLayout</code>
      in
      <code translate="no" dir="ltr">GlimmerPagerLayoutInfo</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I73818826ac7a174f5f5148d0fe09aa8918624ccd">I73818</a>
      ,
      <a href="https://issuetracker.google.com/issues/481669559">b/481669559</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">animateShape</code>
      to
      <code translate="no" dir="ltr">animatedShape</code>
      in
      <code translate="no" dir="ltr">ToggleButtonDefaults</code>
      and
      <code translate="no" dir="ltr">IconToggleButtonDefaults</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I15f00e116bf1f79c0a395d982e7087a86ba24405">I15f00</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">List</code>
      -related components to use the
      <code translate="no" dir="ltr">GlimmerLazyList</code>
      prefix. (
      <a href="https://android-review.googlesource.com/#/q/If07379f60ac061ed2edcf8b1680f1451c634b089">If0737</a>
      ,
      <a href="https://issuetracker.google.com/issues/425919254">b/425919254</a>
      ,
      <a href="https://issuetracker.google.com/issues/483126735">b/483126735</a>
      )
    </li>
    <li>
      Initial implementation of voice indicator for Glimmer (
      <a href="https://android-review.googlesource.com/#/q/I446c740d99cc14927e68b7a0d67246fc8f15e5b4">I446c7</a>
      ,
      <a href="https://issuetracker.google.com/issues/481998624">b/481998624</a>
      )
    </li>
    <li>
      Remove focusable and clickable overloads for 'surface' modifier. Now it's a single modifier that is responsible only for visual effects. Manually add 'focusable' / 'clickable' / other modifiers to create interactive surfaces - see the samples for more information. (
      <a href="https://android-review.googlesource.com/#/q/I12dbe10738c2a25db50998986b8d999c536c3248">I12dbe</a>
      )
    </li>
  </ul>
