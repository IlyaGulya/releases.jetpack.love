changelogHtml: |
  <h3 id="1.0.0-alpha12" data-text="Version 1.0.0-alpha12" tabindex="-1">Version 1.0.0-alpha12</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.glimmer:glimmer:1.0.0-alpha12</code>
    and
    <code translate="no" dir="ltr">androidx.xr.glimmer:glimmer-google-fonts:1.0.0-alpha12</code>
    are released. Version 1.0.0-alpha12 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/df4b49eda6f6834b6bc4c8aa30a581fa577a511e..5ec3fd7563f4f9b2ba745aac0ad7770cc4cd087f/xr/glimmer">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Introduce Glimmer Pager API (
      <a href="https://android-review.googlesource.com/#/q/I2d8308b83d326df2d8685ba21bd6c19479cebc9b">I2d830</a>
      ,
      <a href="https://issuetracker.google.com/issues/481670271">b/481670271</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">ToggleButton</code>
      and
      <code translate="no" dir="ltr">IconToggleButton</code>
      APIs (
      <a href="https://android-review.googlesource.com/#/q/I2656bf9eef8e5a2e65fb98465c31147d9cc6b9e0">I2656b</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/Ib16670db1d9300644aa033a79b38da170fe3f365">Ib1667</a>
      ,
      <a href="https://issuetracker.google.com/issues/481299196">b/481299196</a>
      ,
      <a href="https://issuetracker.google.com/issues/481663547">b/481663547</a>
      )
    </li>
  </ul>
