changelogHtml: |
  <h3 id="1.0.0-alpha09" data-text="Version 1.0.0-alpha09" tabindex="-1">Version 1.0.0-alpha09</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.glimmer:glimmer:1.0.0-alpha09</code>
    is released. Version 1.0.0-alpha09 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a/xr/glimmer/glimmer">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Adjusted the default values for primary, positive, negative, and surface. Added a new color axis called "background". (
      <a href="https://android-review.googlesource.com/#/q/I6bb6cc19998f938b23838c06fc7c71b23961eb56">I6bb6c</a>
      ,
      <a href="https://issuetracker.google.com/issues/481671956">b/481671956</a>
      )
    </li>
    <li>
      Added a
      <code translate="no" dir="ltr">ComponentSpacingValues</code>
      subsystem in
      <code translate="no" dir="ltr">GlimmerTheme</code>
      that provides values for use across components for paddings and other spacing elements. Existing
      <code translate="no" dir="ltr">PascalCase</code>
      spacing and padding constants in component Defaults objects (e.g.,
      <code translate="no" dir="ltr">ContentPadding</code>
      ,
      <code translate="no" dir="ltr">ItemSpacing</code>
      ) have been renamed to
      <code translate="no" dir="ltr">camelCase</code>
      and converted to Composable properties. (
      <a href="https://android-review.googlesource.com/#/q/I96e306ab5dd6aca0cb176c8a2101e1fb9da90213">I96e30</a>
      ,
      <a href="https://issuetracker.google.com/issues/491166461">b/491166461</a>
      )
    </li>
    <li>
      Move
      <code translate="no" dir="ltr">onClick</code>
      to the last position in parameter list to be used as trailing lambda. Don't consume
      <code translate="no" dir="ltr">IndirectPointerEvent(s)</code>
      if no applicable lambda is provided (
      <a href="https://android-review.googlesource.com/#/q/I9343e536af5d22574a73ecc2f4261453f13bc88d">I9343e</a>
      ,
      <a href="https://issuetracker.google.com/issues/486965466">b/486965466</a>
      )
    </li>
    <li>
      Renamed Depth and related entities to
      <code translate="no" dir="ltr">DepthEffect</code>
      . The layer properties of
      <code translate="no" dir="ltr">DepthEffect</code>
      are made public. (
      <a href="https://android-review.googlesource.com/#/q/Ie26d2fdab839cec2d2cf0d4b46d07164df3b51e3">Ie26d2</a>
      ,
      <a href="https://issuetracker.google.com/issues/485632564">b/485632564</a>
      )
    </li>
  </ul>
