changelogHtml: |
  <h3 id="1.0.0-alpha08" data-text="Version 1.0.0-alpha08" tabindex="-1">Version 1.0.0-alpha08</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.glimmer:glimmer:1.0.0-alpha08</code>
    is released. Version 1.0.0-alpha08 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6e23fc0c137022098ae2d043778ffdc56402ba5e..1a508f033de883ba2853b9f9ae1853eec7010638/xr/glimmer/glimmer">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Replaced
      <code translate="no" dir="ltr">TitleChipDefaults.contentPadding</code>
      with a
      <code translate="no" dir="ltr">ContentPadding</code>
      constant. (
      <a href="https://android-review.googlesource.com/#/q/If992fd165af7e4d9ebd8b32bb8b84e3caa08200b">If992f</a>
      ,
      <a href="https://issuetracker.google.com/issues/489451530">b/489451530</a>
      )
    </li>
    <li>
      Glimmer
      <code translate="no" dir="ltr">ListState</code>
      now provides
      <code translate="no" dir="ltr">ScrollIndicatorState</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I0a2f870b000c67e5c1105550301946296a6a6964">I0a2f8</a>
      ,
      <a href="https://issuetracker.google.com/issues/481662773">b/481662773</a>
      )
    </li>
    <li>
      Added a new
      <code translate="no" dir="ltr">TextStyle</code>
      called
      <code translate="no" dir="ltr">caption</code>
      . For the existing
      <code translate="no" dir="ltr">TextStyles</code>
      , Updated
      <code translate="no" dir="ltr">fontWeight</code>
      ,
      <code translate="no" dir="ltr">fontSize</code>
      and
      <code translate="no" dir="ltr">lineHeight</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I2319feefb136d89c10682ffe4835b2f3871b0916">I2319f</a>
      ,
      <a href="https://issuetracker.google.com/issues/473560419">b/473560419</a>
      )
    </li>
  </ul>
