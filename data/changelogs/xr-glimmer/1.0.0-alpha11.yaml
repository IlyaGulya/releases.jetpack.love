changelogHtml: |
  <h3 id="1.0.0-alpha11" data-text="Version 1.0.0-alpha11" tabindex="-1">Version 1.0.0-alpha11</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.glimmer:glimmer:1.0.0-alpha11</code>
    and
    <code translate="no" dir="ltr">androidx.xr.glimmer:glimmer-google-fonts:1.0.0-alpha11</code>
    are released. Version 1.0.0-alpha11 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/951845221205b7a428a9d779107760fc929863ee..885dafb47387f4ea0318276b4dd9fa6a896a87c6/xr/glimmer">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">glimmer-google-fonts</code>
      is released - add this dependency and use
      <code translate="no" dir="ltr">createGoogleSansFlexTypography</code>
      to create a
      <code translate="no" dir="ltr">Typography</code>
      instance with the recommended Google Sans Flex configuration. This
      <code translate="no" dir="ltr">Typography</code>
      instance can be provided as normal through
      <code translate="no" dir="ltr">GlimmerTheme</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Iec9e4f4c332acc3b24919e319d6fa54cc1a6cea1">Iec9e4</a>
      ,
      <a href="https://issuetracker.google.com/issues/458447191">b/458447191</a>
      )
    </li>
  </ul>
