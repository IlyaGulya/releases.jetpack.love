changelogHtml: |
  <h3 id="1.1.0-rc02" data-text="Version 1.1.0-rc02" tabindex="-1">Version 1.1.0-rc02</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.health:health-services-client:1.1.0-rc02</code>
    ,
    <code translate="no" dir="ltr">androidx.health:health-services-client-external-protobuf:1.1.0-rc02</code>
    , and
    <code translate="no" dir="ltr">androidx.health:health-services-client-proto:1.1.0-rc02</code>
    are released. Version 1.1.0-rc02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/7ff96b5234fa386046d864758f46119069f76c8e..3bcb69d968b4cfce9aa0d3f7c73e8b82527f0ce3/health">these commits</a>
    .
  </p>
  <p><strong>Notable:</strong></p>
  <ul>
    <li>
      Relax swimming pool length requirement to just when you request distance (
      <a href="https://android.googlesource.com/platform/frameworks/support/+/2dc7a2e173a807c9b179c155dcd80f0e2ee5ceed">2dc7a2e</a>
      )
    </li>
  </ul>
