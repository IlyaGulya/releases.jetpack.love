changelogHtml: |
  <h3 id="1.3.0-alpha10" data-text="Version 1.3.0-alpha10" tabindex="-1">Version 1.3.0-alpha10</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.material3.adaptive:adaptive-*:1.3.0-alpha10</code>
    is released. Version 1.3.0-alpha10 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1464ecac7af617c248a0ec886fa88609de1a10b0..c656c03d44d333d412d260e5c5bc95a482820745/compose/material3/adaptive">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Mark
      <code translate="no" dir="ltr">DragToResize</code>
      and
      <code translate="no" dir="ltr">PaneMarginas</code>
      APIs as experimental (
      <a href="https://android-review.googlesource.com/#/q/I86c29ca6d1f97305e1081f389fc422593b983eb7">I86c29</a>
      )
    </li>
    <li>
      Deprecate
      <code translate="no" dir="ltr">currentWindowAdaptiveInfo</code>
      and introduce V2 of it (
      <a href="https://android-review.googlesource.com/#/q/I40ecff8c40e9de56cc15c1787c2ba958bfe6ee79">I40ecf</a>
      ,
      <a href="https://issuetracker.google.com/issues/424442112">b/424442112</a>
      )
    </li>
  </ul>
