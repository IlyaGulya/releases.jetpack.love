changelogHtml: |
  <h3 id="1.3.0-alpha09" data-text="Version 1.3.0-alpha09" tabindex="-1">Version 1.3.0-alpha09</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.material3.adaptive:adaptive-*:1.3.0-alpha09</code>
    is released. Version 1.3.0-alpha09 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/cdf076c6abd0f3125cb0302756fcb77fe981ab7c..1464ecac7af617c248a0ec886fa88609de1a10b0/compose/material3/adaptive">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Deprecated
      <code translate="no" dir="ltr">NavDisplays</code>
      that takes a
      <code translate="no" dir="ltr">SceneStrategy</code>
      chained by
      <code translate="no" dir="ltr">then</code>
      infix and replaced with
      <code translate="no" dir="ltr">NavDisplay</code>
      that takes a
      <code translate="no" dir="ltr">List&lt;SceneStrategy&gt;</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I78b2c1c393a72b3f9fea3b615a0f23559e66809b">I78b2c</a>
      ,
      <a href="https://issuetracker.google.com/issues/482108465">b/482108465</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixes the issue shadows are not showing for levitated panes. (
      <a href="https://android-review.googlesource.com/#/q/Ie61088ab5a283291a0f16060ff935e421afbf6c3">Ie6108</a>
      ,
      <a href="https://issuetracker.google.com/issues/470517507">b/470517507</a>
      )
    </li>
  </ul>
