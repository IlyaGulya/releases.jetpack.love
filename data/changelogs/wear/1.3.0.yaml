      <a href="https://android-review.googlesource.com/#/q/Id2042393d23e7e7520e631e01f84bd40bff45ce3">Id2042</a>
      )
    </li>
  </ul>
  <h4 id="wear-phone-interactions-1.0.0-alpha07" data-text="Wear-Phone-Interactions Version 1.0.0-alpha07" tabindex="-1">Wear-Phone-Interactions Version 1.0.0-alpha07</h4>
  <p>August 4, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.0.0-alpha07</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/97264aa4532db7f7db1ffb3f42f3a9204971dbfc..d725303accfa9be6d5c3d61c7603ed1b9a780cbd/wear/wear-phone-interactions">Version 1.0.0-alpha07 contains these commits.</a>
