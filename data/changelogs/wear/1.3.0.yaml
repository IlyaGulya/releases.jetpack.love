    <code translate="no" dir="ltr">androidx.wear:wear-input-testing</code>
    library in the next Jetpack release.
  </p>
  <h2 id="wear-ongoing_2" data-text="Wear-Ongoing" tabindex="-1">Wear-Ongoing</h2>
  <h3 id="version_11_11" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="wear-ongoing-1.1.0" data-text="Version 1.1.0" tabindex="-1">Version 1.1.0</h4>
  <p>September 10, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.1.0</code>
    is released. Version 1.1.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/bb2d7cbe99a56fe59407bf1b598687ce8265ea22..b5910dbad26bb976618a85ecba477cbcf797c451/wear/wear-ongoing">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.0.0:</strong></p>
  <ul>
    <li>Added a content description field to Ongoing Activities, which is used by accessibility services.</li>
    <li>
      Added
      <code translate="no" dir="ltr">RequiresPermission</code>
      annotations to APIs that require
      <code translate="no" dir="ltr">POST_NOTIFICATIONS</code>
      permission on SDK 33 and above.
    </li>
  </ul>
  <h4 id="wear-ongoing-1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>August 27, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.1.0-rc01</code>
    is released with no changes since the last beta. Version 1.1.0-rc01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/5fa9d0954ece0376736164b0f7bc2ef33506ab70..bb2d7cbe99a56fe59407bf1b598687ce8265ea22/wear/wear-ongoing">these commits</a>
    .
  </p>
  <h4 id="wear-ongoing-1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h4>
  <p>July 30, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.1.0-beta01</code>
    is released with no notable changes since the last alpha. Version 1.1.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3315f1ef094c312203fe26841287902916fbedf5..5fa9d0954ece0376736164b0f7bc2ef33506ab70/wear/wear-ongoing">these commits</a>
    .
  </p>
  <h4 id="wear-ongoing-1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h4>
  <p>August 23, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.1.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e29ee7ab92601af2140abdabaabf4960517e49f2..3315f1ef094c312203fe26841287902916fbedf5/wear/wear-ongoing">Version 1.1.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add a content description field to Ongoing Activity. This will be used by accessibility services to describe the Ongoing Activity. (
      <a href="https://android-review.googlesource.com/#/q/I79fc6eaebca0dbb4cd5e7998e29b77152c1547c9">I79fc6</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">@RequiresPermission</code>
      to APIs that require granting the
      <code translate="no" dir="ltr">POST_NOTIFICATIONS</code>
      permission on SDK 33 and above. (
      <a href="https://android-review.googlesource.com/#/q/Ie542eb66c9af6e3c3a7c59bb291c7c5879458631">Ie542e</a>
      ,
      <a href="https://issuetracker.google.com/issues/238790278">b/238790278</a>
      )
    </li>
  </ul>
  <h3 id="version_10_10" data-text="Version 1.0" tabindex="-1">Version 1.0</h3>
  <h4 id="wear-ongoing-1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h4>
  <p>September 1, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.0.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/0cdc4fd8c6d04f740cd6224042b7b173e0d38721..e29ee7ab92601af2140abdabaabf4960517e49f2/wear/wear-ongoing">Version 1.0.0 contains these commits.</a>
  </p>
  <p><strong>Major features of 1.0.0</strong></p>
  <ul>
    <li>The Wear Ongoing Activities API is an API for developers, including third party developers, used to mark their activity as an “Ongoing Activity”, and provide the needed information.</li>
    <li>Ongoing Activities refer to activities that could be running in the background of the watch (e.g. workouts, calls and media). On Wear 3, an activity declared as ongoing will be made more prominent through a dedicated overlay icon on the watchface and a different rendering in the app launcher.</li>
    <li>
      For more information, see the
      <a href="https://developer.android.com/training/wearables/ongoing-activity">Wear Ongoing Activity Guide</a>
    </li>
  </ul>
  <h4 id="wear-ongoing-1.0.0-rc01" data-text="Version 1.0.0-rc01" tabindex="-1">Version 1.0.0-rc01</h4>
  <p>August 18, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.0.0-rc01</code>
    is released with no changes since
    <code translate="no" dir="ltr">1.0.0-beta01</code>
    .
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d725303accfa9be6d5c3d61c7603ed1b9a780cbd..0cdc4fd8c6d04f740cd6224042b7b173e0d38721/wear/wear-ongoing">Version 1.0.0-rc01 contains these commits.</a>
  </p>
  <h4 id="wear-ongoing-1.0.0-beta01" data-text="Version 1.0.0-beta01" tabindex="-1">Version 1.0.0-beta01</h4>
  <p>August 4, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.0.0-beta01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/86ff5b4bb956431ec884586ce0aea0127e189ec4..d725303accfa9be6d5c3d61c7603ed1b9a780cbd/wear/wear-ongoing">Version 1.0.0-beta01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Some setters on OngoingActivity.Builder now accept a null argument in order to give symmetry and consistency to the setters and getters (
      <a href="https://android-review.googlesource.com/#/q/I17ee5238d2e515be2796fa12ecb6adc97e44fcd9">I17ee5</a>
      )
    </li>
  </ul>
  <h4 id="wear-ongoing-1.0.0-alpha06" data-text="Version 1.0.0-alpha06" tabindex="-1">Version 1.0.0-alpha06</h4>
  <p>June 2, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.0.0-alpha06</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/66681ad83c328d0dd821b943bb3d375f02c1db61..86ff5b4bb956431ec884586ce0aea0127e189ec4/wear/wear-ongoing">Version 1.0.0-alpha06 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add Title field to Ongoing Activity. (
      <a href="https://android-review.googlesource.com/#/q/I7a4050af6db1845a1859a8df92dbc36610002901">I7a405</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">SerializationHelper.copy()</code>
      now does a defensive copy of the information (
      <a href="https://android-review.googlesource.com/#/q/I8b27619e49feb1c8d6b1e782060ea62eee298c6a">I8b276</a>
      )
    </li>
    <li>
      Improved setCategory documentation (
      <a href="https://android-review.googlesource.com/#/q/Iff01f5843e3239180d9a18a3fec1c7279f1ea818">Iff01f</a>
      )
    </li>
  </ul>
  <h4 id="wear-ongoing-1.0.0-alpha05" data-text="Version 1.0.0-alpha05" tabindex="-1">Version 1.0.0-alpha05</h4>
  <p>May 18, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.0.0-alpha05</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3d6f168394d1dd14e1d6f5b6dc4a0d405cb1a26a..66681ad83c328d0dd821b943bb3d375f02c1db61/wear/wear-ongoing">Version 1.0.0-alpha05 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <p>
        <code translate="no" dir="ltr">OngoingActivity</code>
        now has getters to retrieve all values directly set via the Builder (or the defaults taken from the associated Notification). (
        <a href="https://android-review.googlesource.com/#/q/Id8ac8b7aa2e363f6dfc8ea484782a8d7d198939a">Id8ac8</a>
        )
      </p>

      <ul>
        <li>
          The new class
          <code translate="no" dir="ltr">Status</code>
          is now used to create the status of the the
          <code translate="no" dir="ltr">OngoingActivity</code>
        </li>
        <li>
          <code translate="no" dir="ltr">OngoingActivityData</code>
          and
          <code translate="no" dir="ltr">OngoingActivityStatus</code>
          are no longer part of the public API.
        </li>
      </ul>
    </li>
    <li>
      <p>
        The classes
        <code translate="no" dir="ltr">TextStatusPart</code>
        and
        <code translate="no" dir="ltr">TimerStatusPart</code>
        are no longer part of the public API. (
        <a href="https://android-review.googlesource.com/#/q/I57fb687933fcbc259c1c93094a2e5fbc88ddd979">I57fb6</a>
        )
      </p>

      <ul>
        <li>
          To create a
          <code translate="no" dir="ltr">Part</code>
          with a static text, use
          <code translate="no" dir="ltr">Status.TextPart</code>
          .
        </li>
        <li>
          To create a
          <code translate="no" dir="ltr">Part</code>
          with a stopwatch (counting up), use
          <code translate="no" dir="ltr">Status.Stopwatch</code>
        </li>
        <li>
          To create a
          <code translate="no" dir="ltr">Part</code>
          with a timer (counting down), use
          <code translate="no" dir="ltr">Status.Timer</code>
        </li>
      </ul>
    </li>
  </ul>
  <h4 id="wear-ongoing-1.0.0-alpha04" data-text="Version 1.0.0-alpha04" tabindex="-1">Version 1.0.0-alpha04</h4>
  <p>May 5, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.0.0-alpha04</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/52fbd7ed5b07ca4431fa828325a1f8da45b02e51..3d6f168394d1dd14e1d6f5b6dc4a0d405cb1a26a/wear/wear-ongoing">Version 1.0.0-alpha04 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>On OngoingActivity, the methods fromExistingOngoingActivity are now called recoverOngoingActivity.</li>
    <li>
      OngoingActivity now has a full set of getters, the same previously only available at OngoingActivityData. (
      <a href="https://android-review.googlesource.com/#/q/I0ee4deaba18f5da836d5dc31607df3d93a808edd">I0ee4d</a>
      )
    </li>
  </ul>
  <h2 id="wear-phone-interactions_2" data-text="Wear-Phone-Interactions" tabindex="-1">Wear-Phone-Interactions</h2>
  <h3 id="version_11_12" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="wear-phone-interactions-1.1.0" data-text="Version 1.1.0" tabindex="-1">Version 1.1.0</h4>
  <p>February 26, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.1.0</code>
    is released. Version 1.1.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/2a6e9213b8a20cd6b58f08550065b5aa6bc56150..69d58ba42a41c8a1d00cead8cefd57d9ccb81fc1/wear/wear-phone-interactions">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.0.0</strong></p>
  <ul>
    <li>This version contains crucial bug fix for Apps running on Wear OS 5 (API level 34) or higher and targeting API level 35 or higher.</li>
    <li>
      Apps should update to this version of the library before updating their
      <code translate="no" dir="ltr">targetSdkVersion</code>
      to 35 or higher.
    </li>
    <li>Otherwise, runtime exception will be thrown.</li>
    <li>
      A new definition for paired device type -
      <code translate="no" dir="ltr">none</code>
      , when the device is not paired with the phone, has been added.
    </li>
  </ul>
  <h4 id="wear-phone-interactions-1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>February 12, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.1.0-rc01</code>
    is released with no notable changes since the last beta. Version 1.1.0-rc01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4c47131cd5b50c3091fc0874eb606aaac5b168fa..2a6e9213b8a20cd6b58f08550065b5aa6bc56150/wear/wear-phone-interactions">these commits</a>
    .
  </p>
  <h4 id="wear-phone-interactions-1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h4>
  <p>January 29, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.1.0-beta01</code>
    is released. Version 1.1.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/46295bc0b75a16f452e8e0090e8de41073d4dbb6..4c47131cd5b50c3091fc0874eb606aaac5b168fa/wear/wear-phone-interactions">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <p>The 1.1.0-beta01 release of Wear Phone Interactions indicates that this release of the library is feature complete and the API is locked (except where marked as experimental). Wear Phone Interactions 1.1 includes the following new functionalities and APIs:</p>
  <ul>
    <li>
      Added property
      <code translate="no" dir="ltr">redirectUrl</code>
      to
      <code translate="no" dir="ltr">OAuthRequest</code>
      .
    </li>
    <li>Documentation fixes</li>
    <li>
      Additional type in
      <code translate="no" dir="ltr">PhoneTypeHelper</code>
      to specify when device is not paired with phone, instead of using existing unknown type.
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added new definition for paired device type - none, when device is not paired with the phone. (
