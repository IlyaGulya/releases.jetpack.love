  </p>
  <h4 id="wear-input-testing-1.0.0-alpha01" data-text="Wear-Input-Testing Version 1.0.0-alpha01" tabindex="-1">Wear-Input-Testing Version 1.0.0-alpha01</h4>
  <p>October 14, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.0.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/f413b8be76bfa0a4d109a3afb583188c580a2aa6/wear/wear-input-testing">Version 1.0.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
