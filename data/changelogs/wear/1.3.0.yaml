  <h2 id="wear-phone-interactions_wear-remote-interactions_2" data-text="Wear-Phone-Interactions Wear-Remote-Interactions" tabindex="-1">Wear-Phone-Interactions Wear-Remote-Interactions</h2>
  <h3 id="version_10_12" data-text="Version 1.0" tabindex="-1">Version 1.0</h3>
  <h4 id="1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h4>
  <p>September 15, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.0.0</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.0.0</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/a8713100cbbd40b35331f0fc0f08af03640800a4..15e31e87f719904535e26aadb16fc5085490c3c6/wear">Version 1.0.0 contains these commits.</a>
  </p>
  <p><strong>Major features of 1.0.0</strong></p>
  <p>The Phone Interaction Library contains APIs for interactions from the Wearables to Phones. It contains the following:</p>
  <ul>
    <li>
      <code translate="no" dir="ltr">PhoneDeviceType</code>
      , providing helper methods for determining the type of phone the current watch is paired to, for use on Wearable devices only.
    </li>
    <li>
      <code translate="no" dir="ltr">BridgingManager</code>
      ,
      <code translate="no" dir="ltr">BridgingManagerService</code>
      and
      <code translate="no" dir="ltr">BridgingConfig</code>
      APIs to enable/disable notifications at runtime and optionally set tags for notifications that are exempt from the bridging mode.
    </li>
    <li>
      <code translate="no" dir="ltr">RemoteAuthClient</code>
      , providing support for remote authentication on Wearables together with support for adding OAuth PKCE extension. Additional handlers and helper classes for communication are provided.
    </li>
  </ul>
  <p>The Remote Interaction Library contains APIs for interactions between the Wearables and Phones. It contains the following:</p>
  <ul>
    <li>
      <code translate="no" dir="ltr">WatchFaceConfigIntentHelper</code>
      , providing helper functions to specify the ID and component name in the watch face configuration activities for the companion on the phone.
    </li>
    <li>
      <code translate="no" dir="ltr">RemoteActivityHelper</code>
      class which can be used for opening intents on other devices (i.e. from watch to phone).
    </li>
  </ul>
  <h4 id="phone-remote-interations-1.0.0-rc01" data-text="Version 1.0.0-rc01" tabindex="-1">Version 1.0.0-rc01</h4>
  <p>September 1, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.0.0-rc01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.0.0-rc01</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1e0ab9e58c3c2ebe8152b7507938aef7e9c1acdc..a8713100cbbd40b35331f0fc0f08af03640800a4/wear">Version 1.0.0-rc01 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix bug preventing errors raised within Google Play Services from being propagated to the caller when using RemoteActivityHelper (
      <a href="https://android-review.googlesource.com/#/q/I60d608db5d3b7fdbc64d9a7046a0b0891e09b698">I60d60</a>
      )
    </li>
    <li>
      Fix bug where RemoteActivityHelper would never fulfill its Future if there were no connected nodes, or if the requested nodeId was not found (
      <a href="https://android-review.googlesource.com/#/q/I60d608db5d3b7fdbc64d9a7046a0b0891e09b698">I60d60</a>
      )
    </li>
  </ul>
  <h4 id="1.0.0-beta01" data-text="Version 1.0.0-beta01" tabindex="-1">Version 1.0.0-beta01</h4>
  <p>August 18, 2021</p>
  <p>
