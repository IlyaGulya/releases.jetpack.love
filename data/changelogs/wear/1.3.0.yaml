      )
    </li>
    <li>
      Fixed bug that caused converting BridgingConfig to/from Bundle to fail with ClassCastException. Added unit tests for BridgingManagerService class. (
      <a href="https://android-review.googlesource.com/#/q/I68ecb506624219155adb5c3aa2fc67621fefb73e">I68ecb</a>
      )
    </li>
  </ul>
  <h4 id="wear-remote-interactions-1.0.0-alpha06" data-text="Wear-Remote-Interactions Version 1.0.0-alpha06" tabindex="-1">Wear-Remote-Interactions Version 1.0.0-alpha06</h4>
  <p>August 4, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.0.0-alpha06</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/97264aa4532db7f7db1ffb3f42f3a9204971dbfc..d725303accfa9be6d5c3d61c7603ed1b9a780cbd/wear/wear-remote-interactions">Version 1.0.0-alpha06 contains these commits.</a>
  </p>
  <h4 id="wear-phone-interactions-1.0.0-alpha06" data-text="Wear-Phone-Interactions Version 1.0.0-alpha06" tabindex="-1">Wear-Phone-Interactions Version 1.0.0-alpha06</h4>
  <p>July 21, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.0.0-alpha06</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/19ae3a88ff0824d615355b492cb56049e16991f2..97264aa4532db7f7db1ffb3f42f3a9204971dbfc/wear/wear-phone-interactions">Version 1.0.0-alpha06 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">BridgingManagerSeviceBinder</code>
      class is now a subclass of Service and is renamed to BridgingManagerSevice. (
      <a href="https://android-review.googlesource.com/#/q/I9fca232a5d402c03b2d879187de92b14ab3c2444">I9fca2</a>
      )
    </li>
    <li>
      Method
      <code translate="no" dir="ltr">RemoteAuthClient.Callback.onAuthorizationError</code>
      is changed to include OAuthRequest parameter. Methods requiring callback now also require an executor for the callback to be run on. (
      <a href="https://android-review.googlesource.com/#/q/I35e119436556aeae193fb146369af9e97b8c71c4">I35e11</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      We have made the authentication API clearer with more documented parameters and by using properties where possible. (
      <a href="https://android-review.googlesource.com/#/q/I1228725db7defda787b49d322bfed4ab307f2b9b">I12287</a>
      )
    </li>
  </ul>
  <h4 id="wear-phone-interactions-1.0.0-alpha05" data-text="Wear-Phone-Interactions Version 1.0.0-alpha05" tabindex="-1">Wear-Phone-Interactions Version 1.0.0-alpha05</h4>
  <p>June 30, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.0.0-alpha05</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/24330de8135d689b34a31a701181b20549e8db25..19ae3a88ff0824d615355b492cb56049e16991f2/wear/wear-phone-interactions">Version 1.0.0-alpha05 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Documented parameters that should be passed in constructor for
      <code translate="no" dir="ltr">BridgingConfig.Builder</code>
      .
    </li>
  </ul>
  <h4 id="wear-remote-interactions-1.0.0-alpha05" data-text="Wear-Remote-Interactions Version 1.0.0-alpha05" tabindex="-1">Wear-Remote-Interactions Version 1.0.0-alpha05</h4>
  <p>July 21, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.0.0-alpha05</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/24330de8135d689b34a31a701181b20549e8db25..97264aa4532db7f7db1ffb3f42f3a9204971dbfc/wear/wear-remote-interactions">Version 1.0.0-alpha05 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <p>
        We have added the
        <code translate="no" dir="ltr">RemoteIntentHelper</code>
        class (previously RemoteIntent in the Wearable Support Library) which can be used for opening intents on other devices (i.e. from watch to phone). (
        <a href="https://android-review.googlesource.com/#/q/I1d7e07052da1e0f942e61b044de08f97b8c51279">I1d7e0</a>
        )
      </p>
    </li>
    <li>
      <p>
        The PlayStoreAvailability class has been removed from the AndroidX library. To detect whether the Play Store is available on a connected phone, use the
        <a href="https://developer.android.com/reference/kotlin/androidx/wear/phone/interactions/PhoneTypeHelper.Companion#getPhoneDeviceType(android.content.Context)"><code translate="no" dir="ltr">androidx.phone.interactions.PhoneTypeHelper.getPhoneDeviceType</code></a>
        method to determine if the connected phone is an Android phone. Then use the
        <code translate="no" dir="ltr">androidx.wear.utils.WearTypeHelper.isChinaDevice</code>
        method to determine if the connected phone is a Chinese device. If the phone is an Android phone and if it is not a Chinese device then the Play Store will be available. (
        <a href="https://android-review.googlesource.com/#/q/Ie7dec297fc1b01c4e308bd001a3666fd87e509a0">Ie7dec</a>
        )
      </p>
    </li>
  </ul>
  <h4 id="wear-phone-interactions-1.0.0-alpha04" data-text="Wear-Phone-Interactions Version 1.0.0-alpha04" tabindex="-1">Wear-Phone-Interactions Version 1.0.0-alpha04</h4>
  <p>April 7, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.0.0-alpha04</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/52fbd7ed5b07ca4431fa828325a1f8da45b02e51..24330de8135d689b34a31a701181b20549e8db25/wear/wear-phone-interactions">Version 1.0.0-alpha04 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Updated
      <code translate="no" dir="ltr">ErrorCode</code>
      constants to make the new library backwards compatible with the implementation in Wearable Support Library.
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Fixed exception caused by new OAuth API when starting an OAuth session.</li>
  </ul>
  <h4 id="wear-remote-interactions-1.0.0-alpha03" data-text="Wear-Remote-Interactions Version 1.0.0-alpha03" tabindex="-1">Wear-Remote-Interactions Version 1.0.0-alpha03</h4>
  <p>April 7, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.0.0-alpha03</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/52fbd7ed5b07ca4431fa828325a1f8da45b02e51..24330de8135d689b34a31a701181b20549e8db25/wear/wear-remote-interactions">Version 1.0.0-alpha03 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Changed
      <code translate="no" dir="ltr">PlayStoreAvailability</code>
      to be a class that contains companion object with static methods. Usage stays the same.
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed summary doc for
      <code translate="no" dir="ltr">WatchFaceConfigIntentHelper</code>
      to correctly show sample code with actual HTML characters.
    </li>
  </ul>
  <h4 id="ongoing-phone-interactions-1.0.0-alpha03" data-text="Wear-Ongoing Wear-Phone-Interactions Version 1.0.0-alpha03" tabindex="-1">Wear-Ongoing Wear-Phone-Interactions Version 1.0.0-alpha03</h4>
  <p>March 10, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.0.0-alpha03</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.0.0-alpha03</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/602cf9bff5e74e4355760aa47d3fc73a2e6d779b..52fbd7ed5b07ca4431fa828325a1f8da45b02e51/wear">Version 1.0.0-alpha03 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Migrate OAuthClient from Wearable Support Library to AndroidX. This migrated class is renamed to RemoteAuthClient and it gives support for remote authentication on Wearables together with support for adding OAuth PKCE extension. Additional handlers and helper classes for communication are provided.</li>
    <li>Ongoing activities can now be associated with a Notification that has a tag, using the new OngoingActivity.Builder constructor.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added support for notification tags on the Ongoing Activities Library (
      <a href="https://android-review.googlesource.com/#/q/I653b41b716ff5b3d590a5be03e417be8dc01236c">I653b4</a>
      )
    </li>
    <li>
      Migrate OAuthClient from Wear Support Library to AndroidX, and add support for OAuth PKCE extension (
      <a href="https://android-review.googlesource.com/#/q/I3eaaa7dd09af837a0221400b3bea639ebb8dd215">I3eaaa</a>
      )
    </li>
  </ul>
  <h4 id="wear-remote-interactions-1.0.0-alpha02" data-text="Wear-Remote-Interactions Version 1.0.0-alpha02" tabindex="-1">Wear-Remote-Interactions Version 1.0.0-alpha02</h4>
  <p>March 10, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.0.0-alpha02</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/aee18b103203a91ee89df91f0af5df2ecff356d6..52fbd7ed5b07ca4431fa828325a1f8da45b02e51/wear/wear-remote-interactions">Version 1.0.0-alpha02 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Migrating PlayStoreAvailability class from Wearable Support Library to AndroidX which provides an API for checking whether the Play Store is available on the Phone.</li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Migrating PlayStoreAvailability class from Wearable Support Library to AndroidX. (
      <a href="https://android-review.googlesource.com/#/q/I69bfe4354149947c8c3631e9e55d994597895e9e">I69bfe</a>
      )
    </li>
  </ul>
  <h4 id="interactions-ongoing-1.0.0-alpha02" data-text="Version 1.0.0-alpha02" tabindex="-1">Version 1.0.0-alpha02</h4>
  <p>February 10, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.0.0-alpha02</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.0.0-alpha02</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/aee18b103203a91ee89df91f0af5df2ecff356d6..602cf9bff5e74e4355760aa47d3fc73a2e6d779b/wear">Version 1.0.0-alpha02 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added support for more complex status. They are composed of a template (or several) and a series of Parts that will be used to fill the template's placeholders. OngoingActivityStatus now has a static method to create simple statuses with only one part (a Text or a Timer), and a Builder to create more complex statuses. (
      <a href="https://android-review.googlesource.com/#/q/I1fe818ee09171f618699cce0b5046bec0bc79e91">I1fe81</a>
      )
    </li>
    <li>
      Move BridgingManager and BridgingConfig classes from Wear Support Library to AndroidX which provides APIs to enable/disable notifications at runtime and optionally set tags for notifications that are exempt from the bridging mode. (
      <a href="https://android-review.googlesource.com/#/q/I3a17e9cf1db86b731b96f0ee0cd45b238aa3fcea">I3a17e</a>
      )
    </li>
  </ul>
  <h4 id="ongoing-interactions-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h4>
  <p>January 27, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-ongoing:1.0.0-alpha01</code>
    ,
    <code translate="no" dir="ltr">androidx.wear:wear-phone-interactions:1.0.0-alpha01</code>
    , and
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.0.0-alpha01</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/aee18b103203a91ee89df91f0af5df2ecff356d6/wear">Version 1.0.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <p>
        Migrate the Ongoing Activities library to a new sub-library: wear-ongoing. Classes now live in the androidx.wear.ongoing package (previously was androidx.wear.ongoingactivities) (
        <a href="https://android-review.googlesource.com/#/q/I7c02947659bbf33c9b66757001eccfa225f4168f">I7c029</a>
        )
      </p>
    </li>
    <li>
      <p>
        Create a new support library to contain classes that support interactions from the Wearables to Phones. It is initially populated with classes migrated from Wearable Support Library. (
        <a href="https://android-review.googlesource.com/#/q/Id5180d4583a60b92f66e06d4f208d8920b97dc28">Id5180</a>
        )
      </p>
    </li>
    <li>
      <p>
        Migrate PhoneDeviceType class from Wearable Support Library to AndroidX. The migrated class is renamed as PhoneTypeHelper which provides helper methods for determining the type of phone the current watch is paired to, for use on Wearable devices only. (
        <a href="https://android-review.googlesource.com/#/q/Ibd9474f69e958c2efd31949609df6aeb7c7dc648">Ibd947</a>
        )
      </p>
    </li>
    <li>
      <p>
        Create a new support library to contain classes that support interactions between the Wearables and Phones. It is initially populated with classes migrated from Wearable Support Library. (
        <a href="https://android-review.googlesource.com/#/q/I9deb4cc773b550141b0f05aae44b3f7705fec532">I9deb4</a>
        )
      </p>
    </li>
    <li>
      <p>
        Migrate WatchFaceCompanion class from Wearable Support Library to AndroidX. The migrated class is renamed as WatchFaceConfigIntentHelper which provides helper functions to specify the ID and component name in the watch face configuration activities in companion on the phone, it can also be used locally to configure the watch face on the wearable device. (
        <a href="https://android-review.googlesource.com/#/q/Ia455f4dc525b7fba3425608ae5a12b05399c476e">Ia455f</a>
        )
      </p>
    </li>
  </ul>
  <h2 id="wear-tooling-preview_2" data-text="Wear-Tooling-Preview" tabindex="-1">Wear-Tooling-Preview</h2>
  <h3 id="version_10_13" data-text="Version 1.0" tabindex="-1">Version 1.0</h3>
  <h4 id="wear-tooling-preview-1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h4>
  <p>November 29, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-tooling-preview:1.0.0</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/af0e5af4f5cecea65dc0553cde117ce199dacb30..5b26896e52ff3bce385a4211e47750dda343998c/wear/wear-tooling-preview">Version 1.0.0 contains these commits.</a>
  </p>
  <p><strong>Features in 1.0.0</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">WearDevices</code>
      to list valid wear devices that can be used for UI previews.
    </li>
  </ul>
  <h4 id="wear-tooling-preview-1.0.0-rc01" data-text="Version 1.0.0-rc01" tabindex="-1">Version 1.0.0-rc01</h4>
  <p>November 15, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-tooling-preview:1.0.0-rc01</code>
    is released with no changes.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/465c5c5b7a0d79793bddb26a695f67aba8ea2f7e..af0e5af4f5cecea65dc0553cde117ce199dacb30/">Version 1.0.0-rc01 contains these commits.</a>
  </p>
  <h4 id="wear-tooling-preview-1.0.0-beta01" data-text="Version 1.0.0-beta01" tabindex="-1">Version 1.0.0-beta01</h4>
  <p>October 18, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-tooling-preview:1.0.0-beta01</code>
    is released with no changes.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3315f1ef094c312203fe26841287902916fbedf5..465c5c5b7a0d79793bddb26a695f67aba8ea2f7e/wear/wear-tooling-preview">Version 1.0.0-beta01 contains these commits.</a>
  </p>
  <h4 id="wear-tooling-preview-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h4>
  <p>August 23, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-tooling-preview:1.0.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3315f1ef094c312203fe26841287902916fbedf5/wear/wear-tooling-preview">Version 1.0.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">WearDevices</code>
      to list valid wear devices that can be used for UI previews (
      <a href="https://android-review.googlesource.com/#/q/Ib036edb1823884c5f9e312d6733e7c3db22f9a0a">Ib036e</a>
      )
    </li>
  </ul>
  <h2 id="wear_complications_and_watchface_2" data-text="Wear Complications and Watchface" tabindex="-1">Wear Complications and Watchface</h2>
  <h3 id="version_10_14" data-text="Version 1.0" tabindex="-1">Version 1.0</h3>
  <aside class="note">
    <strong>Note:</strong>
    <span>
      As of
      <code translate="no" dir="ltr">1.0.0-alpha23</code>
      , the
      <code translate="no" dir="ltr">watchface</code>
      and
      <code translate="no" dir="ltr">complications</code>
      libraries have been moved to a unified
      <code translate="no" dir="ltr">androidx.wear.watchface</code>
      group. Please see the
      <a href="/jetpack/androidx/releases/wear-watchface">Wear Watchface</a>
      release note page for more details.
    </span>
  </aside>
  <h4 id="complications-watchface-1.0.0-alpha22" data-text="Version 1.0.0-alpha22" tabindex="-1">Version 1.0.0-alpha22</h4>
  <p>September 15, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha22</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/47e81d1c497b8a57534a460c277855db1b0257ae..1a3dcfb231517d6104969f17063fcc6c97ba6eeb/wear">Version 1.0.0-alpha22 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>The EditorSession now subscribes to lifecycle observers so you no longer have to explicitly close it when your activity goes away.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      EditorSession and ListenableEditorSession now use kotlin StateFlows for complicationSlotsState, ComplicationsPreviewData and ComplicationsDataSourceInfo. (
      <a href="https://android-review.googlesource.com/#/q/I761d9a3c1990281e9235bcea79dc80f6fa5b7d0c">I761d9</a>
      )
    </li>
    <li>
      EditorSession#userStyle is now a
      <code translate="no" dir="ltr">MutableStateFlow&lt;UserStyle&gt;</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I32ca96636efc1e79152d456dd263dd6c1cd00f5f">I32ca9</a>
      )
    </li>
    <li>
      EditorSession.createOnWatchEditorSession now uses a lifecycle observer and it automatically closes when it observes onDestroy. In addition
      <code translate="no" dir="ltr">createOnWatchEditorSession</code>
      now only requires the activity to be passed in. Identical changes have also been applied to ListenableEditorSession. (
      <a href="https://android-review.googlesource.com/#/q/Ic6b7f48691a97bd8ef9a417dc692febf3e318eb1">Ic6b7f</a>
      )
    </li>
    <li>
      CustomValueUserStyleSetting's constructor has been reinstated as part of the public API. (
      <a href="https://android-review.googlesource.com/#/q/I2e69a3f307a969435296ee9e649b13b174054dcc">I2e69a</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">UserStyle</code>
      now inherits from
      <code translate="no" dir="ltr">Map&lt;UserStyleSetting, UserStyleSetting.Option&gt;</code>
      and
      <code translate="no" dir="ltr">MutableUserStyleSetting#put</code>
      throws IllegalArgumentException if the setting is not in the schema or if the option doesn't match the setting. (
      <a href="https://android-review.googlesource.com/#/q/Iba40fe5b1906a0ae1b6f36f37939f5e498ea8e71">Iba40f</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha21" data-text="Version 1.0.0-alpha21" tabindex="-1">Version 1.0.0-alpha21</h4>
  <p>September 1, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha21</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1e0ab9e58c3c2ebe8152b7507938aef7e9c1acdc..47e81d1c497b8a57534a460c277855db1b0257ae/wear">Version 1.0.0-alpha21 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      All public watch face, client, editor and complication APIs now use java.time.Instant for times rather than a Long, as a consequence the minimum API level has increased to 26. (
      <a href="https://android-review.googlesource.com/#/q/I3cd482ea3c80e6b88d28f9e33368b8f0e8e651c8">I3cd48</a>
      )
    </li>
    <li>
      The watchface and complication APIs now use the immutable ZonedDateTime instead of Calendar. (
      <a href="https://android-review.googlesource.com/#/q/I25cf828b22577fe838a8baf8eab591febb90c284">I25cf8</a>
      )
    </li>
    <li>
      ComplicationSlots are now initialized with NoDataComplicationData, ComplicationSlot.complicationData now always has a value and CanvasComplicationDrawable.complicationData is no longer nullable. (
      <a href="https://android-review.googlesource.com/#/q/I4dfd6e996b84f3d6d664fce98bc8e6601d9298cd">I4dfd6</a>
      ) This reduces (but doesn’t eliminate) complication flickering when switching between watch faces.
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha20" data-text="Version 1.0.0-alpha20" tabindex="-1">Version 1.0.0-alpha20</h4>
  <p>August 18, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha20</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d725303accfa9be6d5c3d61c7603ed1b9a780cbd..1e0ab9e58c3c2ebe8152b7507938aef7e9c1acdc/wear">Version 1.0.0-alpha20 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We have added createFallbackPreviewData to ComplicationDataSourceInfo which can be used when ComplicationDataSourceInfoRetriever.retrievePreviewComplicationData returns null. (
      <a href="https://android-review.googlesource.com/#/q/I38c4dc237d114b51234a4b8df6528280513e4843">I38c4d</a>
      )
    </li>
    <li>
      ComplicationDataSourceUpdateRequester has been turned into an interface to allow mocking in unit tests. You can construct a concrete ComplicationDataSourceUpdateRequester with ComplicationDataSourceUpdateRequester.create(). (
      <a href="https://android-review.googlesource.com/#/q/I7da226172823e58d1d0c6140f96e39f9e8e7ece9">I7da22</a>
      )
    </li>
    <li>
      RenderParameters.pressedComplicationSlotIds has been replaced by RenderParameters.lastComplicationTapDownEvents which exposes the new TapEvent class which contains a triple of x, y coordinates of the tap in pixels and a time stamp.
      <code translate="no" dir="ltr">WatchFace.TapListener.onTap</code>
      has been replaced by
      <code translate="no" dir="ltr">onTapEvent(@TapType tapType: Int, tapEvent: TapEvent)</code>
      . In addition,
      <code translate="no" dir="ltr">InteractiveWatchFaceClient.displayPressedAnimation</code>
      has been removed. (
      <a href="https://android-review.googlesource.com/#/q/Id87d2f42f4e051d400bff931595309fb20dbf489">Id87d2</a>
      )
    </li>
    <li>
      Added explicit threading annotation for setImportantForAccessibility (
      <a href="https://android-review.googlesource.com/#/q/I990faac25c6136591f97c8d4cdea0b3372f51af2">I990fa</a>
      )
    </li>
    <li>
      ComplicationSlotBoundsType has been moved to androidx-wear-watchface.ComplicationSlotBoundsType in wear/wear-watchface. (
      <a href="https://android-review.googlesource.com/#/q/I09420017bd5d811cc59f428add4c6f3a1fd9353a">I09420</a>
      )
    </li>
    <li>
      We have added support for passing string resource ids into UserStyleSetting and Options. This is now the recommended way to construct those objects. (
      <a href="https://android-review.googlesource.com/#/q/I03d5f65e8ad15cfd361778242786f7b9b8830693">I03d5f</a>
      )
    </li>
    <li>
      Limits have been imposed upon the maximum wire size of a UserStyle Schema. Also Icons in the schema must not be bigger than 400x400 pixels. (
      <a href="https://android-review.googlesource.com/#/q/I3b65b34f5018b0f28ca86552b91fceefa136f659">I3b65b</a>
      )
    </li>
    <li>
      We added a MutableUserStyle class to support changes to UserStyle instances (
      <a href="https://android-review.googlesource.com/#/q/I95a4097e1765c987b87f281c431ef64b2449cff7">I95a40</a>
      )
    </li>
    <li>
      We have renamed
      <code translate="no" dir="ltr">ListenableWatchFaceMetadataClient.Companion#listenableCreateWatchFaceMetadataClient</code>
      to
      <code translate="no" dir="ltr">ListenableWatchFaceMetadataClient.Companion#createListenableWatchFaceMetadataClient</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I64ce21f528ffcbb1717749b14d27035202987309">I64ce2</a>
      )
    </li>
    <li>
      We've modified EditorState.previewComplicationsData to only contain data for enabled complications, and we've added
      <code translate="no" dir="ltr">EditorSession.DEFAULT_PREVIEW_TIME_MILLIS</code>
      which if passed to
      <code translate="no" dir="ltr">renderWatchFaceToBitmap</code>
      or
      <code translate="no" dir="ltr">PreviewScreenshotParams</code>
      requests rendering with the watch face's default preview time. (
      <a href="https://android-review.googlesource.com/#/q/If7b3c08c2fc0bb70a3fb9ab5b2df8c6a86ff30d7">If7b3c</a>
      )
    </li>
    <li>
      We have removed UserStyleSetting constructors taking CharSequence from the public API. It's recommended to use the constructors that require StringResource IDs instead. (
      <a href="https://android-review.googlesource.com/#/q/I8537b7c6842e2cdcda0ed9e5c562d35a527bdbc6">I8537b</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">CurrentUserStyleRepository.UserStyleChangeListener</code>
      now supports SAM conversion. (
      <a href="https://android-review.googlesource.com/#/q/I8598927b8384af5b03b9b9e189c307d0901a3282">I85989</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha19" data-text="Version 1.0.0-alpha19" tabindex="-1">Version 1.0.0-alpha19</h4>
  <p>August 4, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha19</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/97264aa4532db7f7db1ffb3f42f3a9204971dbfc..d725303accfa9be6d5c3d61c7603ed1b9a780cbd/wear">Version 1.0.0-alpha19 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We've added
      <code translate="no" dir="ltr">ListenableWatchFaceMetadataClient.listenableCreateWatchFaceMetadataClient</code>
      which provides a
      <code translate="no" dir="ltr">ListenableFuture</code>
      wrapper for
      <code translate="no" dir="ltr">WatchFaceMetadataClient.createWatchFaceMetadataClient</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I5fa37e1f8b22279c5900b837a93b2e20f388a1fa">I5fa37</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">UserStyleOption.getOptionForId</code>
      now accepts
      <code translate="no" dir="ltr">UserStyleOption.Id</code>
      instead of a byte array. (
      <a href="https://android-review.googlesource.com/#/q/I469bed315164f9b8f3c9dc847d426f3798389468">I469be</a>
      )
    </li>
    <li>
      Provide constants
      <code translate="no" dir="ltr">BooleanOption.TRUE</code>
      and
      <code translate="no" dir="ltr">BooleanOption.FALSE</code>
      and disallow instance creation (
      <a href="https://android-review.googlesource.com/#/q/I46e096d6cc1d80a53e01f814ba337d57de8ba41b">I46e09</a>
      )
    </li>
    <li>
      Methods in wear-watchface-client that can throw RemoteException have now been annotated accordingly. (
      <a href="https://android-review.googlesource.com/#/q/Ib8438ef3e1bb63051f3ce7a8bff0da5bb58839fe">Ib8438</a>
      )
    </li>
    <li>
      For consistency we've renamed
      <code translate="no" dir="ltr">EditorSession.createOnWatchEditingSession</code>
      to
      <code translate="no" dir="ltr">createOnWatchEditorSession</code>
      , similarly
      <code translate="no" dir="ltr">createHeadlessEditingSession</code>
      is now
      <code translate="no" dir="ltr">createHeadlessEditorSession</code>
      . Their guava wrappers have also been renamed. (
      <a href="https://android-review.googlesource.com/#/q/I1526b764a598937eb0bc16dab2b32e35ce279cfc">I1526b</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">EditorSession</code>
      is now an interface and
      <code translate="no" dir="ltr">ListenableEditorSession.commitChangesOnClose</code>
      is now properly delegated. (
      <a href="https://android-review.googlesource.com/#/q/I7dc3ef8eea4ae8f5f11ccef7086d2909763ad411">I7dc3e</a>
      )
    </li>
    <li>
      We now reject any user style schema that has settings or options with conflicting IDs (
      <a href="https://android-review.googlesource.com/#/q/Ic27153688978dca2bd801b4d69af6296a2eb3b2c">Ic2715</a>
      )
    </li>
    <li>
      We have added an overloaded
      <code translate="no" dir="ltr">UserStyle.get</code>
      which accepts
      <code translate="no" dir="ltr">UserStyleSetting.Id</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I2aa0ff7c6075a91436fe9b5a87f935a1356862e2">I2aa0f</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha18" data-text="Version 1.0.0-alpha18" tabindex="-1">Version 1.0.0-alpha18</h4>
  <p>July 21, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha18</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/19ae3a88ff0824d615355b492cb56049e16991f2..97264aa4532db7f7db1ffb3f42f3a9204971dbfc/wear">Version 1.0.0-alpha18 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We moved
      <code translate="no" dir="ltr">ComplicationHelperActivity</code>
      to
      <code translate="no" dir="ltr">androidx.wear:wear-watchface</code>
      library. (
      <a href="https://android-review.googlesource.com/#/q/I39e76d0e26e7f56cba741a5a654176e0813ea424">I39e76</a>
      )
    </li>
    <li>
      For consistency and clarity,
      <code translate="no" dir="ltr">ComplicationProvider</code>
      has been renamed to
      <code translate="no" dir="ltr">ComplicationDataSource</code>
      and all classes with Provider in their name have been similarly renamed. (
      <a href="https://android-review.googlesource.com/#/q/Iaef0bf0ebfad43990f4cde8ff89048102a1c97bb">Iaef0b</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">CanvasComplication.isHighlighted</code>
      has been moved into
      <code translate="no" dir="ltr">RenderParameters.pressedComplicationSlotIds</code>
      this is a step towards making
      <code translate="no" dir="ltr">CanvasComplication</code>
      stateless. To support this change
      <code translate="no" dir="ltr">CanvasComplication.render</code>
      now also takes the
      <code translate="no" dir="ltr">slotId</code>
      as a parameter and we now pass the
      <code translate="no" dir="ltr">ComplicationSlot</code>
      into
      <code translate="no" dir="ltr">GlesTextureComplication</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I50e6e600d10f512689b680404eda737595b7a5e8">I50e6e</a>
      )
    </li>
    <li>
      We have added
      <code translate="no" dir="ltr">headlessDeviceConfig</code>
      to
      <code translate="no" dir="ltr">EditorRequest</code>
      , if non null this parameter is used to construct a headless instance to back the EditorSession rather than acting on the interactive instance. This allows the editor to be invoked for a watch face that isn't the current one. (
      <a href="https://android-review.googlesource.com/#/q/I0a8204d7ddd6fa8dac0e082877fc5c741ce1c26a">I0a820</a>
      )
    </li>
    <li>
      We've added an experimental
      <code translate="no" dir="ltr">WatchFaceMetadataClient</code>
      which allows efficient retrieval of static watch face metadata such as the
      <code translate="no" dir="ltr">UserStyleSchema</code>
      and fixed details about
      <code translate="no" dir="ltr">ComplicationSlots</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6bfdf94361b3b84eb5ac7313b44f748b186a3aae">I6bfdf</a>
      )
    </li>
    <li>
      We have renamed
      <code translate="no" dir="ltr">CanvasRenderer.uiThreadInit</code>
      to init. (
      <a href="https://android-review.googlesource.com/#/q/I6fff94f222fda71b99927fcfa7c8657682ba2868">I6fff9</a>
      )
    </li>
    <li>
      We've added PreviewScreenshotParams an optional new parameter for EditorRequest which instructs EditorSession to take a preview screenshot on commit with these parameter. The preview image is exposed on
      <code translate="no" dir="ltr">EditorState.previewImage</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ic2c1668f05a5d7fb9c73ea75a44f7499c4a5999c">Ic2c16</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Developers no longer need to add ComplicationHelperActivity to their own manifest. (
      <a href="https://android-review.googlesource.com/#/q/I6f0c2af08d927095e6bacbad49724fc2c33a282d">I6f0c2</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha17" data-text="Version 1.0.0-alpha17" tabindex="-1">Version 1.0.0-alpha17</h4>
  <p>June 30, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha17</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ccf79f53033e665475116a4e78ff124df2a52c4b..19ae3a88ff0824d615355b492cb56049e16991f2/wear">Version 1.0.0-alpha17 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      <p>
        In
        <code translate="no" dir="ltr">GlesRenderer</code>
        ,
        <code translate="no" dir="ltr">makeUiThreadContextCurrent</code>
        and
        <code translate="no" dir="ltr">makeBackgroundThreadContextCurrent</code>
        have been replaced by
        <code translate="no" dir="ltr">runUiThreadGlCommands</code>
        and
        <code translate="no" dir="ltr">runBackgroundThreadGlCommands</code>
        which both accept a
        <code translate="no" dir="ltr">Runnable</code>
        . The library ensures that only one GL command runnable is executing at any given time.
      </p>
    </li>
    <li>
      <p>
        To make UiThread initialziaion easier we’ve added
        <code translate="no" dir="ltr">CanvasRenderer.uiThreadInit</code>
        which is called once on the UiThread before any calls to render. We’ve also added
        <code translate="no" dir="ltr">onRendererCreated</code>
        to
        <code translate="no" dir="ltr">CanvasComplication</code>
        which makes it easier for
        <code translate="no" dir="ltr">Renderer</code>
        and
        <code translate="no" dir="ltr">CanvasComplication</code>
        to share state.
      </p>
    </li>
    <li>
      <p>
        For clarity we have renamed
        <code translate="no" dir="ltr">Complication</code>
        to
        <code translate="no" dir="ltr">ComplicationSlot</code>
        and
        <code translate="no" dir="ltr">complicationId</code>
        to either
        <code translate="no" dir="ltr">complicationSlotId</code>
        or
        <code translate="no" dir="ltr">complicationInstanceId</code>
        depending on usage
      </p>
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      For clarity we have renamed
      <code translate="no" dir="ltr">Complication</code>
      to
      <code translate="no" dir="ltr">ComplicationSlot</code>
      and
      <code translate="no" dir="ltr">complicationId</code>
      to either
      <code translate="no" dir="ltr">complicationSlotId</code>
      or
      <code translate="no" dir="ltr">complicationInstanceId</code>
      depending on usage. Classes using Complication have similarly been renamed e.g. ComplicationsManager is now called ComplicationSlotsManager. (
      <a href="https://android-review.googlesource.com/#/q/I4da44b7a9bf2d720ad241770f2b677a025d7a70e">I4da44</a>
      )
    </li>
    <li>
      In GlesRenderer
      <code translate="no" dir="ltr">makeUiThreadContextCurrent</code>
      and
      <code translate="no" dir="ltr">makeBackgroundThreadContextCurrent</code>
      have been replaced by
      <code translate="no" dir="ltr">runUiThreadGlCommands</code>
      and
      <code translate="no" dir="ltr">runBackgroundThreadGlCommands</code>
      which both accept a
      <code translate="no" dir="ltr">Runnable</code>
      . These functions are only needed if you need to make GL calls outside of render,
      <code translate="no" dir="ltr">runBackgroundThreadGlCommands</code>
      and
      <code translate="no" dir="ltr">onUiThreadGlSurfaceCreated</code>
      . This is required because there can be multiple GlesRenderers each with their own contexts in the same process, potentially from different watch faces. In addition access to the shared current GL context is now synchronized. (
      <a href="https://android-review.googlesource.com/#/q/I04d5982e80126be3e3dc26423cdf0a5006a79cd2">I04d59</a>
      )
    </li>
    <li>
      We have added
      <code translate="no" dir="ltr">CanvasRenderer.uiThreadInit</code>
      which is called once on the UiThread before any calls to render. Also for clarity in GlesRenderer we have renamed
      <code translate="no" dir="ltr">onGlContextCreated</code>
      to
      <code translate="no" dir="ltr">onBackgroundThreadGlContextCreated</code>
      , and
      <code translate="no" dir="ltr">onGlSurfaceCreated</code>
      to
      <code translate="no" dir="ltr">onUiThreadGlSurfaceCreated</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/If86d04e0a7faadb7f177716d3b18a8b8c640642f">If86d0</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">HeadlessWatchFaceClient</code>
      &amp;
      <code translate="no" dir="ltr">InteractiveWatchFaceClient</code>
      <code translate="no" dir="ltr">getComplicationsSlotState</code>
      has been renamed to
      <code translate="no" dir="ltr">getComplicationSlotsState</code>
      . In
      <code translate="no" dir="ltr">ComplicationSlot</code>
      :
      <code translate="no" dir="ltr">createRoundRectComplicationBuilder</code>
      ,
      <code translate="no" dir="ltr">createBackgroundComplicationBuilder</code>
      , and
      <code translate="no" dir="ltr">createEdgeComplicationBuilder</code>
      have been renamed to
      <code translate="no" dir="ltr">createRoundRectComplicationSlotBuilder</code>
      ,
      <code translate="no" dir="ltr">createBackgroundComplicationSlotBuilder</code>
      , and
      <code translate="no" dir="ltr">createEdgeComplicationSlotBuilder</code>
      respectively. (
      <a href="https://android-review.googlesource.com/#/q/Ib9adca0b03b4f27684eb55cd4e8328e98350bd66">Ib9adc</a>
      )
    </li>
    <li>
      We have added onRendererCreated to CanvasComplication which makes it easier for Renderer and CanvasComplication to share state. (
      <a href="https://android-review.googlesource.com/#/q/I5e1ac34833d9fab1eb54caa8f8f51f49c4d856e3">I5e1ac</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha16" data-text="Version 1.0.0-alpha16" tabindex="-1">Version 1.0.0-alpha16</h4>
  <p>June 16, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha16</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/86ff5b4bb956431ec884586ce0aea0127e189ec4..ccf79f53033e665475116a4e78ff124df2a52c4b/wear">Version 1.0.0-alpha16 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>We’ve fixed a number of bugs related to the recent threading model changes as well as addressing other issues with the on watch face editor.</li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Prevent NPE in
      <code translate="no" dir="ltr">onComplicationProviderChooserResult</code>
      (
      <a href="https://issuetracker.google.com/issues/189594557">b/189594557</a>
      )
    </li>
    <li>
      Fix issues with stale surfaces and drawBlack (
      <a href="https://issuetracker.google.com/issues/189452267">b/189452267</a>
      )
    </li>
    <li>
      Fix race in accessing
      <code translate="no" dir="ltr">complicationsManager.watchState</code>
      (
      <a href="https://issuetracker.google.com/issues/189457893">b/189457893</a>
      )
    </li>
    <li>
      Fix background thread lifetime bug (
      <a href="https://issuetracker.google.com/issues/189445428">b/189445428</a>
      )
    </li>
    <li>
      Fix Pre-R Watch face Editor issues (
      <a href="https://issuetracker.google.com/issues/189126313">b/189126313</a>
      )
    </li>
    <li>
      Don't update direct boot params for editor style changes (
      <a href="https://issuetracker.google.com/issues/187177307">b/187177307</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha15" data-text="Version 1.0.0-alpha15" tabindex="-1">Version 1.0.0-alpha15</h4>
  <p>June 2, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha15</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/66681ad83c328d0dd821b943bb3d375f02c1db61..86ff5b4bb956431ec884586ce0aea0127e189ec4/wear">Version 1.0.0-alpha15 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <p>The majority of watch face initialization is now done on a background thread, however after loading all watch face rendering etc is done on the UiThread. There is a memory barrier between loading and rendering so most user watch faces don’t need to do anything special. Watch faces using GLES may be an exception since the context is thread specific and we create two linked contexts so it’s possible to upload GL resources (e.g. textures and shaders) on the background thread and use them on the UiThread.</p>
  <p>
    We have split the construction of watchfaces into three functions: createUserStyleSchema, createComplicationsManager and createWatchFace. We assume that createUserStyleSchema and createComplicationsManager are fast and createWatchFace may take some time to load assets. Taking advantage of this we have introduced
    <code translate="no" dir="ltr">WatchFaceControlClient.getDefaultProviderPoliciesAndType</code>
    which returns a map of Complication Ids to DefaultComplicationProviderPolicies and the default ComplicationType. This is faster than creating a headless instance since it doesn’t need to fully initialize the watch face to perform the query.
  </p>
  <p>Finally complications are now constructed with a CanvasComplicationFactory which allows for lazy construction of the CanvasComplication renderers.</p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Replaced
      <code translate="no" dir="ltr">@TargetApi</code>
      with
      <code translate="no" dir="ltr">@RequiresApi</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I0184a41bcc214a5033f431f969f36ab5b9c174ae">I0184a</a>
      ,
      <a href="https://issuetracker.google.com/issues/187447093">b/187447093</a>
      ,
      <a href="https://issuetracker.google.com/issues/187447094">b/187447094</a>
      )
    </li>
    <li>
      We have introduced
      <code translate="no" dir="ltr">WatchFaceControlClient.getDefaultProviderPoliciesAndType</code>
      which returns a map of Complication Ids to DefaultComplicationProviderPolicies and the default ComplicationType. Where possible a fast path is used that avoids fully constructing a watch face. To facilitate this the WatchFaceService API has had to change with two new methods being: createUserStyleSchema and createComplicationsManager the results of which are passed into createWatchFace. In addition Complications are now constructed with a CanvasComplicationFactory which allows for lazy construction of the CanvasComplication renderers. (
      <a href="https://android-review.googlesource.com/#/q/Iad6c1414c4ff1792abaf2c60334fed74bd5b5686">Iad6c1</a>
      )
    </li>
    <li>
      We have removed MOST_RECENT_APP from SystemProviders. (
      <a href="https://android-review.googlesource.com/#/q/I3df00a615950bd4ee3e32bdfc8cb277e48c48b8c">I3df00</a>
      )
    </li>
    <li>
      ObservableWatchData is now a sealed class. (
      <a href="https://android-review.googlesource.com/#/q/Ic940ddaaca3f411fdbcf83e701694e4dbf381064">Ic940d</a>
      )
    </li>
    <li>
      CanvasComplicationFactory.create (which is typically io bound) is now called on a background thread for each complication before ui thread rendering commences. There is a memory barrier between construction and rendering so no special threading primitives are required. (
      <a href="https://android-review.googlesource.com/#/q/Ia18f25841808e4d6880b0f5187dd1cae85324861">Ia18f2</a>
      )
    </li>
    <li>
      Watchface construction is now done on a background thread although all rendering is done on the ui thread, GlesRenderer supports two linked contexts to support this. WatchFaceControlClient.createHeadlessWatchFaceClient and WatchFaceControlClient.getOrCreateInteractiveWatchFaceClient may resolve before WatchFaceService.createWatchFace has completed. Subsequent API calls will block until watchFace initialization has completed. (
      <a href="https://android-review.googlesource.com/#/q/Id9f416e2dc57612386f7361778d47d496dd4a4e2">Id9f41</a>
      )
    </li>
    <li>
      EXPANSION_DP and STROKE_WIDTH_DP are no longer visible in api.txt. (
      <a href="https://android-review.googlesource.com/#/q/I54801fdcc7b0c5657568c9cc3508b5da96cb39d9">I54801</a>
      )
    </li>
    <li>
      We have made EditorSession.createOnWatchEditingSession throw TimeoutCancellationException if there's an error instead of sending a null session. Additionally, the return value of EditorRequest.createFromIntent and EditorSession.createOnWatchEditingSession is now NonNull. (
      <a href="https://android-review.googlesource.com/#/q/I41eb47cbe25cdc5e945752f20cba0a56f3bbce05">I41eb4</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha14" data-text="Version 1.0.0-alpha14" tabindex="-1">Version 1.0.0-alpha14</h4>
  <p>May 18, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha14</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3d6f168394d1dd14e1d6f5b6dc4a0d405cb1a26a..66681ad83c328d0dd821b943bb3d375f02c1db61/wear">Version 1.0.0-alpha14 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">EditorSession.openComplicationProviderChooser</code>
      now returns ChosenComplicationProvider which contains the complication id,
      <code translate="no" dir="ltr">ComplicationProviderInfo</code>
      and a Bundle containing any additional extras returned by the provider chooser.
    </li>
    <li>In addition we have been steadily migrating code to Kotlin and the majority of the watch face API is now defined in Kotlin.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      GlesRenderer properties
      <code translate="no" dir="ltr">eglContext</code>
      and
      <code translate="no" dir="ltr">eglDisplay</code>
      are now non-nullable. Any GL errors are now reported via
      <code translate="no" dir="ltr">GlesRenderer.GlesException</code>
      rather than via RuntimeExceptions. (
      <a href="https://android-review.googlesource.com/#/q/Ib100510722daafabdb37b3d32aefc79824917c57">Ib1005</a>
      )
    </li>
    <li>
      We have migrated
      <code translate="no" dir="ltr">androidx.wear.watchface.complications.rendering.ComplicationDrawable</code>
      from Java to Kotlin (
      <a href="https://android-review.googlesource.com/#/q/Ibc3eb9084e8bf9b6261fc54a227898c587c200c6">Ibc3eb</a>
      )
    </li>
    <li>
      We have migrated
      <code translate="no" dir="ltr">androidx.wear.watchface.complications.rendering.ComplicationStyle</code>
      from Java to Kotlin (
      <a href="https://android-review.googlesource.com/#/q/I3375e0cda465c9fb52a993465f7e717e1fd2cf0a">I3375e</a>
      )
    </li>
    <li>
      We added information about the complication provider for each complication within EditorSession. (
      <a href="https://android-review.googlesource.com/#/q/I37f14f4867c495bfd9b67d9e32318e5a78eb33c7">I37f14</a>
      )
    </li>
    <li>
      We extended the result of
      <code translate="no" dir="ltr">EditorSession.openComplicationProviderChooser</code>
      to include information returned by the chosen. (
      <a href="https://android-review.googlesource.com/#/q/Iead6d1a7a7c64aeb4dd3d8d6f49a54b26c8f9c6a">Iead6d</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha13" data-text="Wear Complications &amp; Watchface Version 1.0.0-alpha13" tabindex="-1">Wear Complications &amp; Watchface Version 1.0.0-alpha13</h4>
  <p>May 5, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha13</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4ddfc1583c09aaa878d34437fbfee1b995b60d3a..3d6f168394d1dd14e1d6f5b6dc4a0d405cb1a26a/wear">Version 1.0.0-alpha13 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li><p>Watch faces can have important visual elements beyond showing the time and complications. To provide screen reader support for this, watchface can now specify accessibility ContentDescriptionLabels via the Renderer's additionalContentDescriptionLabels property. In addition, to control the ordering of ContentDescriptionLabels accessibilityTraversalIndex has been added to complications. This can be modified by a ComplicationsUserStyleSetting.</p></li>
    <li>
      <p>
        To encourage developers to carefully consider screen readers we have made
        <code translate="no" dir="ltr">ShortTextComplicationData.Builder</code>
        's,
        <code translate="no" dir="ltr">LongTextComplicationData.Builder</code>
        's and
        <code translate="no" dir="ltr">RangedValueComplicationData.Builder</code>
        's
        <code translate="no" dir="ltr">contentDescription</code>
        field mandatory to be passed into their constructors. If
        <code translate="no" dir="ltr">ComplicationText.EMPTY</code>
        is passed in for the
        <code translate="no" dir="ltr">contentDescription</code>
        , a
        <code translate="no" dir="ltr">contentDescription</code>
        will be automatically generated from the text and title.
      </p>
    </li>
    <li>
      <p>
        <code translate="no" dir="ltr">WatchFaceControlClient.getOrCreateInteractiveWatchFaceClient</code>
        now throws
        <code translate="no" dir="ltr">ServiceStartFailureException</code>
        if the watchface throws an exception during init, this makes it much easier to diagnose issues during watch face startup.
      </p>
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We added support for having a null component name in ComplicationProviderInfo, which is needed to support older versions of Wear OS. (
      <a href="https://android-review.googlesource.com/#/q/I744d23cebf1d658c0066d63f4b989a078dc828f9">I744d2</a>
      )
    </li>
    <li>
      We have migrated
      <code translate="no" dir="ltr">androidx.wear.complications.SystemProviders</code>
      from Java to Kotlin. (
      <a href="https://android-review.googlesource.com/#/q/Ia1f8bd1a6ed1e129b0fcc469781aa06a7f03dc90">Ia1f8b</a>
      )
    </li>
    <li>
      We have hidden all classes from public API that are in android.support.wearable.complications and created corresponding wrappers in AndroidX where needed. (
      <a href="https://android-review.googlesource.com/#/q/I7bd50e3bd368ae14883ad2c4802404a1c424ab3f">I7bd50</a>
      )
    </li>
    <li>
      We have renamed method in
      <code translate="no" dir="ltr">TimeDifferenceComplicationText.Builder</code>
      from
      <code translate="no" dir="ltr">setMinimumUnit</code>
      to
      <code translate="no" dir="ltr">setMinimalTimeUnit</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I20c64730819afd73e0bc0531315565d31ea21ada">I20c64</a>
      )
    </li>
    <li>
      We have made
      <code translate="no" dir="ltr">ShortTextComplicationData.Builder</code>
      's,
      <code translate="no" dir="ltr">LongTextComplicationData.Builder</code>
      's and
      <code translate="no" dir="ltr">RangedValueComplicationData.Builder</code>
      's
      <code translate="no" dir="ltr">contentDescription</code>
      field mandatory to be passed in constructor. (
      <a href="https://android-review.googlesource.com/#/q/I8cb69eb4bf900fb76eae8d2bb39af1297d490b6f">I8cb69</a>
      )
    </li>
    <li>
      We have renamed ComplicationProviderService.onComplicationUpdate to onComplicationRequest and encapsulated id and type parameter of this method into data ComplicationRequest. Corresponding listener has been renamed to ComplicationRequestListener and its method ComplicationRequestListener.onComplicationData. (
      <a href="https://android-review.googlesource.com/#/q/Iaf146c9495ce65ec8a3a13908979bc79277da6d8">Iaf146</a>
      )
    </li>
    <li>
      We have removed method
      <code translate="no" dir="ltr">isActiveAt</code>
      from
      <code translate="no" dir="ltr">ComplicationData</code>
      and exposed field
      <code translate="no" dir="ltr">validTimeRange</code>
      instead of it. This method call can be replaced with
      <code translate="no" dir="ltr">validTimeRange.contains</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I65936f9b3b4d6c2acf3f64be2773e92600e55d9c">I65936</a>
      )
    </li>
    <li>
      We have changed description of the method ComplicationProviderService.onComplicationActivated to receive a ComplicationType instead of an int. (
      <a href="https://android-review.googlesource.com/#/q/Idb5ffd58898956aba178505c0791c434fcea9239">Idb5ff</a>
      )
    </li>
    <li>
      Migrated ProviderUpdateRequester from Java to Koltin. (
      <a href="https://android-review.googlesource.com/#/q/Ibce13d8a9e244164640ade18afccf3e80af31250">Ibce13</a>
      )
    </li>
    <li>
      GlesRender.makeContextCurrent is now public. Watch face code may need to make gl calls outside of render and onGlContextCreated and because there may be both an interactive and a headless context its necessary to call this. (
      <a href="https://android-review.googlesource.com/#/q/I8a43ce92884892b6131c0b1fe2e08019c9f38fa1">I8a43c</a>
      )
    </li>
    <li>
      WatchFaceControlClient.getOrCreateInteractiveWatchFaceClient now throws ServiceStartFailureException if the watchface throws during init. In addition WatchFaceService now throws an exception if createWatchFace takes longer than 6 seconds. (
      <a href="https://android-review.googlesource.com/#/q/I59b2f354e62a71eea1b4b4d5da9309e3968b3b2e">I59b2f</a>
      )
    </li>
    <li>
      We have removed the unused id property of
      <code translate="no" dir="ltr">GlesTextureComplication</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I28958350f962380a962b520425ae6e5d3acc5536">I28958</a>
      )
    </li>
    <li>
      The watchface can now specify accessibility ContentDescriptionLabels via the
      <code translate="no" dir="ltr">Renderer</code>
      's additionalContentDescriptionLabels property. In addition to controlling the ordering of ContentDescriptionLabels accessibilityTraversalIndex has been added to complications. This can be modified by a ComplicationsUserStyleSetting. (
      <a href="https://android-review.googlesource.com/#/q/Ib7362def16d52e924f7db5fdcfedb000683e7103">Ib7362</a>
      )
    </li>
    <li>
      Expand documentation about touch event handling in the watch face. (
      <a href="https://android-review.googlesource.com/#/q/Iaf31ef431003a29c90228fc1866ef85e2651be55">Iaf31e</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">EditorSession.getComplicationsPreviewData()</code>
      now returns a map for every rather only non-empty complications. An instance of EmptyComplicationData is used for empty complications. (
      <a href="https://android-review.googlesource.com/#/q/I1ef7e9c1c9919a3103e83fdfb4f3c005962287db">I1ef7e</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha12" data-text="Wear Complications &amp; Watchface Version 1.0.0-alpha12" tabindex="-1">Wear Complications &amp; Watchface Version 1.0.0-alpha12</h4>
  <p>April 21, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha12</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/24330de8135d689b34a31a701181b20549e8db25..4ddfc1583c09aaa878d34437fbfee1b995b60d3a/wear">Version 1.0.0-alpha12 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <p>Watch face editors need to highlight parts of the watch face to help convery which aspect of a watch is being configured. We’ve extended RenderParameters to allow styles as well as complications to be highlighted. There’s a new optional HighlightLayer which is intended to be matted on top of the watch face with alpha transparency (the screenshot apis can do this matting for you, or provide the HighlightLayer on its own for maximum flexibility). E.g. suppose you had a style that lets you configure the appearance of the watch hands, your renderer in its renderHighlightLayer can draw an outline around them.</p>
  <p>To encourage Complication Provider support for accessibility we have made PhotoImageComplicationData.Builder's, MonochromaticImageComplicationData.Builder's and SmallImageComplicationData.Builder's contentDescription field to be a mandatory constructor argument. ComplicationTapFilter and Complication.createEdgeComplicationBuilder have been added to support edge complications (drawn around the edge of the screen). Rendering and hit testing of edge complications is left up to the watch face. Edge hit testing isn't supported from the companion editor.</p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">PROVIDER_</code>
      prefix to constants in SystemProviders. (
      <a href="https://android-review.googlesource.com/#/q/I1e77397a99f7d2051dc0a0467c37eeb4ecb38428">I1e773</a>
      )
    </li>
    <li>
      We have made
      <code translate="no" dir="ltr">PhotoImageComplicationData.Builder</code>
      's,
      <code translate="no" dir="ltr">MonochromaticImageComplicationData.Builder</code>
      's and
      <code translate="no" dir="ltr">SmallImageComplicationData.Builder</code>
      's
      <code translate="no" dir="ltr">contentDescription</code>
      field mandatory to be passed in constructor. (
      <a href="https://android-review.googlesource.com/#/q/I9643a7aa0ce3033716e2221462f8cfbe590ceaf5">I9643a</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ProviderInfoRetriever.requestPreviewComplicationData</code>
      has been renamed to
      <code translate="no" dir="ltr">retrievePreviewComplicationData</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I911ee7c3209007628d9ad0536be5b2f3ffc08abb">I911ee</a>
      )
    </li>
    <li>
      Migrated
      <code translate="no" dir="ltr">ComplicationProviderService</code>
      from Java to Koltin. (
      <a href="https://android-review.googlesource.com/#/q/I849f2d505096682acb71c10d8e28bb991b3d9c0c">I849f2</a>
      )
    </li>
    <li>
      Method
      <code translate="no" dir="ltr">ComplicationProviderService.onBind</code>
      is now final (
      <a href="https://android-review.googlesource.com/#/q/I39af51b7ab16c4d75314899c72bb805e475131cb">I39af5</a>
      )
    </li>
    <li>
      We've reinstated interface
      <code translate="no" dir="ltr">CanvasComplication</code>
      and moved
      <code translate="no" dir="ltr">CanvasComplicaitonDrawable</code>
      ,
      <code translate="no" dir="ltr">GlesTextureComplication</code>
      and
      <code translate="no" dir="ltr">ComplicationHighlightRenderer</code>
      to
      <code translate="no" dir="ltr">wear-watchface-complications-rendering</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I8467022e6958f6d1d6aadb6e8edf0cdd948bb1ae">I84670</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">RenderParameters</code>
      has been refactored to support extended highlight rendering. It's now possible to request rendering of highlights for styles as well as all or a single complication. In addition CanvasRenderer and GlesRenderer how have a new abstract renderHighlightLayer method for rendering any highlighting requested by the editor. Layer has been renamed to WatchFaceLayer. (
      <a href="https://android-review.googlesource.com/#/q/Ic24444dc23aa6e0ed9075d88ae92f167102a1791">Ic2444</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComplicationTapFilter</code>
      and
      <code translate="no" dir="ltr">Complication.createEdgeComplicationBuilder</code>
      have been added to support edge complications. Rendering and hit testing of edge complications is left up to the watch face. Hit testing isn't supported from within editors. (
      <a href="https://android-review.googlesource.com/#/q/Ia6604405b67d1004314b143c7a767a0624a1ff3b">Ia6604</a>
      )
    </li>
    <li>
      For
      <code translate="no" dir="ltr">DoubleRangeUserStyleSetting</code>
      &amp;
      <code translate="no" dir="ltr">LongRangeUserStyleSetting</code>
      :
      <code translate="no" dir="ltr">defaultValue</code>
      ,
      <code translate="no" dir="ltr">maximumValue</code>
      and
      <code translate="no" dir="ltr">minimumValue</code>
      are now kotlin properties. In addition,
      <code translate="no" dir="ltr">UserStyleSetting.Option</code>
      functions like toBooleanOption, toCoplicationOptions, toListOption and similar have been removed. (
      <a href="https://android-review.googlesource.com/#/q/I52899a374e0f5c4bf164c3b3a0ccc3d5d69b96e1">I52899</a>
      )
    </li>
    <li>
      Add chin size to the properties of the device available to the watch face. (
      <a href="https://android-review.googlesource.com/#/q/I76e1e578f0f32372ba8e540ac0b158b88ff92ba0">I76e1e</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComplicationHighlightRenderer</code>
      's constructor now accepts
      <code translate="no" dir="ltr">outlineExpansion</code>
      and
      <code translate="no" dir="ltr">outlineStrokeWidth</code>
      parameters. (
      <a href="https://android-review.googlesource.com/#/q/I87009b21512d77fd861999420674f428987df36e">I87009</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComplicationDrawable.getNoDataText</code>
      is now part of the public API. (
      <a href="https://android-review.googlesource.com/#/q/I00598f90e553549698c67ea4b699b7fb54d6f70f">I00598</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha11" data-text="Version 1.0.0-alpha11" tabindex="-1">Version 1.0.0-alpha11</h4>
  <p>April 7, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha11</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/5c42896eb6591b09e3952030fb7ea8d9b8c42713..24330de8135d689b34a31a701181b20549e8db25/wear">Version 1.0.0-alpha11 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      More polish has been applied to the watch face APIs. Most of the changes are simple renamings but
      <code translate="no" dir="ltr">InteractiveWatchFaceWcsClient</code>
      and
      <code translate="no" dir="ltr">InteractiveWatchFaceSysUiClient</code>
      have been merged into
      <code translate="no" dir="ltr">InteractiveWatchFaceClient</code>
      .
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      ContentDescriptionLabel.text is now a ComplicationText rather than the old wearable support library TimeDependentText. (
      <a href="https://android-review.googlesource.com/#/q/I80c03a2ce3092e7c571df230515c8ed8121fe4e1">I80c03</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">SystemProviders.GOOGLE_PAY</code>
      is not guaranteed to be present on all Android R devices so it has been removed from the list. It's still possible to use this provider via
      <code translate="no" dir="ltr">DefaultComplicationProviderPolicy</code>
      (
      <a href="https://android-review.googlesource.com/#/q/If01b508bf26e1537da0f6a47f535a38a9d0c85be">If01b5</a>
      )
    </li>
    <li>
      We've renamed ComplicationUpdateCallback to ComplicationUpdateListener for consistency. (
      <a href="https://android-review.googlesource.com/#/q/I61ec7b97abae1fbb590453dcfd1e6d323c4e3dcb">I61ec7</a>
      )
    </li>
    <li>
      The UserStyle wire format map has been changed to
      <code translate="no" dir="ltr">Map&lt;String, byte[]&gt;</code>
      and for convenience a
      <code translate="no" dir="ltr">UserStyleData</code>
      class has been added to the public API and is now used by wear-watchface-client and wear-watchface-editor. In addition CustomValueUserStyleSetting.CustomValueOption.value is now
      <code translate="no" dir="ltr">byte[]</code>
      instead of
      <code translate="no" dir="ltr">String</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Iaa103736ab143ef4f6303db2529d416b4a28b1ca">Iaa103</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">UserStyleSetting</code>
      and
      <code translate="no" dir="ltr">UserStyleSetting.Option</code>
      now use
      <code translate="no" dir="ltr">UserStyleSetting.Id</code>
      and
      <code translate="no" dir="ltr">UserStyleSetting.Option.Id</code>
      respectively to store their ids rather than a String. (
      <a href="https://android-review.googlesource.com/#/q/I63f722e8ae9814892bb238007c498f22f5fcfbb4">I63f72</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">InteractiveWatchFaceClient.SystemState</code>
      has been renamed to
      <code translate="no" dir="ltr">WatchUiState</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6a4e0f8fd3811cdd22bd0b58f0e97accee3b3e0d">I6a4e0</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">InteractiveWatchFaceWcsClient</code>
      and
      <code translate="no" dir="ltr">InteractiveWatchFaceSysUiClient</code>
      have been merged because it was hard to explain the division of responsibility (
      <a href="https://android-review.googlesource.com/#/q/Iff3fa02c0a40a9ae8ac2696a1ba76cd06273d311">Iff3fa</a>
      )
    </li>
    <li>
      Layer enum values have been renamed for clarity.
      <code translate="no" dir="ltr">Layer#TOP_LAYER</code>
      is now
      <code translate="no" dir="ltr">Layer#COMPLICATIONS_OVERLAY</code>
      and
      <code translate="no" dir="ltr">Layer#BASE_LAYER</code>
      is now
      <code translate="no" dir="ltr">Layer#BASE</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ia144eca1c93fb57841e47e396cc442b86f5b2b0a">Ia144e</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">UserStyleListener</code>
      has been renamed to
      <code translate="no" dir="ltr">UserStyleChangeListener</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I185243bbd2723439457e75f78b3e145f1f1854a0">I18524</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">UserStyleRepository</code>
      has been renamed to
      <code translate="no" dir="ltr">CurrentUserStyleRepository</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I6ea531f4e0c9cdce6125ecf661c8548c4cb870e8">I6ea53</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">InteractiveWatchFaceWcsClient.updateInstance</code>
      has been renamed to
      <code translate="no" dir="ltr">updateWatchfaceInstance</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I321dc89e3b46d523245c76080b9491657834bcca">I321dc</a>
      )
    </li>
    <li>
      WatchFace TapType events have been renamed to align with MotionEvents / Compose. (
      <a href="https://android-review.googlesource.com/#/q/I0dfd0d1f55f13d583c2383aaee5775aa5446a8ff">I0dfd0</a>
      )
    </li>
    <li>
      takeWatchfaceScreenshot has been renamed to renderWatchFaceToBitmap, and takeComplicationScreenshot has been renamed to renderComplicationToBitmap (
      <a href="https://android-review.googlesource.com/#/q/Ie0697af81b3b9aca215b8916c64e7bfd3c24b2e3">Ie0697</a>
      )
    </li>
    <li>
      The CanvasComplication interface has been removed in favor of the open class CanvasComplicationDrawable. (
      <a href="https://android-review.googlesource.com/#/q/I1f81f33d4bf34b69d9014676e9b467c4dae6cd18">I1f81f</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">WatcfaceControlServiceFactory</code>
      has been removed from the public api. (
      <a href="https://android-review.googlesource.com/#/q/I1f8d3c6c8be716b9b5316f7197ce032b7b7b3ad9">I1f8d3</a>
      )
    </li>
    <li>
      We've renamed
      <code translate="no" dir="ltr">CanvasComplication.setData</code>
      to
      <code translate="no" dir="ltr">CanvasComplication.loadData</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/If1239a257d3cfad2abcba02a246461993ac69426">If1239</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComplicationsManager.bringAttentionToComplication</code>
      has been renamed to
      <code translate="no" dir="ltr">displayPressedAnimation</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ic4297c90db7536b0fc07f61588b217bfe4beae25">Ic4297</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">WatchFaceService.createWatchFace</code>
      now has an
      <code translate="no" dir="ltr">@UiThread</code>
      annotation. (
      <a href="https://android-review.googlesource.com/#/q/Ib54c292a1a50031544b934644039bd1de0966575">Ib54c2</a>
      )
    </li>
    <li>
      Changed the name of a CanvasComplicationDrawable parameter to fix a bug. (
      <a href="https://android-review.googlesource.com/#/q/I50dac9dd98c1461e44427134813d1866f1476f94">I50dac</a>
      )
    </li>
    <li>
      We've added
      <code translate="no" dir="ltr">HeadlessWatchFaceClient.toBundle()</code>
      and
      <code translate="no" dir="ltr">HeadlessWatchFaceClient.createFromBundle</code>
      to support sending
      <code translate="no" dir="ltr">HeadlessWatchFaceClient</code>
      over AIDL. (
      <a href="https://android-review.googlesource.com/#/q/I07c35ca36d0ecae0c8e0b8cd926b38c602b2d9d8">I07c35</a>
      )
    </li>
    <li>
      HeadlessWatchFaceClient and InteractiveWatchFaceClient now have ClientDisconnectListener and isConnectionAlive() to allow you to observe if the connection is broken for some reason (e.g. the watchface being killed). (
      <a href="https://android-review.googlesource.com/#/q/Ie446d8b50110c9d2992378ff8d8642707db7d2d1">Ie446d</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">WatchFaceControlClient#getOrCreateWallpaperServiceBackedInteractiveWatchFaceWcsClientAsync</code>
      is now a suspend function and has been renamed to
      <code translate="no" dir="ltr">getOrCreateInteractiveWatchFaceClient</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ib745d13d911ffbb90d3cf9a961e469143fe8aaef">Ib745d</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">EditorState.commitChanges</code>
      and
      <code translate="no" dir="ltr">hasCommitChanges()</code>
      has been renamed to
      <code translate="no" dir="ltr">shouldCommitChanges()</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I06e0407f2473e7884145ed418b9438b93017ecfd">I06e04</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">previewComplicationData</code>
      has been renamed to
      <code translate="no" dir="ltr">previewComplicationsData</code>
      to indicate theres (usually) more than one complication in the map. (
      <a href="https://android-review.googlesource.com/#/q/I56c062bffef9d922a95abf8f2015cf716b105211">I56c06</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">InteractiveWatchFaceWcsClient.bringAttentionToComplication</code>
      has been renamed to
      <code translate="no" dir="ltr">displayPressedAnimation</code>
      for consistency with
      <code translate="no" dir="ltr">ComplicationsManager.displayPressedAnimation</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ic9999c10a88f44faf88e186bc4437056575e6605">Ic9999</a>
      )
    </li>
    <li>
      All instances of watchface instance id have been encapsulated in a new WatchFaceId class (
      <a href="https://android-review.googlesource.com/#/q/I45fdf4b8e7a0b1ac7262856191bcb021fb2dd911">I45fdf</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">complicationState</code>
      property has been renamed to
      <code translate="no" dir="ltr">complicationsState</code>
      to indicate plurality. (
      <a href="https://android-review.googlesource.com/#/q/Ided07073723d9115dedd9b37f2327e4c36893e0c">Ided07</a>
      )
    </li>
    <li>
      We've removed the various wear-watchface-client Binder conversions, they should be necessary. (
      <a href="https://android-review.googlesource.com/#/q/Icc4c02ef623b142b7d5d2a7fed86b2bb4930d7a4">Icc4c0</a>
      )
    </li>
    <li>
      For consistency
      <code translate="no" dir="ltr">EditorServiceClient</code>
      has been refactored to use listeners instead of observers. (
      <a href="https://android-review.googlesource.com/#/q/Iec3a437e9583fbd7ca0835a2068cc306d6fa49f1">Iec3a4</a>
      )
    </li>
    <li>
      We've added a couple of missing
      <code translate="no" dir="ltr">@Px</code>
      annotations to
      <code translate="no" dir="ltr">InteractiveWatchFaceSysUiClient</code>
      and
      <code translate="no" dir="ltr">WatchFaceControlClient</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I3277a824046ea85c10439e02df89dbb6b842d7a5">I3277a</a>
      )
    </li>
    <li>
      Renamed EditorObserverCallback to EditorObserverListener for consistency. (
      <a href="https://android-review.googlesource.com/#/q/Ie572d57d0075f83219f721f76fc93b8860439f17">Ie572d</a>
      )
    </li>
    <li>
      EditorState.watchFaceInstanceId is restricted to Android R API level and above and is no longer nullable. (
      <a href="https://android-review.googlesource.com/#/q/Id52bb6d9ebc1d92cbff2deeda788f54e58e75113">Id52bb</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">EditorSession.launchComplicationProviderChooser</code>
      has been renamed to
      <code translate="no" dir="ltr">openComplicationProviderChooser</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9d441b6cc55549a73832f38194180d9c6c6ddd14">I9d441</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">EditorSession.createOnWatchEditingSessionAsync</code>
      has been renamed to
      <code translate="no" dir="ltr">createOnWatchEditingSession</code>
      and is now a suspend function. (
      <a href="https://android-review.googlesource.com/#/q/Id257baf80bca3fa8f97aa106684444e41f35fd5d">Id257b</a>
      )
    </li>
    <li>
      Added several missing
      <code translate="no" dir="ltr">@UiThread</code>
      annotations on
      <code translate="no" dir="ltr">EditorSession</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6935ce9865b194764437c77b305d20f875b66806">I6935c</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">UserStyleSetting.affectsLayers</code>
      has been renamed to
      <code translate="no" dir="ltr">affectedLayers</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6e22bf8a630776c9ca8f30c5214e9f4224999b0d">I6e22b</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha10" data-text="Version 1.0.0-alpha10" tabindex="-1">Version 1.0.0-alpha10</h4>
  <p>March 24, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha10</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/52fbd7ed5b07ca4431fa828325a1f8da45b02e51..5c42896eb6591b09e3952030fb7ea8d9b8c42713/wear">Version 1.0.0-alpha10 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>It’s now possible to create open gl objects (e.g. textures) during WatchFaceService.createWatchFace because GlesRenderer now requires an explicit call to initOpenGLContext which can be done inside createWatchFace.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">IdAndComplicationData</code>
      was a bit awkward and has been removed from the public API. Classes &amp; interfaces that used it have been refactored. (
      <a href="https://android-review.googlesource.com/#/q/I4c92843bda1adcaeab5b1db692ae71b9ebc1353f">I4c928</a>
      )
    </li>
    <li>
      We've replaced
      <code translate="no" dir="ltr">ReferenceTime</code>
      with
      <code translate="no" dir="ltr">CountUpTimeReference</code>
      and
      <code translate="no" dir="ltr">CountDownTimeReference</code>
      which are more self explanatory. (
      <a href="https://android-review.googlesource.com/#/q/Ib66c634425f70816b3762ab1f64a993cfe633581">Ib66c6</a>
      )
    </li>
    <li>
      Added some missing
      <code translate="no" dir="ltr">@Px</code>
      and
      <code translate="no" dir="ltr">@ColorInt</code>
      annotations. (
      <a href="https://android-review.googlesource.com/#/q/I9bbc3031af93f9bb09ffd5aad4751bb5d487aa3e">I9bbc3</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">Complication.complicationConfigExtras</code>
      is now non-nullable and defaults to
      <code translate="no" dir="ltr">Bundle.EMPTY</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Iad04f911e5e612373bda6ab10f2c7874800e92d4">Iad04f</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">GlesRenderer</code>
      now requires you to call
      <code translate="no" dir="ltr">initOpenGLContext</code>
      after construction. This function was an internal detail but is now on the public API to allow GL calls earlier inside createWatchFace. (
      <a href="https://android-review.googlesource.com/#/q/I726c279f6e7ae6185b1a446c0e314c4286673d1f">I726c2</a>
      )
    </li>
    <li>
      We've removed
      <code translate="no" dir="ltr">Complication.setRenderer</code>
      as it should not be needed. (
      <a href="https://android-review.googlesource.com/#/q/Ie992fabad06e17527b17a3b9a258615d6404849e">Ie992f</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">Complicaiton.setComplicationBounds</code>
      is no longer part of the public API. If you need to adjust the position of a complication, this can be done via
      <code translate="no" dir="ltr">ComplicationsUserStyleSetting</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ibd9e5f1f8d44f5ab4c8842e5117fa5aebb2fef7e">Ibd9e5</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComplicationsManager.TapCallback.onComplicationSingleTapped</code>
      has been renamed to
      <code translate="no" dir="ltr">onComplicationTapped</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I3a55cf884e7c4f7899774975ff02811a8fd1c967">I3a55c</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComplicationOutlineRenderer.drawComplicationSelectOutline</code>
      has been renamed to
      <code translate="no" dir="ltr">drawComplicationOutline</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I14b8857a5903560b22379f2e383368b0b00d0830">I14b88</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha09" data-text="Version 1.0.0-alpha09" tabindex="-1">Version 1.0.0-alpha09</h4>
  <p>March 10, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-complications-*:1.0.0-alpha09</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-watchface-*:1.0.0-alpha09</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/5c90131a69042a6a3e13952e1da9e7ffc571c31d..52fbd7ed5b07ca4431fa828325a1f8da45b02e51/wear">Version 1.0.0-alpha09 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      The interface between WCS/SysUI host and the on watch face has evolved. It’s now possible for an editor to determine if a style change will enable or disable a complication (enabled = initiallyEnabled plus any override from ComplicationsUserStyleSetting). Also
      <code translate="no" dir="ltr">EditorService.closeEditor</code>
      allows SysUI to remotely close an on watch face editor if needed.
    </li>
    <li>
      In addition
      <code translate="no" dir="ltr">InteractiveWatchFaceWcsClient.setUserStyle</code>
      with a more powerful command
      <code translate="no" dir="ltr">updateInstance</code>
      which: changes the instance ID, sets the style, and clears complications all in one go.
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      TraceEvents have been added to the watchface libraries. (
      <a href="https://android-review.googlesource.com/#/q/I1a1417e576e9c871cab63c4eb6a0fc60e82842a6">I1a141</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComplicationState</code>
      now has a new property
      <code translate="no" dir="ltr">initiallyEnabled</code>
      which is useful for predicting the consequences of switching styles. (
      <a href="https://android-review.googlesource.com/#/q/I8c9052560ad5b68d88d3e2b05255017ea7087a2f">I8c905</a>
      )
    </li>
    <li>
      We've replaced
      <code translate="no" dir="ltr">InteractiveWatchFaceWcsClient.setUserStyle</code>
      with a more powerful command
      <code translate="no" dir="ltr">updateInstance</code>
      which: changes the instance ID, sets the style, and clears complications. (
      <a href="https://android-review.googlesource.com/#/q/Ife6f658e8d86d85f986d66d52e00d84d1884cd19">Ife6f6</a>
      )
    </li>
    <li>
      WatchFaceClient screenshot APIs no longer compress the screenshots because that was slow, instead we leave any post processing up to the caller. (
      <a href="https://android-review.googlesource.com/#/q/Id35af41e21a27ce412542f8bbb40a66991695d26">Id35af</a>
      )
    </li>
    <li>
      It's now possible to remotely close an on watchface editor via
      <code translate="no" dir="ltr">EditorService.closeEditor</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ic5aa4a1ac99cff2303a2116007b68dae18a4c579">Ic5aa4</a>
      )
    </li>
    <li>
      Added nullability annotations (
      <a href="https://android-review.googlesource.com/#/q/Ic16ed43e46dfd51803d40e6332b0cf34467aaf7c">Ic16ed</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha08" data-text="Version 1.0.0-alpha08" tabindex="-1">Version 1.0.0-alpha08</h4>
  <p>February 24, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha08</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/602cf9bff5e74e4355760aa47d3fc73a2e6d779b..5c90131a69042a6a3e13952e1da9e7ffc571c31d/wear">Version 1.0.0-alpha08 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Some watch faces are designed around one or more specific complications, to support this we’ve added Complication.Builder#setFixedComplicationProvider which if set to true prevents the user from changing the complication in that slot.</li>
    <li>The watchface libraries are Kotlin first and use coroutines (e.g. suspend functions). For Java users we’ve provided ListenableFuture wrappers to improve interoperability in the following libraries: wear/wear-watchface-guava, wear/wear-watchface-client-guava &amp; wear/wear-watchface-editor-guava.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We've removed support for double taps on complications launching the provider chooser, this feature wasn't common in watchfaces and complicated the implementation of SysUI. (
      <a href="https://android-review.googlesource.com/#/q/I3ef24322bbbb76a6a441954b7c31342966567ed2">I3ef24</a>
      )
    </li>
    <li>
      ProviderInfoRetriever methods may throw ServiceDisconnectedException if the binder closes unexpectedly. (
      <a href="https://android-review.googlesource.com/#/q/Ib2cc462394e39b42e28d6e1d0af911d67923563b">Ib2cc4</a>
      )
    </li>
    <li>
      From Android 11 onwards, there are restrictions on when the ProviderChooser can be run, in addition we'd like editors to be built with the new
      <code translate="no" dir="ltr">wear-watchface-editor</code>
      so ComplicationHelperActivity is being removed from the public API. (
      <a href="https://android-review.googlesource.com/#/q/Ib19c1b175b8927432b834465c0689641d371d6f9">Ib19c1</a>
      )
    </li>
    <li>
      Remove ComplicationText static methods in favor of builders. (
      <a href="https://android-review.googlesource.com/#/q/Ibe3992ba05ac2abbc7be71a7c473eec173996d9f">Ibe399</a>
      )
    </li>
    <li>
      We have introduced guava ListenableFuture wrappers for the various watch face library suspended methods. (
      <a href="https://android-review.googlesource.com/#/q/I16b2c5ed3c54db97661dd2e94288e0e18e21a443">I16b2c</a>
      )
    </li>
    <li>
      For API clarity we've added a secondary constructor to RenderParameters which doesn't require a tint, for use with LayerModes other than
      <code translate="no" dir="ltr">LayerMode.DRAW_OUTLINED</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I497ea29cb4671fd2082eaca66d18ff36068f639c">I497ea</a>
      )
    </li>
    <li>
      Previously ListUserStyleSetting was different from the other because it had a default argument. Now all the StyleSetting subclass constructors take the default value last. (
      <a href="https://android-review.googlesource.com/#/q/I9dbfdb05d8dd7fe96c43f870d92843020370c3dd">I9dbfd</a>
      )
    </li>
    <li>
      CanvasComplication has been refactored to use have a hidden method, which makes it easier to implement a subclass (
      <a href="https://android-review.googlesource.com/#/q/I5b32176f98042a1b6affda73e492bdd25fa7d774">I5b321</a>
      )
    </li>
    <li>
      We have refactored away EditorResult in favor of a new EditorService and
      <code translate="no" dir="ltr">EditorSession.broadcastState()</code>
      to stream updates to an observer (typically SysUI). (
      <a href="https://android-review.googlesource.com/#/q/Ic4370d0f48b622a5ecf4c9424ec1fe9f988dcd39">Ic4370</a>
      )
    </li>
    <li>
      Some watchfaces are built around a particular complication as an integral part of the watch face where the provider is not user configurable. To support this we've added
      <code translate="no" dir="ltr">Complication.Builder#setFixedComplicationProvider</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I4509e9a0fbfe08d6614c9b684c216200fc0d772e">I4509e</a>
      )
    </li>
    <li>
      EditorRequest now specifies package name rather than ComponentName because it was inconvenient for SysUI to look up the class name of the editor, and we only really need the package name. (
      <a href="https://android-review.googlesource.com/#/q/Ib68146df783dca74b2944d60fa5e5a762a2348d9">Ib6814</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha07" data-text="Version 1.0.0-alpha07" tabindex="-1">Version 1.0.0-alpha07</h4>
  <p>February 10, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha07</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/aee18b103203a91ee89df91f0af5df2ecff356d6..602cf9bff5e74e4355760aa47d3fc73a2e6d779b/wear">Version 1.0.0-alpha07 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>WatchFaceService.createWatchFace is now a suspend function which means the watchface no longer has to block the ui thread while waiting for IO. Similarly wear-watchface-editor and wear-complications-data</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Remove PhotoImage class and use Icon directly. (
      <a href="https://android-review.googlesource.com/#/q/I8a70b11af7fbee3a535e32a083749423d2f221da">I8a70b</a>
      )
    </li>
    <li>
      Expose the validTimeRange of ComplicationData. (
      <a href="https://android-review.googlesource.com/#/q/I91366d280466c1139b02cae4ed53b32a53ca5446">I91366</a>
      )
    </li>
    <li>
      Make image-like attributes more explicit. (
      <a href="https://android-review.googlesource.com/#/q/I81700dba61c3823861d1cca65fa2de69c6b475fd">I81700</a>
      )
    </li>
    <li>
      wear-watchface-editor and wear-complications-data have been refactored to use suspend functions instead of coroutines. Rx java &amp; Future compat wrappers to follow. (
      <a href="https://android-review.googlesource.com/#/q/If3c5ffa64e04406c4ebeadbffa8f5bc2a42aaaf2">If3c5f</a>
      )
    </li>
    <li>
      ProviderInfoRetriever now now throws PreviewNotAvailableException if requestPreviewComplicationData can't return preview data due to connection issues or lack of API support. (
      <a href="https://android-review.googlesource.com/#/q/I4964df460dce91563e075241cb09843297219463">I4964d</a>
      )
    </li>
    <li>
      WatchFaceControlService::createWatchFaceControlClient is now a suspended fuction and getOrCreateWallpaperServiceBackedInteractiveWatchFaceWcsClient is now called getOrCreateWallpaperServiceBackedInteractiveWatchFaceWcsClientAsync returning
      <code translate="no" dir="ltr">Deferred&lt;InteractiveWatchFaceWcsClient&gt;</code>
      . RX java and Future compat wrappers to follow. (
      <a href="https://android-review.googlesource.com/#/q/I5d4613786239ad2a15b16eed86fdee56029a0da6">I5d461</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">CATEGORY_PROVIDER_CONFIG_ACTION</code>
      to
      <code translate="no" dir="ltr">CATEGORY_PROVIDER_CONFIG</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I7c0689956ef6533ed3ac16edcc0487038cc96a55">I7c068</a>
      )
    </li>
    <li>
      Please note createOnWatchEditingSession is now a suspended function because the watchface sometimes isn't available until shortly after the editor activity has started. (
      <a href="https://android-review.googlesource.com/#/q/Ida9aa6ee3801b9ff79f64966340fdf485f1af389">Ida9aa</a>
      )
    </li>
    <li>
      WatchFaceService.createWatchFace is now a suspend function which allows for async initialization, previously you would have had to block the main thread. (
      <a href="https://android-review.googlesource.com/#/q/If076aca5c94aaf20d8feae835c2833954368c27c">If076a</a>
      )
    </li>
    <li>
      UserStyle now has an array operator and we've added casting helpers to UserStyle.Option. (
      <a href="https://android-review.googlesource.com/#/q/I35036a0d62b14cda9e7c12fb55a256ed279af432">I35036</a>
      )
    </li>
    <li>
      We've fixed a marshalling bug with UserStyle wireformats changing some of the unstable hidden API. (
      <a href="https://android-review.googlesource.com/#/q/I8be0900af78624868d3d7fbaeac0e7752d5beda1">I8be09</a>
      )
    </li>
    <li>
      We've added CustomValueUserStyleSetting which lets you store a single application specific string within a UserStyle. The default watch face editors will ignore this value. (
      <a href="https://android-review.googlesource.com/#/q/Ic04d2d56b0337d87e53926ad58065ca68aaa174f">Ic04d2</a>
      )
    </li>
    <li>
      InstanceID is not passed in the intent extras for R and older versions of Android WearOS which we can't upgrade. To support this we now allow InstancID to be null. (
      <a href="https://android-review.googlesource.com/#/q/Id8b787fcdbbef1c26d79c4ea772786fd40eb073e">Id8b78</a>
      )
    </li>
    <li>
      EditorRequest now includes the editor ComponentName which is set as the component in WatchFaceEditorContract.createIntent (
      <a href="https://android-review.googlesource.com/#/q/I3cd0643327544771cc3b4278cc153736d4e2fb83">I3cd06</a>
      )
    </li>
    <li>
      The watchface EditorResult now includes preview ComplicationData to allow the caller to take a screenshot of the watchface after editing. (
      <a href="https://android-review.googlesource.com/#/q/I2c561066ca91aa08c3450beaf88f18c5e9580fc6">I2c561</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Added toString() overrides to UserStyle, UserStyleSetting and UserStyleSchema which makes working with these classes a bit nicer. (
      <a href="https://android-review.googlesource.com/#/q/I9f5ec3339dbf6793c2c9c67f96467cc6cc227a04">I9f5ec</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha06" data-text="Version 1.0.0-alpha06" tabindex="-1">Version 1.0.0-alpha06</h4>
  <p>January 27, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha06</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6207afb1646d302c5d29c2c67d332b48db87fb27..aee18b103203a91ee89df91f0af5df2ecff356d6/wear">Version 1.0.0-alpha06 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>We’ve introduced a new library wear/wear-watchface-editor which allows watch face developers and potentially OEMs to build a style and complication editor. SysUI will send an Intent to the watch face which will use the new EditorSession class to access WatchFace details and record the result via Activity.setWatchRequestResult. To support this we’ve added ProviderInfoRetriever.requestPreviewComplicationData which allows watch face editors to request preview ComplicationData. The advantage of preview ComplicationData is unlike live data you don’t have to worry about showing permission dialogs when rendering your editor (note if a user selects a provider with a permission they will still be prompted to grant the permission).</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      ComplicationProviderInfo now has a field for the provider's ComponentName, support for this field will be added to WearOS at a later date and in the meantime, it will be null. (
      <a href="https://android-review.googlesource.com/#/q/Id8fc4130844dab52c7398354398a5267d6dbfea2">Id8fc4</a>
      )
    </li>
    <li>
      We've added ProviderInfoRetriever.requestPreviewComplicationData which allows watch face editors to request preview ComplicationData. This is useful because live complications may require permissions and you can now display preview data for complications that are not active. (
      <a href="https://android-review.googlesource.com/#/q/I2e1df39373278a35db757823ddf1533ccb3623e2">I2e1df</a>
      )
    </li>
    <li>
      ComplicationManager is now an optional parameter of WatchFace constructor and the arguments have been reordered to allow this. (
      <a href="https://android-review.googlesource.com/#/q/I66c76f8cd44b5766e6ad980746ed9ab9401e6982">I66c76</a>
      )
    </li>
    <li>
      We've added an optional Bundle to Complications which if set gets merged in with the intent sent to launch the provider chooser activity. (
      <a href="https://android-review.googlesource.com/#/q/Ifd4adf79afbdaed2f505e7fcdd07d1d443752bfe">Ifd4ad</a>
      )
    </li>
    <li>
      We've added a new
      <code translate="no" dir="ltr">wear-watchface-editor</code>
      library to support on watch face and SysUi hosted editors. SysUI will launch these editors by sending an intent. The watch face activity service can use the new EditorSession class to access WatchFace details and record the result via Activity.setWatchRequestResult. (
      <a href="https://android-review.googlesource.com/#/q/I2110d1b0e714c563c0f076c7814b838511c2e3bc">I2110d</a>
      )
    </li>
    <li>
      LayerMode.DRAW_HIGHLIGHTED is now called LayerMode.DRAW_OUTLINED and RenderParameters.highlightComplicationId is now called RenderParameters.selectedComplicationId which draws a highlight on the specified complication in addition to an outline. (
      <a href="https://android-review.googlesource.com/#/q/I90a405d73c4d3a647c8ed21729655609050e2246">I90a40</a>
      )
    </li>
    <li>
      WatchFaceControlClient.getOrCreateWallpaperServiceBackedInteractiveWatchFaceWcsClient's future can now resolve with a ServiceStartFailureException if the service dies while waiting for the watchface to be created. (
      <a href="https://android-review.googlesource.com/#/q/I0f509426f8e43822c6bdd0721857b385eb753848">I0f509</a>
      )
    </li>
    <li>
      EditorSession.complicationPreviewData is now a ListenableFuture because fetching this data is an asynchronous process. (
      <a href="https://android-review.googlesource.com/#/q/Iead9d686587392e6be2db31b3010fe257a73eb8c">Iead9d</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      We're removing unused fields from ComplicationOverlay leaving enabled and complicationBounds. (
      <a href="https://android-review.googlesource.com/#/q/I17b71448a1875e66e3a209a4133dc079b4f223ea">I17b71</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha05" data-text="Version 1.0.0-alpha05" tabindex="-1">Version 1.0.0-alpha05</h4>
  <p>January 13, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha05</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/dd3c8e9c2424b78e44f55db599251891fd1cadb4..6207afb1646d302c5d29c2c67d332b48db87fb27/wear">Version 1.0.0-alpha05 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <p>Watchfaces often support a number of complication configurations with varying numbers of complications shown. To make this easier to set up we now support initially disabled complications by calling setEnabled(false) on the builder. These can be enabled later via ComplicationsUserStyleSetting.</p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      ComplicationHelperActivity now accepts
      <code translate="no" dir="ltr">Collection&lt;ComplicationType&gt;</code>
      rather than an int array making it easier to use. (
      <a href="https://android-review.googlesource.com/#/q/I1f13d4546c5f8fc8661a0664a333110f9ea0d148">I1f13d</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ProviderInfoRetriever.retrieveProviderInfo</code>
      now correctly returns
      <code translate="no" dir="ltr">ListenableFuture&lt;ProviderInfo[]&gt;</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/If2710223e25ba11247bf952a714696f88ac6ccbf">If2710</a>
      )
    </li>
    <li>
      You can now create an initially disabled complication by calling setEnabled(false) on the builder. (
      <a href="https://android-review.googlesource.com/#/q/Idaa53a3fcaeeb0ec6ea8dedaddbfbafe5e3f613f">Idaa53</a>
      )
    </li>
    <li>
      WatchFaceState now has an isHeadless property which is only true for headless instances. (
      <a href="https://android-review.googlesource.com/#/q/Ifa900c849a27a2883bef7b6b1be735d82e3e2f5c">Ifa900</a>
      )
    </li>
    <li>
      ComplicationDrawable now optionally supports synchronous loading of drawables. This is used by the screenshot APIs. (
      <a href="https://android-review.googlesource.com/#/q/I34d4aa37eb0dbd995f93819e18232de5037cd613">I34d4a</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha04" data-text="Version 1.0.0-alpha04" tabindex="-1">Version 1.0.0-alpha04</h4>
  <p>December 16, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha04</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/38a668d3ef95f40ad28d6e735a2c3eb95ae4cf63..dd3c8e9c2424b78e44f55db599251891fd1cadb4/wear">Version 1.0.0-alpha04 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>The wear watch face library now supports setting bounds per type. E.g. you can switch to a wide bounding box for ComplicationType.LONG_TEXT whilst using a smaller bounding box for other types.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Complications now use ComplicationBounds which wraps a
      <code translate="no" dir="ltr">Map&lt;ComplicationType, RectF&gt;</code>
      to support per complication type sizes. (
      <a href="https://android-review.googlesource.com/#/q/I1ebe78c6c7368ef3327c3dba39f6498b18089a4e">I1ebe7</a>
      )
    </li>
    <li>
      RenderParameters now lets you specify the highlight tint for use in screen shots. (
      <a href="https://android-review.googlesource.com/#/q/Iff42b0df61de46be1e03566f8a9b79b67de8727e">Iff42b</a>
      )
    </li>
    <li>
      With the exception of bounds you now have to use ComplicationsUserStyleSetting to modify complications, this is to ensure the OS is kept in sync. (
      <a href="https://android-review.googlesource.com/#/q/I8dc5db6f349e7ad4995f9ea7a3e12fe31b560c7e">I8dc5d</a>
      )
    </li>
    <li>
      Renderer is now a sealed class. This means CanvasRenderer and GlesRenderer are now inner classes of Renderer. (
      <a href="https://android-review.googlesource.com/#/q/Iab5d4cf05f02a2ed3a47729c32fac6b6e6cf23dc">Iab5d4</a>
      ,
      <a href="https://issuetracker.google.com/issues/173803230">b/173803230</a>
      )
    </li>
    <li>
      CanvasComplicationDrawable.drawHighlight renamed to drawOutline. ObservableWatchData now has a few missing UiThread annotations. ScreenState has now been fully removed from WatchState. (
      <a href="https://android-review.googlesource.com/#/q/If1393142f3a0d7902a35a7622329c1bf6e7e3449">If1393</a>
      )
    </li>
    <li>
      The minimum API level for wear-watchface is now 25. Note hardware canvas support requires API level 26 or above. (
      <a href="https://android-review.googlesource.com/#/q/Ic9bbdf1858ef4435bb6561cb02bba7b709d54d00">Ic9bbd</a>
      )
    </li>
    <li>
      InteractiveWatchFaceWcsClient now has a getComplicationIdAt helper. (
      <a href="https://android-review.googlesource.com/#/q/I05811891b9ea4ebb4f4c3fa393d3b7510dee8e0b">I05811</a>
      )
    </li>
    <li>
      The API level for wear-watchface-client has been reduced to 25, however the screen shot APIs require API level 27. (
      <a href="https://android-review.googlesource.com/#/q/Id31c21c4b650cc8cb21523f4b0cf861bd1b107e0">Id31c2</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      We now expose the complication's current ComplicationData's ComplicationType in ComplicationState. (
      <a href="https://android-review.googlesource.com/#/q/I9b39013cc5486d68bd285c9624fedc5f0ba835d2">I9b390</a>
      )
    </li>
    <li>
      InteractiveWatchFaceWcs now has a method `bringAttentionToComplication to briefly highlight the specified complication. (
      <a href="https://android-review.googlesource.com/#/q/I6d31cb1a177fe9eb98c0859ce400391c8cecb668">I6d31c</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">InteractiveWatchFaceWcsClient#setUserStyle</code>
      now has an overload accepting Map
      <string, string="">
        which can potentially avoid an extra IPC round trip necessary to construct UserStyle. (
        <a href="https://android-review.googlesource.com/#/q/I24eec01f8eed113931fa7ec61cc8af4baf38049d">I24eec</a>
        )
      </string,>
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha03" data-text="Version 1.0.0-alpha03" tabindex="-1">Version 1.0.0-alpha03</h4>
  <p>December 2, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha03</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/2d49f9fa892a0d067580a871f3aa0cd6764f4c3b..38a668d3ef95f40ad28d6e735a2c3eb95ae4cf63/wear">Version 1.0.0-alpha03 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <p>The Complication class now has a compicationData property letting watch faces observe ComplicationData changes. This makes it possible to change the complication’s dimensions based on the type of the complication.</p>
  <p>Variable frame rates are now supported by assigning to Renderer.interactiveDrawModeUpdateDelayMillis. For watch faces which run short animations every second this can lead to good power savings by going to sleep when not animating.</p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">BACKGROUND_IMAGE</code>
      has been renamed to
      <code translate="no" dir="ltr">PHOTO_IMAGE</code>
      along with related classes. This type of complication is not exclusively used for backgrounds hence the name change. (
      <a href="https://android-review.googlesource.com/#/q/I995c61974db868d89184b8fa49d677e6fc16befa">I995c6</a>
      )
    </li>
    <li>
      DefaultComplicationProviderPolicy properly annotated with IntDefs. (
      <a href="https://android-review.googlesource.com/#/q/I3b4312734532d2cec94d74ed70647fb33ecf21e3">I3b431</a>
      )
    </li>
    <li>
      The hidden TimeDependentText class is no longer exposed via ContentDescriptionLabel, instead we add an accessor to get the text at a specified time. (
      <a href="https://android-review.googlesource.com/#/q/Ica69255606c011c1b4c733db31d3c4afdad16887">Ica692</a>
      )
    </li>
    <li>
      ObservableWatchData's constructor is now internal. (
      <a href="https://android-review.googlesource.com/#/q/I301215475e08c10a8cb97095638b235d664bcfcb">I30121</a>
      ,
      <a href="https://issuetracker.google.com/issues/173802666">b/173802666</a>
      )
    </li>
    <li>
      Complication now has compicationData letting watch faces observe ComplicationData changes. Complication also has a new isActiveAt call which can be used to tell if anything should be rendered at the provided datetime. (
      <a href="https://android-review.googlesource.com/#/q/Ic0e2a53c2c8973e133304a55197ec27c708404e7">Ic0e2a</a>
      )
    </li>
    <li>
      The empty
      <code translate="no" dir="ltr">SharedMemoryImage</code>
      is no longer in the public API. (
      <a href="https://android-review.googlesource.com/#/q/I7ee17b402375ff3231a4fb8b6cd32cacaefdab8a">I7ee17</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">WatchFace.overridePreviewReferenceTimeMillis</code>
      now has an IntRange annotation and the getter and setter have consistent names. (
      <a href="https://android-review.googlesource.com/#/q/Ia5f7811eece551191ad1ec0ec9420369886058d2">Ia5f78</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">Complication.Builder</code>
      is now created via
      <code translate="no" dir="ltr">Complication.createRoundRectComplicationBuilder</code>
      or
      <code translate="no" dir="ltr">Complication.createBackgroundComplicationBuilder</code>
      for clarity (
      <a href="https://android-review.googlesource.com/#/q/I54063447e6c0fac6f53448ec50a3f50d3a1c759b">I54063</a>
      )
    </li>
    <li>
      Added WatchFace.TapListener which allows taps not consumed by complications to be observed by the WatchFace. (
      <a href="https://android-review.googlesource.com/#/q/Ic2fe1b967acc321e459f560a298ad98206a431ab">Ic2fe1</a>
      ,
      <a href="https://issuetracker.google.com/issues/172721168">b/172721168</a>
      )
    </li>
    <li>
      WatchFace now supports variable frame rates by assigning to
      <code translate="no" dir="ltr">Renderer.interactiveDrawModeUpdateDelayMillis</code>
      . This can help preserve battery life by sleeping when not animating. (
      <a href="https://android-review.googlesource.com/#/q/I707c9c6487b902c8f4f339ac292ca3a4dce49ef9">I707c9</a>
      )
    </li>
    <li>
      WatchFace.Builder is no longer needed and invalidate() and interactiveUpdateRateMillis have been moved to Renderer. (
      <a href="https://android-review.googlesource.com/#/q/I329ea7916fe2ad0c37cf45d8ab9de6da326ee82d">I329ea</a>
      )
    </li>
    <li>
      For better java interoperability renamed getters for boolean properties in WatchState (
      <a href="https://android-review.googlesource.com/#/q/I6d2f154452b3f6b17617bd7412539380ce0ea84c">I6d2f1</a>
      )
    </li>
    <li>
      Renamed TapListener to TapCallback and InvalidateCallback to InvalidateListener for consistency. (
      <a href="https://android-review.googlesource.com/#/q/I9414ef54a9ebbdbda6c625ef9f139882a0ee0af6">I9414e</a>
      )
    </li>
    <li>
      Wear 2.0 watchface style options have been moved to their own class for clarity. WatchFace.Builder setters now have symmetrical WatchFace class getters. (
      <a href="https://android-review.googlesource.com/#/q/Iefdfc95bbab3eec314d95b3cd7f6b4666fa28ba2">Iefdfc</a>
      )
    </li>
    <li>
      Added InteractiveWatchFaceWcsClient and
      <code translate="no" dir="ltr">WatchFaceControlClient.getOrCreateWallpaperServiceBackedInteractiveWatchFaceWcsClient</code>
      which either gets an existing instance or creates it once the wallaper service has connected and made the engine. (
      <a href="https://android-review.googlesource.com/#/q/Id666e8c785c8cd803ff445dda4e45f40db65cee9">Id666e</a>
      )
    </li>
    <li>
      WatchFaceControlClient is now an interface to allow tests to mock it. (
      <a href="https://android-review.googlesource.com/#/q/I875d9b0bf214db40781958e04e7cc751cdde709d">I875d9</a>
      )
    </li>
    <li>
      HeadlessWatchFaceClient, InteractiveWatchFaceSysUiClientImpl, InteractiveWatchFaceWcsClient are now interfaces to better facilitate testing. (
      <a href="https://android-review.googlesource.com/#/q/I7cdc3a7b9e49cb26a9a55d43243ae305e8cf9701">I7cdc3</a>
      )
    </li>
    <li>
      Added annotations to methods in
      <code translate="no" dir="ltr">wear-watchface-complications-rendering</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I0d65c78e9c6717748a5891fc539fc258812851c5">I0d65c</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Remove screen shape from DeviceConfig, which was duplicating
      <code translate="no" dir="ltr">android.content.res.Configuration#isScreenRound()</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ifadf459ef1f67f24262e97279f859b413a2dd045">Ifadf4</a>
      )
    </li>
    <li>
      Changed
      <code translate="no" dir="ltr">WatchFaceControlClient.getOrCreateWallpaperServiceBackedInteractiveWatchFaceWcsClient</code>
      to accept a
      <code translate="no" dir="ltr">Map&lt;String, String&gt;</code>
      instead of
      <code translate="no" dir="ltr">UserStyle</code>
      because it's hard to create a
      <code translate="no" dir="ltr">UserStyle</code>
      without knowing the schema which you can only get after the client has been created. (
      <a href="https://android-review.googlesource.com/#/q/Iea02ada7595d6e0272a94644c470330ed17378c1">Iea02a</a>
      )
    </li>
    <li>
      Fix
      <code translate="no" dir="ltr">InteractiveWatchFaceWcsClient</code>
      to use
      <code translate="no" dir="ltr">ComplicationState</code>
      instead of the wire format. (
      <a href="https://android-review.googlesource.com/#/q/Icb8a49513e834ead46c7bcca78504f905b8766ba">Icb8a4</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">UserStyleSettings</code>
      is now a sealed class because the watch face editors only understand the built in classes. (
      <a href="https://android-review.googlesource.com/#/q/I2d797029198ecd2b6a3aac3e16b691be05171f83">I2d797</a>
      )
    </li>
  </ul>
  <h4 id="1.0.0-alpha02" data-text="Version 1.0.0-alpha02" tabindex="-1">Version 1.0.0-alpha02</h4>
  <p>November 11, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-*:1.0.0-alpha02</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/234e23e470a5e7f81291f6acd12d538146dc010b..2d49f9fa892a0d067580a871f3aa0cd6764f4c3b/wear">Version 1.0.0-alpha02 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">ComplicationDetails</code>
      is now called
      <code translate="no" dir="ltr">ComplicationState</code>
      and is properly wrapped and usages of wearable support
      <code translate="no" dir="ltr">@ComplicationData.ComplicationType</code>
      have been migrated to androidx
      <code translate="no" dir="ltr">ComplicationType</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I4dd368751f3ffe3bd5728f485ef0f8afeee287ea">I4dd36</a>
      )
    </li>
    <li>
      Add an optional
      <code translate="no" dir="ltr">highlightedComplicationId</code>
      parameter to RenderParameters which allows you to request highlighting of a single complication in screenshots. (
      <a href="https://android-review.googlesource.com/#/q/I66ce937929c863627c45291901b945945a21d89f">I66ce9</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">ComplicationProviderService</code>
      to use new style complication api for consistency (
      <a href="https://android-review.googlesource.com/#/q/Id5aea26299cefb845006e630d956e0ca08c20f99">Id5aea</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">getPreviewReferenceTimeMillis</code>
      now gets reference times from
      <code translate="no" dir="ltr">DeviceConfig</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I779fefb5b7bb8ea737b98fedbabe0d97844fd198">I779fe</a>
      )
    </li>
    <li>
      Simplifying Renderer API surface, can use
      <code translate="no" dir="ltr">SurfaceHolder.Callback</code>
      to observe changes instead. (
      <a href="https://android-review.googlesource.com/#/q/I210dbb26483698cfbea0e434182891ddd3958424">I210db</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">CanvasComplicationRenderer</code>
      doesn't extend from
      <code translate="no" dir="ltr">Renderer</code>
      , renaming it for clarity. (
      <a href="https://android-review.googlesource.com/#/q/Ibe8809f15ec4d2145b8011c26e00fd2804aac466">Ibe880</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      First version of
      <code translate="no" dir="ltr">androidx.wear:wear-watchface-client</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I1e35eb467fff1ed8d4a440bec74c6b6e94109d34">I1e35e</a>
      )
    </li>
    <li>
      Changed the name of
      <code translate="no" dir="ltr">GlesTextureComplication#renderer</code>
      for clarity (
      <a href="https://android-review.googlesource.com/#/q/Ib78f7d3b571033f35401858aeaf71f62fe1effa2">Ib78f7</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">StyleCategory</code>
      to
      <code translate="no" dir="ltr">StyleSetting</code>
      for clarity (
      <a href="https://android-review.googlesource.com/#/q/I488c740576f28a670b2a354b602030c1bff93d3c">I488c7</a>
      )
    </li>
    <li>
      Adding
      <code translate="no" dir="ltr">UserStyleSchema</code>
      for a cleaner API (
      <a href="https://android-review.googlesource.com/#/q/If36f8841fe2d1c17b14afa8b35da72641ac8ffbc">If36f8</a>
      )
    </li>
  </ul>
  <h4 id="complications-watchface-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h4>
  <p>October 28, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-complications-*:1.0.0-alpha01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-watchface-*:1.0.0-alpha01</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/234e23e470a5e7f81291f6acd12d538146dc010b/wear">Version 1.0.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Removed some things we didn't intend to expose in public api. (
      <a href="https://android-review.googlesource.com/#/q/I4166938e428ef6147e39aaa8994e7e21003067b0">I41669</a>
      )
    </li>
    <li>
      Create
      <code translate="no" dir="ltr">androidx.wear:wear-complications-provider</code>
      library. (
      <a href="https://android-review.googlesource.com/#/q/I77f1fe61bd5dfd122845b459901484e2c9ee4b77">I77f1f</a>
      )
    </li>
    <li>
      ComplicationsUserStyleCategory the new recommended category for configuring complications (
      <a href="https://android-review.googlesource.com/#/q/I96909e26ed00f6fb9f27f9fac2b81d7c0d92b690">I96909</a>
      )
    </li>
    <li>
      Add wear-complication-data API. (
      <a href="https://android-review.googlesource.com/#/q/I7c268561f08f0a637ecc4bc4fbf59c32236d50bf">I7c268</a>
      )
    </li>
    <li>
      Functions with boolean return values to be prefixed with “is” rather than “get” (
      <a href="https://android-review.googlesource.com/#/q/If36ff36bc29d7090ae7f358d8b03123e43b53c7d">If36ff</a>
      )
    </li>
    <li>
      API advice is to avoid using protected so this class has been refactored to take parameters in via the constructor. (
      <a href="https://android-review.googlesource.com/#/q/I6164450bf16baa6bde98380c2e113f49774f0916">I61644</a>
      )
    </li>
    <li>
      Rename setBackgroundComplication for clarity. (
      <a href="https://android-review.googlesource.com/#/q/I96fe3baa25837620d01ab51d16c4aef87a71a6b2">I96fe3</a>
      )
    </li>
    <li>
      Use Kotlin properties for ComplicationDrawable isHighlighted &amp; data (
      <a href="https://android-review.googlesource.com/#/q/I4dcc8d2f323efd18fb1cadbbe9b01aac7111565a">I4dcc8</a>
      )
    </li>
    <li>
      Instead of ComplicationRenderer.InvalidateCallback we add Complication#invalidate() (
