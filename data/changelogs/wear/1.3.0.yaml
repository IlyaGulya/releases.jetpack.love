changelogHtml: |
  <h3 id="version_130_4" data-text="Version 1.3.0" tabindex="-1">Version 1.3.0</h3>
  <h4 id="wear-remote-interactions-1.3.0-alpha01" data-text="Version 1.3.0-alpha01" tabindex="-1">Version 1.3.0-alpha01</h4>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.3.0-alpha01</code>
    is released. Version 1.3.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/55bf42f5cd58f4b0527ed1fccdf579f7e86c9b9e..92906e864a2b9ada27dee710266d12dc035dbaa2/wear/wear-remote-interactions">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">startRemoteActivityAttemptUnlock</code>
      and
      <code translate="no" dir="ltr">startPhoneActivityWithUnlock</code>
      to
      <code translate="no" dir="ltr">RemoteActivityHelper</code>
      , allowing Wear OS applications to start an activity on the connected phone after unlocking the phone, subject to user enrolling in feature and platform capability.
      <code translate="no" dir="ltr">startRemoteActivityAttemptUnlock</code>
      can fall back to existing
      <code translate="no" dir="ltr">startRemoteActivity</code>
      when feature not available. (
      <a href="https://android-review.googlesource.com/#/q/Ic23ae13d4085542d279f4b2ef2dff4cc8a650f72">Ic23ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/468374830">b/468374830</a>
      )
    </li>
  </ul>
  <h3 id="version_12_5" data-text="Version 1.2" tabindex="-1">Version 1.2</h3>
  <h4 id="wear-remote-interactions-1.2.0" data-text="Version 1.2.0" tabindex="-1">Version 1.2.0</h4>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.2.0</code>
    is released. Version 1.2.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ea52d659916d0fe20e20ad2ed5574bf39e7e69a4..55bf42f5cd58f4b0527ed1fccdf579f7e86c9b9e/wear/wear-remote-interactions">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.1.0:</strong></p>
  <ul>
    <li>
      Updated
      <code translate="no" dir="ltr">RemoteActivityHelper.startRemoteActivity</code>
      to use a new public Wear SDK API (
      <code translate="no" dir="ltr">startRemoteActivity</code>
      ) if it’s available (from Wear 6 onwards).
      <a href="https://android-review.googlesource.com/#/q/Id1e77f5fc838470748137a612176f9bee76f6c46">Id1e77</a>
    </li>
    <li>Updated dependency on Play Basement version which contained CVE-2022-2390 vulnerability.</li>
  </ul>
  <h4 id="wear-remote-interactions-1.2.0-rc01" data-text="Version 1.2.0-rc01" tabindex="-1">Version 1.2.0-rc01</h4>
  <p>January 28, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.2.0-rc01</code>
    is released. Version 1.2.0-rc01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/f005cd28feebaa370904e6437c9ca3d465f5ac4f..7b41731cd36163f3e218f3d341cf22b377fdf90c/wear/wear-remote-interactions">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Updated dependency on Play Basement version which contained CVE-2022-2390 vulnerability.</li>
  </ul>
  <h4 id="wear-remote-interactions-1.2.0-beta01" data-text="Version 1.2.0-beta01" tabindex="-1">Version 1.2.0-beta01</h4>
  <p>December 17, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.2.0-beta01</code>
    is released. Version 1.2.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1b437892629a2cdedb46d9b7232575987b2cc6b5..f005cd28feebaa370904e6437c9ca3d465f5ac4f/wear/wear-remote-interactions">these commits</a>
    .
  </p>
  <ul>
    <li>There are no substantial new changes since the previous alpha release.</li>
  </ul>
  <h4 id="wear-remote-interactions-1.2.0-alpha01" data-text="Version 1.2.0-alpha01" tabindex="-1">Version 1.2.0-alpha01</h4>
  <p>July 2, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.2.0-alpha01</code>
    is released. Version 1.2.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c80589c1ddd2f27bbb6103e55cd3a8a1f18c5b16..1b437892629a2cdedb46d9b7232575987b2cc6b5/wear/wear-remote-interactions">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Updated
      <code translate="no" dir="ltr">RemoteActivityHelper.startRemoteActivity</code>
      to use a new public Wear SDK API (
      <code translate="no" dir="ltr">startRemoteActivity</code>
      ) if it’s available (from Wear 6 onwards). (
      <a href="https://android-review.googlesource.com/#/q/Id1e77f5fc838470748137a612176f9bee76f6c46">Id1e77</a>
      )
    </li>
  </ul>
  <h3 id="version_11_9" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="wear-remote-interactions-1.1.0" data-text="Version 1.1.0" tabindex="-1">Version 1.1.0</h4>
  <p>December 11, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.1.0</code>
    is released. Version 1.1.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6d28cab96afc79c552e0a536271069ae563da2ab..c80589c1ddd2f27bbb6103e55cd3a8a1f18c5b16/wear/wear-remote-interactions">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.0.0</strong></p>
  <ul>
    <li>
      We have added
      <code translate="no" dir="ltr">RemoteActivityHelper.isRemoteActivityHelperAvailable</code>
      which helps check whether the functionality of launching a remote activity is available. (
      <a href="https://android-review.googlesource.com/#/q/I107a967fbc8fdf445013d32427036aa9756f229b">I107a9</a>
      )
    </li>
  </ul>
  <h4 id="wear-remote-interactions-1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>October 16, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.1.0-rc01</code>
    is released with no changes since
    <code translate="no" dir="ltr">1.1.0-beta01</code>
    . Version 1.1.0-rc01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/8b5ab34869fa8731b13a77763ea92989ce4ef70d..6d28cab96afc79c552e0a536271069ae563da2ab/wear/wear-remote-interactions">these commits</a>
    .
  </p>
  <h4 id="wear-remote-interactions-1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h4>
  <p>July 24, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.1.0-beta01</code>
    is released. Version 1.1.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/7a45f0bc9e0a73744b3780a6f92e1b570de58bba..8b5ab34869fa8731b13a77763ea92989ce4ef70d/wear/wear-remote-interactions">these commits</a>
    . The 1.3.0-beta01 release of Wear Remote Interactions indicates that this release of the library is feature complete and the API is locked (except where marked as experimental).
  </p>
  <h4 id="wear-remote-interactions-1.1.0-alpha02" data-text="Version 1.1.0-alpha02" tabindex="-1">Version 1.1.0-alpha02</h4>
  <p>January 10, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.1.0-alpha02</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/3b5b931546a48163444a9eddc533489fcddd7494..7a45f0bc9e0a73744b3780a6f92e1b570de58bba/wear/wear-remote-interactions">Version 1.1.0-alpha02 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      We have added
      <code translate="no" dir="ltr">RemoteActivityHelper.isRemoteActivityHelperAvailable</code>
      which helps check whether the functionality of launching a remote activity is available. (
      <a href="https://android-review.googlesource.com/#/q/I107a967fbc8fdf445013d32427036aa9756f229b">I107a9</a>
      )
    </li>
    <li>
      We have updated
      <code translate="no" dir="ltr">RemoteActivityHelper</code>
      's constructor to have optional parameter compatible in Java. (
      <a href="https://android-review.googlesource.com/#/q/I755543588602ebab6f506780e9808b7978da377a">I75554</a>
      )
    </li>
  </ul>
  <h4 id="wear-remote-interactions-1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h4>
  <p>June 21, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-remote-interactions:1.1.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/15e31e87f719904535e26aadb16fc5085490c3c6..3b5b931546a48163444a9eddc533489fcddd7494/wear/wear-remote-interactions">Version 1.1.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Improved how completion and error handling is done in
      <code translate="no" dir="ltr">RemoteActivityHelper</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I60d608db5d3b7fdbc64d9a7046a0b0891e09b698">I60d60</a>
      )
    </li>
  </ul>
  <p><strong>External Contribution</strong></p>
  <ul>
    <li>
      Remove Guava dependency from
      <code translate="no" dir="ltr">wear-remote-interactions</code>
      and use smaller alternatives.
    </li>
  </ul>
  <h2 id="wear-input_2" data-text="Wear-Input" tabindex="-1">Wear-Input</h2>
  <h3 id="version_12_6" data-text="Version 1.2" tabindex="-1">Version 1.2</h3>
  <h4 id="wear-input-1.2.0" data-text="Version 1.2.0" tabindex="-1">Version 1.2.0</h4>
  <p>September 10, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.2.0</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.2.0</code>
    are released. Version 1.2.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c703f9ae405f8bd6f6c2b5ea25e78cc385af90ab..d100b900f3fe5699adfa2afaaf6d467cf7b836dd/wear">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.1.0:</strong></p>
  <ul>
    <li>Exposed physical button location constants.</li>
    <li>
      Added
      <code translate="no" dir="ltr">WearableRemoteInputExtender</code>
      for setting Wear-specific extras on
      <code translate="no" dir="ltr">android.app.RemoteInput</code>
      (for example, enabling Emoji input)
    </li>
  </ul>
  <h4 id="1.2.0-rc01" data-text="Version 1.2.0-rc01" tabindex="-1">Version 1.2.0-rc01</h4>
  <p>August 27, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.2.0-rc01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.2.0-rc01</code>
    are released with no changes since the last beta. Version 1.2.0-rc01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/5fa9d0954ece0376736164b0f7bc2ef33506ab70..c703f9ae405f8bd6f6c2b5ea25e78cc385af90ab/wear">these commits</a>
    .
  </p>
  <h4 id="1.2.0-beta01" data-text="Version 1.2.0-beta01" tabindex="-1">Version 1.2.0-beta01</h4>
  <p>July 30, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.2.0-beta01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.2.0-beta01</code>
    are released with no notable changes since the last alphas. Version 1.2.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/98552a7cab42f1d19ee63ca0b2cd5f5bb862510d..5fa9d0954ece0376736164b0f7bc2ef33506ab70/wear/wear-input">these commits</a>
    .
  </p>
  <h4 id="1.2.0-alpha04" data-text="Version 1.2.0-alpha04" tabindex="-1">Version 1.2.0-alpha04</h4>
  <p>July 16, 2025</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.2.0-alpha04</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.2.0-alpha04</code>
    are released. Version 1.2.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1f6bc4d47b7be46a5af151ed726e84db0a1cf9f9..98552a7cab42f1d19ee63ca0b2cd5f5bb862510d/wear">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Account for screen rotation when calculating the location of physical buttons relative to the screen. (
      <a href="https://android-review.git.corp.google.com/c/platform/frameworks/support/+/3396375">87a57e</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Rename LOC
      <em>* to LOCATION</em>
      * in wear-input. (
      <a href="https://android-review.googlesource.com/#/q/I5e87996a7783a7fdf4abf9c4ea1357ac7bcc4590">I5e879</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      This library now uses
      <a href="https://jspecify.dev/">JSpecify nullness annotations</a>
      , which are type-use. Kotlin developers should use the following compiler arguments to enforce correct usage:
      <code translate="no" dir="ltr">-Xjspecify-annotations=strict</code>
      ,
      <code translate="no" dir="ltr">-Xtype-enhancement-improvements-strict-mode</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Icbfb9996a30b4decc85ee8a9bc4211a25adfcfe3">Icbfb9</a>
      ,
      <a href="https://issuetracker.google.com/issues/326456246">b/326456246</a>
      )
    </li>
  </ul>
  <h4 id="1.2.0-alpha02" data-text="Version 1.2.0-alpha02" tabindex="-1">Version 1.2.0-alpha02</h4>
  <p>September 29, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.2.0-alpha02</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.2.0-alpha02</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a3dcfb231517d6104969f17063fcc6c97ba6eeb..1f6bc4d47b7be46a5af151ed726e84db0a1cf9f9/wear">Version 1.2.0-alpha02 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Renamed
      <code translate="no" dir="ltr">disallowEmoji</code>
      to
      <code translate="no" dir="ltr">setEmojisAllowed</code>
      in
      <code translate="no" dir="ltr">WearableRemoteInputExtender</code>
      to use to set whether the option to draw emojis will be shown. (
      <a href="https://android-review.googlesource.com/#/q/I28393933d8c178c6f39bcc6ec0c571edf0ade471">I28393</a>
      )
    </li>
  </ul>
  <h4 id="1.2.0-alpha01" data-text="Version 1.2.0-alpha01" tabindex="-1">Version 1.2.0-alpha01</h4>
  <p>September 15, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.2.0-alpha01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.2.0-alpha01</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/bf82de2481a345e3246890808ee52363d69194fc..1a3dcfb231517d6104969f17063fcc6c97ba6eeb/wear">Version 1.2.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Exposed all button location constants from
      <code translate="no" dir="ltr">WearableButtons</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ibb12c35ad548b8a67baeef405cb19739bbfa47bd">Ibb12c</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">WearableRemoteInputExtender</code>
      class that can be used for adding Wear-specific extras to the android.app.RemoteInput. (
      <a href="https://android-review.googlesource.com/#/q/I0190310bcd43c98793bda31a7ef055e1abad815e">I01903</a>
      )
    </li>
  </ul>
  <h3 id="version_11_10" data-text="Version 1.1" tabindex="-1">Version 1.1</h3>
  <h4 id="1.1.0" data-text="Version 1.1.0" tabindex="-1">Version 1.1.0</h4>
  <p>August 18, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.1.0</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.1.0</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1d48419d620e931d6c410d4dedb2788d95a8fc98..bf82de2481a345e3246890808ee52363d69194fc/wear">Version 1.1.0 contains these commits.</a>
  </p>
  <p><strong>Important changes since 1.0.0</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">RemoteInputIntentHelper</code>
      .
      <ul>
        <li>This class can be used to build a RemoteInput Intent. This can then be used to request input from your users in a customisable activity.</li>
      </ul>
    </li>
  </ul>
  <h4 id="input-1.1.0-rc01" data-text="Version 1.1.0-rc01" tabindex="-1">Version 1.1.0-rc01</h4>
  <p>August 4, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.1.0-rc01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.1.0-rc01</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/97264aa4532db7f7db1ffb3f42f3a9204971dbfc..1d48419d620e931d6c410d4dedb2788d95a8fc98/wear">Version 1.1.0-rc01 contains these commits.</a>
  </p>
  <p>
    No API Changes since
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.1.0-beta01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.1.0-beta01</code>
  </p>
  <h4 id="input-1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h4>
  <p>July 21, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.1.0-beta01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.1.0-beta01</code>
    are released with no changes since
    <code translate="no" dir="ltr">1.1.0-alpha03</code>
    .
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/19ae3a88ff0824d615355b492cb56049e16991f2..97264aa4532db7f7db1ffb3f42f3a9204971dbfc/wear/wear-input">Version 1.1.0-beta01 contains these commits.</a>
  </p>
  <h4 id="input-1.1.0-alpha03" data-text="Version 1.1.0-alpha03" tabindex="-1">Version 1.1.0-alpha03</h4>
  <p>June 30, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.1.0-alpha03</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.1.0-alpha03</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/66681ad83c328d0dd821b943bb3d375f02c1db61..19ae3a88ff0824d615355b492cb56049e16991f2/wear">Version 1.1.0-alpha03 contains these commits.</a>
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed bug which caused RemoteInput intents, which had
      <code translate="no" dir="ltr">RemoteInput</code>
      s added to them via
      <code translate="no" dir="ltr">RemoteInputHelper.putRemoteInputsExtra</code>
      , to be rejected.
    </li>
  </ul>
  <h4 id="1.1.0-alpha02" data-text="Version 1.1.0-alpha02" tabindex="-1">Version 1.1.0-alpha02</h4>
  <p>May 18, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.1.0-alpha02</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.1.0-alpha02</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/aee18b103203a91ee89df91f0af5df2ecff356d6..66681ad83c328d0dd821b943bb3d375f02c1db61/wear">Version 1.1.0-alpha02 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">RemoteInputIntentHelper</code>
      's methods that are used for getting or putting extras that represent title, cancel, confirm, and in progress labels are now using
      <code translate="no" dir="ltr">CharSequence</code>
      instead of
      <code translate="no" dir="ltr">String</code>
      for these labels. (
      <a href="https://android-review.googlesource.com/#/q/I0e71f888c3da299cf863bcd3a5af18174d705313">I0e71f</a>
      )
    </li>
  </ul>
  <h4 id="wear-input-1.1.0-alpha01" data-text="Version 1.1.0-alpha01" tabindex="-1">Version 1.1.0-alpha01</h4>
  <p>January 27, 2021</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.1.0-alpha01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.1.0-alpha01</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/64308b96cf7c7c5e039a3f95cd3dae1bb9d9d915..aee18b103203a91ee89df91f0af5df2ecff356d6/wear">Version 1.1.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Migrate RemoteInputIntent class from Wearable Support Library to AndroidX. The migrated class is renamed as RemoteInputIntentHelper which provides helper functions for supporting remote inputs through starting an intent. (
      <a href="https://android-review.googlesource.com/#/q/I47ceeb522f3d0d4ef9ab6078cee228b32b29c416">I47cee</a>
      )
    </li>
  </ul>
  <h3 id="version_10_9" data-text="Version 1.0" tabindex="-1">Version 1.0</h3>
  <h4 id="input-1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h4>
  <p>December 2, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.0.0</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.0.0</code>
    are released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ecf1b5888d9d003cacb3edb9c2fff198d3437d70..64308b96cf7c7c5e039a3f95cd3dae1bb9d9d915/wear">Version 1.0.0 contains these commits.</a>
