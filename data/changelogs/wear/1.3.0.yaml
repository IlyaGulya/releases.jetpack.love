  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Renamed class
      <code translate="no" dir="ltr">RemoteIntentHelper</code>
      to
      <code translate="no" dir="ltr">RemoteActivityHelper</code>
      . Renamed functions
      <code translate="no" dir="ltr">RemoteIntentHelper#getRemoteIntentExtraIntent</code>
      and
      <code translate="no" dir="ltr">RemoteIntentHelper#getRemoteIntentNodeId</code>
      to
      <code translate="no" dir="ltr">RemoteActivityHelper#getTargetIntent</code>
      and
      <code translate="no" dir="ltr">RemoteActivityHelper#getTargetNodeId</code>
