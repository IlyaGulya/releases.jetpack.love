  <p>
    This release is identical to
    <code translate="no" dir="ltr">1.0.0-beta01</code>
    .
  </p>
  <h4 id="wear-input-1.0.0-beta01" data-text="Version 1.0.0-beta01" tabindex="-1">Version 1.0.0-beta01</h4>
  <p>October 28, 2020</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear:wear-input:1.0.0-beta01</code>
    and
    <code translate="no" dir="ltr">androidx.wear:wear-input-testing:1.0.0-beta01</code>
