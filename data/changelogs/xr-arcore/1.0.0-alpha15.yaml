version: 1.0.0-alpha15
releaseDate: 2026-06-17
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha15" data-text="Version 1.0.0-alpha15" tabindex="-1">Version 1.0.0-alpha15</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.arcore:arcore-*:1.0.0-alpha15</code>
    is released. Version 1.0.0-alpha15 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/9ddf57f5b4ce98e7df261a3de947540f143fe26c..1790799be76c86764f97a92871414dfdd08154a2/xr/arcore">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">HitResult.createAnchor</code>
      was removed. Developers can create an anchor representing the
      <code translate="no" dir="ltr">HitResult</code>
      if the trackable of the result is an
      <code translate="no" dir="ltr">Anchorable</code>
      by supplying the hit position to the
      <code translate="no" dir="ltr">createAnchor</code>
      function of the
      <code translate="no" dir="ltr">Anchorable</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ia851e1865dc7080f960d616965a845aafa56e8e9">Ia851e</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">AnchorUnsupportedObject</code>
      was removed. It is no longer thrown by a JXR ARCore runtime. (
      <a href="https://android-review.googlesource.com/#/q/Ia851e1865dc7080f960d616965a845aafa56e8e9">Ia851e</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">androidx.xr.arcore.Anchor</code>
      and
      <code translate="no" dir="ltr">androidx.xr.arcore.ArDevice</code>
      now implement
      <code translate="no" dir="ltr">androidx.xr.arcore.Trackable</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I57b6519a710bf277345c332201a01d96aa9b9606">I57b65</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">Depth.left</code>
      ,
      <code translate="no" dir="ltr">Depth.right</code>
      , and
      <code translate="no" dir="ltr">Depth.mono</code>
      are now non-nullable (
      <a href="https://android-review.googlesource.com/#/q/I1fc5e42404477122af26dd2a541483934aa327ad">I1fc5e</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">Face.getUserFace</code>
      is now non-nullable (
      <a href="https://android-review.googlesource.com/#/q/I0eac1729355d684f7565c0e06a8f75f44c4603a0">I0eac1</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">RenderViewpoint.left</code>
      ,
      <code translate="no" dir="ltr">RenderViewpoint.right</code>
      ,
      <code translate="no" dir="ltr">RenderViewpoint.mono</code>
      are now non-nullable (
      <a href="https://android-review.googlesource.com/#/q/Icf7faa4690d6d36ef43efb4544071b7f58face12">Icf7fa</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">Hand.left</code>
      and
      <code translate="no" dir="ltr">Hand.right</code>
      are non non-nullable (
      <a href="https://android-review.googlesource.com/#/q/Icef37cb8599c6a1ca83ef2f4cb45f1e8ed0331dc">Icef37</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">QrCode</code>
      API (
      <a href="https://android-review.googlesource.com/#/q/Ia0bbe0444195922efdf6ebd76ee91b44a600e3ee">Ia0bbe</a>
      )
    </li>
  </ul>
