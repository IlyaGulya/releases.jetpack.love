libraryId: xr-arcore
groupId: androidx.xr
version: 1.0.0-alpha13
releaseDate: 2026-05-06
#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha13" data-text="Version 1.0.0-alpha13" tabindex="-1">Version 1.0.0-alpha13</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.arcore:arcore-*:1.0.0-alpha13</code>
    is released. Version 1.0.0-alpha13 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/bc435de8f136679d268375c04ab31ecc94fa99f9..0671e372f2168396421338583e76edca824d7d22/xr/arcore">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">TrackingState</code>
      and
      <code translate="no" dir="ltr">VpsAvailabilityResult</code>
      have moved to the
      <code translate="no" dir="ltr">androidx.xr.arcore package</code>
      , and the types in
      <code translate="no" dir="ltr">androidx.xr.runtime</code>
      are now deprecated. (
      <a href="https://android-review.googlesource.com/#/q/Ic79303427f1301f722efb7f624033f9f11b49544">Ic7930</a>
      ,
      <a href="https://issuetracker.google.com/issues/480462213">b/480462213</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">Plane.Type</code>
      to
      <code translate="no" dir="ltr">PlaneType</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I8c90cccb087dd6bf0d5342d39db5e6eca210e572">I8c90c</a>
      ,
      <a href="https://issuetracker.google.com/issues/482675376">b/482675376</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">Hand.HandSide</code>
      to
      <code translate="no" dir="ltr">HandSide</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ica562ae66c9d59f927f5201b3315c82317840793">Ica562</a>
      ,
      <a href="https://issuetracker.google.com/issues/482675376">b/482675376</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">Plane.Label</code>
      to
      <code translate="no" dir="ltr">PlaneLabel</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ic6b67074e9a22f44cd2ec30dad0c5f17fc9631af">Ic6b67</a>
      ,
      <a href="https://issuetracker.google.com/issues/482675376">b/482675376</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">Geospatial.Surface</code>
      to
      <code translate="no" dir="ltr">GeospatialSurface</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I1a8be619cb27cd3915a2098bb85e167fcea595b7">I1a8be</a>
      ,
      <a href="https://issuetracker.google.com/issues/482675376">b/482675376</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">Geospatial.State</code>
      to
      <code translate="no" dir="ltr">GeospatialState</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I203fa5118d103987272b5667bb67dc656efbaffb">I203fa</a>
      ,
      <a href="https://issuetracker.google.com/issues/482675376">b/482675376</a>
      )
    </li>
    <li>
      Moved
      <code translate="no" dir="ltr">NativeData</code>
      API to
      <code translate="no" dir="ltr">xr:runtime:runtime</code>
      library. (
      <a href="https://android-review.googlesource.com/#/q/I87954b9811c11c019f9a256dacd11c352b79cc56">I87954</a>
      ,
      <a href="https://issuetracker.google.com/issues/494251500">b/494251500</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">Session.create</code>
      and
      <code translate="no" dir="ltr">Session.configure</code>
      are now non-exhaustive and require else clauses in when statements. (
      <a href="https://android-review.googlesource.com/#/q/I9885e2b6bdb6da77988d04402f0df73380f6807a">I9885e</a>
      ,
      <a href="https://issuetracker.google.com/issues/495805998">b/495805998</a>
      ,
      <a href="https://issuetracker.google.com/issues/495805998">b/495805998</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">androidx.xr.runtime.FieldOfView</code>
      has been deprecated. Use
      <code translate="no" dir="ltr">androidx.xr.runtime.math.FieldOfView</code>
      instead. (
      <a href="https://android-review.googlesource.com/#/q/Ia01a0ac228dc4a93c1bb2979b26d4f400be4fe99">Ia01a0</a>
      ,
      <a href="https://issuetracker.google.com/issues/480233045">b/480233045</a>
      )
    </li>
    <li>
      Changed Orbiter to use either an
      <code translate="no" dir="ltr">OrbiterAnchorPoint + VolumeOffset</code>
      or an
      <code translate="no" dir="ltr">OrbiterPoseProvider</code>
      instead of position, offset, offsetType, alignment, and elevation. Also removed the
      <code translate="no" dir="ltr">shouldRenderInNonSpatial</code>
      parameter. If the developer does not want the orbiter to render in non-spatial they should wrap the orbiter in an if statement and check the
      <code translate="no" dir="ltr">SpatialCapabilities</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9fbb3826fb7e709f86fee3e033585cdd97bc0b79">I9fbb3</a>
      ,
      <a href="https://issuetracker.google.com/issues/462428503">b/462428503</a>
      )
    </li>
    <li>
      Added movable modifiers. These modifiers work well, right now, for
      <code translate="no" dir="ltr">SpatialPanels</code>
      and
      <code translate="no" dir="ltr">SpatialExternalSurface</code>
      . Very soon they will also be supported for
      <code translate="no" dir="ltr">SpatialGltfModels</code>
      . However, the intention is to have these supported well for all
      <code translate="no" dir="ltr">SubspaceComposables</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9a3cd5a7989887a09282207629cd4a6dd39dfae7">I9a3cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/479530787">b/479530787</a>
      ,
      <a href="https://issuetracker.google.com/issues/478935063">b/478935063</a>
      ,
      <a href="https://issuetracker.google.com/issues/478935063">b/478935063</a>
      )
    </li>
    <li>
      Developers are expected to observe the
      <code translate="no" dir="ltr">ArDevice.state</code>
      Flow to monitor
      <code translate="no" dir="ltr">State.trackingState</code>
      and adjust their application's rendering or warnings accordingly based on the tracking fidelity. (
      <a href="https://android-review.googlesource.com/#/q/Ic00f0e941ad4491ea15efdc42045eee256f50191">Ic00f0</a>
      ,
      <a href="https://issuetracker.google.com/issues/445466590">b/445466590</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">HandJointType</code>
      enum values. (
      <a href="https://android-review.googlesource.com/#/q/Ifbc83b1141960fc83d32a08e6b8a65c7091ce612">Ifbc83</a>
      ,
      <a href="https://issuetracker.google.com/issues/482670596">b/482670596</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">FaceConfidenceRegion</code>
      constants. (
      <a href="https://android-review.googlesource.com/#/q/Ia62d5d829ba0cf819d18bc96121045421acd7e60">Ia62d5</a>
      ,
      <a href="https://issuetracker.google.com/issues/482670596">b/482670596</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">FaceBlendShapeType</code>
      constants. (
      <a href="https://android-review.googlesource.com/#/q/I33b8b8460697dfd1d71d8d9d39a3d673d8abfad7">I33b8b</a>
      ,
      <a href="https://issuetracker.google.com/issues/482670596">b/482670596</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">CreatePoseFromGeospatialPoseErrorInternal</code>
      and
      <code translate="no" dir="ltr">CreateGeospatialPoseFromPoseErrorInternal</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I4bcf1942bf859413b3f99a4618c48eb0ef63fd81">I4bcf1</a>
      ,
      <a href="https://issuetracker.google.com/issues/482666615">b/482666615</a>
      )
    </li>
    <li>
      Renamed
      <code translate="no" dir="ltr">DeviceTrackingMode.LAST_KNOWN</code>
      to
      <code translate="no" dir="ltr">SPATIAL_LAST_KNOWN</code>
      (with a deprecated fallback), added
      <code translate="no" dir="ltr">INERTIAL_LAST_KNOWN</code>
      for 3DoF tracking, and added
      <code translate="no" dir="ltr">TRACKING_DEGRADED</code>
      to
      <code translate="no" dir="ltr">TrackingState</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ie661cfd441521987dcebd7e1fd1e7cfc3ef5ab9d">Ie661c</a>
      ,
      <a href="https://issuetracker.google.com/issues/445466590">b/445466590</a>
      )
    </li>
    <li>
      Deprecated
      <code translate="no" dir="ltr">GroupEntity</code>
      . To have an Entity with only the base Entity functionality, call
      <code translate="no" dir="ltr">Entity.create</code>
      which will return and Entity interface. (
      <a href="https://android-review.googlesource.com/#/q/I4c45068d0b8f9a15a2b2ce29bc3523cf93463446">I4c450</a>
      ,
      <a href="https://issuetracker.google.com/issues/473867483">b/473867483</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">XrLog</code>
      API. Set
      <code translate="no" dir="ltr">XrLog.isEnabled</code>
      to
      <code translate="no" dir="ltr">true</code>
      to enable logging in JetpackXR, and use
      <code translate="no" dir="ltr">XrLog.Level</code>
      to set the log level. (
      <a href="https://android-review.googlesource.com/#/q/I76a1f066b96ab6f07016d57c7e8e83518cb67de6">I76a1f</a>
      ,
      <a href="https://issuetracker.google.com/issues/463460895">b/463460895</a>
      ,
      <a href="https://issuetracker.google.com/issues/487378441">b/487378441</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Add the device tracking state support to the openxr devices. (
      <a href="https://android-review.googlesource.com/#/q/I914850cda132645b7c8d40e12e204e7528ac056a">I91485</a>
      ,
      <a href="https://issuetracker.google.com/issues/445466590">b/445466590</a>
      )
    </li>
  </ul>
