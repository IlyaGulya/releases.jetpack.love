changelogHtml: |
  <h3 id="1.0.0-beta01" data-text="Version 1.0.0-beta01" tabindex="-1">Version 1.0.0-beta01</h3>
  <p>July 15, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.arcore:arcore-*:1.0.0-beta01</code>
    is released. Version 1.0.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1790799be76c86764f97a92871414dfdd08154a2..ad7cd7099fdef1e27d4e7c957a7cbf7b8690d425/xr/arcore">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Updated resizable modifier to use a
      <code translate="no" dir="ltr">ResizePolicy</code>
      instead of two modifiers (
      <a href="https://android-review.googlesource.com/#/q/I7fb0fff7c7abe5ab3cffe2a118fec42cf61f4684">I7fb0f</a>
      ,
      <a href="https://issuetracker.google.com/issues/496257436">b/496257436</a>
      ,
      <a href="https://issuetracker.google.com/issues/519672992">b/519672992</a>
      )
    </li>
    <li>
      Added movable overload with
      <code translate="no" dir="ltr">movePolicy</code>
      param and deprecate
      <code translate="no" dir="ltr">transformingMovable</code>
      and
      <code translate="no" dir="ltr">movable</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ic88c1d6acf919b741f6f50bca3f61da958caab70">Ic88c1</a>
      ,
      <a href="https://issuetracker.google.com/issues/481781189">b/481781189</a>
      )
    </li>
    <li>
      Removed
      <code translate="no" dir="ltr">TrackingState</code>
      .TRACKING_DEGRADED from public API surface and map runtime degraded states to PAUSED instead. Update
      <code translate="no" dir="ltr">TrackingState</code>
      to use enums instead of int values for string conversion and runtime conversion. (
      <a href="https://android-review.googlesource.com/#/q/I3eb5b4b57f9d9bd029f0b08a9841d54b4ebf128e">I3eb5b</a>
      ,
      <a href="https://issuetracker.google.com/issues/524326338">b/524326338</a>
      )
    </li>
    <li>
      Converted Session.create to a suspend function. (
      <a href="https://android-review.googlesource.com/#/q/I5d27fd6399fc5fe35f28ddf9c0c488a12eb23115">I5d27f</a>
      )
    </li>
    <li>
      Deprecated the
      <code translate="no" dir="ltr">ProjectedPermissionsResultContract</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I141d5713b3a0c26606f85815111fa7af88f63269">I141d5</a>
      ,
      <a href="https://issuetracker.google.com/issues/515699436">b/515699436</a>
      )
    </li>
    <li>
      Updated
      <code translate="no" dir="ltr">AnchorEntity</code>
      to be called
      <code translate="no" dir="ltr">AnchorSpace</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ifa95ebf5c1da2b4413723835db4c0e5f9a2e52fb">Ifa95e</a>
      ,
      <a href="https://issuetracker.google.com/issues/513619219">b/513619219</a>
      )
    </li>
  </ul>
