changelogHtml: |
  <h3 id="1.0.0-alpha12" data-text="Version 1.0.0-alpha12" tabindex="-1">Version 1.0.0-alpha12</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.arcore:arcore-*:1.0.0-alpha12</code>
    is released. Version 1.0.0-alpha12 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c6ef8fa5ea41c72f3cc3e7c77e7981305dfecf33..bc435de8f136679d268375c04ab31ecc94fa99f9/xr/arcore">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Changed
      <code translate="no" dir="ltr">Config.augmentedObjectCategories</code>
      from a List to a Set. (
      <a href="https://android-review.googlesource.com/#/q/I25a64eb05fa641c80185dbff62b7d140a2d4cac0">I25a64</a>
      ,
      <a href="https://issuetracker.google.com/issues/487376359">b/487376359</a>
      )
    </li>
    <li>
      The types
      <code translate="no" dir="ltr">androidx.xr.arcore.Eye</code>
      and
      <code translate="no" dir="ltr">androidx.xr.arcore.Hand</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I42438bade68de856a267bdd7280ee89b81f7eb5b">I42438</a>
      ,
      <a href="https://issuetracker.google.com/issues/449032900">b/449032900</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">Session.create</code>
      overload to allow passing an Android Context for resource-scoping. (
      <a href="https://android-review.googlesource.com/#/q/I7d3fec251fb7d1a415a812286d71adbf23a910b2">I7d3fe</a>
      ,
      <a href="https://issuetracker.google.com/issues/415805990">b/415805990</a>
      ,
      <a href="https://issuetracker.google.com/issues/477386334">b/477386334</a>
      )
    </li>
    <li>
      Changes
      <code translate="no" dir="ltr">FakeRuntimeAnchor.ANCHOR_RESOURCE_LIMIT</code>
      to
      <code translate="no" dir="ltr">FakeRuntimeAnchor.anchorResourceLimit</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I9084135267eeede19b5d4125432a409f33aa4ee8">I90841</a>
      ,
      <a href="https://issuetracker.google.com/issues/431992235">b/431992235</a>
      )
    </li>
    <li>
      Making
      <code translate="no" dir="ltr">TiltGesture</code>
      API experimental as it may be changed or removed in the future. To use this api, opt in to
      <code translate="no" dir="ltr">@ExperimentalGesturesApi</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ic98584011ddc6c6ba6c44a6d979ce56ca04860c4">Ic9858</a>
      )
    </li>
    <li>
      Added ability to set categories for
      <code translate="no" dir="ltr">AugmentedObject</code>
      tracking in the Config (
      <a href="https://android-review.googlesource.com/#/q/I1f6e4e634a511ab591802327ce3d45da6a3a0510">I1f6e4</a>
      ,
      <a href="https://issuetracker.google.com/issues/480220930">b/480220930</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed Chrome's build by updating META-INF/services/ file with actual location of
      <code translate="no" dir="ltr">PerceptionRuntimeFactory</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I7a80111b2144ed2406cb2bd0113100faac9057b0">I7a801</a>
      ,
      <a href="https://issuetracker.google.com/issues/481288291">b/481288291</a>
      )
    </li>
  </ul>
