changelogHtml: |
  <h3 id="remote-material3-1.0.0-alpha03" data-text="Version 1.0.0-alpha03" tabindex="-1">Version 1.0.0-alpha03</h3>
  <p>May 06, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose.remote:remote-material3:1.0.0-alpha03</code>
    is released. Version 1.0.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/951845221205b7a428a9d779107760fc929863ee..8db6b19df41c512621b47ea1370552eaa910997b/wear/compose/remote/remote-material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Modifier clickable changed to not accept null value for action parameter.
      <code translate="no" dir="ltr">Action.Empty</code>
      should be used instead. (
      <a href="https://android-review.googlesource.com/#/q/I21be9ccd0c402e176cbb5998ba4e73b76851d4d8">I21be9</a>
      ,
      <a href="https://issuetracker.google.com/issues/498881738">b/498881738</a>
      )
    </li>
    <li>
      Modifier
      <code translate="no" dir="ltr">clickable(varargs action)</code>
      was changed to
      <code translate="no" dir="ltr">clickable(action)</code>
      . Use
      <code translate="no" dir="ltr">CombinedAction</code>
      for a list of actions. (
      <a href="https://android-review.googlesource.com/#/q/I8432da06a6ca0c39c297cc6f65bf4b4d67967630">I8432d</a>
      ,
      <a href="https://issuetracker.google.com/issues/498881738">b/498881738</a>
      )
    </li>
  </ul>
