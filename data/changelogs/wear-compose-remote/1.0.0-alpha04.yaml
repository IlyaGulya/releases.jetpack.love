changelogHtml: |
  <h3 id="1.0.0-alpha04" data-text="Version 1.0.0-alpha04" tabindex="-1">Version 1.0.0-alpha04</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose.remote:remote-material3:1.0.0-alpha04</code>
    is released. Version 1.0.0-alpha04 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e29a10982f4299b1fa812e229d76792092a62814..b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe/wear/compose/remote/remote-material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteState</code>
      static factories (
      <a href="https://android-review.googlesource.com/#/q/I544f0fc816ce073606a98911261876de43e76cd1">I544f0</a>
      ,
      <a href="https://issuetracker.google.com/issues/484137042">b/484137042</a>
      )
    </li>
    <li>
      Update
      <code translate="no" dir="ltr">RemoteText</code>
      to use
      <code translate="no" dir="ltr">RemoteFontFamily</code>
      instead of
      <code translate="no" dir="ltr">FontFamily</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ib76b66464b97b40f914639aef783a3e26a6a6964">Ib76b6</a>
      ,
      <a href="https://issuetracker.google.com/issues/502907551">b/502907551</a>
      )
    </li>
  </ul>
