changelogHtml: |
  <h3 id="1.0.0-alpha06" data-text="Version 1.0.0-alpha06" tabindex="-1">Version 1.0.0-alpha06</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose.remote:remote-material3:1.0.0-alpha06</code>
    is released. Version 1.0.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d0d5e8b902b1ded8854df7d27fa1d1ee14e3bb4c..14c2f2ed81d0f61a3227641684cd875e95dd6529/wear/compose/remote/remote-material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Update
      <code translate="no" dir="ltr">containerPainter</code>
      method to take
      <code translate="no" dir="ltr">RemoteImageBitmap</code>
      instead (
      <a href="https://android-review.googlesource.com/#/q/I68a92331857f100fc37288e76af270d2ceb39d25">I68a92</a>
      ,
      <a href="https://issuetracker.google.com/issues/494562308">b/494562308</a>
      )
    </li>
    <li>
      Rename
      <code translate="no" dir="ltr">RemoteBitmap</code>
      to
      <code translate="no" dir="ltr">RemoteImageBitmap</code>
      to improve naming consistency. (
      <a href="https://android-review.googlesource.com/#/q/I4fde13afb0f60eae9e47e651d02c964ec7773433">I4fde1</a>
      ,
      <a href="https://issuetracker.google.com/issues/513228889">b/513228889</a>
      )
    </li>
    <li>
      Exposed
      <code translate="no" dir="ltr">captureRemoteDocument</code>
      Flow API and a new
      <code translate="no" dir="ltr">captureSingleRemoteDocument</code>
      overload (which takes
      <code translate="no" dir="ltr">RemoteCreationDisplayInfo</code>
      ) as public APIs. (
      <a href="https://android-review.googlesource.com/#/q/I87b0ef46ca9cbaae9375053ab8d0618921aa1957">I87b0e</a>
      ,
      <a href="https://issuetracker.google.com/issues/513228889">b/513228889</a>
      )
    </li>
    <li>
      Renamed existing
      <code translate="no" dir="ltr">ValueChange</code>
      factory functions to lowercase
      <code translate="no" dir="ltr">valueChange</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I812b92fed6b9edfb9e489dbf6ceb5382cd68a80e">I812b9</a>
      ,
      <a href="https://issuetracker.google.com/issues/513228889">b/513228889</a>
      )
    </li>
  </ul>
