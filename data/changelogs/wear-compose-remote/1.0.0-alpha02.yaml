changelogHtml: |
  <h3 id="remote-material3-1.0.0-alpha02" data-text="Version 1.0.0-alpha02" tabindex="-1">Version 1.0.0-alpha02</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose.remote:remote-material3:1.0.0-alpha02</code>
    is released. Version 1.0.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/4f1927c2c3b66d0c3a6b9118974d818d2dc5a06a..951845221205b7a428a9d779107760fc929863ee/wear/compose/remote/remote-material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteCircularProgressIndicator</code>
      ,
      <code translate="no" dir="ltr">RemoteProgressIndicatorDefaults</code>
      , and
      <code translate="no" dir="ltr">RemoteProgressIndicatorColors</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I64481ef9b9246f0ef82b863f66f459e4bb8ccee7">I64481</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteTitleCard</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ic65ff71f28387406a153889d8eee162430be5546">Ic65ff</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteMaterialTheme</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I07329a0ac7c5ca82b251023cc9fe53abcd5c002f">I07329</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteAppCard</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ib6fbcb4c2b022d89dd48017eabdd6e67edfea423">Ib6fbc</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteCard</code>
      ,
      <code translate="no" dir="ltr">RemoteOutlinedCard</code>
      ,
      <code translate="no" dir="ltr">RemoteCardDefaults</code>
      , and
      <code translate="no" dir="ltr">RemoteCardColors</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I2bcfd467f039e4a81e8221eff34ec851e262f2d8">I2bcfd</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteColorScheme</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Id0e8817db6118b89c7728b6f853dbf57f3e8b05a">Id0e88</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteTypography</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ib6f880bb885f8fe2723d8176f996af0ad32f8aeb">Ib6f88</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteShapes</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I6c356b5485ae33a838a2a28e63ba9559d32812ac">I6c356</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
  </ul>
  <p><strong>Other Changes</strong></p>
  <ul>
    <li>
      Updated Compose
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
  </ul>
