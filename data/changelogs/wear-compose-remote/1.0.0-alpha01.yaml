changelogHtml: |
  <h3 id="remote-material3-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.compose.remote:remote-material3:1.0.0-alpha01</code>
    is released. Version 1.0.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1abcb4178d48853948b9b566cabff9222d90ab69/wear/compose/remote/remote-material3">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteTextButton</code>
      public APIs. (
      <a href="https://android-review.googlesource.com/#/q/I169e3b2e0c336da4727d00da6d3f0a571061da88">I169e3</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteIconButton</code>
      public APIs. (
      <a href="https://android-review.googlesource.com/#/q/Id7c71e213914b4c524c465e8277bdd9dfaa923a7">Id7c71</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteButtonGroup</code>
      public APIs. (
      <a href="https://android-review.googlesource.com/#/q/Ibfc22f7315183805aa0cac158af8e8967d68ec87">Ibfc22</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteButton</code>
      ,
      <code translate="no" dir="ltr">RemoteCompactButton</code>
      ,
      <code translate="no" dir="ltr">RemoteButtonDefaults</code>
      and
      <code translate="no" dir="ltr">RemoteButtonColors</code>
      as public APIs (
      <a href="https://android-review.googlesource.com/#/q/I3bcdd4d2ed1b43f523eddaba953e8a95aefd2e71">I3bcdd</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteIcon</code>
      as a public API (
      <a href="https://android-review.googlesource.com/#/q/I0cc799082b3e90cbe5b218d13d83aaba976330f9">I0cc79</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteText</code>
      as public APIs (
      <a href="https://android-review.googlesource.com/#/q/I8a11a50a46b90acb222ac99cf8bb9e41140fc5b5">I8a11a</a>
      ,
      <a href="https://issuetracker.google.com/issues/492476015">b/492476015</a>
      )
    </li>
    <li>
      Expose
      <code translate="no" dir="ltr">RemoteFloat.asRemoteDp()</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I28b361187b51f6b0b15a5223cd7af98f50270da0">I28b36</a>
      ,
      <a href="https://issuetracker.google.com/issues/446824085">b/446824085</a>
      )
    </li>
  </ul>
