changelogHtml: |
  <h3 id="3.5.0-beta01" data-text="Version 3.5.0-beta01" tabindex="-1">Version 3.5.0-beta01</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.paging:paging-*:3.5.0-beta01</code>
    is released. Version 3.5.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1a508f033de883ba2853b9f9ae1853eec7010638..1084df59b549f7ddc3e0b18213917a26af4aff10/paging">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      The
      <code translate="no" dir="ltr">Flow&lt;PagingData&gt;.asState</code>
      API has been renamed to
      <code translate="no" dir="ltr">Flow&lt;PagingData&gt;.asItemSnapshotListFlow</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I0dc1134fe42ffa2dd48d1f60beb86f66ffa80c08">I0dc11</a>
      ,
      <a href="https://issuetracker.google.com/issues/496548025">b/496548025</a>
      )
    </li>
  </ul>
