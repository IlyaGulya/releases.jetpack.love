changelogHtml: |
  <h3 id="1.11.0-beta01" data-text="Version 1.11.0-beta01" tabindex="-1">Version 1.11.0-beta01</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.animation:animation-*:1.11.0-beta01</code>
    is released. Version 1.11.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6e23fc0c137022098ae2d043778ffdc56402ba5e..a15c668d4bb2e00cfa8ed1af96895a84c3e7e2d5/compose/animation">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix
      <code translate="no" dir="ltr">isTransitionActive</code>
      so that it only reports true when there’re active animation from
      <em>matched</em>
      shared element (
      <a href="https://android-review.googlesource.com/#/q/d3426a6">d3426a</a>
      ,
      <a href="https://issuetracker.google.com/issues/474385510">b/474385510</a>
      )
    </li>
  </ul>
