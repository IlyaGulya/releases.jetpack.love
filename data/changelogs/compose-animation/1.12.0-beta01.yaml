changelogHtml: |
  <h3 id="1.12.0-beta01" data-text="Version 1.12.0-beta01" tabindex="-1">Version 1.12.0-beta01</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.animation:animation-*:1.12.0-beta01</code>
    is released. Version 1.12.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/b5d2acb5ad0a36c9d2aba8feb4c7951165f30fbe..40b1610b08564489b3f6a426cd8833f8615bfc68/compose/animation">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Introduced
      <code translate="no" dir="ltr">permitTransformDuringDeferredTransition</code>
      parameter to
      <code translate="no" dir="ltr">SharedContentConfig</code>
      to control whether shared elements should visually transform with their parent container during the deferred phase of a
      <code translate="no" dir="ltr">DeferredTransition</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I4b67ba8bc4ab94f4430ac01ac1f83da35ec48c86">I4b67b</a>
      )
    </li>
    <li>
      Refactored Transition to a sealed class and improved
      <code translate="no" dir="ltr">DeferredTransition</code>
      API documentation and safety. (
      <a href="https://android-review.googlesource.com/#/q/Iecb8fdf7370d37cc404b3fdab272e768044a5212">Iecb8f</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">inactiveElementColor</code>
      to
      <code translate="no" dir="ltr">LookaheadAnimationVisualDebugging</code>
      " into androidx-main
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">inactiveElementColor</code>
      to
      <code translate="no" dir="ltr">LookaheadAnimationVisualDebugging</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I5454ba0fd32c6ce411bc6747e7c2cc71d829013b">I5454b</a>
      ,
      <a href="https://issuetracker.google.com/issues/501193322">b/501193322</a>
      )
    </li>
    <li>
      Removed
      <code translate="no" dir="ltr">ExperimentalAnimatableApi</code>
      annotation. (
      <a href="https://android-review.googlesource.com/#/q/I4e670a34f56e1123bc60dbe4068c60f832350f64">I4e670</a>
      ,
      <a href="https://issuetracker.google.com/issues/500030165">b/500030165</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed an issue in the
      <code translate="no" dir="ltr">LinkComposer</code>
      that could cause composables to skip instead of recompose when invalidated during composition. (
      <a href="https://android-review.googlesource.com/#/q/Ie29fe654c682ea4307d411104dcb5bfa87017b18">Ie29fe</a>
      )
    </li>
  </ul>
