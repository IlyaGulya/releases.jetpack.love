groupId: androidx.compose
version: 1.12.0-alpha03
releaseDate: 2026-05-19
#language=html
changelogHtml: |
  <h3 id="1.12.0-alpha03" data-text="Version 1.12.0-alpha03" tabindex="-1">Version 1.12.0-alpha03</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.animation:animation-*:1.12.0-alpha03</code>
    is released. Version 1.12.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e29a10982f4299b1fa812e229d76792092a62814..a5046b380f14cd67d25208fa4c58d41bf3b06a1b/compose/animation">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">DeferredTargetAnimation</code>
      is no longer experimental, please remove opt-in into androidx-main
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">mutableTransform</code>
      parameter to
      <code translate="no" dir="ltr">AnimatedVisibility</code>
      and
      <code translate="no" dir="ltr">AnimatedContent</code>
      to support direct manual property manipulation (e.g., for predictive back gestures) during a deferred transition phase. (
      <a href="https://android-review.googlesource.com/#/q/I236e840eaded1fc5685f27ed6e2211c5b1241b81">I236e8</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">DeferredTargetAnimation</code>
      is no longer experimental, please remove opt-in. (
      <a href="https://android-review.googlesource.com/#/q/I1e4aeb4d0542a5ef99d7adc3282794e652b0ba49">I1e4ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/500030165">b/500030165</a>
      )
    </li>
    <li>
      New enum to support triggers in ui-tooling (
      <a href="https://android-review.googlesource.com/#/q/I6e19896c8cea4e5006de7b414bf67ab92cd5e83d">I6e198</a>
      ,
      <a href="https://issuetracker.google.com/issues/478807872">b/478807872</a>
      )
    </li>
  </ul>
