changelogHtml: |
  <h3 id="1.12.0-alpha01" data-text="Version 1.12.0-alpha01" tabindex="-1">Version 1.12.0-alpha01</h3>
  <p>April 22, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.compose.animation:animation-*:1.12.0-alpha01</code>
    is released. Version 1.12.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ecc44700355708734de3756bf5e677323ae14ed1..df4b49eda6f6834b6bc4c8aa30a581fa577a511e/compose/animation">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Updated Compose
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required when using Compose. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/413674743">b/413674743</a>
      )
    </li>
    <li>
      End the
      <code translate="no" dir="ltr">SeekableTransitionState</code>
      animation before composition (
      <a href="https://android-review.googlesource.com/#/q/1bf9dcf">1bf9dc</a>
      ,
      <a href="https://issuetracker.google.com/410055849">b/410055849</a>
      )
    </li>
  </ul>
  <h2 id="version_111_3" data-text="Version 1.11" tabindex="-1">Version 1.11</h2>
