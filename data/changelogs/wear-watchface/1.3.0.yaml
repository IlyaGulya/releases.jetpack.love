changelogHtml: |
  <h3 id="1.3.0" data-text="Version 1.3.0" tabindex="-1">Version 1.3.0</h3>
  <p>February 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.wear.watchface:watchface-*:1.3.0</code>
    is released. Version 1.3.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/264b14bca26ab6294c17da770ce57440099d1e4a..c23098949847d0672c4b37c6ccd58d14c6426402/wear/watchface">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.2.0:</strong></p>
  <ul>
    <li>
      The wear watchface APIs (watchface, watchface-client, watchface-client-guava, watchface-complications-rendering, watchface-data, watchface-editor, watchface-editor-guava, and watchface-style) have been deprecated in favor of the
      <a href="https://developer.android.com/training/wearables/wff">Wear Watchface Format</a>
      , and will eventually be removed from AndroidX. The complication APIs are not deprecated and will remain. (
      <a href="https://android-review.googlesource.com/#/q/Ice960baec89d1ff8ace8faf6425daeb4907bd548">Ice960</a>
      )
    </li>
    <li>
      Added support for static complication previews (
      <a href="https://android-review.googlesource.com/#/q/Ic9f861ad0bdb6778c43843eea107a047ec6f68f8">8b2bed3</a>
      )
    </li>
    <li>
      The utility class
      <code translate="no" dir="ltr">ComplicationTextFormatting</code>
      has been added with support for formatting data and time as tersely as possible, which is useful for complications where space is very much at a premium.
    </li>
  </ul>
