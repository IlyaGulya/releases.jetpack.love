#language=html
changelogHtml: |
  <h3 id="1.2.0-alpha01" data-text="Version 1.2.0-alpha01" tabindex="-1">Version 1.2.0-alpha01</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.appsearch:appsearch-*:1.2.0-alpha01</code>
    is released. Version 1.2.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/1ba9efeef17e71a00ddd145f3d0c5c2de2544c2c..1abcb4178d48853948b9b566cabff9222d90ab69/appsearch">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Disable and hide delete propagation API (
      <a href="https://android-review.googlesource.com/#/q/Ia4073aafe8fb73b3f95246ec03c8eb5cb2b58819">Ia4073</a>
      ,
      <a href="https://issuetracker.google.com/issues/384947619">b/384947619</a>
      )
    </li>
    <li>
      Change
      <code translate="no" dir="ltr">setSchemaTypeWipeoutAccountPropertyPaths</code>
      to take set. (
      <a href="https://android-review.googlesource.com/#/q/If442cb14a8acbfc181172680d2ba3924da292dd1">If442c</a>
      ,
      <a href="https://issuetracker.google.com/issues/470398298">b/470398298</a>
      )
    </li>
    <li>
      Support visibility for
      <code translate="no" dir="ltr">Process#isPccUid</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I2ee69f41949793c483d19754812313e1bb7eaefc">I2ee69</a>
      ,
      <a href="https://issuetracker.google.com/issues/463863587">b/463863587</a>
      )
    </li>
    <li>
      Hides some unintentionally exposed constructors in
      <code translate="no" dir="ltr">AppSearch</code>
      built-in types (
      <a href="https://android-review.googlesource.com/#/q/I98583b2cfe653effac9c022a713fce143b958abe">I98583</a>
      ,
      <a href="https://issuetracker.google.com/issues/463386955">b/463386955</a>
      )
    </li>
    <li>
      Adds
      <code translate="no" dir="ltr">AppSearchSchema#fromDocumentClass</code>
      which returns the generated schema for a @Document-annotated class (
      <a href="https://android-review.googlesource.com/#/q/I599ad75e97188406c6a49fd69fc591753344d93b">I599ad</a>
      ,
      <a href="https://issuetracker.google.com/issues/458101236">b/458101236</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">setSchemaTypeWipeoutAccountPropertyPaths</code>
      to
      <code translate="no" dir="ltr">GetSchemaResponse</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I8f6d499d2fc0105454a6e9409546b232a358a239">I8f6d4</a>
      ,
      <a href="https://issuetracker.google.com/issues/413089233">b/413089233</a>
      )
    </li>
    <li>
      Add set wipe out account API in
      <code translate="no" dir="ltr">SetSchemaRequest</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Id5a47ae2738d2930b6334506511aff427ab9869f">Id5a47</a>
      ,
      <a href="https://issuetracker.google.com/issues/413089233">b/413089233</a>
      )
    </li>
    <li>
      Added a builder class to create built-in-type Account (
      <a href="https://android-review.googlesource.com/#/q/I29d07b58ad30a4528f77334f66c50349a7235b6d">I29d07</a>
      ,
      <a href="https://issuetracker.google.com/issues/429110646">b/429110646</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">AppSearch</code>
      delete propagation API (
      <a href="https://android-review.googlesource.com/#/q/I57f899a1f1bbe368ffcdbaca44e703ac6aa11892">I57f89</a>
      ,
      <a href="https://issuetracker.google.com/issues/384947619">b/384947619</a>
      )
    </li>
    <li>
      Adds a shared interface for
      <code translate="no" dir="ltr">GlobalSearchSession</code>
      and
      <code translate="no" dir="ltr">EnterpriseGlobalSearchSession</code>
      (
      <a href="https://android-review.googlesource.com/#/q/If2a70af93529325e2666aff0af3b237a55992e39">If2a70</a>
      ,
      <a href="https://issuetracker.google.com/issues/422241546">b/422241546</a>
      )
    </li>
    <li>
      Clean
      <code translate="no" dir="ltr">ExperimentalAppSearchApi</code>
      from Blob API (
      <a href="https://android-review.googlesource.com/#/q/I610e816d6e32913211980d8e52dcd2ae1040af7b">I610e8</a>
      ,
      <a href="https://issuetracker.google.com/issues/273591938">b/273591938</a>
      )
    </li>
    <li>
      Adds a builtin Nickname type (
      <a href="https://android-review.googlesource.com/#/q/I8aba0d22d2c3dba89fe07b8a37c3ba16ed746af3">I8aba0</a>
      )
    </li>
    <li>
      Adds an Action Accumulator API (
      <a href="https://android-review.googlesource.com/#/q/I3f778e8babf1e6441ba039e4a5f18cc310b1ac2d">I3f778</a>
      ,
      <a href="https://issuetracker.google.com/issues/395157195">b/395157195</a>
      )
    </li>
    <li>
      Moves get indexable nested properties to new feature (
      <a href="https://android-review.googlesource.com/#/q/I4cf95c3e9b70f491b3233ca73a28f0c074e847f3">I4cf95</a>
      ,
      <a href="https://issuetracker.google.com/issues/407815165">b/407815165</a>
      )
    </li>
    <li>
      Removing obsolete
      <code translate="no" dir="ltr">@RequiresApi(21)</code>
      annotations (
      <a href="https://android-review.googlesource.com/#/q/Ic47923dcc82f4b7c4638fadb10c2c0268b414fcd">Ic4792</a>
      )
    </li>
    <li>
      Add new built-in type account (
      <a href="https://android-review.googlesource.com/#/q/Iadad6c4fe37d35357824ad07ef9ae963b294c5fd">Iadad6</a>
      ,
      <a href="https://issuetracker.google.com/issues/422079057">b/422079057</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">AppSearchResult#RESULT_UNAVAILABLE</code>
      result error code (
      <a href="https://android-review.googlesource.com/#/q/I484111dd1b51c44075f9eff3c537c43e665d05c3">I48411</a>
      ,
      <a href="https://issuetracker.google.com/issues/407815165">b/407815165</a>
      ,
      <a href="https://issuetracker.google.com/issues/404210068">b/404210068</a>
      ,
      <a href="https://issuetracker.google.com/issues/415387509">b/415387509</a>
      ,
      <a href="https://issuetracker.google.com/issues/419875333">b/419875333</a>
      ,
      <a href="https://issuetracker.google.com/issues/417461575">b/417461575</a>
      ,
      <a href="https://issuetracker.google.com/issues/415031127">b/415031127</a>
      ,
      <a href="https://issuetracker.google.com/issues/357835538">b/357835538</a>
      )
    </li>
    <li>
      Adds an Action Accumulator API (
      <a href="https://android-review.googlesource.com/#/q/I97818a96e12cdd5422338a031619e3513c92b375">I97818</a>
      ,
      <a href="https://issuetracker.google.com/issues/395157195">b/395157195</a>
      )
    </li>
    <li>
      Add new
      <code translate="no" dir="ltr">AppSearchResult</code>
      code
      <code translate="no" dir="ltr">RESULT_ABORTED</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I6c37543a5eeedc2cb73c5ac2912def3ef28440f2">I6c375</a>
      ,
      <a href="https://issuetracker.google.com/issues/409070736">b/409070736</a>
      )
    </li>
    <li>
      Amended Event to requires API O. (
      <a href="https://android-review.googlesource.com/#/q/I4433b41436698f5f0c8149f4b223f14d05942332">I4433b</a>
      ,
      <a href="https://issuetracker.google.com/issues/399728815">b/399728815</a>
      )
    </li>
    <li>
      Added new
      <code translate="no" dir="ltr">AppSearch</code>
      builtin schema
      <code translate="no" dir="ltr">SportsEvent</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I0dea67280602a00d2b83c7c742d9dc2f5abbf641">I0dea6</a>
      ,
      <a href="https://issuetracker.google.com/issues/399728815">b/399728815</a>
      )
    </li>
    <li>
      Added new
      <code translate="no" dir="ltr">AppSearch</code>
      builtin schema
      <code translate="no" dir="ltr">SportsTeam</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I073cddac6cba5ff886e6318526f494a5002fad48">I073cd</a>
      ,
      <a href="https://issuetracker.google.com/issues/399728815">b/399728815</a>
      )
    </li>
    <li>
      Added new
      <code translate="no" dir="ltr">AppSearch</code>
      builtin schema
      <code translate="no" dir="ltr">SportsOrganization</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I5729ce0dcc91ccb1ce1c5508c43737ae177501f0">I5729c</a>
      ,
      <a href="https://issuetracker.google.com/issues/399728815">b/399728815</a>
      )
    </li>
    <li>
      Added new
      <code translate="no" dir="ltr">AppSearch</code>
      builtin schema
      <code translate="no" dir="ltr">Organization</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I4bb2d7713fc2180c64187757fa4e698cc54ee282">I4bb2d</a>
      ,
      <a href="https://issuetracker.google.com/issues/399728815">b/399728815</a>
      )
    </li>
    <li>
      Added new
      <code translate="no" dir="ltr">AppSearch</code>
      builtin schema
      <code translate="no" dir="ltr">Event</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ifd64688ca2e268174b6f04410a8033350731e541">Ifd646</a>
      ,
      <a href="https://issuetracker.google.com/issues/399728815">b/399728815</a>
      )
    </li>
    <li>
      Projects released with Kotlin 2.0 require KGP 2.0.0 or newer to be consumed (
      <a href="https://android-review.googlesource.com/#/q/Idb6b5d6ae1625ab870ffe74f9790ffabc82a63b4">Idb6b5</a>
      ,
      <a href="https://issuetracker.google.com/issues/344563182">b/344563182</a>
      )
    </li>
    <li>
      Make
      <code translate="no" dir="ltr">WebPage</code>
      extendable (
      <a href="https://android-review.googlesource.com/#/q/I622f7f26a4dda919a8e3fdeeceeb7848c16e1ca5">I622f7</a>
      ,
      <a href="https://issuetracker.google.com/issues/399220908">b/399220908</a>
      )
    </li>
    <li>
      Add source field to
      <code translate="no" dir="ltr">WebPage</code>
      (
      <a href="https://android-review.googlesource.com/#/q/Ic4d7b15d9c55437c9cc80290824316f0acf81cf5">Ic4d7b</a>
      ,
      <a href="https://issuetracker.google.com/issues/399220908">b/399220908</a>
      )
    </li>
    <li>
      Change
      <code translate="no" dir="ltr">TextMatchInfo</code>
      's constructor params (
      <a href="https://android-review.googlesource.com/#/q/Ie29c3a4e425847ef263094dcd672b1d5e802d19d">Ie29c3</a>
      ,
      <a href="https://issuetracker.google.com/issues/403591188">b/403591188</a>
      ,
      <a href="https://issuetracker.google.com/issues/395128139">b/395128139</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Moves libraries to use Java 11 target. This means produced bytecode will be Java 11 (class file version 55) and might require desugaring to use the library (
      <a href="https://android-review.googlesource.com/#/q/If4c2a6fdda1278f42ea080fa365e8b437b2c2ae6">If4c2a</a>
      ,
      <a href="https://issuetracker.google.com/issues/457821470">b/457821470</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">SearchFeatures</code>
      and
      <code translate="no" dir="ltr">RankingFeatures</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I54b7d621d66e29607d654661f3bde712f0cb7551">I54b7d</a>
      ,
      <a href="https://issuetracker.google.com/issues/387291182">b/387291182</a>
      )
    </li>
    <li>
      Use new delete propagation flag (
      <a href="https://android-review.googlesource.com/#/q/If21ae4f3bbe0b2eb2376d2e81a102575c2d9d196">If21ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/384947619">b/384947619</a>
      )
    </li>
    <li>
      Adds more detailed internal logging (
      <a href="https://android-review.googlesource.com/#/q/I10604db6faf2221dc42fc55540189ab6865c4e5f">I10604</a>
      ,
      <a href="https://issuetracker.google.com/issues/448872333">b/448872333</a>
      )
    </li>
    <li>
      Adds back
      <code translate="no" dir="ltr">allowoptimization</code>
      to proguard keep rule for
      <code translate="no" dir="ltr">AppSarchDocumentClassMap</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I0bd88826523819fe13feb4ca22e3a53f0bd90d2d">I0bd88</a>
      ,
      <a href="https://issuetracker.google.com/issues/440484133">b/440484133</a>
      )
    </li>
    <li>
      Fixes a bug in optimized builds where references to
      <code translate="no" dir="ltr">AppSearch</code>
      document classes could be replaced by unrelated classes due to horizontal class merging (
      <a href="https://android-review.googlesource.com/#/q/I93f2035b8fd64f28974df86d616d1e9becb3f515">I93f20</a>
      ,
      <a href="https://issuetracker.google.com/issues/440484133">b/440484133</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">ISOLATED_STORAGE</code>
      feature (
      <a href="https://android-review.googlesource.com/#/q/Ifb963feacd8f787ccc882529b1acade25a66427c">Ifb963</a>
      )
    </li>
  </ul>
  <h2 id="version_11_2" data-text="Version 1.1" tabindex="-1">Version 1.1</h2>
