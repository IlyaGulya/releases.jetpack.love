libraryId: emoji2
groupId: androidx.emoji2
version: 1.0.0-alpha01
releaseDate: 2023-01-25
#language=html
changelogHtml: |
  <h3 id="emojipicker-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h3>
  <p>January 25, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.emoji2:emoji2-emojipicker:1.0.0-alpha01</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e5dad1e7d1c225f89f7c2d5a39a7a0de8d637d7b/emoji2/emoji2-emojipicker">Version 1.0.0-alpha01 contains these commits.</a>
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>Introduced an emoji picker which provides consistent user experience with the latest emojis across Android OS OEM devices and apps. It provides the latest emoji support and emoji picker UI including skin-tone variants and emoji compat support.</li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Introduced
      <code translate="no" dir="ltr">EmojiPickerView</code>
      class that provides up-to-date emojis in a vertical scrollable view with a clickable horizontal header.
    </li>
    <li>
      The emoji picker grid columns can be set via XML attribute
      <code translate="no" dir="ltr">emojiGridColumns</code>
      or function
      <code translate="no" dir="ltr">setEmojiGridColumns()</code>
      .
    </li>
    <li>
      The emoji picker grid rows can be set via XML attribute
      <code translate="no" dir="ltr">emojiGridRows</code>
      or function
      <code translate="no" dir="ltr">setEmojiGridRows()</code>
      .
    </li>
    <li>
      The emoji picked listener can be set via
      <code translate="no" dir="ltr">setOnEmojiPickedListener()</code>
      and the listener will be notified whenever the user clicked any emoji.
    </li>
    <li>
      The recent emoji provider can be provided with
      <code translate="no" dir="ltr">setRecentEmojiProvider()</code>
      . This is an optional function. If the recent emoji provider isn’t set, a default recent emoji provider will be used by the library. The default behavior is defined as follows: 1) all selected emojis will be saved per-app level in shared preferences. 2) the picker will display at most 3 rows of selected emojis, deduped, in reverse chronological order.
    </li>
    <li>
      Introduced
      <code translate="no" dir="ltr">EmojiViewItem</code>
      class that holds the displayed emoji and its emoji variants.
    </li>
    <li>
      Introduced
      <code translate="no" dir="ltr">RecentEmojiProvider</code>
      interface that can be implemented to provide a recent emoji list. The
      <code translate="no" dir="ltr">recentEmojiProvider</code>
      is responsible for providing emojis in the “Recently Used” category.
    </li>
  </ul>
