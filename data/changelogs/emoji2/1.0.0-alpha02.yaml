#language=html
changelogHtml: |
  <h3 id="emojipicker-1.0.0-alpha02" data-text="Version 1.0.0-alpha02" tabindex="-1">Version 1.0.0-alpha02</h3>
  <p>February 22, 2023</p>
  <p>
    <code translate="no" dir="ltr">androidx.emoji2:emoji2-emojipicker:1.0.0-alpha02</code>
    is released.
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/e5dad1e7d1c225f89f7c2d5a39a7a0de8d637d7b..87533b4ff06971ed59028936cd9b6da988cd4522/emoji2/emoji2-emojipicker">Version 1.0.0-alpha02 contains these commits.</a>
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added new API for java clients to be able to provide recent emojis. (
      <a href="https://android-review.googlesource.com/#/q/I39d1054670ddadeba062810de9b36418843d7c19">I39d10</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Update emoji resources to support emoji 15.0 (
      <a href="https://android-review.googlesource.com/#/q/Ib4eb3565f7cf2f4c4f72268e5b04001b181136e7">Ib4eb3</a>
      )
    </li>
    <li>
      When picking an emoji from the popup window, update all identical emojis to the newly picked emoji (except the recent emoji row). Also announce the emoji when clicking. (
      <a href="https://android-review.googlesource.com/#/q/I892c6e734ee5be608b2dd632234553bb0d2093f9">I892c6</a>
      )
    </li>
    <li>
      Wait for emojicompat to load before showing the
      <code translate="no" dir="ltr">EmojiPickerView</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I29e030aa682ddb59add4280d27cac241cbdcdbe2">I29e03</a>
      )
    </li>
  </ul>
