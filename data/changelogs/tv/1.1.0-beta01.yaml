changelogHtml: |
  <h3 id="tv-material-1.1.0-beta01" data-text="Version 1.1.0-beta01" tabindex="-1">Version 1.1.0-beta01</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.tv:tv-material:1.1.0-beta01</code>
    is released. Version 1.1.0-beta01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ad66672b42ec1e9359219e82b7f8189d03df40f5..1a508f033de883ba2853b9f9ae1853eec7010638/tv/tv-material">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Projects released with Kotlin 2.0 require KGP 2.0.0 or newer to be consumed (
      <a href="https://android-review.googlesource.com/#/q/Idb6b5d6ae1625ab870ffe74f9790ffabc82a63b4">Idb6b5</a>
      ,
      <a href="https://issuetracker.google.com/issues/344563182">b/344563182</a>
      )
    </li>
  </ul>
  <p><strong>External Contribution</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">androidx.compose.ui.graphics.NativePaint</code>
      typealias is deprecated, use
      <code translate="no" dir="ltr">android.graphics.Paint</code>
      directly instead (
      <a href="https://android-review.googlesource.com/#/q/I6303c742f80887649d1a77e837ab0ff93ddff212">I6303c</a>
      ,
      <a href="https://issuetracker.google.com/issues/477394763">b/477394763</a>
      )
    </li>
    <li>
      Replace
      <code translate="no" dir="ltr">Paint.asFrameworkPaint()</code>
      to
      <code translate="no" dir="ltr">Paint.nativePaint</code>
      extension to avoid exposing platform type into
      <code translate="no" dir="ltr">commonMain</code>
      sourceset via
      <code translate="no" dir="ltr">typealias</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I6303c742f80887649d1a77e837ab0ff93ddff212">I6303c</a>
      ,
      <a href="https://issuetracker.google.com/issues/477394763">b/477394763</a>
      )
    </li>
  </ul>
