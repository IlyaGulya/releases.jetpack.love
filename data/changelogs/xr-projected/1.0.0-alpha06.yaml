changelogHtml: |
  <h3 id="1.0.0-alpha06" data-text="Version 1.0.0-alpha06" tabindex="-1">Version 1.0.0-alpha06</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.projected:projected:1.0.0-alpha06</code>
    ,
    <code translate="no" dir="ltr">androidx.xr.projected:projected-binding:1.0.0-alpha06</code>
    , and
    <code translate="no" dir="ltr">androidx.xr.projected:projected-testing:1.0.0-alpha06</code>
    are released. Version 1.0.0-alpha06 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/855e9d89b825c1acd405c8aeb81dab7792e61dbc..9c7d19e26a25f01d06a79709097a11943f562613/xr/projected">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added a new
      <code translate="no" dir="ltr">create(activity: Activity)</code>
      method to the
      <code translate="no" dir="ltr">ProjectedActivityCompat</code>
      (
      <a href="https://android-review.googlesource.com/#/q/If4773d4a30b80572b08a10ee622f4be3dd751e0c">If4773</a>
      ,
      <a href="https://issuetracker.google.com/issues/479214966">b/479214966</a>
      )
    </li>
  </ul>
