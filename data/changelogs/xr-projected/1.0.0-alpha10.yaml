#language=html
changelogHtml: |
  <h3 id="1.0.0-alpha10" data-text="Version 1.0.0-alpha10" tabindex="-1">Version 1.0.0-alpha10</h3>
  <p>July 15, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.projected:projected:1.0.0-alpha10</code>
    ,
    <code translate="no" dir="ltr">androidx.xr.projected:projected-binding:1.0.0-alpha10</code>
    , and
    <code translate="no" dir="ltr">androidx.xr.projected:projected-testing:1.0.0-alpha10</code>
    are released. Version 1.0.0-alpha10 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/dd34e9d11afb54183d16f86d530f3775b4caeb0d..3bb7062224bc3aafaa5b8ff46cd3c4d740dde289/xr/projected">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Deprecated the
      <code translate="no" dir="ltr">ProjectedPermissionsResultContract</code>
      . Use
      <code translate="no" dir="ltr">ProjectedActivityCompat.requestPermissions()</code>
      instead. (
      <a href="https://android-review.googlesource.com/#/q/I141d5713b3a0c26606f85815111fa7af88f63269">I141d5</a>
      ,
      <a href="https://issuetracker.google.com/issues/515699436">b/515699436</a>
      )
    </li>
    <li>
      Added the
      <code translate="no" dir="ltr">requestPermissions()</code>
      API to the
      <code translate="no" dir="ltr">ProjectedActivityCompat</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I2edb5fa7b1a1d00764b0faa8be587178698eb1f7">I2edb5</a>
      ,
      <a href="https://issuetracker.google.com/issues/433523713">b/433523713</a>
      ,
      <a href="https://issuetracker.google.com/issues/508189550">b/508189550</a>
      )
    </li>
  </ul>
