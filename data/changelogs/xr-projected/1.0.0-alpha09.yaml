changelogHtml: |
  <h3 id="1.0.0-alpha09" data-text="Version 1.0.0-alpha09" tabindex="-1">Version 1.0.0-alpha09</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.projected:projected:1.0.0-alpha09</code>
    ,
    <code translate="no" dir="ltr">androidx.xr.projected:projected-binding:1.0.0-alpha09</code>
    , and
    <code translate="no" dir="ltr">androidx.xr.projected:projected-testing:1.0.0-alpha09</code>
    are released. Version 1.0.0-alpha09 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/326d73f28026a67b1a67b91d525146cb1128068f..dd34e9d11afb54183d16f86d530f3775b4caeb0d/xr/projected">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added support for battery state to
      <code translate="no" dir="ltr">ProjectedTestRule</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I6b28efb2f85e3fa7e7e57adc07cbf676ead9398a">I6b28e</a>
      )
    </li>
    <li>
      Added listening to battery state changes to the
      <code translate="no" dir="ltr">ProjectedDeviceController</code>
      (
      <a href="https://android-review.googlesource.com/#/q/If89664837057f6fbca0f32c1d9c130644b3c4c35">If8966</a>
      )
    </li>
    <li>
      Added support for audio devices to
      <code translate="no" dir="ltr">ProjectedTestRule</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I5d1c916e167672ce7f4ac895b35e9082d1a36a04">I5d1c9</a>
      )
    </li>
    <li>
      Added support for audio devices to the
      <code translate="no" dir="ltr">ProjectedDeviceController</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I7681d1db5ed8a7fdc2213ff91cd6445735411b78">I7681d</a>
      )
    </li>
  </ul>
