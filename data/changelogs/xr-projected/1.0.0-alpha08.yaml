changelogHtml: |
  <h3 id="1.0.0-alpha08" data-text="Version 1.0.0-alpha08" tabindex="-1">Version 1.0.0-alpha08</h3>
  <p>May 19, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.xr.projected:projected:1.0.0-alpha08</code>
    ,
    <code translate="no" dir="ltr">androidx.xr.projected:projected-binding:1.0.0-alpha08</code>
    , and
    <code translate="no" dir="ltr">androidx.xr.projected:projected-testing:1.0.0-alpha08</code>
    are released. Version 1.0.0-alpha08 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/7e145b73c783ec04028705f50e32995be9407cef..326d73f28026a67b1a67b91d525146cb1128068f/xr/projected">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">ProjectedTestRule</code>
      to support unit testing. (
      <a href="https://android-review.googlesource.com/#/q/I69db588cc6c62d97f7b59118ef40ff0bb2c52d04">I69db5</a>
      )
    </li>
  </ul>
  <p><strong>Known Issues</strong></p>
  <ul>
    <li>
      Erroneously bumped
      <code translate="no" dir="ltr">compileSdk</code>
      to API 37. This means that a minimum AGP version of 9.2.0 is required for this release. It will be reduced to 36 in the next release. (
      <a href="https://android-review.googlesource.com/#/q/Id45cdca34ef948e06259b2dd9adc901b7c930492">Id45cd</a>
      )
    </li>
  </ul>
