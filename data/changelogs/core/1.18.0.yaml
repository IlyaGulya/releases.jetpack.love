version: 1.18.0
releaseDate: 2026-03-11
#language=html
changelogHtml: |
  <h3 id="1.18.0" data-text="Version 1.18.0" tabindex="-1">Version 1.18.0</h3>
  <p>March 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.core:core:1.18.0</code>
    ,
    <code translate="no" dir="ltr">androidx.core:core-ktx:1.18.0</code>
    , and
    <code translate="no" dir="ltr">androidx.core:core-testing:1.18.0</code>
    are released. Version 1.18.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/6d6d409113492a342806d502d7572e4dcf8c6ad1..d0311626e34d3399038ccd85c9ea91f7297de350/core">these commits</a>
    .
  </p>
  <p><strong>Important changes since 1.17.0:</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">compileSdk</code>
      changed from API 36 to API 36.1
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">NotificationCompat.ProjectedExtender</code>
      to support notifications on projected devices.
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">PictureInPictureUiStateCompat</code>
      to help handle API differences for picture-in-picture feature
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">AccessibilityNodeInfoCompat.SelectionCompat</code>
      to help handle accessibility selection on devices running API 36.1
    </li>
  </ul>
