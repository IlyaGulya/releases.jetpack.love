changelogHtml: |
  <h3 id="1.0.0" data-text="Version 1.0.0" tabindex="-1">Version 1.0.0</h3>
  <p>June 17, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.core:core-location-altitude:1.0.0</code>
    ,
    <code translate="no" dir="ltr">androidx.core:core-location-altitude-external-protobuf:1.0.0</code>
    , and
    <code translate="no" dir="ltr">androidx.core:core-location-altitude-proto:1.0.0</code>
    are released. Version 1.0.0 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ee961773bd6a83b5a65e1eded92c3ac09e4fe81f..a95266623bd2e6b286cbd12c2eefec5b9845316a/core">these commits</a>
    .
  </p>
  <p><strong>Major features of 1.0.0:</strong></p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Moves libraries to use Java 11 target. This means produced bytecode will be Java 11 (class file version 55) and might require desugaring to use the library (
      <a href="https://android-review.googlesource.com/#/q/If4c2a6fdda1278f42ea080fa365e8b437b2c2ae6">If4c2a</a>
      ,
      <a href="https://issuetracker.google.com/issues/457821470">b/457821470</a>
      )
    </li>
    <li>
      Add ViewBoundsTracker class to continuously track the view bounds for setting sourceRectHint in PictureInPictureParamsCompat (
      <a href="https://android-review.googlesource.com/#/q/Id203aa25cb63addc6585c6eb721d99e5b195177b">Id203a</a>
      ,
      <a href="https://issuetracker.google.com/issues/474454111">b/474454111</a>
      )
    </li>
    <li>
      Add PictureInPictureParamsValidator class to validate the app provided PictureInPictureParamsCompat (
      <a href="https://android-review.googlesource.com/#/q/I89b4d813f42c42687eb10bb45005f6765c210990">I89b4d</a>
      ,
      <a href="https://issuetracker.google.com/issues/470149490">b/470149490</a>
      )
    </li>
    <li>
      Add the Pixel Dec release to the list of fixed build fingerprints in KI_398591036 (
      <a href="https://android-review.googlesource.com/#/q/I65f51f92c528ca7483476bb5ab9d0f0e7f603ca1">I65f51</a>
      ,
      <a href="https://issuetracker.google.com/issues/398591036">b/398591036</a>
      )
    </li>
    <li>
      Add the Pixel Nov release to the list of fixed build fingerprints in KI_398591036 (
      <a href="https://android-review.googlesource.com/#/q/I60c10c18a5cbe68a2a5aaa45aae6caf314de0179">I60c10</a>
      ,
      <a href="https://issuetracker.google.com/issues/398591036">b/398591036</a>
      )
    </li>
    <li>
      Add the Pixel Oct release to the list of fixed build fingerprints in KI_398591036 (
      <a href="https://android-review.googlesource.com/#/q/I6438cbd8db15b8ad545eff1c3b492385a1002a5f">I6438c</a>
      ,
      <a href="https://issuetracker.google.com/issues/398591036">b/398591036</a>
      )
    </li>
    <li>
      Removed references to FingerprintManager class from FingerprintManagerCompat and updated all methods to return false or no-op. (
      <a href="https://android-review.googlesource.com/#/q/I0360b3ef856865097df80d3d98953978d1e86de7">I0360b</a>
      ,
      <a href="https://issuetracker.google.com/issues/330524057">b/330524057</a>
      )
    </li>
    <li>
      Fix the code links in documentation for KI_452390376 (
      <a href="https://android-review.googlesource.com/#/q/I9a554376ca3be01cc6a79cda3349d0d4fb23c070">I9a554</a>
      ,
      <a href="https://issuetracker.google.com/issues/454020407">b/454020407</a>
      )
    </li>
    <li>
      Mark specifig pixel builds as fixed. (
      <a href="https://android-review.googlesource.com/#/q/I4c7519189c6fd1a792333925e0a1bd3cbb37c712">I4c751</a>
      ,
      <a href="https://issuetracker.google.com/issues/398591036">b/398591036</a>
      )
    </li>
    <li>
      Add support for specifying a list of manually tested build fingerprints for a KnownIssue. (
      <a href="https://android-review.googlesource.com/#/q/Iea9f9f14a4c81a66689552d59ecaf2b41f02c494">Iea9f9</a>
      ,
      <a href="https://issuetracker.google.com/issues/453691379">b/453691379</a>
      )
    </li>
  </ul>
