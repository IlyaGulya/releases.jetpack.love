  <h4 id="core-location-altitude-1.0.0-alpha03" data-text="Version 1.0.0-alpha03" tabindex="-1">Version 1.0.0-alpha03</h4>
  <p>October 16, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.core:core-location-altitude:1.0.0-alpha03</code>
    ,
    <code translate="no" dir="ltr">androidx.core:core-location-altitude-external-protobuf:1.0.0-alpha03</code>
    , and
    <code translate="no" dir="ltr">androidx.core:core-location-altitude-proto:1.0.0-alpha03</code>
    are released. Version 1.0.0-alpha03 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/f5541f29d045c6ba9734689ec67891f8d667412b..b8a68b0896897fa158508d73a31998a26161d9a7/core">these commits</a>
    .
  </p>
  <p><strong>Security fix</strong></p>
  <ul>
    <li>
      As of
      <a href="https://android-review.googlesource.com/q/topic:%22protobuf-4.28.2%22">this change</a>
      , androidx compiles against protobuf 4.28.2 in order to address
      <a href="https://nvd.nist.gov/vuln/detail/CVE-2024-7254">CVE-2024-7254</a>
      . Upgrade your dependency on
      <code translate="no" dir="ltr">androidx.core:core-location-altitude-proto</code>
      and
      <code translate="no" dir="ltr">androidx.core:core-location-altitude-external-protobuf</code>
      to 1.1.0-alpha03 to address the vulnerability risk.
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Removed manual outlining of access to new platform APIs since this happens automatically via API modeling when using R8 with AGP 7.3 or later (e.g. R8 version 3.3) and for all builds when using AGP 8.1 or later (e.g. D8 version 8.1). Clients who are not using AGP are advised to update to D8 version 8.1 or later. See
      <a href="https://medium.com/androiddevelopers/mitigating-soft-verification-issues-in-r8-and-d8-7e9e06827dfd">this article</a>
      for more details. (
      <a href="https://android-review.googlesource.com/#/q/Ieb9aecd2af5587c5b82833146fee6e912693ab7b">Ieb9ae</a>
      ,
      <a href="https://issuetracker.google.com/issues/345472586">b/345472586</a>
      )
    </li>
  </ul>
  <h4 id="core-location-altitude-1.0.0-alpha02" data-text="Version 1.0.0-alpha02" tabindex="-1">Version 1.0.0-alpha02</h4>
  <p>June 12, 2024</p>
  <p>
    <code translate="no" dir="ltr">androidx.core:core-location-altitude:1.0.0-alpha02</code>
    ,
    <code translate="no" dir="ltr">androidx.core:core-location-altitude-external-protobuf:1.0.0-alpha02</code>
