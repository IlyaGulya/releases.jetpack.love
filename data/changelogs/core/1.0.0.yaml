  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>Fixes proguard failure caused by the repackaging of proto libraries.</li>
  </ul>
  <p><strong>External Contribution</strong></p>
  <ul>
    <li>Bug fix above provided by andrekir@pm.me</li>
  </ul>
  <h4 id="core-location-altitude-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h4>
