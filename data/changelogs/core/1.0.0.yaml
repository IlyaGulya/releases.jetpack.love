  <h2 id="core-pip_2" data-text="Core-pip" tabindex="-1">Core-pip</h2>
  <h3 id="version_10_23" data-text="Version 1.0" tabindex="-1">Version 1.0</h3>
  <h4 id="core-pip-1.0.0-alpha02" data-text="Version 1.0.0-alpha02" tabindex="-1">Version 1.0.0-alpha02</h4>
  <p>February 11, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.core:core-pip:1.0.0-alpha02</code>
    is released. Version 1.0.0-alpha02 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c4e491baa54e95e632dbbac0df9b66a7e62ad17f..2e98d140740558dc55710bde96311d2e0e8d5cfd/core/core-pip">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">BasicPictureInPicture</code>
      and
      <code translate="no" dir="ltr">VideoPlaybackPictureInPicture</code>
      to streamline standard implementations. The new
      <code translate="no" dir="ltr">VideoPlaybackPictureInPicture</code>
      class allows the library to handle view-bounds tracking automatically, ensuring smoother visual transitions.
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Remove the
      <code translate="no" dir="ltr">onViewBoundsChanged</code>
      API (
      <a href="https://android-review.googlesource.com/#/q/Ie56d0c9472eee965067a9f598a8225ea5df7aaef">Ie56d0</a>
      ,
      <a href="https://issuetracker.google.com/issues/475328144">b/475328144</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">BasicPictureInPicture</code>
      and
      <code translate="no" dir="ltr">VideoPlaybackPictureInPicture</code>
      classes for typical PiP usages (
      <a href="https://android-review.googlesource.com/#/q/I7f9895dd5a0c6a5853dda519faf0ac62a4f9d5c1">I7f989</a>
      ,
      <a href="https://issuetracker.google.com/issues/475328144">b/475328144</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">ViewBoundsTracker</code>
      class to continuously track the view bounds for setting
      <code translate="no" dir="ltr">sourceRectHint</code>
      in
      <code translate="no" dir="ltr">PictureInPictureParamsCompat</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Id203aa25cb63addc6585c6eb721d99e5b195177b">Id203a</a>
      ,
      <a href="https://issuetracker.google.com/issues/474454111">b/474454111</a>
      )
    </li>
  </ul>
  <h4 id="core-pip-1.0.0-alpha01" data-text="Version 1.0.0-alpha01" tabindex="-1">Version 1.0.0-alpha01</h4>
  <p>January 14, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.core:core-pip:1.0.0-alpha01</code>
    is released. Version 1.0.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/c4e491baa54e95e632dbbac0df9b66a7e62ad17f/core/core-pip">these commits</a>
    .
  </p>
  <p><strong>New Features</strong></p>
  <p>The PiP Jetpack library is introduced to address several challenges in Android's Picture-in-Picture (PiP) mode:</p>
  <ul>
    <li>
      OS Fragmentation: The library handles differences in PiP API calls across Android versions, such as
      <code translate="no" dir="ltr">enterPictureInPictureMode</code>
      before Android S and
      <code translate="no" dir="ltr">isAutoEnterEnabled</code>
      after.
    </li>
    <li>Incorrect PiP Parameters: It provides a unified solution for setting correct PiP parameters, especially for playback, to ensure smooth animations (e.g., source rect hint).</li>
    <li>
      Fragmented PiP State Callbacks: The library consolidates
      <code translate="no" dir="ltr">onPictureInPictureModeChanged</code>
      and
      <code translate="no" dir="ltr">onPictureInPictureUiStateChanged</code>
      into a single, unified callback interface for simplified state management.
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      <code translate="no" dir="ltr">PictureInPictureDelegate</code>
      class that helps setup PiP (Picture-in-Picture) functionalities on behalf of the given
      <code translate="no" dir="ltr">PictureInPictureProvider</code>
      instance (
      <a href="https://android-review.git.corp.google.com/c/platform/frameworks/support/+/3857454">8cf9588</a>
      ).
    </li>
    <li>
      <code translate="no" dir="ltr">PictureInPictureDelegate.onPictureInPictureEvent</code>
      interface that provides a unified callback for application to listen on Picture-in-Picture events (
      <a href="https://android-review.git.corp.google.com/c/platform/frameworks/support/+/3857454">8cf9588</a>
      ).
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Add
      <code translate="no" dir="ltr">PictureInPictureParamsValidator</code>
      class to validate the app provided
      <code translate="no" dir="ltr">PictureInPictureParamsCompat</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I89b4d813f42c42687eb10bb45005f6765c210990">I89b4d</a>
      ,
      <a href="https://issuetracker.google.com/issues/470149490">b/470149490</a>
      )
    </li>
    <li>
      A dedicated
      <code translate="no" dir="ltr">:core:core-pip</code>
      library is introduced to help app developers implementing the Android PiP (Picture-in-Picture) feature (
      <a href="https://android-review.googlesource.com/#/q/I8ebc5081a0067d80f1ae9e01578e36370a71be1a">I8ebc5</a>
      ,
      <a href="https://issuetracker.google.com/issues/462178249">b/462178249</a>
      )
    </li>
  </ul>
