changelogHtml: |
  <h3 id="1.19.0-alpha01" data-text="Version 1.19.0-alpha01" tabindex="-1">Version 1.19.0-alpha01</h3>
  <p>April 08, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.core:core:1.19.0-alpha01</code>
    ,
    <code translate="no" dir="ltr">androidx.core:core-ktx:1.19.0-alpha01</code>
    , and
    <code translate="no" dir="ltr">androidx.core:core-testing:1.19.0-alpha01</code>
    are released. Version 1.19.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/d0311626e34d3399038ccd85c9ea91f7297de350..684b3295267fc81724f6bd72bf540c456cc1d347/core">these commits</a>
    .
  </p>
  <p><strong>Important Changes</strong></p>
  <ul>
    <li>
      core-ktx APIs have been merged into the core library. All Kotlin extensions are now part of the main core artifact. core-ktx is now an empty artifact for compatibility. (
      <a href="https://android-review.googlesource.com/#/q/I6adbeb4b24f7f71c7885e72d3e8e1c3a37f425ab">I6adbe</a>
      )
    </li>
  </ul>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Add new APIs to get and set math info (
      <a href="https://android-review.googlesource.com/#/q/Ib5ad3c55c42e0e7c294d9202a3125ff97c548bff">Ib5ad3</a>
      ,
      <a href="https://issuetracker.google.com/issues/394599312">b/394599312</a>
      )
    </li>
    <li>
      Add variation settings to customize downloadable variable fonts (
      <a href="https://android-review.googlesource.com/#/q/Ifdc9339f5b4f1ed9146807742705fc8d7d84b0b4">Ifdc93</a>
      ,
      <a href="https://issuetracker.google.com/issues/223262013">b/223262013</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">unwrap()</code>
      to
      <code translate="no" dir="ltr">AccessibilityNodeInfoCompat.SelectionCompat</code>
      to retrieve the underlying platform
      <code translate="no" dir="ltr">AccessibilityNodeInfo.Selection</code>
      object. (
      <a href="https://android-review.googlesource.com/#/q/I3078a8ddb3fe55bdc5c57cae06795296b191a365">I3078a</a>
      ,
      <a href="https://issuetracker.google.com/issues/479902413">b/479902413</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">getView()</code>
      and
      <code translate="no" dir="ltr">getVirtualDescendantId()</code>
      to
      <code translate="no" dir="ltr">AccessibilityNodeInfoCompat.SelectionPositionCompat</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/Ib0c48a0bc53935bc5f5dc8729500d9435ada60cb">Ib0c48</a>
      ,
      <a href="https://issuetracker.google.com/issues/362783892">b/362783892</a>
      )
    </li>
    <li>
      Corrects
      <code translate="no" dir="ltr">ACTION_ARGUMENT_SELECTION_PARCELABLE</code>
      definition in AndroidX to match that within the framework sdk to have a single action literal. (
      <a href="https://android-review.googlesource.com/#/q/Ib40afdb9771e6cbbe0569798bf9e008323830a63">Ib40af</a>
      ,
      <a href="https://issuetracker.google.com/issues/479852824">b/479852824</a>
      )
    </li>
    <li>
      Add
      <code translate="no" dir="ltr">EXTRA_PREFER_SMALL_ICON</code>
      key constant to
      <code translate="no" dir="ltr">NotificationCompat</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I713c9038cff97e3ae74fa1845b852f77fe3e0068">I713c9</a>
      ,
      <a href="https://issuetracker.google.com/issues/469460575">b/469460575</a>
      ,
      <a href="https://issuetracker.google.com/issues/478869887">b/478869887</a>
      )
    </li>
    <li>
      Add support for
      <code translate="no" dir="ltr">MetricStyle</code>
      , semantic style, and related APIs in
      <code translate="no" dir="ltr">NotificationCompat</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I6c1941302a2ec5d61c3d83fa9c34343e54991f72">I6c194</a>
      ,
      <a href="https://issuetracker.google.com/issues/445685015">b/445685015</a>
      ,
      <a href="https://issuetracker.google.com/issues/446155056">b/446155056</a>
      ,
      <a href="https://issuetracker.google.com/issues/446157356">b/446157356</a>
      ,
      <a href="https://issuetracker.google.com/issues/467924497">b/467924497</a>
      )
    </li>
    <li>
      Annotate
      <code translate="no" dir="ltr">BuildCompat.isAtLeastB_1</code>
      with @ChecksSdkIntAtLeast (
      <a href="https://android-review.googlesource.com/#/q/I18a281e4da7733751ff0819a0795f833cf818e94">I18a28</a>
      ,
      <a href="https://issuetracker.google.com/issues/462789273">b/462789273</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fixed
      <code translate="no" dir="ltr">equals()</code>
      method behavior in
      <code translate="no" dir="ltr">AccessibilityNodeInfoCompat.SelectionPositionCompat</code>
      and
      <code translate="no" dir="ltr">AccessibilityNodeInfoCompat.SelectionCompat</code>
      to properly evaluate equality. (
      <a href="https://android-review.googlesource.com/#/q/Icbe1d9cc8ab54d92641d5e758c5049b341b6d8db">Icbe1d</a>
      ,
      <a href="https://issuetracker.google.com/issues/495537199">b/495537199</a>
      )
    </li>
  </ul>
  <h2 id="core-pip_version_10_2" data-text="Core-Pip Version 1.0" tabindex="-1">Core-Pip Version 1.0</h2>
