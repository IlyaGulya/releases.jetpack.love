changelogHtml: |
  <h3 id="2.12.0-alpha01" data-text="Version 2.12.0-alpha01" tabindex="-1">Version 2.12.0-alpha01</h3>
  <p>July 15, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.work:work-*:2.12.0-alpha01</code>
    is released. Version 2.12.0-alpha01 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/ca9838b48d87bc75d30b12a4b187c2f6da47308f..d8b87d55dbba210659e3477c5fedc17e51f9dd5b/work">these commits</a>
    .
  </p>
  <p><strong>API Changes</strong></p>
  <ul>
    <li>
      Added
      <code translate="no" dir="ltr">WorkMetricsQuery</code>
      API to filter metric info (
      <a href="https://android-review.googlesource.com/#/q/I132b407c5358f981fd698888ed11ec7e85fe6356">I132b4</a>
      ,
      <a href="https://issuetracker.google.com/issues/522338412">b/522338412</a>
      )
    </li>
    <li>
      Implement
      <code translate="no" dir="ltr">workerDurationMillis</code>
      and
      <code translate="no" dir="ltr">totalRuntimeMillis</code>
      in
      <code translate="no" dir="ltr">WorkMetricsInfo</code>
      to track worker execution duration and total cumulative runtime. (
      <a href="https://android-review.googlesource.com/#/q/I57f658f4b7613741af3991c7c7dc046768b16ab3">I57f65</a>
      ,
      <a href="https://issuetracker.google.com/issues/507212208">b/507212208</a>
      )
    </li>
    <li>
      Added
      <code translate="no" dir="ltr">retentionDuration</code>
      (Duration, API 26+) and
      <code translate="no" dir="ltr">retentionTime</code>
      /
      <code translate="no" dir="ltr">retentionTimeUnit</code>
      (API 23+) constructors to
      <code translate="no" dir="ltr">WorkMetricsInfoRepository</code>
      to allow pruning old metrics, defaulting to 7 days. (
      <a href="https://android-review.googlesource.com/#/q/Ifdf2ec626b62f8d67c748e3b3999c1406d629e9d">Ifdf2e</a>
      ,
      <a href="https://issuetracker.google.com/issues/522338412">b/522338412</a>
      )
    </li>
    <li>
      Add flow API for finished
      <code translate="no" dir="ltr">WorkMetricsInfo</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I11ec240ad486d5ee2c7add20b32377ef0a67169a">I11ec2</a>
      ,
      <a href="https://issuetracker.google.com/issues/507212999">b/507212999</a>
      )
    </li>
    <li>
      Add missing experimental annotation to
      <code translate="no" dir="ltr">work-analytics</code>
      classes (
      <a href="https://android-review.googlesource.com/#/q/I1a055fdedaa767b16343223db2edc303416ca003">I1a055</a>
      ,
      <a href="https://issuetracker.google.com/issues/528112001">b/528112001</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">androidx.benchmark</code>
      now has a
      <code translate="no" dir="ltr">minSdk</code>
      of 24. (
      <a href="https://android-review.googlesource.com/#/q/Ic2a8500af8a2bf092fcc1b27d9a599aa5f3b81d7">Ic2a85</a>
      )
    </li>
    <li>
      Implement
      <code translate="no" dir="ltr">stopReasonCounts</code>
      ,
      <code translate="no" dir="ltr">explicitRetryCount</code>
      , and
      <code translate="no" dir="ltr">runAttemptCount</code>
      in
      <code translate="no" dir="ltr">WorkMetricsInfo</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I95498759c69cdc9c8a5051fec64b01ea45fcf15d">I95498</a>
      ,
      <a href="https://issuetracker.google.com/issues/507212225">b/507212225</a>
      )
    </li>
    <li>
      Implement
      <code translate="no" dir="ltr">WorkMetricsInfo</code>
      APIs and database schema to track work execution history, including enqueue, unblock, first start and finish timestamps. (
      <a href="https://android-review.googlesource.com/#/q/I163e95c561a2118144c26b97d2ab645892664e23">I163e9</a>
      ,
      <a href="https://issuetracker.google.com/issues/479123623">b/479123623</a>
      ,
      <a href="https://issuetracker.google.com/issues/507212482">b/507212482</a>
      )
    </li>
    <li>
      Add experimental API to disable in-process opportunistic scheduling (
      <a href="https://android-review.googlesource.com/#/q/I1062d8f5b8741840891c7a8a27ed113e854925bc">I1062d</a>
      ,
      <a href="https://issuetracker.google.com/issues/513299442">b/513299442</a>
      )
    </li>
    <li>
      Add experimental API to listen to
      <code translate="no" dir="ltr">WorkManager</code>
      scheduling events (
      <a href="https://android-review.googlesource.com/#/q/I14487d29457fb3e0045b8242d3683562e1aeb9ee">I14487</a>
      ,
      <a href="https://issuetracker.google.com/issues/448485695">b/448485695</a>
      )
    </li>
    <li>
      Add worker class name to
      <code translate="no" dir="ltr">WorkInfo</code>
      (
      <a href="https://android-review.googlesource.com/#/q/I57da1d5e8bf9edbf4d7b8077989a8f4eaa7264f4">I57da1</a>
      ,
      <a href="https://issuetracker.google.com/issues/448485695">b/448485695</a>
      )
    </li>
    <li>
      Add more granular annotation to experimental event listener API (
      <a href="https://android-review.googlesource.com/#/q/Icaa8e2aa210f95dd762d80157155237ea9ac7fbb">Icaa8e</a>
      ,
      <a href="https://issuetracker.google.com/issues/448485695">b/448485695</a>
      )
    </li>
    <li>
      Add a new API that allows retrieving nullable string arrays from instances of
      <code translate="no" dir="ltr">Data</code>
      class (
      <a href="https://android-review.googlesource.com/#/q/I78bc3ed262fe129754d753d37c447e57af540e0b">I78bc3</a>
      ,
      <a href="https://issuetracker.google.com/issues/383071402">b/383071402</a>
      )
    </li>
    <li>
      Create
      <code translate="no" dir="ltr">work-analytics</code>
      artifact (
      <a href="https://android-review.googlesource.com/#/q/Idc7c2633bd7ebe774d414340448fdfb1a9f47b7c">Idc7c2</a>
      ,
      <a href="https://issuetracker.google.com/issues/465357612">b/465357612</a>
      )
    </li>
    <li>
      Add experimental API to set a listener for worker execution events (
      <a href="https://android-review.googlesource.com/#/q/I06b3830ebc4782eee6f3fe0557c9ee65e58de560">I06b38</a>
      ,
      <a href="https://issuetracker.google.com/issues/448485695">b/448485695</a>
      )
    </li>
  </ul>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Use
      <code translate="no" dir="ltr">Dispatchers.Default</code>
      instead of custom thread pool for the default WM configuration (
      <a href="https://android-review.googlesource.com/#/q/Ic2c428cbb13c290a594e88957fa02a7ef2b2fee7">Ic2c42</a>
      ,
      <a href="https://issuetracker.google.com/issues/506239869">b/506239869</a>
      )
    </li>
    <li>
      Improve and add tests to manage bad workers (
      <a href="https://android-review.googlesource.com/#/q/I500f355fe22088c9140e8bd9e60379410767ef62">I500f3</a>
      ,
      <a href="https://issuetracker.google.com/issues/506239869">b/506239869</a>
      )
    </li>
    <li>
      Fixed a
      <code translate="no" dir="ltr">ConcurrentModificationException</code>
      in
      <code translate="no" dir="ltr">WorkManager's</code>
      execution listener dispatch. (
      <a href="https://android-review.googlesource.com/#/q/I4cc187c9b71c2cfaebcc3eef4302242ddb473135">I4cc18</a>
      ,
      <a href="https://issuetracker.google.com/issues/506239869">b/506239869</a>
      )
    </li>
    <li>
      Fixed process crashes in
      <code translate="no" dir="ltr">WorkManager</code>
      when registering network constraint callbacks due to missing
      <code translate="no" dir="ltr">ACCESS_NETWORK_STATE</code>
      permissions. (
      <a href="https://android-review.googlesource.com/#/q/I7045a22600d6b29624c67ffd13539fa27eb95520">I7045a</a>
      ,
      <a href="https://issuetracker.google.com/issues/446013734">b/446013734</a>
      )
    </li>
    <li>
      Improve log detail when DEBUG logs are enabled (
      <a href="https://android-review.googlesource.com/#/q/Id9e5f8c9ade4ebfd4811cc91cfa3fe0899ebfff2">Id9e5f</a>
      ,
      <a href="https://issuetracker.google.com/issues/491209738">b/491209738</a>
      )
    </li>
    <li>
      Fix bug with retried work failing to schedule with the OS (
      <a href="https://android-review.googlesource.com/#/q/I452fcda5509083ec0dd8eb6bc1ddb1b1315a6aa6">I452fc</a>
      ,
      <a href="https://issuetracker.google.com/issues/504085166">b/504085166</a>
      ,
      <a href="https://issuetracker.google.com/issues/517339607">b/517339607</a>
      )
    </li>
    <li>
      Fixed
      <code translate="no" dir="ltr">Configuration.Provider</code>
      reference doc link (
      <a href="https://android-review.googlesource.com/#/q/Ieedb73c99122368c5c089bde42ec6eb6ae6f929a">Ieedb7</a>
      ,
      <a href="https://issuetracker.google.com/issues/340913210">b/340913210</a>
      )
    </li>
    <li>
      Made event hooks not blocking for operations (
      <a href="https://android-review.googlesource.com/#/q/I27cd8697069d433e4d432023baa57926fbf62caa">I27cd8</a>
      ,
      <a href="https://issuetracker.google.com/issues/448485695">b/448485695</a>
      )
    </li>
    <li>
      <code translate="no" dir="ltr">WorkManager</code>
      now retries initialization on generic
      <code translate="no" dir="ltr">SQLiteException</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I98436771ee136147e493c824ff1b7e3fff13bd66">I98436</a>
      ,
      <a href="https://issuetracker.google.com/issues/485368721">b/485368721</a>
      )
    </li>
    <li>
      Fixed an issue where developers could receive a nonexistent stop reason code of 0 by mapping it to
      <code translate="no" dir="ltr">WorkInfo.STOP_REASON_UNKNOWN</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I0b1751c5741e216013335d11d73d4d90ef8c0aa8">I0b175</a>
      ,
      <a href="https://issuetracker.google.com/issues/479314734">b/479314734</a>
      )
    </li>
    <li>
      Fix additional issues with network calls failing from background even when network constraint are met (
      <a href="https://android-review.googlesource.com/#/q/Ic7f73c833cc7c984e49aa09d8466fd0f222d3dab">Ic7f73</a>
      ,
      <a href="https://issuetracker.google.com/issues/445324855">b/445324855</a>
      )
    </li>
    <li>
      Handle security exception in
      <code translate="no" dir="ltr">NetworkStateTracker</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I4b7ca9a97566b4fa836c335ef18e37ed310ac471">I4b7ca</a>
      ,
      <a href="https://issuetracker.google.com/issues/480123154">b/480123154</a>
      )
    </li>
    <li>
      Ensure execution hooks get an accurate
      <code translate="no" dir="ltr">WorkInfo</code>
      snapshot (
      <a href="https://android-review.googlesource.com/#/q/I25ebb17c06123a44faca51ffc8b1efed3ec75717">I25ebb</a>
      ,
      <a href="https://issuetracker.google.com/issues/448485695">b/448485695</a>
      )
    </li>
    <li>
      Fixed an issue where background network requests could fail on Android 15. (
      <a href="https://android-review.googlesource.com/#/q/I60f241226361660db8513575fd4f8095b340069e">I60f24</a>
      ,
      <a href="https://android-review.googlesource.com/#/q/I8a0a2c029957335892d12a2df33a23ae0b77ab3e">I8a0a2</a>
      ,
      <a href="https://issuetracker.google.com/issues/452081708">b/452081708</a>
      ) (
      <a href="https://android-review.googlesource.com/#/q/I5abb7f65b095a0feefa8e2645baa742f48049cae">I5abb7</a>
      ,
      <a href="https://issuetracker.google.com/issues/465016918">b/465016918</a>
      )
    </li>
    <li>
      Fixed an issue where periodic
      <code translate="no" dir="ltr">WorkRequest</code>
      s that fail due to an uncaught exception would not be rescheduled. (
      <a href="https://android-review.googlesource.com/#/q/Ia6b9216b669b67441f0d429112059faf8fa806c9">Ia6b92</a>
      ,
      <a href="https://issuetracker.google.com/issues/443879071">b/443879071</a>
      )
    </li>
  </ul>
  <h2 id="version_211_2" data-text="Version 2.11" tabindex="-1">Version 2.11</h2>
