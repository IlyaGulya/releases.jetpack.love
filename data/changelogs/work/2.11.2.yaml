changelogHtml: |
  <h3 id="2.11.2" data-text="Version 2.11.2" tabindex="-1">Version 2.11.2</h3>
  <p>March 25, 2026</p>
  <p>
    <code translate="no" dir="ltr">androidx.work:work-*:2.11.2</code>
    is released. Version 2.11.2 contains
    <a href="https://android.googlesource.com/platform/frameworks/support/+log/5a3057b3fba2ecd31580689419aff5f082f9efdc..ca9838b48d87bc75d30b12a4b187c2f6da47308f/work">these commits</a>
    .
  </p>
  <p><strong>Bug Fixes</strong></p>
  <ul>
    <li>
      Fix additional issues with network calls failing from background even when network constraint are met (
      <a href="https://android-review.googlesource.com/#/q/Ic7f73c833cc7c984e49aa09d8466fd0f222d3dab">Ic7f73</a>
      ,
      <a href="https://issuetracker.google.com/issues/445324855">b/445324855</a>
      )
    </li>
    <li>
      Handle security exception in
      <code translate="no" dir="ltr">NetworkStateTracker</code>
      . (
      <a href="https://android-review.googlesource.com/#/q/I4b7ca9a97566b4fa836c335ef18e37ed310ac471">I4b7ca</a>
      ,
      <a href="https://issuetracker.google.com/issues/480123154">b/480123154</a>
      )
    </li>
    <li>
      Fixed an issue where periodic
      <code translate="no" dir="ltr">WorkRequest</code>
      s that fail due to an uncaught exception would not be rescheduled. (
      <a href="https://android-review.googlesource.com/#/q/Ia6b9216b669b67441f0d429112059faf8fa806c9">Ia6b92</a>
      ,
      <a href="https://issuetracker.google.com/issues/443879071">b/443879071</a>
      )
    </li>
  </ul>
